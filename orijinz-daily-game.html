rald was the first to mention it in his 1920 novel, This Side of Paradise.","def":"","answer":"DAIQUIRI","tidbit":""},{"cat":"phrase","origin":"Meaning \"to annoy,\" this phrase likely refers to petting a cat from the back toward the head rather than the other way around.","def":"","answer":"RUB THE WRONG WAY","tidbit":""},{"cat":"word","origin":"Likely an alteration of a British word for the gilded brass ring used in a con game in which the brass ring is sold as a gold one.","def":"Fake or fictitious.","answer":"PHONY","tidbit":"\"Fawney\" is the British word for the gilded brass ring."},{"cat":"word","origin":"A martial-arts term derived from Japanese words meaning \"empty hand.\"","def":"","answer":"KARATE","tidbit":""},{"cat":"word","origin":"From the custom, in Venice, Italy, of keeping ships from plague-stricken countries waiting in port for 40 days.","def":"A period of enforced isolation.","answer":"QUARANTINE","tidbit":""},{"cat":"word","origin":"From an Italian word that originally meant \"sudden shock\" or \"horror\" and evolved to mean \"whim.\" The Italian word is likely a blend of caput meaning \"head\" with riggio meaning \"hedgehog,\" akin to a frightened person whose hair is standing on end like the spines of a hedgehog.","def":"Impulsive and unreliable.","answer":"CAPRICIOUS","tidbit":"The Italian word is capriccio."},{"cat":"word","origin":"From an Old English word meaning \"male horse.\" When \"man\" was added to the end, it referred to a squire who walked or rode a horse beside a person of high honor. Today the word refers to a loyal aide, often one who engages in illegal activities for a powerful crime boss.","def":"","answer":"HENCHMAN","tidbit":"Some etymologists believe henchman has nothing to do with horses and would consider this origin to be a mistake."},{"cat":"word","origin":"The Portuguese used this word, which evolved from a Sanskrit word for \"counselor,\" to describe Chinese officials. Today it is more commonly used to refer to a fruit with the orange color of the robes these officials wore.","def":"","answer":"MANDARIN","tidbit":""},{"cat":"phrase","origin":"This 16th century phrase has a nautical origin. The first key word meant the ship was traveling into the wind. The second meant the ship was sailing with the wind at its back. Sailors put the words together to mean they would go wherever the wind took them. The phrase now means \"in general,\" \"all things considered\" or \"for the most part.\"","def":"","answer":"BY AND LARGE","tidbit":""},{"cat":"word","origin":"In 17th-century Britain, a plot to blow up Parliament was foiled, and the conspirators were executed. On November 5, Londoners celebrated by burning human likenesses in bonfires, which were called by this word. It later evolved to mean \"a person of strange appearance or dress.\" In the US, it came to mean \"man\" and eventually \"a person of either sex.\"","def":"","answer":"GUY","tidbit":"Guy Fawkes' Day (and Night) is still celebrated today in Britain on November 5 with fireworks and sometimes Halloween-like activities."},{"cat":"words","origin":"Both of these words are derived from a Latin word meaning \"healthy.\" The first one, in its verb form, means \"to address with courtesy or honor.\" The second one, a noun, is a simultaneous discharge of two or more guns, sometimes conducted as a show of respect or honor.","def":"","answer":"SALUTE & SALVO","tidbit":""},{"cat":"word","origin":"This adjective refers to something \"complex and clandestine\" and comes from the name of an ancient city known for its political infighting and intrigue as well as for its unique art and architecture. Now called Istanbul, it was formerly Constantinople.","def":"","answer":"BYZANTINE","tidbit":""},{"cat":"phrase","origin":"This phrase, meaning \"helpless,\" may have originated as a term for a person being secured to a wooden cylinder to be flogged or hazed.","def":"","answer":"OVER A BARREL","tidbit":""},{"cat":"word","origin":"From a Latin word for \"dark,\" this adjective means \"hidden or unclear.\"","def":"","answer":"OBSCURE","tidbit":""},{"cat":"phrase","origin":"This phrase is associated with the ad agencies located on Madison Avenue in New York City in the 1950s and 1960s. It was popularized in the 1957 film 12 Angry Men and again, much later, in the TV series Mad Men. It means \"to tentatively present an idea to your superiors and see whether it receives a favorable reaction.\"","def":"","answer":"RUN UP THE FLAGPOLE","tidbit":""},{"cat":"phrase","origin":"Originally, in the 18th century, this phrase referred to a type of petition, often used by sailors, in which the complainants signed their names in a circle, to hide who had signed first. This phrase may also be related to a similar type of French petition in which the names were written on a circle of ribbon.","def":"Activities that operate in a rotational manner, such as tournaments in which each player plays every other.","answer":"ROUND ROBIN","tidbit":""},{"cat":"word","origin":"From a German word meaning \"garden of children.\"","def":"A school class for children between the ages of four and six.","answer":"KINDERGARTEN","tidbit":""},{"cat":"word","origin":"From a Dutch word meaning \"to dip\" or \"thick dipping sauce,\" this word became slang for a stupid person in the mid-1800s. Then, in the late 1800s, opium smokers turned it into a slang word meaning \"drug.\" In 1981, American rappers developed a new slang meaning for it of \"excellent,\" which is still common today.","def":"","answer":"DOPE","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"to overturn,\" this word originally referred to the conclusion of a drama, usually a tragedy, in which the ending was the opposite of what was expected. By the early 1600s, the word was being used more generally for any unhappy ending. By the 18th century, it had come to refer to truly devastating sudden events, such as earthquakes, fires and floods. Today it can also figuratively refer to minor disasters.","def":"","answer":"CATASTROPHE","tidbit":""},{"cat":"phrase","origin":"The first word of this two-word phrase comes from a slang term for a one-time professional engagement, usually a musical performance. The phrase itself describes a sector of the service industry, like Lyft or Uber, centered around independent or freelance workers, who frequently work part time.","def":"","answer":"GIG ECONOMY","tidbit":"The definitive origin of the word \"gig\" is highly debated but ultimately unknown. When first recorded around the 1920s, it referred to one-time jazz performances."},{"cat":"word","origin":"From a Latin word meaning \"roots,\" this adjective for centuries referred to the roots of things, such as trees, words, numbers or illnesses. Over time it took on the figurative meaning of \"fundamental,\" as roots are fundamental to a tree. But in 1797 England, when the term was used to call for fundamental political reform, the word took on a new meaning of \"extreme.\"","def":"","answer":"RADICAL","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to lie upon,\" this verb literally means \"to sit on an egg in order to provide the warmth needed to hatch it.\" It has the figurative meaning of \"to develop or foster something,\" such as an idea.","def":"","answer":"INCUBATE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"suffering,\" this noun had a strictly theological usage for centuries, referring to the sufferings of Christ on the cross. In the 13th century, it evolved to mean anyone's martyrdom or physical suffering. Today it more often refers to powerful emotions or lust.","def":"","answer":"PASSION","tidbit":""},{"cat":"word","origin":"From French words meaning \"distant writing.\" It was a popular communication technology in the late 18th and early 19th century.","def":"An apparatus for communication at a distance via coded signals; in sporting terminology, to unintentionally alert an opponent of your intention.","answer":"TELEGRAPH","tidbit":""},{"cat":"word","origin":"Literally \"black bile\" in Greek. Ancient doctors believed that the balance of four body \ufb02uids - blood, phlegm, black bile and yellow bile - determined temperament and health. Black bile was associated with depression.","def":"Gloomy.","answer":"MELANCHOLY","tidbit":""},{"cat":"word","origin":"From Latin for \"to embrace, to comprise [a multitude of objects].\" Ancient medicine around the 14th century used this word to refer to a person's general nature or bodily constitution, which they believed came from the blending of the four primary qualities (hot, cold, dry, moist) or humors (blood, phlegm, choler, black choler). In medieval physiology, the color of the face was believed to indicate temperament or health.","def":"The color or hue of the skin, especially of the face.","answer":"COMPLEXION","tidbit":""},{"cat":"word","origin":"From the Latin galbinus, which means a light greenish-yellow, this word means \"to prejudice because of jealousy or resentment.\" Ancient doctors believed that too much yellow bile made a person surly and envious.","def":"To affect with envy or jealousy; to tinge the views or judgment of; also, a yellow discoloration of the skin.","answer":"JAUNDICE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"evil spirits of the dead\" or \"ghost.\" Swedish naturalist Carl Linnaeus chose this name for these primates \"because they go around mainly by night, in a certain way similar to humans, and roam with a slow pace.\"","def":"Nocturnal Madagascar mammal.","answer":"LEMUR","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"nearsighted\" or, literally, \"blinking to shut the eyes\" as nearsighted people do.","def":"Narrow-minded or shortsighted.","answer":"MYOPIC","tidbit":""},{"cat":"word","origin":"From the title of one of the great epic poems of ancient Greece, in which the hero spends 20 years traveling home from the Trojan War, experiencing amazing adventures along the way.","def":"A long voyage, usually marked by many changes of fortune and adventures.","answer":"ODYSSEY","tidbit":""},{"cat":"word","origin":"Comparing propping up a painting on a wooden stand to loading cargo on a donkey led to this noun, which is derived from the Dutch word for \"ass.\"","def":"A stand for supporting or displaying something.","answer":"EASEL","tidbit":""},{"cat":"words","origin":"Both of these foods derive from spoken Latin (also called Vulgar Latin). One means \"to salt,\" and the other means \"seasoned with salt.\"","def":"1) Minced meat stuffed into an intestine casing.2) An Italian version of #1.","answer":"SAUSAGE & SALAMI","tidbit":""},{"cat":"word","origin":"From Latin and ancient Greek words that literally mean \"nose-horned.\"","def":"Large mammal found in Africa and southern Asia.","answer":"RHINOCEROS","tidbit":""},{"cat":"word","origin":"From the Middle English gasten, \"to terrify,\" from gast, a Middle English spelling of the word \"ghost.\"","def":"Struck with terror or horror: shocked and upset.","answer":"AGHAST","tidbit":""},{"cat":"word","origin":"Likely derived from a French word meaning \"little bench.\" The word came to represent a small snack eaten on a low bench, but then its meaning dramatically changed to mean \"feast\" - for example, being mentioned in Homer's The Iliad.","def":"A feast; a sumptuous presentation of food and drink.","answer":"BANQUET","tidbit":""},{"cat":"word","origin":"From the same noun that evolved into the word \"freight.\" For centuries this word meant \"to load [a ship] with cargo.\" We now use it in a figurative sense to mean \"filled with tension.\"","def":"","answer":"FRAUGHT","tidbit":""},{"cat":"word","origin":"Originally this word meant \"insightful\" or \"clever,\" but sometime early in the 20th century American schoolkids started using it to mean \"attractive\" or \"pretty.\"","def":"","answer":"CUTE","tidbit":"\"Cute\" is a shortened version of \"acute\" and was even spelled \" 'cute\" at one time. Its original meaning still exists in the phrase \"Don't get cute with me.\""},{"cat":"word","origin":"An early-16th-century word for a symbol of abundance, from Latin for \"horn of plenty.\" According to a story in Greek mythology, Zeus was fed as an infant from the horn of a goat. Later, the horn was filled with flowers and fruit and given to him as a present.","def":"","answer":"CORNUCOPIA","tidbit":""},{"cat":"word","origin":"From a Latin phrase meaning \"holy by sacred rite,\" this is an adjective you don't want to mess around with.","def":"Extremely sacred or inviolable; immune from criticism, change or interference.","answer":"SACROSANCT","tidbit":""},{"cat":"word","origin":"This verb comes from the nickname of federal Indian Affairs agent W.E. Johnson (1862-1945), in charge of curbing liquor traffic on Indian reservations in Oklahoma, who was noted for his stealthy tactics. Think of the silent and sneaky movements of a cat.","def":"","answer":"PUSSYFOOT","tidbit":""},{"cat":"word","origin":"From a 16th-century French phrase meaning \"to sell half-ducks\" - an imaginative way to say \"to fool.\" It likely led to the contemporary meaning of the word: a hoax or fabrication.","def":"","answer":"CANARD","tidbit":"The French phrase was vendre des canards a moitie."},{"cat":"word","origin":"From an obsolete Dutch word for a person who treats patients with home remedies, which translates as \"seller or user of salve\" (ointments).","def":"A fraudulent doctor.","answer":"QUACK","tidbit":"The Dutch word is quacksalver."},{"cat":"word","origin":"This word with German roots refers to a ridge of land between two drainage areas, such as rivers or streams, and/or the area through which the water flows. In either case, the figurative meaning of a \"key turning point\" is now a popular usage for the word.","def":"","answer":"WATERSHED","tidbit":""},{"cat":"word","origin":"In the 1960s, Hall of Fame defensive lineman Deacon Jones popularized this verb. Quoting Jones: \"[It] is just like you devastate a city ... like you put all the offensive players in a bag, and I just take a baseball bat and beat on the bag.\"","def":"To tackle a football quarterback behind the line of scrimmage.","answer":"SACK","tidbit":"Jones was inspired by his coach, George Allen, who told his team: \"Before we play those Dallas Cowboys, we're going to take that Morton Salt and pour him into a sack.\" Allen was referring to Cowboys quarterback Craig Morton."},{"cat":"word","origin":"From the Old Norse vindauga, literally \"wind eye.\" Originally an unglazed hole in a roof.","def":"An opening in a wall, the side of a vehicle, etc., for the admission of air and/or light, commonly fitted with panes of glass.","answer":"WINDOW","tidbit":""},{"cat":"phrase","origin":"Probably derived from old folk tales, as the color in this two-word phrase was associated with faithfulness in medieval Europe. One old story, which may or may not have influenced this phrase, says the city of Coventry in the English Midlands was famous for a dye of this color that would neither change nor fade when washed.","def":"Loyal.","answer":"TRUE BLUE","tidbit":""},{"cat":"word","origin":"The similarity of this carpentry joint to a bird's tail display inspired this term, which also means \"to connect closely.\"","def":"","answer":"DOVETAIL","tidbit":""},{"cat":"word","origin":"The image of men arriving in a town, carrying everything they owned in a suitcase made of rug fabric on a frame, inspired this derogatory nickname for Northerners who came to the South after the Civil War, seeking political or business fortune.","def":"An opportunistic or exploitive outsider.","answer":"CARPETBAGGER","tidbit":""},{"cat":"phrase","origin":"This Latin phrase meaning \"something for something\" was first used to describe a 16th-century practice by pharmacies of substituting one medicine, sometimes fraudulently, for another. Within several decades the phrase was being used more generally, especially in legal circles.","def":"","answer":"QUID PRO QUO","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase is derived from a Latin word meaning \"to sprinkle.\" In the 16th century, the phrase generally referred to sprinkling someone with water for religious ceremonies, as in a baptism. Around the middle of the 17th century, the current meaning of spreading false statements about someone took shape. This phrase seems to have been first published by Henry Fielding in his famous 1749 novel, Tom Jones.","def":"Slander.","answer":"TO CAST ASPERSIONS","tidbit":""},{"cat":"phrase","origin":"A phrase describing the material produced by a factory before being sorted or inspected for quality. It developed its figurative meaning of \"average\" in the 1920s.","def":"","answer":"RUN OF THE MILL","tidbit":""},{"cat":"phrase","origin":"Two different origins are often cited for this phrase. One is from sports such as squash, handball, racquetball and baseball, where a ball hit in this way can bounce in a crazy fashion. The other is from the image of a mad person bouncing in this way.","def":"Crazy.","answer":"OFF THE WALL","tidbit":""},{"cat":"phrase","origin":"This verb phrase may have been inspired by the last thing you do to furniture or furnishings to make them sparkle. It appears to have been first used in boxing in the early or mid-1800s. Today it also figuratively refers to cleaning your plate at a meal.","def":"To defeat or finish.","answer":"POLISH OFF","tidbit":""},{"cat":"word","origin":"From the name of the Greek goddess of healing and a Greek word meaning \"all-healing.\" Alchemists seeking to concoct the elixir of life that would give immortality or the \"philosopher stone\" that would turn ordinary metals to stone were seeking this.","def":"A remedy for all diseases; a cure-all.","answer":"PANACEA","tidbit":"Today the word panacea is almost always used to indicate there is no cure-all. (\"Scientists question mass tree planting as a climate-change panacea.\")"},{"cat":"phrase","origin":"From the name of a member of the Big Dipper that is important to natural navigation, particularly by boat. Figuratively, it means a person or thing that serves as a guide or goal.","def":"","answer":"NORTH STAR","tidbit":"The North Star is essential for natural navigation because it tells you which direction is north (it sits directly over the North Pole)."},{"cat":"word","origin":"The wedge-shaped piece at the crown of an arch that holds the other pieces in place. The word has also come to mean \"the main element of a system.\"","def":"","answer":"KEYSTONE","tidbit":""},{"cat":"word","origin":"The core word in these phrases means the \"strap of a bridle\" and was principally used in horse management. It comes from the 1300s from a Latin verb meaning \"to hold back.\"","def":"Complete freedom or full control\nRestrain","answer":"FREE REIN & REIN IN","tidbit":"Rein is from a Vulgar Latin word retin\u0113re meaning \"to restrain.\" It is also the root of retain. Other phrases using rein include take the reins and hold the reins.\nTheses expressions are often misspelled with \"reign.\" Reign refers to royal authority, as in \"to reign over.\""},{"cat":"word","origin":"These three phrases are all derived from the name of the Roman god of war, who was one of the patron gods of Rome itself. The first phrase is an umbrella term for various forms of combat and self-defense. The second is the term for a period when armed forces take over from civilians. The third is a term for a military trial.","def":"","answer":"MARTIAL ARTS & MARTIAL LAW & COURT-MARTIAL","tidbit":""},{"cat":"phrase","origin":"From the term for a flat wooden canopy placed over church pulpits during the Renaissance, designed to amplify the sound of the preacher's voice.","def":"If you test your ideas on a person or group, you are using them as one of these.","answer":"SOUNDING BOARD","tidbit":""},{"cat":"word","origin":"From the name of a philosopher who believed that love between people could be free of sexual desire.","def":"A relationship without romance or sex.","answer":"PLATONIC","tidbit":"In the Symposium, Plato presents his mentor, Socrates, as immune to sexual advances."},{"cat":"word","origin":"Originally this word was a nickname for a cobbler, and then evolved to mean a person of lower rank who might seek higher social status. Now it means someone who thinks they are of superior status and is condescending to others.","def":"","answer":"SNOB","tidbit":""},{"cat":"word","origin":"This word meaning \"commotion\" may be onomatopoeic in origin. Some believe it comes from the Hebrew phrase barukh habba, meaning \"welcome\" - literally, \"blessed be the one who comes.\"","def":"","answer":"BROUHAHA","tidbit":""},{"cat":"word","origin":"In the 12th century, this word meant \"an innkeeper.\" A century later, it meant \"a person sent ahead of the main party to arrange lodgings.\" That led to the sense of \"a forerunner,\" one who goes before and announces the approach of someone or, eventually, figuratively, something.","def":"Anything that foreshadows a future event; an omen or sign.","answer":"HARBINGER","tidbit":""},{"cat":"word","origin":"Not surprisingly, this word for a rock barrier evolved to mean \"to obstruct or delay.\"","def":"","answer":"STONEWALL","tidbit":""},{"cat":"word","origin":"This type of mandarin orange was originally imported to Britain from the city in Morocco that inspired its name.","def":"","answer":"TANGERINE","tidbit":"The city is Tangiers."},{"cat":"word","origin":"In the 16th century, the Flemish mapmaker Gerardus Mercator created the modern meaning of this word when he put a picture of a giant from Greek mythology on the title page of one of his books.","def":"","answer":"ATLAS","tidbit":"In Greek mythology Atlas is forced by Zeus to carry the heavens on his shoulders for being on the losing end of the Titan's revolt against the gods."},{"cat":"word","origin":"Renaissance Italians referred to the murals they found in ruins by this Italian word for \"ancient.\" Because of their unusual representations of human, animal and floral forms, the word came to mean \"grotesque\" or \"bizarre,\" which then evolved into the current definition, \"a playful trick, prank or caper.\"","def":"","answer":"ANTIC","tidbit":""},{"cat":"word","origin":"This verb is derived from an ancient Rome military punishment for a severe crime such as mutiny: to put to death one-tenth of the unit's soldiers.","def":"To destroy, ruin or devastate.","answer":"DECIMATE","tidbit":""},{"cat":"word","origin":"This word started as \"pick pack.\" \"Pick\" is a medieval version of \"pitch,\" so it meant a load that was pitched on a person's back for carrying. Later the \"pack\" got changed to \"back.\" Then the \"pick\" got changed too, though the reason is not clear. Maybe some swine misheard the word and replaced it with something that sounded better.","def":"To take advantage, or build on the work or effort, of someone or something else; to be carried on someone's back or shoulders.","answer":"PIGGYBACK","tidbit":""},{"cat":"word","origin":"When this Greek word meaning \"lasting a day\" first appeared in print in English in the late 16th century, it was a scientific term for short-term illnesses and, later, for organisms with very short life spans (such as insects and flowers). Now it describes anything fleeting and short-lived.","def":"","answer":"EPHEMERAL","tidbit":""},{"cat":"word","origin":"Some consider Aldus Manutius (1455-1515) the greatest Venetian scholar-printer of the Italian Renaissance. He brought \"portable\" books to the literate masses and was the first to print the major Greek classics. Manutius first used this type style in 1500, replicating the handwritten calligraphic manuscript style of the period.","def":"A type style in which the letters slope to the right.","answer":"ITALICS","tidbit":"Italics comes from \"Italian.\""},{"cat":"phrase","origin":"This phrase originated in the 18th century as a description of beached ships unable to sail.","def":"Helpless or abandoned.","answer":"HIGH AND DRY","tidbit":""},{"cat":"word","origin":"From French, meaning \"to click.\" This was the word for a stereotype or electrotype plate used in British printing, apparently because it resembled the sound of a mold striking metal. Because the plate could always be reproduced, the word developed the figurative meaning of a trite phrase or something very predictable.","def":"","answer":"CLICHE","tidbit":""},{"cat":"words","origin":"This hyphenated word means \"callous.\" English also uses its French equivalent, which translates literally to exactly the same thing but has come to mean \"composure.\" Most reptiles probably prefer the original French definition.","def":"","answer":"COLD-BLOODED & SANGFROID","tidbit":"The French noun comes from the Latin words sanguis (\"blood\") and frigidus (\"cold\")."},{"cat":"word","origin":"First used in chess, this noun comes from an Italian or Spanish word meaning \"a tripping up.\" It initially referred to a sequence of opening moves involving a sacrifice, usually a pawn, to gain a strategic advantage. Over time, it evolved to mean any sequence of moves to gain an advantage, and eventually any plan to gain an advantage, especially at the start of a sporting event or negotiation.","def":"","answer":"GAMBIT","tidbit":""},{"cat":"word","origin":"Lumberjacks (and many others) were known for using this thin, springy cable for makeshift repairs. But it is difficult to handle and can create quite a mess, particularly if it comes apart, leading to the current, more common meaning of the noun.","def":"In disorder, out of control; crazy.","answer":"HAYWIRE","tidbit":""},{"cat":"word","origin":"In Greek this noun literally means \"overcoming death,\" as consuming it gave the gods their immortality.","def":"A fruit juice beverage; a delicious drink.","answer":"NECTAR","tidbit":""},{"cat":"phrase","origin":"This noun phrase was the title of a 1948 science fiction novel by Robert Heinlein, in which the main character hoped to achieve this rank. Today it is used to describe someone whose mind seems to be elsewhere.","def":"A flaky or out-of-touch person.","answer":"SPACE CADET","tidbit":""},{"cat":"word","origin":"In Greek, this word meant \"great house\" and referred to a palace. It evolved to mean \"an ancient Egyptian king.\"","def":"","answer":"PHARAOH","tidbit":""},{"cat":"word","origin":"From Latin for \"to chew cud\" (partially digested food, brought up from the stomach of an animal such as a cow to be chewed again). The figurative meaning of this word, \"to think about deeply and slowly,\" evolved in the 1530s.","def":"","answer":"RUMINATE","tidbit":""},{"cat":"word","origin":"From a Latin word for \"internal organ.\" The intestine, heart and other key organs were regarded as generating emotion.","def":"An instinctual reaction, one that seems to be coming from deep inside the body.","answer":"VISCERAL","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"to hide away,\" this adjective originally had a purely ecclesiastical meaning, referring to unsanctioned sections of the Bible. It has developed a more general meaning, \"of doubtful authenticity,\" and is often used to describe unproven stories or legends.","def":"","answer":"APOCRYPHAL","tidbit":""},{"cat":"word","origin":"From a Latin word for \"wreath\" or \"crown,\" this adjective evolved to refer to the blood vessels that surround the heart like a crown and manage its blood supply. Today it also refers more generally to the human heart with respect to health and, as a noun, is a synonym for a heart attack.","def":"","answer":"CORONARY","tidbit":""},{"cat":"word","origin":"From the name for a lower caste in southern India, which literally means \"drum.\" Caste members played the drum at festivals, since drum leather was considered unfit for higher-caste Hindus to touch. Members of the lower caste became servants for British colonists, and the word evolved to mean \"outcast.\"","def":"","answer":"PARIAH","tidbit":""},{"cat":"phrase","origin":"This phrase has nothing to do with your mother or long-dead Egyptians. The first word is imitative, based on \"mmm\" - the inarticulate sound made with a closed mouth, indicating an unwillingness or inability to speak.","def":"Stay quiet.","answer":"MUM'S THE WORD","tidbit":""},{"cat":"word","origin":"This reptile's name is derived from a combination of two Greek words that together mean \"lion on the ground,\" perhaps because this reptile is frightening or because it has a large crest on its head.","def":"A lizard known for its ability to change colors; similarly, a person who often changes their beliefs or behavior to please others.","answer":"CHAMELEON","tidbit":""},{"cat":"word","origin":"A 16th-century Latin term meaning \"we do not know,\" this was a legal term a grand jury could use when it considered the prosecution's evidence insufficient. In 1615, George Ruggle wrote a play with this name spoofing the stupidity of lawyers, and the word then took on the meaning of \"dunce.\"","def":"An utterly stupid person.","answer":"IGNORAMUS","tidbit":""},{"cat":"word","origin":"From Latin for \"grown together,\" this word evolved to mean \"real\" or \"not abstract.\" In the 19th century, it also became the term for the building material that combines Portland cement (mainly limestone and clay), water, and gravel.","def":"Tangible; also, a hard, strong building material.","answer":"CONCRETE","tidbit":""},{"cat":"word","origin":"Originally this word from Latin, meaning \"horseman,\" signified a knight or gentleman. English Puritans applied it derisively to their adversaries, the brash, violent Royalist followers of Charles I, who sported longish hair and swords. Others saw the Royalists as charming and debonair.","def":"Disdainfully dismissive of important matters, overly casual; also, gallant.","answer":"CAVALIER","tidbit":""},{"cat":"word","origin":"From an Anglo-French verb that means \"to defy,\" but that also has the literal meaning \"to strike on the forehead\" or \"to slap on the face.\"","def":"A deliberate act of disrespect","answer":"AFFRONT","tidbit":""},{"cat":"word","origin":"The combination of two Swedish words meaning \"sandwich\" and \"table.\"","def":"A buffet offering a variety of hot and cold foods.","answer":"SMORGASBORD","tidbit":"Board was a common word for \"table.\""},{"cat":"word","origin":"Manuscript writers once inserted special instructions into a book in red ink to set them off from the black used in the main text. These comments came to be known by this noun, which is derived from the Latin word for \"red.\" Today its usage has evolved to mean \"an established protocol or set of rules.\"","def":"","answer":"RUBRIC","tidbit":""},{"cat":"words","origin":"Both of these words were inspired by a famous area in ancient southern Greece also known as Lacedaemon. It was a highly disciplined military society, and its citizens were known for their brevity and frugality.","def":"1) Concise.2) Austere","answer":"LACONIC & SPARTAN","tidbit":"Sparta was the capital city of Laconia, an ancient Greek country bordering on the Aegean and Mediterranean Seas."},{"cat":"word","origin":"We said it here first, from Late Latin meaning \"to walk before.\"","def":"An introductory statement.","answer":"PREAMBLE","tidbit":""},{"cat":"phrase","origin":"Theodore Roosevelt coined this phrase to describe the power of the presidency to inspire, influence and educate citizens.","def":"A prominent public position (such as a political office) that provides an opportunity for expounding one's views.","answer":"BULLY PULPIT","tidbit":"In this phrase, bully refers not to the modern meaning of the noun, \"a browbeating person,\" but to the adjective bully, which in Roosevelt's time meant \"first-rate.\" Given today's politics, the current sense of the word might be more apt."},{"cat":"words","origin":"The first word, from Latin for \"to shine,\" originally meant \"shining,\" but it developed a figurative meaning of \"easy to understand\" or \"thinking clearly.\" The second word comes from Latin for \"shine through.\"","def":"","answer":"LUCID & TRANSLUCENT","tidbit":""},{"cat":"word","origin":"Because this verb's roots come from Latin and mean \"to smear with poison,\" it originally meant \"to poison.\" Its definition evolved into \"to make drunk\" in the 1570s. It also means \"to excite beyond self-control, as if affected by drugs.\"","def":"","answer":"INTOXICATE","tidbit":""},{"cat":"word","origin":"A stringed instrument similar to a harp, popular in ancient Greece and often played to accompany poetry, inspired this word. When it was first adopted into English, it referred to poems such as odes or sonnets that express powerful emotions, but eventually it also came to mean the words of a song.","def":"","answer":"LYRIC","tidbit":"The stringed instrument is the lyre."},{"cat":"word","origin":"Originally this word, from the French for \"unbar,\" meant \"the breaking up of ice in a river and the rush of ice and water that follows.\" It evolved to mean \"a violent and destructive flood that occurs when river ice melts in the spring.\" Finally, it came to mean \"any disaster or fiasco.\"","def":"","answer":"DEBACLE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to wound,\" this adjective originally meant \"capable of being physically wounded.\" It evolved to mean \"capable of being emotionally wounded\" and \"open to attack.\"","def":"","answer":"VULNERABLE","tidbit":""},{"cat":"phrase","origin":"This phrase is derived from the name of a king who landed on the southern shore of Italy with 20 elephants and 25,000 soldiers and won two battles against the Romans in 280 BC and 279 BC. The Romans had a much larger army, which reportedly led the king to say, \"If we are victorious in one more battle with the Romans, we shall be utterly ruined.\" And that is what happened.","def":"A victory or goal achieved at too great a cost.","answer":"PYRRHIC VICTORY","tidbit":"The king's name was Pyrrhus."},{"cat":"word","origin":"Early printing presses (circa late 15th century) required each character to be cast in a mold. That process was called \"typefounding\" or \"founding,\" words that come from the Old French fondre, meaning \"to melt, cast, pour out,\" which itself comes from a Latin word with a similar meaning, fundere.","def":"A complete assortment of type of one style and size.","answer":"FONT","tidbit":"The name of the melted cheese dish called fondue also comes from the Old French fondre."},{"cat":"word","origin":"From the Latin word for \"eyebrow.\" Picture someone raising their eyebrow to express haughtiness and disdain.","def":"Behaving or looking as though one thinks one is superior to others.","answer":"SUPERCILIOUS","tidbit":"The Latin word is supercilium."},{"cat":"word","origin":"From a character in the comic strip The Timid Soul, created by American cartoonist Harold Tucker Webster and first published in 1924.","def":"A meek, spineless person.","answer":"MILQUETOAST","tidbit":"Caspar Milquetoast was named after the American dish \"milk toast,\" consisting of toasted bread dipped or covered in warm milk."},{"cat":"word","origin":"From a Middle French word meaning \"vine,\" this noun was first used in the mid-18th century for a design or illustration that often looked like vines and ran along the border of a book page or at the beginning or end of a chapter. In the late 19th century, its meaning extended to refer to a brief literary sketch.","def":"","answer":"VIGNETTE","tidbit":""},{"cat":"word","origin":"First used in English in the 16th century to describe a medical condition causing swelling and a reddish complexion, supposedly caused by an excess volume of blood or other fluids. From a Greek word meaning \"fullness.\"","def":"Overabundance.","answer":"PLETHORA","tidbit":""},{"cat":"phrase","origin":"In politics, this phrase means using implicit, coded or suggestive language to foster support from a particular group without provoking opposition. Think of canines' ability to hear sounds that humans cannot.","def":"","answer":"DOG WHISTLE","tidbit":"The phrase dog whistle is used in the field of opinion polling. When subtle changes in the wording of a question lead to dramatically different results, pollsters call that \"the dog whistle effect.\""},{"cat":"phrase","origin":"This phrase from the 1840s was named after a room in Madame Tussaud's wax museum in London that displayed replicas of criminals and various notorious people. Visitors were charged an extra sixpence to enter.","def":"A collection of horrifying things.","answer":"CHAMBER OF HORRORS","tidbit":""},{"cat":"word","origin":"In the 18th century, sailors in the Royal Navy were given a daily ration of rum. English admiral Edward Vernon, concerned about the health of his men, ordered the rum diluted with water. The decision wasn't popular with the sailors, who supposedly christened the mixture with the admiral's nickname. An extended version of this same word came to mean how one acted after drinking the diluted rum.","def":"Dazed or unsteady, especially from a blow, illness, intoxication, having just woken up, or not getting enough sleep.","answer":"GROGGY","tidbit":"Vernon earned the nickname \"Old Grog\" because he often wore a cloak made from grogram - a coarse, loosely woven fabric made of silk or silk blended with mohair or wool."},{"cat":"phrase","origin":"Before modern instruments, pilots flew a plane based on feel.","def":"Using instinct, experience or guesswork instead of formal instruction or technological aids.","answer":"BY THE SEAT OF ONE'S PANTS","tidbit":"A longer version of the phrase is \"flying by the seat of one's pants.\""},{"cat":"words","origin":"This pair of political terms originated in the 1789 French National Assembly, the parliament formed after the French Revolution, where nobility and high-ranking religious leaders were seated on one side of the assembly chair, while commoners and less powerful clergy were placed on the other. Their divergent views, especially on how much power the king would be given in the new constitution, led to these labels still in use today.","def":"","answer":"LEFT & RIGHT","tidbit":""},{"cat":"word","origin":"The name for this flower comes from an Old English word meaning \"day's eye,\" because the petals of some species open at dawn and close at dusk.","def":"","answer":"DAISY","tidbit":""},{"cat":"word","origin":"A combination of two Old French words. The first means \"guard.\" The second means \"garment\" but originally meant \"booty,\" perhaps because clothing was taken from the enemy as spoils during war.","def":"A collection of clothes.","answer":"WARDROBE","tidbit":"The Old French word robe comes from the West Germanic raubo, which is also the source of the word rob."},{"cat":"word","origin":"From a 16th-century Middle English word meaning \"a blaze of bones.\" Sometimes you don't have enough wood.","def":"A large fire built in the open air.","answer":"BONFIRE","tidbit":""},{"cat":"word","origin":"From a Greek adjective meaning \"one's own\" and a noun meaning \"private citizen,\" this word evolved to refer to \"a common man\" and later \"a fool.\"","def":"","answer":"IDIOT","tidbit":"A Greek idiot\u0113s was not in the public eye and did not hold public office."},{"cat":"word","origin":"In the early 19th century this word, based on a tool of their trade, referred to hired soldiers - mercenaries who would fight for whichever nation, king or person paid them.","def":"Independent contract work or worker.","answer":"FREELANCE","tidbit":""},{"cat":"word","origin":"For many crimes in ancient Greek law, any citizen could bring prosecutions. These individuals were referred to by this Greek word, which meant \"slanderer\" or \"informer\" but literally translates to \"fig revealer,\" likely because citizens taunted the criminals with an obscene hand gesture denoting female genitals that resembled a fig. Shortly after this word appeared in English in the 16th century, its meaning changed to \"a self-seeking, abject flatterer.\"","def":"","answer":"SYCOPHANT","tidbit":"Sycophants were habitual prosecutors. Sometimes they wanted to build their political or oratorical reputation. They made money from the case itself, by blackmailing people trying to avoid prosecution, or from people who would pay to have a rival prosecuted."},{"cat":"word","origin":"For about five years starting in 1811, English textile mill workers rioted and destroyed new machinery to protest what was slowly replacing them. Their movement was named after a story about an apprentice who, in 1779 in a fit of rage, was said to have broken into a stocking weavers' house and smashed two machines.","def":"A person who opposes technological change.","answer":"LUDDITE","tidbit":"The story of Ned Ludd is apocryphal."},{"cat":"word","origin":"From the 14th century. The name for this flower means \"lion's tooth\" in Old French, a reference to its toothed leaves.","def":"Plant of the daisy family with a tapering, milky root, producing a large yellow flower.","answer":"DANDELION","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"to banish by voting with potsherds.\" In ancient Greece, voters could elect to banish a citizen deemed dangerous to the state, usually for 10 years. Voting was done on pottery shards.","def":"To exclude from society, friendship, conversation, etc.","answer":"OSTRACIZE","tidbit":"The Greek word is ostrakizein. Its precursor, the Greek ostrakon (\"shell\" or \"potsherd\"), inspired the English word \"oyster.\""},{"cat":"phrase","origin":"John Milton's 1634 masque (a short drama performed by masked actors) Comus is likely the source of this phrase. Milton refers to the shining edges of a cloud backlit by the sun or the moon.","def":"A positive aspect of a negative circumstance.","answer":"SILVER LINING","tidbit":"Quoting Milton:\nWas I deceived? Or did a sable cloud Turn forth her silver lining on the night?I did not err, there does a sable cloud,Turn out her silver lining on the nightAnd casts a gleam over this tufted grove."},{"cat":"word","origin":"During his papacy, Pope Sixtus IV (1471-1484) granted numerous favors to members of his family, a practice carried on by his successors. In 1667, Gregorio Leti's book The History of the Popes' Nephews (English translation) brought the practice to light and ushered this word into English.","def":"Favoring relatives.","answer":"NEPOTISM","tidbit":"The original title of Leti's book was Il Nepotismo di Roma.\nNepotism derives from the Latin word for nephew."},{"cat":"phrase","origin":"This idiom from the mid-1800s comes from the belief that angry birds display this behavior.","def":"To irritate or upset someone.","answer":"RUFFLE SOMEONE'S FEATHERS","tidbit":""},{"cat":"word","origin":"From a quote attributed to William of Orange in 1672, when defiantly declining an offer to be made Sovereign Prince of Holland (at the time he was the chief magistrate) in return for capitulation to England and France.","def":"Made as a final effort, especially to avert disaster.","answer":"LAST-DITCH","tidbit":"William of Orange is said to have declared that he would \"die in the last ditch.\""},{"cat":"phrase","origin":"Thorleif Schjelderup-Ebbe, a Norwegian zoologist, is famous for his study of the social dynamics and hierarchy of chickens. He coined this now famous phrase to describe how the dominant chickens get their food first and enforce their positions by striking subservient chickens with their beaks.","def":"A hierarchy of authority in an organization or social group.","answer":"PECKING ORDER","tidbit":""},{"cat":"word","origin":"The native Algonquian people of Virginia named this animal aroughcun, which means \"he scratches with his hands.\"","def":"A small nocturnal carnivore of North America with a bushy ringed tail.","answer":"RACCOON","tidbit":"Early English spellings also included raugroughcum."},{"cat":"word","origin":"From the Middle French word lavasse, meaning \"downpour of rain,\" which is derived from the Old French laver, meaning \"to wash.\" If you guess this word correctly, shower yourself with praise.","def":"Generous, extravagant or excessive.","answer":"LAVISH","tidbit":""},{"cat":"word","origin":"Probably derived from the Sanskrit word panca, meaning \"five,\" based on a Hindu beverage made with five ingredients: spirits, water, lemon juice, sugar and spices. In the 17th century, English sailors imported panca to Europe, where it was served warm with wine or brandy and eventually rum. Today this beverage is served hot or cold and with or without alcohol.","def":"","answer":"PUNCH","tidbit":""},{"cat":"word","origin":"It is often said that money can't buy happiness, but this verb - meaning \"to be grateful for,\" \"to regard highly,\" or \"to be fully conscious of\" - is derived from a Late Latin verb meaning \"to put a price on.\" To be fair, it does still have another definition more directly related to money: \"to increase in value.\"","def":"","answer":"APPRECIATE","tidbit":""},{"cat":"phrase","origin":"Leader of the band Chic, Nile Rodgers, likely coined this essence of this phrase with the band's 1981 song Your Love Is Cancelled. Barry Michael Cooper added it to the 1990s black gangster classic film New Jack City and artists like 50 Cent and Lil Wayne used it thereafter. Momentum for this phrase grew with an episode of VH1's reality show Love and Hip-Hop: New York that aired in December 2014.","def":"The withdrawal of support for, or the broad public criticism of, a person, business, movement, or idea.","answer":"CANCEL CULTURE","tidbit":"During a fight in Love and Hip-Hop: New York, cast member Cisco Rosado told his love interest, Diamond Strawberry, \"You're canceled.\" Subsequently the phrase spread on Black Twitter, a large and loosely coordinated network of Black users of that social media platform."},{"cat":"word","origin":"From a Latin word meaning \"property in cattle\" that, given the importance of livestock, evolved to mean \"property\" and \"privately owned.\" In the 16th century, when the word began to be used in English, it came to mean \"distinguished\" (someone wealthy or held in high regard). Eventually it developed its current meaning of \"odd or curious.\"","def":"","answer":"PECULIAR","tidbit":"The sense of peculiar as related to ownership continues today with the phrase \"peculiar to.\" Pecu (\"cattle\") can be found in other English words related to money, such as \"pecuniary.\""},{"cat":"words","origin":"Both of these closely related words come from the violent intimidation of Black voters during the 1876 US presidential election. The beatings and lashings were described as \"a dose of the whip fit for a bull.\" By the 20th century, both words had lost their original, race-related meanings.","def":"1) To bully.2) A large earthmoving tractor.","answer":"BULLDOZE & BULLDOZER","tidbit":""},{"cat":"word","origin":"To suppress the Black vote post-Reconstruction, some states enacted restrictive voting laws (such as requiring literacy tests and the paying of property tax), but included exemptions in the laws that allowed descendants of people who had voted before 1867 to continue to do so. The exemptions allowed poor and illiterate whites to still vote.","def":"1) To exempt from a new law, restriction or requirement.2) The exemption itself.","answer":"GRANDFATHER IN & GRANDFATHER CLAUSE","tidbit":""},{"cat":"word","origin":"A type of warship developed in Europe and the United States in the mid-19th century, sheathed in iron to protect the hull, was probably the inspiration for this word, which means \"unbreakable.\"","def":"","answer":"IRONCLAD","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase comes from a Latin word for \"stake\" and also referred to a fence (a barrier made of stakes). The word pole comes from the same source. By the end of the 14th century, the word took on additional senses, including a place where one was not allowed to go. Eventually, probably in the 1700s, this idiom took on its figurative meaning of \"outside the limits of propriety.\"","def":"","answer":"BEYOND THE PALE","tidbit":""},{"cat":"word","origin":"This word is derived from a Latin verb meaning \"to bubble out.\" It originally referred to bubbling or boiling like a pot of water. Its figurative meaning of \"exuberant\" was first recorded in the 1600s.","def":"","answer":"EBULLIENT","tidbit":""},{"cat":"word","origin":"This word is from the mid-17th century and is the combination of two Greek words meaning \"all people.\"","def":"","answer":"PANDEMIC","tidbit":""},{"cat":"word","origin":"In 1920, writer Karel \u010capek debuted a play called R.U.R., about machines that performed difficult, dull or dangerous work for people. \u010capek got the name for these machines from his brother Josef, whose inspiration was a Czech word meaning \"servitude\" or \"forced labor.\"","def":"","answer":"ROBOT","tidbit":""},{"cat":"phrase","origin":"In the late 1800s, the last word of this phrase was used to describe a sports referee. That term led to a metaphorical phrase meaning \"to reveal a wrongdoing.\"","def":"","answer":"BLOW THE WHISTLE","tidbit":""},{"cat":"words","origin":"The first of these two words originally meant \"to drive animals ahead\" and evolved in 16th-century Middle French to mean \"a leisurely stroll\" or \"a walkway by the ocean.\" By the late 19th century, this word and its shortened form became the name for an Ivy League tradition called \"presentation week,\" featuring formal dress, dancing, and concerts.","def":"","answer":"PROMENADE & PROM","tidbit":""},{"cat":"word","origin":"Originating from a Latin term meaning \"pregnant animal\" or \"breeding female,\" this word later generalized to mean \"womb\" or \"source or origin.\" In ancient Rome, it also referred to a plant used for producing other plants. Over time, the word developed both figurative and technical meanings, referring to something within which, or from which, something else originates, develops, or takes form. It is used in science, mathematics, and was even the title of a famous science fiction movie series.","def":"","answer":"MATRIX","tidbit":""},{"cat":"word","origin":"The harpsichord was one of the most important instruments in European music from the 16th until the mid-18th century. Its strings are plucked by leather or quill points connected with the keys. In 1709, Italian Bartolomeo Cristofori invented a new harpsichord that allowed for a much wider range of volume and longer-lasting notes. Clearly not a marketing genius, Cristofori called his invention \"harpsichord with soft and loud,\" which was shortened in English to this name by the 1770s.","def":"","answer":"PIANO","tidbit":"The original Italian phrase that translates to \"harpsichord with soft and loud\" is gravicembalo col piano e forte."},{"cat":"word","origin":"This election-related word from the mid-15th century comes from a Latin word meaning \"vow\" or \"promise made to a god.\"","def":"","answer":"VOTE","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"sacred ruler,\" this noun originally referred to the ranks of angels; there were three divisions, each made up of three orders. Over time, around the 17th century, the idea of categorizing groups by rank was extended to other organizations and government.","def":"A classification of groups of people or things ranked one above the other.","answer":"HIERARCHY","tidbit":""},{"cat":"word","origin":"Rarely used before the 20th century, this word was coined by English novelist Horace Walpole in 1754 from the title of a Persian fairy tale. Quoting Walpole: \"[Y]ou will understand [this word] better by the derivation than the definition. I once read a silly fairy tale ... as their Highnesses travelled, they were always making discoveries, by accidents and sagacity [discernment], of things which they were not in quest of.\"","def":"Good fortune.","answer":"SERENDIPITY","tidbit":"The Persian fairy tale was The Three Princes of Serendip. Serendip, an old name for Ceylon (modern Sri Lanka), comes from the Arabic Sarandib, which in turn comes from the Sanskrit Simhaladvipa, meaning \"Dwelling-Place-of-Lions Island.\""},{"cat":"word","origin":"Because Mary Magdalene is often portrayed as a weeping sinner, a variation of Magdalene became a word meaning \"foolishly sentimental.\"","def":"","answer":"MAUDLIN","tidbit":"The phrase \"maudlin-drunk\" first appeared in 1592."},{"cat":"word","origin":"From the Old Norse word drit, meaning \"excrement.\"","def":"Earth or soil","answer":"DIRT","tidbit":""},{"cat":"phrase","origin":"When it originated during the California Gold Rush in the 1850s, this phrase referred to finding gold or valuable ore when mining.","def":"To strike it rich; to discover something valuable.","answer":"HIT PAY DIRT","tidbit":""},{"cat":"phrase","origin":"From a popular US radio crime-fighting drama of the mid-20th century, which opened with loud sound effects such as sirens and screams. This phrase originally meant \"with great initial excitement\" but has come to mean \"successful\" or \"enthusiastic.\"","def":"","answer":"LIKE GANGBUSTERS","tidbit":""},{"cat":"word","origin":"From 16th century French word derived from a Latin word meaning \"footprint.\"","def":"A trace of something that is disappearing or no longer exists.","answer":"VESTIGE","tidbit":""},{"cat":"phrase","origin":"The core noun in this phrase comes from a Latin word meaning \"first principle\" or \"rudiment.\" During the Elizabethan era, living and nonliving things were categorized as belonging to one of four components - earth, air, fire or water.","def":"A place or situation where someone is comfortable or thrives.","answer":"IN ONE'S ELEMENT","tidbit":""},{"cat":"word","origin":"From a Late Latin noun that meant \"to sort through trash.\" In the early 15th century, it described the taking of individual votes in an election. Its current meaning, \"close examination,\" developed in the 16th century.","def":"","answer":"SCRUTINY","tidbit":""},{"cat":"word","origin":"From the name of a handsome young hunter in a famous Greek myth. After rudely breaking the heart of the mountain nymph Echo, the hunter is cursed to fall in love with his own reflection in a pond. Eventually, unable to pull himself away, the hunter dies and turns into a flower.","def":"An extremely self-centered person who has an exaggerated sense of self-importance.","answer":"NARCISSIST","tidbit":"The hunter's name was Narcissus."},{"cat":"word","origin":"From a Latin word meaning \"mark\" or \"brand,\" which comes from a Greek word meaning \"to tattoo.\" In English it first referred to a scar left by a hot iron. By the early 1600s it referred to a figurative scar.","def":"A mark of disgrace.","answer":"STIGMA","tidbit":""},{"cat":"phrase","origin":"First appearing in the early 1800s, this phrase may have originated from the practice of tying up uncontrollable mental patients.","def":"Very angry.","answer":"FIT TO BE TIED","tidbit":"The straitjacket was invented around 1790 in France."},{"cat":"phrase","origin":"In use since before the 20th century, this phrase is from the theater. Actors preparing to come on the stage wait on the sides.","def":"Not yet active or important, but about or ready to be so.","answer":"WAITING IN THE WINGS","tidbit":"The sides of the stage are called wings."},{"cat":"phrase","origin":"On the 1960s comedy series Get Smart, this large plastic apparatus came down from the ceiling and covered the heads of Agent Maxwell Smart and his boss, aka the Chief, to prevent anyone from hearing their conversations. The contraption never worked properly and was one of many recurring humorous devices on the show.","def":"An agreement or directive to maintain secrecy about a subject.","answer":"CONE OF SILENCE","tidbit":""},{"cat":"word","origin":"From a Dutch word meaning \"to sail into the wind\" in order to stay clear of the shore or a hazard. This nautical maneuver inspired the figurative meaning of the word - \"emotionally or physically distant.\"","def":"","answer":"ALOOF","tidbit":""},{"cat":"phrase","origin":"This phrase meant \"plenty of food\" in Chinook jargon, a pidgin language developed for trading by the Pacific Northwest Chinook that combined Chinook, Nootka, English and French. Perhaps because of the banquets served to important guests, the phrase got reinterpreted to mean \"an important person\" when first used in English in the 19th century.","def":"An important and/or self-important person.","answer":"MUCKETY-MUCK","tidbit":"The Chinook jargon phrase combines hiu meaning \"plenty\" with muckamuck meaning \"food.\" Hiu became high in English, which explains why the phrase high muckety-muck is sometimes used instead."},{"cat":"word","origin":"From a Vulgar Latin word meaning \"to touch the shore,\" which evolved into a Middle English word meaning \"to reach the end of a journey by sea\" before developing the more general meaning of \"to reach any destination\" in the 15th century.","def":"","answer":"ARRIVE","tidbit":""},{"cat":"phrase","origin":"The phrase became popular in the 1800s, but its origin is unclear. One theory links it to the French folktale Bluebeard, about a man who hides his murdered wives' corpses. Another theory cites an 1816 article by William Hendry Stowell, describing how men hid family medical histories to avoid the stigma of passing on hereditary diseases. Victorian-era Gothic novels, like those by Edgar Allan Poe, may also have contributed to the phrase's popularity by featuring hidden bodies in old homes.","def":"Incriminating or embarrassing secrets.","answer":"SKELETONS IN THE CLOSET","tidbit":"Another unproven theory is that skeletons in the closet refers to corpses stolen for medical research and hidden in closets."},{"cat":"phrase","origin":"Picture a sailboat when there is no wind or a powerboat with a nonworking engine, and you can imagine this phrase from the 1800s, which probably developed its figurative sense around 1960.","def":"Doomed, as of a proposal.","answer":"DEAD IN THE WATER","tidbit":""},{"cat":"phrase","origin":"Miners face many dangers, including carbon monoxide poisoning. Odorless, tasteless and colorless, carbon monoxide was hard to detect. In the early 1900s, miners learned that a certain bird was more sensitive to the gas than humans, so they carried this bird with them when they ventured into the caves. If the bird got sick or died, it was time to evacuate. This practice continued until digital detectors began being used instead, around 1986.","def":"An early indicator of danger; a warning sign.","answer":"CANARY IN A COAL MINE","tidbit":""},{"cat":"word","origin":"In the 16th and 17th centuries, this was a term for upperclassmen at Cambridge University. It is derived from an altered version of the Greek word for wise that means \"specious argument.\" The terminology carried over to Harvard but changed slightly there, perhaps influenced by the Greek moros, meaning \"foolish.\"","def":"A student in the second year of high school or college.","answer":"SOPHOMORE","tidbit":"Cambridge and to a lesser extent Oxford upperclassmen were called sophisters, from the word sophist, but in US usage, the word changed to sophomore."},{"cat":"word","origin":"From an Old English word meaning \"of brass.\" Its figurative meaning, \"shameless boldness,\" which originated in the mid-16th century, may come from the fact that a face made of brass does not blush or get embarrassed.","def":"","answer":"BRAZEN","tidbit":""},{"cat":"phrase","origin":"From the 1960s science fiction television series Star Trek. In the show, First Officer Spock is a Vulcan, a member of an extraterrestrial humanoid species that possesses a limited amount of telepathy. By using this special technique, Spock can share thoughts and memories with another individual.","def":"A link between two people who think deeply alike.","answer":"MIND MELD","tidbit":""},{"cat":"word","origin":"In 1934 the Federal Housing Administration (FHA) was created as part of the New Deal to incent home ownership. The FHA created color-coded maps to guide its investments. Green and blue areas were the best investments and usually had a majority of white residents. Yellow areas were next to Black neighborhoods and were considered risky due to the \"threat of infiltration of foreign-born, negro, or lower-grade populations.\" Red areas, almost all of them Black neighborhoods, were described as having an \"undesirable population\" and were ineligible for FHA backing.","def":"Refusing to offer mortgages, or offering higher interest rates, on homes in certain neighborhoods based on their racial or ethnic composition.","answer":"REDLINING","tidbit":""},{"cat":"phrase","origin":"From the title of Joseph Heller's 1961 novel, made popular in 1970 when the book was adapted into a movie. In the story, a bomber pilot is insane if he flies combat missions without asking to be relieved from duty but asking to be relieved from duty indicates sanity and thus, he must keep flying missions.","def":"A paradoxical problem in which one is trapped by contradictory regulations or conditions.","answer":"CATCH-22","tidbit":""},{"cat":"phrase","origin":"An equestrian phrase dating from the 16th century. Horses impatient to walk, trot or gallop sometimes repeatedly bite on their mouthpiece.","def":"Eager.","answer":"CHOMPING AT THE BIT","tidbit":"The original phrase was champing at the bit, from a now archaic meaning of champ (\"to gnash\"). Both versions of the phrase are still used, although chomping at the bit is more frequent."},{"cat":"phrase","origin":"The longitudinal structure along the center at the bottom of a boat, on which the rest of the hull is built, must be level to ensure balanced and stable sailing or cruising.","def":"A calm, steady state of mind.","answer":"EVEN KEEL","tidbit":"The word keel comes from Old Norse kj\u00f3ll, meaning 'ship.' Some scholars consider keel, originally spelled cyulae, to be the first word recorded in writing in the English language in the sixth century."},{"cat":"word","origin":"Beginning in the 16th century, a carved wooden ornament was projected from the bow of ships to ward off evil spirits or imbue the vessels with good luck or special powers. Its figurative sense (no pun intended) began in 1868.","def":"A leader without authority.","answer":"FIGUREHEAD","tidbit":""},{"cat":"word","origin":"In the 18th century, British warships were categorized based on the number of guns they carried. The highest classification went to ships with 100 or more guns. The Royal Navy referred to the highest-level ships with this term, which soon developed the more general meaning \"of the best quality.\"","def":"","answer":"FIRST-RATE","tidbit":""},{"cat":"word","origin":"From an Old French word meaning \"seize, grasp,\" and literally \"to overtake.\" Originally, in the 15th century, it meant \"a sudden, unexpected attack.\" Its meaning broadened in the late 16th century.","def":"Something unexpected. Also, a feeling of wonder or astonishment caused by something unexpected.","answer":"SURPRISE","tidbit":""},{"cat":"word","origin":"From a French phrase adopted from an Italian phrase that means \"to make a bottle\" - Italian theater slang for \"a flop, a complete breakdown in a performance.\" The link between \"to make a bottle\" and \"a flop\" is not clear. One theory is that Venetian glassblowers tossed aside flawed pieces to be made into common flasks later. Another theory is that the original Italian phrase was a reference to the loser of a game buying the next bottle of wine.","def":"A total failure.","answer":"FIASCO","tidbit":"The Italian phrase was far fiasco."},{"cat":"word","origin":"From the late 13th century. The root of this word is from the Latin lact, meaning \"milk,\" probably a reference to the plant's milky juice.","def":"A plant with leaves that are commonly used in salads.","answer":"LETTUCE","tidbit":""},{"cat":"word","origin":"In 1924, seeking to embarrass Prohibition violators, Delcevare King, a wealthy Massachusetts Prohibitionist, held a contest with a $200 first-place prize, in which he asked participants to coin an appropriate word to mean \"a lawless drinker.\" The Boston Herald chose this word as the winner. It was submitted by two different people among the 25,000 contestants.","def":"A person who flouts rules and laws.","answer":"SCOFFLAW","tidbit":"Scofflaw combines the verb scoff, meaning \"to deride, mock,\" with the noun law."},{"cat":"word","origin":"From a Mexican Spanish word of the same spelling that originally meant \"calm sea,\" which signaled good fortune for fishermen. In English, in the first part of the 1800s, the usage was extended to mining and applied to a different type of good providence, initially meaning \"a very large mineral deposit.\" The definition broadened over time until it acquired its current meaning in the 20th century, \"sudden wealth or luck.\"","def":"","answer":"BONANZA","tidbit":""},{"cat":"phrase","origin":"Popularized during the California Gold Rush, the key two-word phrase within this four-word phrase means \"the principal vein or zone of ore or mineral in rock.\" It referred to the California Gold Belt, divisions of gold-bearing deposits in the Sierra Nevada Mountain range.","def":"To strike it rich; to find the main source or supply.","answer":"HIT THE MOTHER LODE","tidbit":"Miners followed the gold-bearing sands upstream to discover the source, or mother, of the gold in the river. Mother lode is probably a translation of the Mexican Spanish mining term veta madre, a name given to rich silver veins or deposits."},{"cat":"phrase","origin":"This phrase from the late 16th century has horticultural roots. Growers sometimes pinch off or trim plants to prevent them from flowering and to encourage other growth such as leaves.","def":"To stop a potential problem before it occurs.","answer":"NIP IT IN THE BUD","tidbit":""},{"cat":"word","origin":"This popular gambling game from the first third of the 18th century got its name from a French word meaning \"small wheel.\" In reality, the odds of winning are small and the wheel itself is large.","def":"","answer":"ROULETTE","tidbit":""},{"cat":"phrase","origin":"This two-word phrase from the 1800s once meant \"to woo\" or \"to defy authority.\" The core word in the phrase refers to a fastener that keeps things secure, which accounts for the current meaning, \"to start to work hard\" or \"to get serious and focused.\"","def":"","answer":"BUCKLE DOWN","tidbit":""},{"cat":"word","origin":"From the 14th century, from a Greek word meaning \"milk.\" In Greek mythology, Zeus places his half-mortal infant son Heracles on his wife Hera's breast while she is asleep so the baby will drink her milk and become immortal. Hera wakes up and realizes she is nursing an unknown baby. She pushes the baby away, some of her milk spills, and it produces the band of milky light in the sky.","def":"A collection of star systems.","answer":"GALAXY","tidbit":"The earliest mentions of the Milky Way can be traced back to the ancient Greeks (800 BC to 500 BC)."},{"cat":"words","origin":"Both of these words entered English from French in the 17th century and come from the sport of fencing. The first word refers to the name for the strongest part of the sword, just above the handle, and also means \"one's expertise or strength.\" The second word refers to the name for the weakest part of the blade, between the middle and the point, and also means \"a minor character flaw.\"","def":"","answer":"FORTE & FOIBLE","tidbit":""},{"cat":"word","origin":"From around 1640, this word is derived from the Latin iubilantem, meaning \"to let out whoops\" or \"to shout for joy.\"","def":"Experiencing great joy.","answer":"JUBILANT","tidbit":""},{"cat":"phrase","origin":"The core word in this two-word phrase from the late 16th century means \"a military inspection.\" It comes from a word that traveled from Middle English to Old French to Latin and means \"to show.\"","def":"To gain approval.","answer":"PASS MUSTER","tidbit":""},{"cat":"phrase","origin":"The thick woolen jackets issued to British soldiers in World War I were impractical for rainy weather, mud, and deep ditches. Officers, who outfitted themselves, opted for more fashionable and weather-resistant jackets. Unfortunately, these new fashions were expensive and made them easier for the enemy to identify. When the military began recruiting officers from the lower classes, these \"temporary gentlemen\" chose similar but more affordable jackets, which eventually gained popularity beyond the military.","def":"","answer":"TRENCH COAT","tidbit":""},{"cat":"phrase","origin":"From the mid-1800s. This phrase is derived from the concept, perhaps also a real practice but perhaps just from a cartoon, of encouraging a draft animal like a donkey to go forward or faster by dangling food in front of it, just out of reach, while beating it at the same time.","def":"A method in which both reward and punishment or severe tactics are used to encourage cooperation.","answer":"CARROT AND STICK","tidbit":"In one of the earlier versions of this phrase, turnip was used instead of carrot, and the context was about the turnip being more effective than the stick."},{"cat":"phrase","origin":"This phrase is used in William Langland's 1377 Middle English narrative poem Piers Plowman to explain that astronomers are at the end of their knowledge. Later it shows up in the King James Bible in Psalms 107:27. The verse refers to people who vacillate in their commitment to God. It says that people at the end of their knowledge must rely on faith.","def":"Very frustrated because, despite significant effort, a problem remains unsolvable.","answer":"AT WITS' END","tidbit":"An archaic definition of wit was \"knowledge.\"From Piers Plowman: \"Astronomyens also aren at hir wittes ende.\"From Psalms 107:27: \"They reel to and fro, and stagger like a drunken man, and are at their wits' end.\""},{"cat":"phrase","origin":"The core word in this two-word phrase was both a noun and a verb in the 16th century. As a noun it meant \"meat,\" and as a verb it meant \"to reward a hawk or dog with part of the killed game.\" Over time the phrase came to mean \"to add skin to a skeleton,\" though it is unclear if that referenced a drawing, a real skeleton or both. Today, the main definition of this phrase is figurative.","def":"To develop more fully; to add more details.","answer":"FLESH OUT","tidbit":""},{"cat":"word","origin":"The first syllable of this word may come from the Gaelic word car, meaning \"twist,\" or cearr, meaning \"wrong,\" while the remainder of the word is from a Scottish verb from the early 16th century that means \"to throw into disorder.\"","def":"A ruckus.","answer":"KERFUFFLE","tidbit":"Alternatively, ker may have been added just for emphasis, as in kerplunk, where it lends an onomatopoeic or echoic effect intended to imitate the sound of the fall of a heavy object."},{"cat":"word","origin":"In France during the peak of the Renaissance, quatre, the word for 'four,' could also be spelled catre. English speakers spelled it cater and, among other things, used it to represent the four dots on a die and their relative positions, so cater evolved in the 1830s to mean \"diagonal.\" This hyphenated word evolved from there, and cater was all but forgotten.","def":"Diagonally.","answer":"KITTY-CORNER","tidbit":"Cater-corner became catty-corner, which became kitty-corner, even though kitty-corner has nothing to do with cats."},{"cat":"phrase","origin":"This phrase was first documented in 1463. The two key nouns in the phrase meant the same thing, \"a key component\"; the redundancy was for emphasis. Originally the phrase was used in a legal formula defining property ownership. Today the first noun generally means \"a portion,\" and the second means \"a package.\"","def":"A key component of a whole.","answer":"PART AND PARCEL","tidbit":""},{"cat":"word","origin":"Found in the diaries of captured Civil War soldiers, this word originally meant \"a boundary drawn within or around a prison that a prisoner passes at the risk of being shot.\" This practice gained notoriety in 1864 because of its use at the Confederate prison in Andersonville, Georgia, which also employed other harsh punishments. By the mid-20th century, the word had changed to mean a time-based rather than a physical boundary. Today you might get in trouble for taking more than the allotted time to complete a task, but fortunately you would not be shot.","def":"The time by which something must be completed.","answer":"DEADLINE","tidbit":""},{"cat":"word","origin":"Ultimately from a Middle French word meaning \"cloth\" or \"hunting net.\" When first used in English in the 1530s, it meant a \"clothing bag\" and then \"a cloth put over the shoulders when getting a haircut or shave.\" By the 18th century, it had become associated with combs, brushes and other articles used for dressing by the upper class. Then its sense extended to the whole process of washing, grooming and dressing, and, in the late 18th century, to the room where the washing and grooming took place. Finally, in the late 19th century, the word came to refer to a specific fixture in the bathroom.","def":"","answer":"TOILET","tidbit":""},{"cat":"word","origin":"This Spanish word from the 15th century, meaning \"affection,\" came to refer to an amateur bullfighter in the 17th century and carried that meaning when it first appeared in English in the early 19th century. Soon, though, it evolved to mean \"a devoted fan or enthusiast,\" regardless of the discipline.","def":"","answer":"AFICIONADO","tidbit":""},{"cat":"phrase","origin":"First attributed to American newspaperman and short-story writer Alfred Runyon in 1931, this two-word phrase means \"to be excessive,\" which seems appropriate given that the core word, which dates from 1330, refers to throwing something or someone off a ship.","def":"","answer":"GO OVERBOARD","tidbit":""},{"cat":"word","origin":"From a verb of the early Middle Ages meaning \"to become stiff or numbed with cold.\" When you are that cold you probably aren't very coordinated, which gives you a clue as to the evolution of the meaning of this word.","def":"Lacking in dexterity or tact.","answer":"CLUMSY","tidbit":""},{"cat":"phrase","origin":"The first word of this two-word phrase from the 1540s originally meant \"to arrange or rearrange cargo in the hold of a ship.\" It also came to mean \"commotion,\" \"junk\" and \"a thorough but random search.\" Damaged, unclaimed or unpaid cargo was often peddled dockside in the 1800s, a practice that gave this phrase its current meaning.","def":"An informal market with secondhand items available for purchase.","answer":"RUMMAGE SALE","tidbit":""},{"cat":"word","origin":"This word from the mid-14th century combines two words. The first means \"on high or above\" and the second means \"to overturn or capsize,\" such as what can happen to a ship in a massive storm.","def":"To crush, often with superior forces; to cause to feel inundated and confused; to treat excessively.","answer":"OVERWHELM","tidbit":""},{"cat":"word","origin":"This Old English legal term originally meant a \"a statute, judgment or law.\" Today's meaning of \"adverse fate, ruin, or death\" is mostly an allusion to Judgment Day, the day of God's final judgment of mankind and the end of the world according to various theologies.","def":"","answer":"DOOM","tidbit":"Doomsday may also refer to Judgment Day as well as meaning \"a time of catastrophic destruction and death.\""},{"cat":"phrase","origin":"The core noun in this phrase is from the 16th century, perhaps from a Middle Dutch word meaning \"haze or mist.\" It described a daydream or, more precisely, a \"dazed or puzzled state of mind.\" Today the noun is most often used to describe a garbage disposal site, though this phrase has nothing to do with garbage.","def":"Very sad.","answer":"DOWN IN THE DUMPS","tidbit":"Dump as in \"garbage dump\" is probably of Norse origin and is probably onomatopoeic. It meant \"to fall or cast off suddenly or forcibly.\""},{"cat":"word","origin":"Named for a 1938 play and its subsequent film adaptations. In the story, a husband attempts to convince his wife and others that she is insane by altering small elements of her environment and insisting that she is mistaken when she observes the changes. To make his wife doubt her own perceptions, the abusive husband slowly dims the lights in their home, hides pictures, makes footstep noises, and so on while pretending nothing has happened.","def":"Psychological manipulation aiming to persuade someone to question their sanity or reality.","answer":"GASLIGHTING","tidbit":""},{"cat":"word","origin":"During his reign, King Edward I of England (1239-1307) decreed that gold and silver had to be tested and approved before being sold. In 1327, a Royal Charter was granted to the Goldsmith Company, where finished metal goods could be assayed. Items meeting the necessary quality standards were given a special stamp of approval. The word for the stamp gained the broader meaning of \"an indicator of quality\" hundreds of years later.","def":"A special indication of quality; a distinguishing feature or characteristic of excellence.","answer":"HALLMARK","tidbit":"The site where items were checked was Goldsmith's Hall."},{"cat":"word","origin":"From the early 15th century, from a Latin word meaning \"to seek out.\" The meaning of this adjective changed many times, from \"rare and exceptional\" to \"obscure and far-fetched\" to \"detailed, exacting work.\" In the 16th century it developed an additional meaning of \"possessing beauty or excellence,\" which is its primary usage today.","def":"Marked by or pleasing because of flawless craftsmanship, beauty or excellence.","answer":"EXQUISITE","tidbit":""},{"cat":"word","origin":"In ancient Greece, this word represented the number 10,000. Because that was the highest number in the Greek numerical system, the word came to figuratively represent any enormous, unspecified amount.","def":"Many; countless.","answer":"MYRIAD","tidbit":""},{"cat":"word","origin":"The Middle French phrase culpable, prest d'averrer nostre bille - translated as \"guilty, ready to prove our case\" - was what the prosecutor (then called \"the Clerk of the Crown\") would say to begin a trial in the 17th century. Court records, however, often shortened the long phrase to this word.","def":"One accused of a crime or wrongdoing.","answer":"CULPRIT","tidbit":"Culpable meant \"guilty\" and was abbreviated cul. Prit meant \"ready.\" A culprit, therefore, was a person ready to be proven guilty."},{"cat":"word","origin":"The original Medieval Latin version of this word was a mangled translation of the last name of Mu\u1e25ammad ibn M\u016bsa al-Khwarizm (c. 780-c. 850), a famous Persian mathematician and astronomer who introduced Hindu-Arabic numerals and the concepts of algebra to European scholars.","def":"A procedure for solving a mathematical problem.","answer":"ALGORITHM","tidbit":""},{"cat":"word","origin":"This word came into English in the early 1600s from French via the Spanish dish of mixed meats called olla podrida, meaning \"rotten pot.\" The dish's seemingly random set of ingredients led over time to the figurative sense of the word, \"a medley or mixture of random things.\" It is ironic that the word for this apparently foul-smelling stew also became, in the mid-18th century, an English word for an aromatic blend of dried flowers.","def":"","answer":"POTPOURRI","tidbit":"Hodgepodge (hotch-potch) also originally meant a French stew thrown or \"hotched\" together from mince
