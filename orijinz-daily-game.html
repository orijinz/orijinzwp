tice of using a marker, originally a buckhorn knife, to indicate the next dealer."},{"cat":"word","origin":"From a word in Algonquian (a Native American language) meaning \"place of the wild onion\" or \"skunk.\" Apparently, wild onion or garlic was abundant in the area. Perhaps the city's famous winds covered the area with these pungent aromas.","def":"","answer":"CHICAGO","tidbit":""},{"cat":"word","origin":"From the Greek Maiandros, an old name for a winding river in in Caria (now Western Turkey).","def":"To wander aimlessly.","answer":"MEANDER","tidbit":""},{"cat":"phrase","origin":"From the name of a 1993 movie in which actor Bill Murray must live the same day repeatedly.","def":"Unpleasant, repeating events.","answer":"GROUNDHOG DAY","tidbit":"Murray portrays a cynical television weatherman covering the annual Groundhog Day event in Punxsutawney, Pennsylvania."},{"cat":"phrase","origin":"Electric train systems, first introduced in the 1880s, used an exposed electrical conductor that was very dangerous to touch since it carried high-voltage power. The name for this conductor was first used in a metaphorical sense in the 1980s to describe the Social Security program.","def":"An issue so highly charged that any public official who tries to tackle it will be harmed politically.","answer":"THIRD RAIL","tidbit":""},{"cat":"word","origin":"During the ancient observance of Yom Kippur, the Hebrew Day of Atonement, a high priest would symbolically lay the sins of the people on the head of a goat and then free the animal into the wilderness.","def":"A person or group made to bear the blame for others.","answer":"SCAPEGOAT","tidbit":"Bible translators interpreted Azazel as \"goat that departs,\" or \"escape goat.\" Many scholars now believe that Azazel is a proper name, perhaps referring to a desert demon."},{"cat":"word","origin":"Ironically, although it may not seem reasonable, this mid-16th-century word is derived from a Latin word meaning \"deserving applause.\"","def":"Believable.","answer":"PLAUSIBLE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"left\" or \"on the left side.\" Throughout history, the left side has often been considered bad luck. First recorded in the early 15th century, this word acquired an even more ominous meaning over time.","def":"Suggestive of evil.","answer":"SINISTER","tidbit":""},{"cat":"word","origin":"From a practice first written about in the early 1300s. Hunters would dig a hole and lightly cover it with leaves and branches, hoping an animal would fall in. The word's broader definition of \"any unforeseen difficulty\" was first recorded nearly 300 years later.","def":"","answer":"PITFALL","tidbit":""},{"cat":"word","origin":"Made famous by a 1935 New York Times headline describing some of the useless tasks and \"make-work\" projects that were part of the New Deal, this word was made up by a U.S. scoutmaster to describe the primarily decorative braided leather lanyard worn by Boy Scouts.","def":"A wasteful project or spending, or a lavish benefit offered in return for patronage, often funded by the government.","answer":"BOONDOGGLE","tidbit":""},{"cat":"phrase","origin":"Once they achieved peace with a warring tribe, the Iroquois conducted a ceremony in which war weapons were discarded underground.","def":"To settle differences.","answer":"BURY THE HATCHET","tidbit":""},{"cat":"word","origin":"Around 621 BC, a legislator was asked to compile the laws of Athens. His code helped provide consistency to a system that was in shambles. Many of the crimes, even minor ones, were punishable by death, and so his name became associated with harsh laws and justice.","def":"","answer":"DRACONIAN","tidbit":""},{"cat":"word","origin":"A Greek word for \"sharp\" combined with a Greek word for \"dull\" or \"stupid.\" The word itself exemplifies what it means.","def":"Contradiction in terms.","answer":"OXYMORON","tidbit":""},{"cat":"phrase","origin":"Shortly after it was first documented, this 19th century expression was used in its abbreviated form that is common today. The original phrase refers to how unusual it is to see lightning in a clear sky.","def":"Suddenly and unexpectedly.","answer":"OUT OF THE BLUE","tidbit":"The original expression was a bolt out of the blue or a bolt out of the clear blue sky."},{"cat":"word","origin":"Large and elaborate hairpieces were status symbols in the 17th and 18th centuries. They were worn by the rich and powerful, since they were the only ones who could afford them.","def":"An important person, though often a person who isn't as important as he or she thinks.","answer":"BIGWIG","tidbit":"Wigs first became fashionable in France in the early 1600s, when the prematurely bald King Louis XIII wore them."},{"cat":"word","origin":"The Old English term for \"godparent\" eventually came to mean \"close friend.\" Presumably, because good friends talk a lot, by the 16th century this word had become a term for people who exchanged idle chatter and rumors. By the 19th century, the word also referred to the rumors themselves.","def":"","answer":"GOSSIP","tidbit":""},{"cat":"phrase","origin":"Fly-fishermen try to catch salmon, trout and other fish by enticing them to swim up toward the bait. First recorded in the mid-1600s.","def":"To provoke.","answer":"GET A RISE OUT OF SOMEONE","tidbit":"Also the origin of the phrase \"take the bait.\""},{"cat":"word","origin":"This wickedly evil origin comes from a Greek word meaning \"devil.\"","def":"Fiendish.","answer":"DIABOLICAL","tidbit":""},{"cat":"word","origin":"Impressed with visitors' rapid finger movements while playing a European musical instrument called a braguinha, Hawaiians gave the instrument a native name meaning \"jumping flea.\" Within 10 years of its late-1800s introduction, this Hawaiian version of the braguinha was the most popular musical instrument in Hawaii.","def":"","answer":"UKULELE","tidbit":""},{"cat":"word","origin":"First recorded in the late 1500s, this word comes from a Greek word meaning \"to look\" or \"to consider.\" The Greek word was the name taken by the disciples of the philosopher Pyrrho (360-270 BC), who doubted the possibility of real knowledge.","def":"A person with a doubting attitude.","answer":"SKEPTIC","tidbit":""},{"cat":"phrase","origin":"This stone is uneven and dull when found in nature. Proper cutting and polishing brings out its beauty.","def":"Someone with potential who lacks training or refinement.","answer":"DIAMOND IN THE ROUGH","tidbit":""},{"cat":"phrase","origin":"Starting at least by the late 17th century, it was common practice to bind government or legal documents with a red ribbon. This phrase, which means \"excessive bureaucracy,\" has been common since the early 19th century.","def":"","answer":"RED TAPE","tidbit":""},{"cat":"word","origin":"In his 1667 epic poem Paradise Lost, Milton named the capital of hell with this word, which literally means \"place of all demons.\" Its broader meaning of \"unrestrained disorder or chaos\" dates from the 1800s.","def":"","answer":"PANDEMONIUM","tidbit":""},{"cat":"phrase","origin":"In ancient civilizations, a victorious athlete was given a ring of leaves to wear on his head. This related phrase, first recorded in the 1870s, means \"to be satisfied with past success.\"","def":"","answer":"REST ON ONE'S LAURELS","tidbit":""},{"cat":"phrase","origin":"The history of this phrase is a total mess. The core word in the phrase originally meant \"a stool\" and \"a moneychanger's table\" and comes from the Latin scamellum, meaning \"small bench.\" In the 15th century the meaning shifted to \"a meat market,\" then to \"slaughterhouse,\" then to \"any place of slaughter or bloodshed.\" In the 20th century, this word and the phrase it is a part of somehow shifted meaning again to mean \"a state of complete disorder and confusion.\"","def":"","answer":"A COMPLETE SHAMBLES","tidbit":""},{"cat":"phrase","origin":"In the Middle Ages, criminals were sent to their execution immediately after sentencing and had only a little time to met with a priest to receive absolution.","def":"Curt treatment.","answer":"SHORT SHRIFT","tidbit":"Shakespeare used the phrase in his play Richard III in 1594, but it was Sir Walter Scott who popularized it more than 200 years later. Except for its usage in this phrase, shrift is now obsolete. It meant \"penance imposed by a priest after confession.\""},{"cat":"phrase","origin":"From a story published in 1765 about a poor, sweet orphan girl named Margery Meanwell who has only one shoe. When she is eventually given a pair of shoes, she is so excited that she tells everyone about her good fortune. Margery's nickname and the title of the story are the sources of this phrase, which developed a more negative connotation over time.","def":"Someone smugly virtuous.","answer":"GOODY TWO-SHOES","tidbit":""},{"cat":"phrase","origin":"The French apparently believed that the products sold at these outdoor fairs attracted parasitic insects. This phrase first appeared in print in English in 1922.","def":"","answer":"FLEA MARKET","tidbit":""},{"cat":"word","origin":"The Aztecs' name for this edible substance, the likely source of our own word for it, means \"bitter water.\" The Spanish explorer Cortes introduced it to Europe as a beverage, and it gradually spread. It was first made into a food in the mid-19th century.","def":"","answer":"CHOCOLATE","tidbit":""},{"cat":"word","origin":"From the Latin for \"moon-struck.\" Since at least Roman times, it has been popularly believed that the mind is affected by the phases of the moon. First recorded in English in 1290.","def":"An insane person.","answer":"LUNATIC","tidbit":""},{"cat":"word","origin":"In Old English, this word referred to two or more animals tied together to pull heavy loads. Its current, more popular meaning became prevalent 700 years later.","def":"A group of people working together on an activity.","answer":"TEAM","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"wearing long hair,\" this object has a tail that resembles long flowing hair.","def":"A celestial body with a frozen mass and a highly elongated orbit around the sun.","answer":"COMET","tidbit":"When a comet comes close to the sun, its center heats up and releases a gas that surrounds the nucleus. The tail forms when solar heat or wind forces the dust or gas to stream away from the sun."},{"cat":"word","origin":"In the 13th century, this word referred to an evil female spirit that was believed to afflict people while they were sleeping and make them feel as if they were suffocating.","def":"Bad dream.","answer":"NIGHTMARE","tidbit":"The Old English maere means \"goblin.\""},{"cat":"phrase","origin":"This phrase originally described what a person would do to accept a challenge to a boxing match. Now it means \"to enter a contest,\" usually a political race.","def":"","answer":"THROW ONE'S HAT IN THE RING","tidbit":""},{"cat":"word","origin":"German miners called this ore \"copper devil\" because it did not contain copper even though it looked as if it did. The word was coined in 1754.","def":"A silvery white metallic element.","answer":"NICKEL","tidbit":"In Old English, the name Nick or Old Nick was a nickname for the devil. Ironically, the word nickname does not mean \"the devil's name.\" Nickname is actually a mistaken derivative of ekename. Eke is Old English for \"additional.\""},{"cat":"phrase","origin":"A slight alteration to a Middle English phrase, first cited in 1225, that literally means \"nude even to the tail.\"","def":"Totally nude.","answer":"STARK NAKED","tidbit":"The original phrase was start-naked. An obsolete meaning of start, from the Old English word steort, is \"the tail of an animal.\""},{"cat":"word","origin":"From a Latin word meaning \"to frighten.\" Originally this word meant \"to cause terror,\" and by the 19th century it was used to describe something severe or excessive. By 1930, this latter meaning had led to a new sense of the word that wasn't the least bit scary.","def":"Extremely good.","answer":"TERRIFIC","tidbit":""},{"cat":"name","origin":"Named after the loyal, strong, steady and coffee-drinking first mate in Herman Melville's Moby Dick.","def":"","answer":"STARBUCKS","tidbit":""},{"cat":"word","origin":"From a Latin word for \"little mouse,\" this word ironically means \"physical strength or power.\" The movement of this body tissue was believed to resemble the movement of mice.","def":"","answer":"MUSCLE","tidbit":""},{"cat":"phrase","origin":"From gold prospecting, this phrase stems from the process of separating the gold from the gravel and sand.","def":"An unsuccessful effort. The positive form of the phrase, describing a successful effort, is also used, but less frequently.","answer":"IT DIDN'T PAN OUT","tidbit":""},{"cat":"phrase","origin":"In the 14th century, an area outside of London used for executing criminals was labeled with this phrase because it was not desirable property to own.","def":"An area of uncertainty, in which boundaries or rules are unclear. Also, the area between the baseline and service line of a tennis court.","answer":"NO-MAN'S-LAND","tidbit":""},{"cat":"phrase","origin":"Probably from a god of the Mandinka people of West Africa, whose name literally means \"ancestor with a pompom.\" Men wishing to scare women into obedience would call for Mama Dyubmo (also written as Maamajomboo) -a masked tribesman who sometimes used a whip, stood nine feet tall, and was dressed with bark, a long coat and strands of straw on his head. Eighteenth-century Europeans associated the god's name with nonsense and babbling.","def":"Confusing technical jargon.","answer":"MUMBO JUMBO","tidbit":""},{"cat":"phrase","origin":"Before the era of refrigeration, pig's meat was cured, stored and distributed in large drums. These containers, and the amount of meat inside them, came to represent wealth. It is not hard to imagine people wanting to reach in to obtain their fair share.","def":"A political practice in which government funds are doled out to gain favor with constituents.","answer":"PORK BARREL","tidbit":""},{"cat":"word","origin":"First cited in the 1400s, this term originally referred to the wet feed, often leftovers from the kitchen or brewery, given to pigs. By the 18th century it was also a term for cheap liquor, and it eventually came to describe anything worthless or lacking credibility.","def":"Nonsense.","answer":"HOGWASH","tidbit":""},{"cat":"phrase","origin":"From the 16th century. When fabric is colored before it is woven into cloth, the color is likely to last much longer.","def":"Resolute or unyielding; often used in reference to a person's political affiliation.","answer":"DYED-IN-THE-WOOL","tidbit":""},{"cat":"phrase","origin":"This 18th century British phrase has multiple possible origins. The first is that pigs were sometimes tied by their feet to a beam before slaughter. Not surprisingly, it was natural for the animal's feet to strike the beam. Another theory is that a person committing suicide by hanging may stand on a pail to fasten the rope and then knock the pail away. The term was loosely used for anyone dying by any means by 1785.","def":"To die.","answer":"KICK THE BUCKET","tidbit":"A beam was once known as a bucket. The English word and this definition likely came from the French word buque, which has a similar meaning."},{"cat":"phrase","origin":"From the 19th century. New sailors would have to learn how to tie the knots and handle the various lines and sails on a ship.","def":"To become skilled at something new.","answer":"LEARN THE ROPES","tidbit":""},{"cat":"phrase","origin":"Likely from the sound one makes when trying to speak with closed lips. People use this phrase when urging someone not to tell a secret.","def":"","answer":"MUM'S THE WORD","tidbit":""},{"cat":"phrase","origin":"From the 16th century, this metaphor conveys the sense of flipping to a new page in an ancient book.","def":"To start fresh.","answer":"TURN OVER A NEW LEAF","tidbit":"Pages of a book were once called leaves."},{"cat":"word","origin":"From the Latin for \"pebble,\" as in the stones used for counting or voting.","def":"To think through or to determine mathematically.","answer":"CALCULATE","tidbit":""},{"cat":"word","origin":"A Greek word meaning \"origin\" was used as the Greek name for the first book of the Pentateuch, also known as the Torah.","def":"An origin, creation, or beginning.","answer":"GENESIS","tidbit":""},{"cat":"word","origin":"From the Old English wyrgan, which means \"strangle.\" This word's meaning evolved over time. It once meant \"to bite the throat and kill or wound,\" as when wolves attack sheep. By the 16th century, it meant \"to physically or verbally aggravate someone.\" By the 18th century, it developed its current meaning, to denote the feelings of the person being aggravated: \"to feel anxious or troubled.\"","def":"","answer":"WORRY","tidbit":""},{"cat":"word","origin":"In 1759, a French politician tried to get his country out of the debt caused by the Seven Years' War by restricting spending and imposing some heavy taxes. Outraged citizens quickly associated his name with anything thought to be cheap and mundane, including basic shadow portraits, which were less expensive than a painted portrait.","def":"","answer":"SILHOUETTE","tidbit":"Some contend that the meaning attached to his name was influenced by the many outline self-portraits Monsieur de Silhouette had on the walls of his chateau. Still others argue it refers to his brief tenure in office as Controller-General."},{"cat":"phrase","origin":"A medieval torture device, used at the Tower of London in 1470, punished victims by stretching their limbs. Though abolished in England in 1640, the device lives on as the key word in this phrase.","def":"To think very hard.","answer":"RACK ONE'S BRAIN","tidbit":""},{"cat":"phrase","origin":"This phrase comes from the early 1300s French allegorical poem Roman de Fauvel -a satire on the corruption of church, state and social life. Fauvel was a cunning but dishonest horse. This phrase, which literally means \"to brush a fawn-colored horse,\" represents how people insincerely flattered Fauvel in order to ingratiate themselves to him.","def":"","answer":"CURRY FAVOR","tidbit":"The original phrase, curry Fauvel, was altered in the 16th century as the popularity of the poem faded."},{"cat":"phrase","origin":"Perhaps first used in horse racing or boxing in the 1800s to describe the practice of winning a race after promising to lose it.","def":"Betrayal.","answer":"DOUBLE CROSS","tidbit":"In this phrase, cross means \"swindle,\" a slang definition that developed in the early 19th century. To cross and cross back is a double cross."},{"cat":"phrase","origin":"Although the origin of this phrase has not been definitively established, the most plausible theory associates it with a venerable chain of British menswear stores called Burton. Montague Maurice Burton had more than 400 shops, factories and mills throughout England by 1929. Burton sold a basic two-piece suit, but for a little extra they would throw in a vest and an extra pair of pants. The phrase was not recorded in print until 1979.","def":"The whole thing. Also, total nudity.","answer":"THE FULL MONTY","tidbit":""},{"cat":"word","origin":"From an Arabic word meaning \"eye makeup\" or, more specifically, \"powder used to paint the eyes.\" The powder in question, antimony sulfide, is a shimmering white element that was heated to a vapor and then condensed to a solid to produce an extremely fine powder. Over time, the word's meaning expanded to include other distilled substances, including the intoxicating compound of fermented liquor.","def":"","answer":"ALCOHOL","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"to make visible.\" In the 14th century, this word referred to something imagined. Perhaps because of the liveliness of the imagination, over time it came to mean \"elaborate or extravagant.\" In the 20th century, this latter sense evolved to refer to something \"superb\" or \"extraordinary.\"","def":"","answer":"FANTASTIC","tidbit":"Fantastic and fantasy have similar origins."},{"cat":"word","origin":"The explorer Captain James Cook introduced this word into the English language after encountering it in the Tongan Islands in 1777. In his journal, Cook wrote that the word \"has a very comprehensive meaning but, in general, signifies that a thing is forbidden.\"","def":"Socially prohibited.","answer":"TABOO","tidbit":"The original Polynesian meaning referred to a sacred item used only by a god, chief or priest."},{"cat":"word","origin":"Lewis Carroll invented this word in 1872 in Through the Looking-Glass, the sequel to Alice's Adventures in Wonderland. It is likely a combination of the words chuckle and snort.","def":"Partially suppressed laugh.","answer":"CHORTLE","tidbit":""},{"cat":"word","origin":"When arranged as an inverted pyramid and worn around the neck as a charm, the letters of this magical chant were believed to cure disease. One letter was removed in each line of the pyramid to signify that as the letters disappeared, so did the sickness. First cited in a second-century poem.","def":"","answer":"ABRACADABRA","tidbit":"A B R A C A D A B R A  A B R A C A D A B R    A B R A C A D A B      A B R A C A D A        A B R A C A D         A B R A C A           A B R A C             A B R A              A B R               A B                 A"},{"cat":"word","origin":"From Latin meaning \"to neck\" or, later, \"an embrace.\" First recorded in 1623, this word described the moment during the conferral of knighthood when the knight received an embrace, kiss or tap on the shoulder with a sword. By the mid-19th century, the definition had broadened.","def":"Praise or award.","answer":"ACCOLADE","tidbit":""},{"cat":"word","origin":"From Medieval Latin for \"glassy,\" this word was originally used to describe something highly corrosive and harmful, like sulfuric acid, that looks like glass in certain states.","def":"Highly caustic and/or severe criticism.","answer":"VITRIOL","tidbit":""},{"cat":"phrase","origin":"In boxing, competitors who are knocked down lose the match if they do not get back on their feet in 10 seconds. However, if the signal for the end of the round is given before the count of 10, the match continues after a break between rounds.","def":"Rescued by a timely interruption.","answer":"SAVED BY THE BELL","tidbit":""},{"cat":"word","origin":"Literally, \"that which comes.\" This Old English word for \"destiny\" was first cited around the year 888 in Beowulf. Its modern meaning comes from its use as part of a nickname for the Norns, the goddesses from Norse mythology who controlled human fate. The three sisters were usually depicted as frightening or odd, and consequently, by the 19th century, this word meant \"strange.\"","def":"","answer":"WEIRD","tidbit":"Because they controlled human fate, the Norns were called the Weird Sisters."},{"cat":"word","origin":"From a title for the Hindi god Krishna, who is worshiped in an annual festival at Puri, in India. The idol is placed on a massive cart that is pulled around the town. Reportedly, before modern times when safety precautions were improved, some devotees were accidentally crushed under the wagon's wheels.","def":"An overwhelming, unstoppable force.","answer":"JUGGERNAUT","tidbit":"Juggernaut comes from the Hindi word Jagannath, which literally means \"lord of the world.\""},{"cat":"word","origin":"Before the year 1000, this word meant \"ball,\" especially a \"ball of thread.\" Its current meaning comes from its key role in the Greek myth of Theseus, an Athenian sent to be sacrificed to the Minotaur. Theseus unwinds a ball of thread as he navigates the Labyrinth, where the monster lives. After slaying the Minotaur, Theseus rewinds the ball of string to find his way out of the maze.","def":"Evidence that helps solve a mystery.","answer":"CLUE","tidbit":"The original spelling was clew."},{"cat":"word","origin":"Because of worries about unattended domestic fires erupting into a major blaze, in medieval Europe a bell was rung at a fixed time every evening to remind the populace to put out their fires. This word, which literally means \"cover fire,\" was the term used for the bell-ringing. The broader definition of this word evolved in the 1800s.","def":"A limit on where a person can be at certain times; often requires the person to be home by a certain hour.","answer":"CURFEW","tidbit":""},{"cat":"phrase","origin":"In 1704, for his play Appius and Virginia, John Dennis invented a new method for creating the booming sound of a major storm. The play failed, but Dennis claimed that the producers of Macbeth copied his technique to create their storm sound effects.","def":"To anticipate someone's use of an idea and use it yourself.","answer":"STEAL ONE'S THUNDER","tidbit":"Dennis is quoted as saying, \"Damn them! They will not let my play run, but they steal my thunder.\""},{"cat":"word","origin":"From the title heroine of a 1913 children's novel by Eleanor Hodgman Porter about an orphan who follows her father's teaching to \"find something about everything to be glad about.\"","def":"A person with such irrepressible optimism and excessive cheerfulness that they seem naive or deluded.","answer":"POLLYANNA","tidbit":""},{"cat":"phrase","origin":"In 1566, Queen Elizabeth I organized the first British lottery to raise money for civic projects. Lottery tickets with the name or number of the buyer were put in one pot; another pot included both blank tickets and tickets with prizes. One ticket was selected from each pot to award the prizes. This phrase, relating to those whose names were matched with losing tickets, was first recorded in the 1800s.","def":"To conduct an unsuccessful search; also, to be unable to recall something.","answer":"DRAW A BLANK","tidbit":""},{"cat":"word","origin":"From the Latin and Middle French words meaning \"to weigh.\" This word has had several meanings related to weight, including, in the mid-16th century, \"equal weight\" or \"balance.\" By the early 1700s, the latter sense had been extended to mean \"steadiness\" or \"composure.\"","def":"","answer":"POISE","tidbit":""},{"cat":"word","origin":"Ancient doctors believed that the balance of four body fluids-blood, phlegm, black bile, and yellow bile-determined temperament and health. Excess blood made a person cheerful, while too much black bile caused gloominess. The Latin term for \"fluid\" named these substances. Over time, the word evolved to describe moods, particularly odd or whimsical traits, and by the 17th century, it also referred to something amusing or funny.","def":"","answer":"HUMOR","tidbit":""},{"cat":"word","origin":"A contraction of the phrase God be with you. First recorded in 1573.","def":"Farewell.","answer":"GOODBYE","tidbit":"Early forms of the phrase include God be wry you, God buy' ye and God b'y you."},{"cat":"word","origin":"From a Latin word meaning \"related to the heart.\" At first a term for the heart as \"the center of feeling and thought,\" it developed multiple meanings over time that related to unseen qualities such as bravery, anger, confidence and lustiness. Today, all but the first are obsolete.","def":"The ability to face dangers without, or in spite of, fear.","answer":"COURAGE","tidbit":""},{"cat":"words","origin":"From the Latin meaning \"to wander outside.\" In the 14th century, this word referenced papal decrees not yet formalized as church doctrine. By 1599 it meant \"beyond reason; excessive,\" and by the 18th century it meant \"spending excessively.\" A second, very similar word with the same Latin roots came into the English language from Italian and means \"a lavish show or event.\"","def":"","answer":"EXTRAVAGANT & EXTRAVAGANZA","tidbit":""},{"cat":"phrase","origin":"The sizzling and hissing of high temperature food sounded like music to the inventors of this phrase. Chaucer used it to describe waffles coming out of a fire in 1387 in The Miller's Tale, the second of his Canterbury Tales.","def":"","answer":"PIPING HOT","tidbit":"The word piping in this phrase refers to pipes as a musical instrument."},{"cat":"phrase","origin":"Starting in the 19th century, soldiers were awakened with this phrase, which perhaps referenced the sun coming up to start the day, and which urged them to get out of bed and act lively. It may have also been a reminder to soldiers to polish their boots.","def":"Time to get up and start the day.","answer":"RISE AND SHINE","tidbit":"Perhaps ultimately an allusion to Isaiah 60:1:\n\"Arise, shine, for thy light is come, and the glory of the Lord is risen vpon thee.\" (King James Bible)"},{"cat":"phrase","origin":"This phrase was first used on the London Stock Exchange in the 18th century to describe investors who could not pay their debts. Its underlying premise was that wounded birds were easy fodder for prey. The same phrase was also used for damaged ships that had no propulsion. By the 19th century the phrase was being used in politics, but it had a different meaning altogether.","def":"A politician who is slated to leave office but whose term has not yet ended.","answer":"LAME DUCK","tidbit":""},{"cat":"phrase","origin":"In 15th and 16th-century England, it was common practice for princes to have companions from other noble families who shared many of the princes' privileges. However, since kings (and, by extension, their children) were considered answerable only to God, it was the princes' companions who received punishment when the princes got into trouble.","def":"Scapegoat.","answer":"WHIPPING BOY","tidbit":""},{"cat":"phrase","origin":"Zeus, angry at Prometheus for stealing fire from heaven, orders the creation of the first mortal woman as a gift for Prometheus' brother. She carries with her a jar, which she is told never to open. She opens it anyway, and the evils of human life escape. She quickly closes the lid, but by then, hope is all that remains at the bottom of the jar.","def":"A course of action that, once started, generates problems.","answer":"PANDORA'S BOX","tidbit":"The box in some versions of the Pandora myth is likely more accurately translated as jar."},{"cat":"phrase","origin":"In the 18th century, drinking cups were sometimes decorated with ugly caricatures of human faces. The slang word for \"face\" that likely evolved from this practice is the key word in this phrase, first recorded in 1950.","def":"A photo of someone's face, especially one made for police records.","answer":"MUG SHOT","tidbit":""},{"cat":"word","origin":"This poker term describes a tactic in which a player with strong cards tries to keep the other players in the hand and maximize his winnings by not raising his bet until late in the game.","def":"To feign weakness or underperform to gain a future advantage.","answer":"SANDBAG","tidbit":"Sandbags were once used as weapons. The poker usage is likely a metaphor for being hit with a sandbag by surprise."},{"cat":"word","origin":"A once trademarked word combining a Latin word for \"steps\" with the word \"elevator\" was shortened to get to this word.","def":"To increase in intensity and seriousness at successive stages.","answer":"ESCALATE","tidbit":"Escalator was a trademark of the Otis Elevator Company but entered the public domain in 1950. The word was invented by taking scala, the Latin word for \"stairs\" or \"steps,\" and placing it between the second e and tor in elevator."},{"cat":"word","origin":"From an obscure classical Latin word meaning \"to besiege,\" this word described someone \"haunted by an evil spirit\" and, later, one \"excessively preoccupied with a single idea or emotion.\"","def":"","answer":"OBSESS","tidbit":""},{"cat":"phrase","origin":"The title of a 1942 James Thurber short story helped popularize this expression. Thurber apparently got the phrase from the famous baseball announcer Red Barber, who heard it from a man in a poker game in Cincinnati during the Depression. The bird in the phrase stakes its territory high in trees to sing and avoid predators.","def":"In a strong position.","answer":"IN THE CATBIRD SEAT","tidbit":"From Barber's 1968 biography referencing the poker game:\n\"I sat there for hours and couldn't win a pot. Finally, during a round of seven-card stud, I decided I was going to force the issue. I raised on the first bet, and I raised again on every card. At the end, when the showdown came, it was a fellow named Frank Cope and me. Frank turned over his hold cards, showed a pair of aces and won the pot. He said, 'Thank you, Red. I had those aces from the start. I was sitting in the catbird seat.' I didn't know the derivation of it, but I didn't have to be told the meaning. And I had paid for it. It was mine.\""},{"cat":"phrase","origin":"Knights in the Middle Ages would throw a glove to the ground to challenge an opponent.","def":"To make a serious challenge; to defy.","answer":"THROW DOWN THE GAUNTLET","tidbit":"Gauntlet is from Old French and means \"little glove.\""},{"cat":"word","origin":"At first, this word meant \"the seats at a racetrack or stadium.\" By the late 19th century, it was baseball slang and referred to someone who shows off to impress or pander to a crowd.","def":"1) The seats at a racetrack or stadium.\n2) Done for show or to impress onlookers.","answer":"GRANDSTAND","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase is a fashion accessory that was made from very soft leather, such as goat or lamb skin. In the mid-19th century, it came to be associated with people considered delicate or refined.","def":"To treat gently.","answer":"HANDLE WITH KID GLOVES","tidbit":"A kid is a young goat."},{"cat":"word","origin":"The definitive origin of this word is unknown. Some speculate that it was rhyming slang for the word nix. Restaurant workers in the early 1900s used this word to indicate that the restaurant was out of the dish ordered. It was later used as a code word to refuse service to someone or to throw out an unwanted diner. It is currently used to mean \"discard.\"","def":"","answer":"EIGHTY-SIX","tidbit":""},{"cat":"word","origin":"Perhaps from a Malay word meaning \"a parasitic biting insect,\" such as a tick, louse, or a mosquito. Alternatively, originally a British expression meaning \"infested with lice\" referencing waterfowl believed to be riddled with them. The word was originally British World War I slang.","def":"An imaginary germ that children believe they can get from the opposite sex.","answer":"COOTIE","tidbit":"The Malay word is kutu.\nA coot is an aquatic bird."},{"cat":"phrase","origin":"First used in print in 1960, this expression describes the wild intensity and ferocity of certain species of shark when they attack and eat their prey. By extension, the phrase is also used to describe people or groups competing with reckless abandon. In particular, it describes the media's intense pursuit of a story about an individual or group.","def":"","answer":"FEEDING FRENZY","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"where the three ways (or roads) meet.\" This word was used for the first stage of a medieval liberal arts education, which included three subjects: rhetoric, grammar and logic.","def":"Insignificant, though sometimes interesting, facts.","answer":"TRIVIA","tidbit":"To complete study in the seven liberal arts, trivium was followed by the four mathematical sciences, which were called quadrivium: arithmetic, cul, music and astronomy."},{"cat":"word","origin":"\"Goat song\" is the literal English translation of this Latin word, although the reason why is unknown. One theory holds that the word was the name for early performances of male singers who impersonated satyrs (half man, half goat deities). Another is that goats were a prize for the best song. In either case, these performances changed over time, becoming more dramatic and including more misfortune.","def":"A play or event with an unhappy ending.","answer":"TRAGEDY","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"an actor on stage.\" The idea behind the word's current meaning is that an actor, in playing a part, is pretending to be someone that he or she is not.","def":"A person who says one thing and does another.","answer":"HYPOCRITE","tidbit":""},{"cat":"phrase","origin":"This phrase may have been inspired by the Parthian Empire, which lasted from around 247 BC to around the year 225 and occupied all of modern Iran, Iraq, Armenia and other territories. Parthian warriors were known for their skill in archery and horsemanship and were famous for a military maneuver in which they would feign retreat and then, at full gallop, turn and fire at their enemy.","def":"A pointed or sarcastic remark made when one is leaving.","answer":"PARTING SHOT","tidbit":"Parthian horseman firing on their enemy while fleeing was dubbed a Parthian shot."},{"cat":"word","origin":"Combines two Japanese words that together mean \"empty orchestra.\"","def":"The practice of singing songs to prerecorded music.","answer":"KARAOKE","tidbit":""},{"cat":"word","origin":"The medieval game Ragman used rolled-up scrolls tied with a string with funny stories inside. By the late 13th century, some English statutes with their seals and ribbons were called Ragman Rolls because they resembled these scrolls. Perhaps because the length of the statutes, by the 1700s, the term evolved to mean \"a series of rambling statements\" and also refers to \"an overly complicated process.\"","def":"","answer":"RIGMAROLE","tidbit":""},{"cat":"phrase","origin":"In medieval England, before the existence of organized police forces, a common law statute directed that witnesses to a crime must sound an alarm and pursue the suspect. This phrase was the term used for the clamor the bystanders were directed to make.","def":"Uproar.","answer":"HUE AND CRY","tidbit":"Hue, meaning \"outcry,\" is from the legal phrase hu e cri, and may have also referred to sounds such as a horn or trumpet. In fact, the equivalent Latin phrase was hutesium et clamor, \"with horn and with voice.\""},{"cat":"word","origin":"From an Old French word meaning \"tail.\" The evolution of its meaning likely stems from an animal's practice of turning to flee its prey, as in the phrases \"turning tail\" or \"running away with its tail between its legs.\"","def":"Timid; lacking courage.","answer":"COWARD","tidbit":""},{"cat":"phrase","origin":"This phrase describes what a boxer's coaches would do when their boxer was losing the match and they wanted to concede defeat.","def":"To give up.","answer":"THROW IN THE TOWEL","tidbit":"Another version of the same expression was \"throw in the sponge.\" Like towels, sponges were used by trainers to wipe down boxers between rounds and were thrown into the ring to stop a fight."},{"cat":"word","origin":"In medieval times this word referred to the small slits in castle walls that were narrow on the inside and wider toward the outside. Its figurative meaning first emerged in the 17th century, perhaps because the slits' shape made it hard to shoot in but easy to shoot out.","def":"An ambiguity that allows someone to avoid the intent of the law without actually violating it.","answer":"LOOPHOLE","tidbit":"Likely from the Middle English word loupe, meaning \"opening in a wall,\" and related to the Middle Dutch word lupen, meaning \"to watch or peer.\""},{"cat":"phrase","origin":"This phrase with its figurative meaning was first printed in 1974 in the New York Times to describe what members of the House Judiciary Committee, skeptical about impeaching President Nixon, wanted to see: incontrovertible evidence of his guilt.","def":"","answer":"SMOKING GUN","tidbit":"From the New York Times July 14, 1974:\n\"The big question asked over the last few weeks in and around the House Judiciary Committee's hearing room by committee members who are uncertain about how they felt about impeachment was, 'Where's the smoking gun?'\"\nWhen the evidence was found on the Watergate tapes Rep. Barber B. Conable Jr. (R-N.Y.), chairman of the House Republican Policy Committee said, \"I guess we have found the smoking gun, haven't we?\""},{"cat":"phrase","origin":"The key word in this phrase may come from the name of a 17th-century instrument with a long handle and iron ball at the end, which was heated and used to melt tar. These devices were also used as weapons, either by themselves or as a vehicle for throwing tar at an enemy. A 16th-century meaning of the word, \"a stupid person or blockhead,\" may also have influenced the contemporary meaning of the phrase.","def":"Engaged in a violent quarrel or head-on dispute.","answer":"AT LOGGERHEADS","tidbit":""},{"cat":"phrase","origin":"In his 1837 poem Thoughts of August, Charles-Augustin Sainte-Beuve used this biblical expression from the Song of Solomon to intimate that a fellow poet, Alfred de Vigny, was detached from the realities of normal life. Henry James then popularized the phrase when he used it as the title of a 1916 book.","def":"A place that is disconnected from life's realities.","answer":"IVORY TOWER","tidbit":""},{"cat":"phrase","origin":"The Industrial Workers of the World formed in 1905 to organize workers. Known as the Wobblies, they wrote pro-union songs to rally their members. This phrase comes from a song called \"The Preacher and the Slave,\" which spoofs the Salvation Army for trying to save souls instead of feeding them.","def":"A lofty, unrealistic goal.","answer":"PIE IN THE SKY","tidbit":"Song chorus:\"You will eat, bye and bye,In that glorious land above the sky;Work and pray, live on hay,You'll get pie in the sky when you die.\""},{"cat":"word","origin":"Originating from Latin words for \"enliven,\" \"flourishing,\" and \"active,\" this term initially meant \"having the living properties of a plant.\" By the late 16th century, it referred to a \"plant,\" and by the late 18th century, it described \"a plant cultivated for food.\" Ironically, by the 1920s, it also came to mean \"incapable of conscious responses, usually due to an accident or illness.\"","def":"","answer":"VEGETABLE","tidbit":""},{"cat":"word","origin":"Gamblers who kept their hands higher than the table were thought to be less able to cheat. First recorded in the 16th century.","def":"Open and honest; transparent.","answer":"ABOVEBOARD","tidbit":"The noun board once meant \"table.\""},{"cat":"word","origin":"\"Deaf to the ear\" and \"out of tune\" were the meanings of the French and Latin versions of this word. Its figurative sense, which stems from how silly a poor instrument or musician can sound, replaced those original meanings when the word was brought into the English language.","def":"Unreasonable; ridiculous.","answer":"ABSURD","tidbit":""},{"cat":"phrase","origin":"In Old English, the first word of this phrase referred to \"a piece of wood that has been burning on the hearth.\" The phrase itself, first recorded in the 16th century, described something \"freshly forged from the furnace.\"","def":"Original.","answer":"BRAND-NEW","tidbit":"Brand had another, slightly different meaning in the 1400s, \"to burn with a hot iron,\" which led to the branding of cattle and even of barrels of wine. The latter, in turn, led to the sense of brand as a mark for a commercial product."},{"cat":"word","origin":"In ancient Rome, people seeking political office wore white togas and thus were labeled with this word, which in Latin means \"clothed in white.\"","def":"Someone who seeks an office, prize or honor.","answer":"CANDIDATE","tidbit":""},{"cat":"word","origin":"In the year 582, this word referred to a torture device. Its meaning changed over time from \"torment\" to \"weary\" to \"hard work.\" The current meaning comes from the notion of a difficult journey, perhaps because of the hardship of any excursion during the Middle Ages.","def":"To go from one place to another.","answer":"TRAVEL","tidbit":"Travel was originally the same word as travail."},{"cat":"phrase","origin":"In the late 18th century, the key word in this phrase referred to a line used as a boundary or starting point in sporting events such as track, boxing or cricket. By the mid-19th century, it also meant a competitor who received no advantage in a handicapped match. Its broader usage came from this latter meaning.","def":"From the very beginning; from nothing.","answer":"FROM SCRATCH","tidbit":""},{"cat":"word","origin":"From el largarto, meaning \"the lizard\" in Spanish, this word was first published in English in 1568, and its spelling was altered many times thereafter. The earliest recorded version similar to the current English spelling is found in Shakespeare's Romeo and Juliet (1623).","def":"","answer":"ALLIGATOR","tidbit":""},{"cat":"phrase","origin":"One theory is that this phrase described Yankees fans who went to see Babe Ruth play but purchased tickets on the wrong side of the ballpark. Another theory is that the phrase refers to the location of a mental hospital outside Chicago's old West Side Park. All that is really known is that this expression came from baseball.","def":"Unexpected; unusual.","answer":"OUT OF LEFT FIELD","tidbit":""},{"cat":"phrase","origin":"During World War II, General Evans Carlson borrowed this Mandarin Chinese motto meaning \"work together\" after he heard it used by the Chinese Industrial Cooperative. Carlson used the term for team meetings designed to resolve problems. The expression caught on among Carlson's Marines, who used it as a moniker for their battalion. It now means \"extreme eagerness.\"","def":"","answer":"GUNG-HO","tidbit":""},{"cat":"phrase","origin":"The definitive origin of this phrase is unknown. One theory is that mapmakers used flower petals to clean their spectacles and that those petals left a red or pink stain on the lenses. Another theory is that the Victorian era romanticized flower gardens and associated their beauty with optimism. A third theory is that looking at life while sipping a glass of red wine would give the drinker the positive life view behind this phrase.","def":"To have a positive outlook.","answer":"ROSE-COLORED GLASSES","tidbit":""},{"cat":"word","origin":"From a Norman French word meaning \"crane's foot,\" because the forked lines (\"/|\\\") used in genealogy charts resemble the foot or footprint of a crane.","def":"The ancestry of an animal, especially a horse or dog. Also, the historical development of an idea or custom.","answer":"PEDIGREE","tidbit":""},{"cat":"word","origin":"The root of this word means \"what is read,\" and in the 12th century it meant \"a written story about the life of a saint.\" By the 15th century, it referred to \"a story passed down over generations that was popularly believed to be true, even if its facts were unverified.\" Starting in the 20th century, the word was also used for the famous characters in these fanciful stories.","def":"","answer":"LEGEND","tidbit":""},{"cat":"word","origin":"In Sanskrit, this word is translated \"to blow out\" and means \"extinction.\" Though the concept is not exactly the same in each religion, in Buddhism, Hinduism and Jainism this word refers to a state of spiritual enlightenment in which the soul is freed from attachment to the physical world and the cycle of birth, death and rebirth ends. More generally, the word means \"an ideal condition of harmony or delight.\"","def":"","answer":"NIRVANA","tidbit":""},{"cat":"phrase","origin":"In the 19th century, before the advent of cameras, a line was stretched across the endpoint of a horse race to help the judges determine the winner.","def":"Undecided until the very end.","answer":"DOWN TO THE WIRE","tidbit":"A wire was also placed at the start of the race to help detect false starts, hence the phrase wire to wire, which means \"from the beginning to the end.\" Similarly, when you complete something just in time, you have made it under the wire."},{"cat":"word","origin":"In the 17th century, this word's definition reflected its Latin roots. It meant \"a plant or fruit that ripened early.\" The concept was quickly applied to people as well.","def":"Unusually advanced or mature; especially used to describe children with superior abilities.","answer":"PRECOCIOUS","tidbit":"Apricot has the same roots as precocious and means \"ripe early.\""},{"cat":"word","origin":"In the Middle Ages, a shepherd would place a chime around the neck of a castrated ram and the other sheep would follow the designated leader of the flock. By the 15th century, this word was used derisively to denote a leader who would be followed only by sheep. However, in modern times it describes a trendsetter or indicator of future developments.","def":"","answer":"BELLWETHER","tidbit":"In Old English, wether referred to \"a castrated ram.\""},{"cat":"phrase","origin":"In backgammon, and other similar games, players would sometimes reverse the board and switch positions. From the 17th century.","def":"To completely reverse the circumstances.","answer":"TURN THE TABLES","tidbit":"The two folding leaves of a backgammon board are called tables; one is the inner table, the other the outer table."},{"cat":"word","origin":"Scottish Highland or Irish warriors of the 16th century would yell the name of their leader or locale as they launched into combat. Their term for \"battle cry\" was the Gaelic sluagh-ghairm. By the 18th century, the term had evolved to apply to more than just combat.","def":"Motto.","answer":"SLOGAN","tidbit":""},{"cat":"word","origin":"George de Mestral was annoyed by the burs that stuck to his dog's fur and his wool pants. Looking under a microscope, he discovered that burs have hundreds of tiny hooks that attach to loops of thread or fur. A weaver working on his small loom for de Mestral made two cotton tapes that connected like burs and fabric. de Mestral named the product from the French words for \"velvet\" (velour) and \"hook\" (crochet).","def":"","answer":"VELCRO","tidbit":""},{"cat":"phrase","origin":"In European folklore as early as the 17th century, it was believed that some supernatural creatures, such as werewolves, could be killed only with this special ammunition.","def":"A simple and complete solution to a difficult problem.","answer":"SILVER BULLET","tidbit":"The Lone Ranger, a popular radio and television hero of the 1930s and beyond, helped further cement the mystique of the silver bullet by leaving one at the scene where he \"saved the day.\""},{"cat":"word","origin":"From a 19th-century Dutch word meaning \"to sneak food.\"","def":"To pry or prowl, especially into the private affairs of others.","answer":"SNOOP","tidbit":""},{"cat":"word","origin":"In the 14th century, this word meant \"to pierce or stab.\" Later it was used metaphorically, by authors such as Shakespeare, to describe the feeling of being pierced with a burst of emotion.","def":"A sudden and intense feeling of excitement.","answer":"THRILL","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"doglike.\" This word was a nickname for members of a philosophical school which taught that virtue was the only good and that it was achieved by self-control. Since they were quick to find fault with people they considered less virtuous, their name came to mean \"someone critical or disbelieving of others.\"","def":"","answer":"CYNIC","tidbit":"Cynic likely came from the name of the gymnasium where the group's founder taught, although some claim it came from the nickname for Diogenes, the school's most illustrious member, who mocked social conventions."},{"cat":"phrase","origin":"This phrase was a part of \"trench warfare\" during World War I. The term described soldiers who left the protection of the trenches to attack the enemy. Over time, the figurative meaning of the phrase extended from \"foolhardy\" to \"extravagantly excessive.\"","def":"","answer":"OVER-THE-TOP","tidbit":""},{"cat":"phrase","origin":"An officer on 19th-century ships called the boatswain -in charge of the sails and summoning the crew to its duties-blew on a small, whistle-like device to direct the crew. Different sounds represented different commands. The call for sailors to retire for the night is the origin of this phrase.","def":"Be quiet.","answer":"PIPE DOWN","tidbit":""},{"cat":"phrase","origin":"This phrase comes from early 20th-century magazine stories, TV shows and movies about the Old West. It was used to describe the practice of guards who rode atop stagecoaches armed with weapons to protect their cargo and riders.","def":"To protect or carefully watch something; to sit in the passenger seat of a car.","answer":"RIDE SHOTGUN","tidbit":""},{"cat":"word","origin":"A surveyor's reference point, cut in rock or in part of a structure that is used to measure the altitude and/or level of a tract of land. The cut was originally used to attach a bracket so a leveling rod could be accurately mounted at the same place. The word was first recorded in 1842.","def":"A standard by which something can be measured.","answer":"BENCHMARK","tidbit":"The bracket is called a bench. The original benchmark was a horizontal line above a chiseled arrow."},{"cat":"phrase","origin":"Likely from the sale of dehydrated herbs, which are uniform, prepared in advance and lack the freshness, flavor and spontaneity of hand-picked herbs.","def":"Routine or prepared in advance.","answer":"CUT-AND-DRIED","tidbit":""},{"cat":"word","origin":"Perhaps from a Scottish word meaning \"a person who sees poorly.\" This word, first recorded in 1834, described a golfing situation in which one golf ball lying on the putting green blocked the hole from another ball. By the early 1990s, a more general meaning had taken hold.","def":"To hinder progress or frustrate.","answer":"STYMIE","tidbit":""},{"cat":"word","origin":"In fencing, this exclamation is used to acknowledge that an opponent has made a scoring hit.","def":"A pleasant acknowledgement of another person's cogent or clever verbal comeback.","answer":"TOUCHE","tidbit":""},{"cat":"phrase","origin":"A fisherman opening this container of bait and having to handle its wriggling contents is the likely origin of this phrase.","def":"A source of unanticipated problems.","answer":"OPEN A CAN OF WORMS","tidbit":""},{"cat":"word","origin":"In Greek mythology, when Odysseus leaves for the Trojan War, he places a trusted counselor in charge of his son, Telemachus. Odysseus does not return for 20 years, but the advisor does a wonderful job of supporting and guiding Telemachus. The counselor's name is the source of this word.","def":"A trusted counselor or patron.","answer":"MENTOR","tidbit":""},{"cat":"words","origin":"From Latin meaning \"abandon,\" this word, that originally referred to an uninhabited track of land and now refers to a desolate region, is often confused with a second, similarly spelled word with Old French roots meaning \"to clear the table.\"","def":"1) A barren region with little rainfall.2) A sweet dish served at the end of a meal.","answer":"DESERT & DESSERT","tidbit":"Another meaning for desert, as in the phrase just deserts, is \"deserving\"; it comes from a different French word that means \"to deserve.\"\nA desert island is uninhabited, not a hot and dry island with little rainfall."},{"cat":"phrase","origin":"In the 1400s, the key word in this phrase referred to a spicy sauce used with meat or poultry. Likely from a Dutch word for \"brine,\" it later meant \"a solution used for preserving and seasoning food.\" The phrase conjures up the image of being stuck in vinegary brine.","def":"A difficult predicament.","answer":"IN A PICKLE","tidbit":"By the 18th century, pickle was also used specifically for preserved cucumbers as well as any food preserved in brine. In a pickle may have been influenced by a similar Dutch phrase that translates to sit in a pickle."},{"cat":"words","origin":"From Old French, this word, and a second word that is a later popular shortening of it, refer to the forefront of an army. By the 19th century, both words also meant \"leaders or pioneers in a movement or field.\"","def":"","answer":"AVANT-GARDE & VANGUARD","tidbit":"Avant-garde literally means \"advance guard.\""},{"cat":"phrase","origin":"From a popular Spanish bullfighting term for the point at which the bull is about to be slain. The phrase was popularized in English by Ernest Hemingway in Death in the Afternoon, his 1932 study of bullfighting.","def":"A decisive point in time, often when someone is put to an important test.","answer":"MOMENT OF TRUTH","tidbit":"The Spanish phrase is hora de la verdad, literally \"hour of truth.\""},{"cat":"phrase","origin":"This Italian phrase for the leading female singer of an opera company dates from the late 18th century. Its extended sense of a conceited and temperamental person was first recorded in 1834.","def":"","answer":"PRIMA DONNA","tidbit":"Prima donna, literally translated, means \"first lady.\""},{"cat":"words","origin":"From a Latin word meaning \"related to a temple.\" This word originally referred to the speech or actions of a person believed possessed by a deity or demon. By the 17th century, it had developed the more general meaning of a person with \"excessive, inflexible devotion to a cause.\" A similar word, likely a late 19th-century abbreviation of the first, means \"devoted supporter.\"","def":"","answer":"FANATIC & FAN","tidbit":""},{"cat":"word","origin":"From Greek, meaning \"suffering in the womb,\" because the Greeks believed that disorders in the uterus caused women to be uncontrollably emotional.","def":"Uncontrollably emotional.","answer":"HYSTERICAL","tidbit":""},{"cat":"word","origin":"From the 18th century, a reference to a tightly wound part of a musical instrument.","def":"Highly excitable or nervous.","answer":"HIGH-STRUNG","tidbit":""},{"cat":"word","origin":"From the Hindi word for \"waistband.\"","def":"A wide pleated sash worn at the waist with a tuxedo; a man's formal dress staple.","answer":"CUMMERBUND","tidbit":"The Hindi word is kamarband."},{"cat":"word","origin":"In 1865 the Prince of Wales was looking for stylish attire slightly less formal than a tailcoat. Most likely, the garment designed for the prince was also fitted for American millionaire James Potter when he met the prince during a trip to Britain. This garment got its name from the city in New York state where Potter later wore it to the autumn ball of a private country club in 1886.","def":"Man's formal jacket or outfit.","answer":"TUXEDO","tidbit":""},{"cat":"word","origin":"From an old French word meaning \"wine taster.\"","def":"1) A connoisseur of fine food and drink.2) A high quality or expensive specialty food, sometimes requiring expert preparation.","answer":"GOURMET","tidbit":""},{"cat":"words","origin":"From an old French word meaning \"trust,\" which makes sense if you're committed to getting married.","def":"1) A woman engaged to be married.\n2) A man engaged to be married.","answer":"FIANCEE & FIANCE","tidbit":""},{"cat":"word","origin":"This word for a Japanese organized crime organization means 8-9-3, the worst hand in a card game called oicho-kabu, the Japanese equivalent to baccarat.","def":"","answer":"YAKUZA","tidbit":""},{"cat":"word","origin":"In the Roman cursive of the 1st century AD, the letters E and T were sometimes blended together into the single symbol et, a Latin word for \"also.\" This symbol even appeared at the end of the English alphabet after the letter Z as late as the 19th century.","def":"And.","answer":"AMPERSAND","tidbit":"The & symbol was read aloud as \"and per se and\" (meaning \"and in and of itself\"), which morphed into the word \"ampersand.\""},{"cat":"word","origin":"Coined by a French inventor in 1861. It combines two Greek words, the first meaning \"spiral\" and the second meaning \"wing.\"","def":"Aircraft that ascends and descends vertically.","answer":"HELICOPTER","tidbit":"\"Helico\" is from the Greek helix, and \"pter\" is from the Greek word pteron, meaning \"wing.\""},{"cat":"word","origin":"Originally a trademarked name for the mechanically loaded trash-hauling container produced by the Dempster Brothers Company of Knoxville, Tennessee.","def":"A large trash receptacle.","answer":"DUMPSTER","tidbit":"The trademarked name was Dempster Dumper."},{"cat":"word","origin":"In some English-speaking countries, the name for this mighty biblical hunter means \"fool.\" The definitive reason is not clear, but may have to do with cartoons. The term was used in the cartoon The Great Magoo in 1933, but likely gained popularity because Bugs Bunny derogatorily used it to describe his hunter and dimwit nemesis Elmer Fudd.","def":"Fool; also a hunter.","answer":"NIMROD","tidbit":"Bugs Bunny, known for the catchphrase \"What's up, Doc?\" called Elmer Fudd \"poor little Nimrod.\""},{"cat":"word","origin":"A 17th-century doctor diagnosed homesick Swiss mercenary soldiers with a form of melancholy, which he named by combining a Greek word meaning \"homecoming\" with a New Latin word meaning \"pain.\" By the end of the 19th century the condition was no longer thought of as an ailment, but the word was still used to describe sentimentality for the past.","def":"","answer":"NOSTALGIA","tidbit":""},{"cat":"phrase","origin":"An adverb derived from the way that, in horse racing, a jockey relaxes his grip on the reins and lowers his hands when cruising to victory.","def":"Easily.","answer":"HANDS DOWN","tidbit":""},{"cat":"words","origin":"Prehistorically, the Ursa Major and Ursa Minor constellations, in the northern hemisphere and pointing to the North Star, were known as \"Great Bear\" and \"Little Bear.\" Correspondingly, the name for the first of these two regions originates from a Greek word that means \"bear.\" The name for the second region comes from Greek and means \"anti-bear.\"","def":"1) Located near the North Pole; also, bitter cold.2) Located near the South Pole.","answer":"ARCTIC & ANTARCTIC","tidbit":""},{"cat":"word","origin":"From Old English and Proto-Germanic words meaning \"the brown one.\"","def":"A carnivorous or omnivorous mammal, usually massive.","answer":"BEAR","tidbit":"Most of the Indo-European languages have a precise word for \"bear,\" but in some cultures the word was replaced, perhaps because hunters had a taboo on saying the word directly."},{"cat":"word","origin":"This word originally meant \"babbler\" and referred to any non-Greek whose language was unintelligible to the ancient Greeks. Later, in the Roman Empire, the word came to refer to all foreigners who lacked Greek and Roman traditions.","def":"A savage or uncivilized person.","answer":"BARBARIAN","tidbit":""},{"cat":"word","origin":"Borrowed from the French phrase m'aidez, which means \"help me.\" Used for emergencies.","def":"International distress call.","answer":"MAYDAY","tidbit":"In 1923, English aviators who used radio on their planes, instead of telegraph sets, were trying to establish a distress call. The letters SOS didn't work because the letter S was thought to be hard to distinguish, so \"Mayday\" was chosen instead."},{"cat":"phrase","origin":"In the late 19th century, logging expanded in the northwestern United States. Tree trunks were rolled or hauled by animals along tracks made of greased timbers. Streets around the mills attracted cookhouses, cheap bars and inexpensive hotels for itinerant workers. As cities such as Seattle grew more prosperous and the milling business diminished, the logging areas became dilapidated haunts for the unemployed, and this term arose.","def":"An urban, impoverished area, usually stereotyped as being full of cheap bars and vagrants.","answer":"SKID ROW","tidbit":"The phrase \"skid road\" for a logging road dates to the 17th century."},{"cat":"word","origin":"From Latin and French words meaning \"witchcraft.\" This word was first recorded with its present-day meaning of \"something that attracts and holds interest or attention\" in the early 19th century.","def":"","answer":"FASCINATE","tidbit":""},{"cat":"word","origin":"From the name of the 18th-century scientist who discovered that an electrical spark made a frog's leg move and was a pioneer in the study of bioelectricity. His core belief that electrical energy was intrinsic to the frog was eventually proven false.","def":"To stimulate to action.","answer":"GALVANIZE","tidbit":"The scientist's name was Luigi Galvani. His work and the debate over his theories influenced Mary Shelley's Frankenstein."},{"cat":"phrase","origin":"This shoe, introduced in the 1930s, was originally called The Weejun, because it was inspired by the light slip-on shoes worn by Norwegian fisherman and peasants. The design includes a strap on the top with a small slit that is the ideal size to hold a coin, which was useful in the days of payphones, and led to this nickname that became the standard name for this shoe. Years later, preppy Americans put silver coins in the slit.","def":"A leather shoe with a decorative slotted leather strip across the vamp.","answer":"PENNY LOAFER","tidbit":""},{"cat":"phrase","origin":"A phrase derived from the difficulty of hitting a target from very far away.","def":"Very unlikely.","answer":"LONG SHOT","tidbit":""},{"cat":"phrase","origin":"A shortened version of a 17th-century English expression for the intense hallucinations that accompany withdrawal from alcohol is likely the source for the two-word name of this American musical genre.","def":"","answer":"THE BLUES","tidbit":"The expression was \"the blue devils.\""},{"cat":"phrase","origin":"Originally an 18th-century nautical phrase for when a sudden change of wind flattens the sails back against the masts and stops a ship's forward motion.","def":"Suddenly surprised, shocked or disappointed.","answer":"TAKEN ABACK","tidbit":""},{"cat":"phrase","origin":"Picture sprinters trying to get their feet as close to the starting line as possible to guess this phrase, though the origin is likely from the 18th century and refers to British soldiers getting into a precise formation for drills.","def":"Conform.","answer":"TOE THE LINE","tidbit":""},{"cat":"word","origin":"From a Latin word for \"light.\" It now refers to a person of eminence, perhaps because the Middle English word in the mid-15th century had a figurative meaning of \"source of spiritual light.\"","def":"","answer":"LUMINARY","tidbit":""},{"cat":"word","origin":"From a Dutch word for \"lover,\" this word meant \"sweetheart\" in the early 16th century. By the 17th century, the meaning had changed to apply to men only and meant \"fine fellow.\" Eventually, for unclear reasons, the word came to mean \"pimp\" and then changed again to mean \"a blustering, browbeating person.\"","def":"","answer":"BULLY","tidbit":""},{"cat":"word","origin":"From the Latin word for \"blood.\" Ancient doctors believed that the balance of four body \ufb02uids - blood, phlegm, black bile and yellow bile - determined temperament and health. Too much blood was thought to make a person cheerful.","def":"Cheerfully optimistic.","answer":"SANGUINE","tidbit":""},{"cat":"word","origin":"From Middle English and Middle French words meaning \"Turkish stone.\" Though it was mined in the Sinai Peninsula, this mineral was traded to and brought to Europe through Turkey.","def":"Greenish-blue precious stone; also, a color resembling the stone.","answer":"TURQUOISE","tidbit":""},{"cat":"word","origin":"This term first appears in Shakespeare's Othello, when Iago uses it to plant doubt in Othello's mind about his wife Desdemona's faithfulness. The same passage inspired a second similar idiom meaning the same thing.","def":"Jealousy.","answer":"GREEN-EYED MONSTER & GREEN WITH ENVY","tidbit":"Iago:\"O, beware, my lord, of jealousy;It is the green-eyed monster which doth mockThe meat it feeds on; that cuckold lives in blissWho, certain of his fate, loves not his wronger;But, O, what damned minutes tells he o'erWho dotes, yet doubts, suspects, yet strongly loves!\""},{"cat":"phrase","origin":"From the name of an arcade amusement game in which players use a mallet to bang on a plastic version of a burrowing mammal that chiefly lives underground.","def":"A situation in which attempts to solve a persistent problem are superficial, so the problem continually resurfaces.","answer":"WHACK-A-MOLE","tidbit":""},{"cat":"word","origin":"Suspicions (occasionally justified) about sausages being made from canines, along with sausages' resemblance to dachshunds, are probably the origin for the two-word name of this food.","def":"","answer":"HOT DOG","tidbit":""},{"cat":"word","origin":"From two Greek words, the first meaning \"star\" and the second meaning \"sailor.\"","def":"Space traveler.","answer":"ASTRONAUT","tidbit":""},{"cat":"word","origin":"From a Middle English word meaning \"good luck,\" with a \"y\" added to the end to mean \"full of,\" this word meant \"glad\" by the late 14th century.","def":"","answer":"HAPPY","tidbit":""},{"cat":"phrase","origin":"Derived from the Latin for \"open field,\" the noun in this two-word phrase was widely used to refer to a soldier when it entered the English language in the 1600s. In the mid-1800s it took on the more generic meaning of a person who goes to the country for recreation. In the 1980s, an adjective was added to form a two-word phrase meaning \"sad person.\" The phrase probably sprung from descriptions of homesick kids away for summer activities.","def":"","answer":"UNHAPPY CAMPER","tidbit":""},{"cat":"word","origin":"From the word for \"tied wood\" in the Dravidian language, spoken by Tamils in southern India, Sri Lanka and elsewhere. A 17th-century Englishman, William Dampier, wrote about these vessels, first widely used by the Tamil people in the fifth century, and introduced the word into the English language.","def":"","answer":"CATAMARAN","tidbit":""},{"cat":"word","origin":"From a Latin verb meaning \"to heat.\" The earliest documented English versions of this word were in medical texts, and it came to mean \"to apply a hot compress to a wound.\" In the 17th century, the meaning evolved to \"to instigate.\"","def":"","answer":"FOMENT","tidbit":""},{"cat":"phrase","origin":"In the 17th century, horses were fitted with horseshoes with nail heads or metal points for improved traction or as a weapon to use when charging foot soldiers. Figuratively, this phrase suggests being trampled by a horse.","def":"To treat harshly, crush.","answer":"TO RUN ROUGHSHOD","tidbit":"From rough + shod (wearing shoes)"},{"cat":"word","origin":"From a French verb meaning \"to walk noisily or clumsily,\" this word also meant \"to work ineptly.\" It may have been used to describe workers working slowly or incompetently to protest labor conditions or pay. Over time the word got applied to more violent actions during war to disrupt enemy tactics (such as blowing up bridges) and then to any effort to disrupt, damage or destroy, especially in an underhanded manner.","def":"","answer":"SABOTAGE","tidbit":"Sabot is the French word for \"wooden shoe.\""},{"cat":"word","origin":"From the Latin word for \"sand\" or \"sandy place.\" Roman amphitheaters would be strewn with sand to soak up the blood from events that took place there.","def":"An enclosed area or building used for public entertainment. Also a place of combat.","answer":"ARENA","tidbit":""},{"cat":"word","origin":"This may go against the grain, but the word \"flower\" came to be used metaphorically in the 13th century to describe the best part of a thing, then the finest quality of a meal and then evolved to this word.","def":"Finely ground meal of grain, often wheat.","answer":"FLOUR","tidbit":""},{"cat":"word","origin":"The image of hiding an illicit liquor bottle in a tall shoe is behind this word.","def":"Alcohol illegally made and transported. Also, an illegal music recording.","answer":"BOOTLEG","tidbit":""},{"cat":"word","origin":"Japanese for \"harbor\" + \"waves.\"","def":"An unusually large sea wave produced by a seaquake or volcanic eruption.","answer":"TSUNAMI","tidbit":""},{"cat":"words","origin":"Both of these adjectives come from the same 13th-century root meaning \"fear, terror, great reverence,\" but one means \"extremely unpleasant,\" while the other means \"very impressive.\"","def":"","answer":"AWFUL & AWESOME","tidbit":""},{"cat":"phrase","origin":"Inspired by 19th-century training, exhibitions and competitions of fire brigades where hoses were deployed, but water was not used. The phrase now means a practice session or rehearsal.","def":"","answer":"DRY RUN","tidbit":""},{"cat":"phrase","origin":"The blood-curdling cries of Confederate troops during the Civil War inspired this phrase.","def":"A prolonged high-pitched scream.","answer":"REBEL YELL","tidbit":""},{"cat":"phrase","origin":"From the early 20th century, a boxing phrase for punching an opponent on the point of the chin.","def":"Exactly right.","answer":"ON THE BUTTON","tidbit":""},{"cat":"word","origin":"Originally, in the 1570s, this word described cotton padding used to stuff or pad things like seat cushions. The meaning evolved to refer to speaking or writing that was \"full of itself.\"","def":"Pretentious or boastful talk.","answer":"BOMBAST","tidbit":""},{"cat":"word","origin":"The first part of this word has a Proto-Indo-European root, kakka, meaning \"to defecate,\" which evolved into Greek words meaning \"bad, evil, harsh.\" The second part of this word comes from a Greek word for \"sound.\"","def":"A harsh mixture of sounds.","answer":"CACOPHONY","tidbit":""},{"cat":"word","origin":"This word originally referred to the tendon at the back of an animal's leg that could be cut to render it lame or harmless. It now also means \"to cripple or make powerless.\"","def":"","answer":"HAMSTRING","tidbit":"The hamstring is any of the tendons that bind the \"ham\" (the back of the knee)."},{"cat":"word","origin":"Used in 18th-century London as criminal slang to hide its real sense from authorities, this word had various meanings, including \"kill,\" \"rob,\" \"swindle\" and \"counterfeit.\" Though a definitive origin is unknown, a potential source is feague, \"to spruce up by artificial means,\" from the German fegen, \"polish, sweep.\"","def":"Untrue, counterfeit, an imitation. In sports, to deceive or trick an opponent.","answer":"FAKE","tidbit":""},{"cat":"word","origin":"This Italian flat pasta cut in wide strips comes from an Italian word meaning \"to gobble up or devour.\"","def":"","answer":"PAPPARDELLE","tidbit":""},{"cat":"word","origin":"In the 1800s, it was hard to recruit sailors for long, dangerous sea voyages, so sea captains and shipping companies were known to kidnap crew by physical force or with the help of liquor or drugs. The name of this Asian city, sometimes a destination for these voyages, became synonymous with this unscrupulous practice.","def":"To recruit someone forcibly or by fraud into doing something.","answer":"SHANGHAI","tidbit":""},{"cat":"phrase","origin":"From Latin for \"nourishing mother,\" a title given by Romans to certain goddesses such as Ceres. By the early 18th century, this two-word phrase had a different meaning, perhaps related to the learning a student gets from school.","def":"A school, college or university at which one has studied and, usually, from which one has graduated.","answer":"ALMA MATER","tidbit":""},{"cat":"word","origin":"From the 14th-century Greek kaustik\u00f3s, which means \"burning.\"","def":"Severely critical or sarcastic. Often used to describe a remark someone has made.","answer":"CAUSTIC","tidbit":""},{"cat":"word","origin":"The ancient root of this word means \"age of man.\" The Anglo-Saxons first used it to mean \"human existence,\" as opposed to \"future life in heaven or hell.\" Its meaning naturally evolved to \"the earth and its inhabitants.\"","def":"","answer":"WORLD","tidbit":""},{"cat":"phrase","origin":"The likely origin of this phrase is Philadelphia, Pennsylvania, where cops used it to describe the horrible traffic jams that took place when out-of-town visitors began arriving for the Army-Navy football game at the same time the Christmas shopping season began.","def":"The day after Thanksgiving, which retailers have proclaimed the start of the holiday shopping season.","answer":"BLACK FRIDAY","tidbit":""},{"cat":"word","origin":"Conceived in 1851 but not pursued by sewing machine inventor Elias Howe, this fastener was improved over the years and eventually named and trademarked by B.F. Goodrich, who used the device on its rubber galoshes. It was also used early on for tobacco pouches. Eventually its use spread, and B.F. Goodrich lost the trademark.","def":"A fastening device with parallel rows of metal or plastic teeth on adjacent edges of an opening that are interlocked by a sliding tab.","answer":"ZIPPER","tidbit":""},{"cat":"word","origin":"From a Greek word for \"wanton violence or insolence.\" In Greek mythology, this type of cockiness was considered a dangerous character flaw that provoked the wrath of the gods, who would humble the perpetrator.","def":"Exaggerated pride or self-confidence; arrogance.","answer":"HUBRIS","tidbit":""},{"cat":"word","origin":"From the Dutch word, and earlier an Old French word, that both mean \"marsh.\" Marshes, after all, are quite a slog to get through.","def":"A confusing situation.","answer":"MORASS","tidbit":""},{"cat":"words","origin":"The first of these words means \"physical,\" \"skillful\" or \"adroit,\" and comes from Latin and Greek words meaning \"on the right hand.\" The second word literally means \"right-handed on both sides.\"","def":"1) Physical (and sometimes mental) skill or adroitness.2) Able to use both hands equally well.","answer":"DEXTERITY & AMBIDEXTROUS","tidbit":"Around the 15th century, being right-handed was associated with skill and strength, while being left-handed was associated with weakness or evil."},{"cat":"phrase","origin":"This gambling phrase from the 16th century referred to players who kept their cards above the playing table. It came to mean \"honest and forthright.\"","def":"","answer":"ABOVE BOARD","tidbit":"Board was a common word for \"table\" - a meaning that survives today in phrases such as \"boardroom\" and \"board of directors.\""},{"cat":"word","origin":"A combination of the Latin words sub meaning \"up from under\" and cingre meaning \"to grid\", this word's original 15th century meaning was \"having one's belt tightly fastened.\" That obsolete definition was replaced in the 16th century with a meaning of \"concise.\"","def":"Brief.","answer":"SUCCINCT","tidbit":""},{"cat":"words","origin":"These two words come from a 19th-century term for \"swimming pool.\" The first has become a synonym for \"losing intentionally\" or \"failing.\" (Think, metaphorically, of a boxer \"taking a dive.\") The second refers to an article of clothing, still popular today as casual wear, but originally worn for swimming.","def":"","answer":"TANK & TANK-TOP","tidbit":"During World War I, the British called the armored vehicle they were developing a tank to suggest to the Germans that the vehicle was for transporting fresh water."},{"cat":"phrase","origin":"Meaning \"mistaken\" or \"wrong,\" this two-word phrase comes from baseball, because a player caught in this position is usually in trouble.","def":"","answer":"OFF BASE","tidbit":""},{"cat":"word","origin":"The root of this word, meaning \"to close the eyes or lips,\" referenced religious rites and myths that were to remain a secret. The definition evolved to \"something unclear and difficult to explain.\"","def":"","answer":"MYSTERY","tidbit":""},{"cat":"word","origin":"A drink that includes rum, sugar and lemon or lime juice, named after a beach or village in Cuba. F. Scott Fitzge
