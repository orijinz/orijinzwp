originated in England, but, somewhat mysteriously, the first citations of the phrase are from the U.S."},{"cat":"phrase","origin":"In 1920, Republican leaders held a series of discussions hours past midnight in a suite at the Blackstone Hotel to choose a presidential candidate and overcome a deadlocked convention. The Associated Press reported that Warren G. Harding had been chosen and used this phrase to describe the setting.","def":"Political decision-making conducted privately by a small group of influential people.","answer":"SMOKE-FILLED ROOM","tidbit":""},{"cat":"word","origin":"The name for this capital city comes from a Maasai expression meaning \"cool water.\"","def":"The largest city in Kenya.","answer":"NAIROBI","tidbit":""},{"cat":"phrase","origin":"In Greek this phrase means \"the many.\"","def":"The general populace.","answer":"HOI POLLOI","tidbit":""},{"cat":"word","origin":"From a French word meaning \"to the purpose.\"","def":"Suitable or relevant.","answer":"APROPOS","tidbit":""},{"cat":"word","origin":"From an early 13th century Latin phrase that means \"I will please the Lord in the land of the living.\" The first word of the phrase, meaning \"I will please,\" developed a medical sense in the 18th century.","def":"1) A drug that helps a patient, even though it is pharmacologically inert.\n2) An inert substance used as a control in experiments.","answer":"PLACEBO","tidbit":""},{"cat":"word","origin":"The Hospital of Saint Mary of Bethlehem (originally a priory), called \"Bethlehem\" for short, became an insane asylum in the early 1400s. The Middle English name for Bethlehem developed a broader meaning.","def":"Mad confusion.","answer":"BEDLAM","tidbit":"In Middle English, Bethlehem was called Bedlem."},{"cat":"phrase","origin":"From children's puzzles in which a line is drawn between a sequence of small circles to reveal a picture.","def":"To understand something by piecing together disparate bits of information.","answer":"CONNECT THE DOTS","tidbit":""},{"cat":"phrase","origin":"From the Bible, this expression originally alluded to tucking up the traditional long robe and tying it around your waist like a belt so it wouldn't hamper physical activity.","def":"Prepare for action.","answer":"GIRD YOUR LOINS","tidbit":""},{"cat":"word","origin":"This vehicle, first used in the 17th century and popular in the England and the United States into the 19th century, was given this name because its routes involved two or more stops.","def":"A horse-drawn passenger and mail vehicle running on a regular schedule between established stops.","answer":"STAGECOACH","tidbit":"Stage in this case means \"station.\""},{"cat":"word","origin":"From phrenology, a pseudoscience that claimed to discern a person's characteristics from the shape of their skull, someone with a large forehead was considered an intellectual.","def":"A person with intellectual or cultural pretensions.","answer":"HIGHBROW","tidbit":""},{"cat":"word","origin":"From a Middle English word meaning \"having the same parents.\" Shakespeare popularized this word's current meaning when he used it figuratively in Hamlet.","def":"Relevant, closely related.","answer":"GERMANE","tidbit":""},{"cat":"phrase","origin":"St. Augustine: Letters Volume 1 circa 390 might be the source of this phrase. St. Ambrose wrote to St. Augustine that, at home in Milan, he did not fast on Saturday, but that when he traveled to this other major city, he did fast on Saturday because it was permissible to follow local church customs. The phrase has been used so much over the centuries and is so well known that this shortened version is now common.","def":"Follow and partake in the customs of the place you are visiting.","answer":"WHEN IN ROME","tidbit":"The Interesting letters of Pope Clement XIV published in 1777 may contain the earliest version of the full proverb:\n\"The siesto, or afternoon's nap of Italy, my most dear and reverend Father, would not have alarmed you so much, if you had recollected, that when we are at Rome, we should do as the Romans do.\""},{"cat":"word","origin":"This hair style name comes from the term for the tail of a horse that was allowed to grow long and then cut horizontally across to form a tassel-like end.","def":"","answer":"BANGS","tidbit":"This type of horse tail was called a bangtail."},{"cat":"phrase","origin":"This proverb is first documented in the 1190 collection of medieval French poems Li Proverbe au Vilain and reflects the challenges of building a major empire.","def":"A complex task or great achievement takes time.","answer":"ROME WASN'T BUILT IN A DAY","tidbit":""},{"cat":"word","origin":"From the Latin adjective suavis, meaning \"sweet.\" As the saying goes, \"the sweet taste of candy calms the soul.\"","def":"To pacify, soften or calm.","answer":"ASSUAGE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to shout,\" though \"a shout-out\" would be a better fit. This word's current meaning dates from the 17th century.","def":"Praise, applaud.","answer":"ACCLAIM","tidbit":""},{"cat":"phrase","origin":"The large kernels of rock salt used to cure this meat led to its name.","def":"","answer":"CORNED BEEF","tidbit":"As late as the ninth century, corn described a small, hard, grainy substance like sand or salt. By the 16th century, preserving meat or other food items became known as \"corning.\""},{"cat":"word","origin":"Generally thought to be from an old Irish word meaning \"small body,\" this word may actually trace back to the Roman Luperci, youth who ran naked through ancient Rome during the festival of Lupercalia. In the fifth century AD, St. Augustine compared the Luperci to men who, after swimming in a lake, changed into werewolves. Irish scholars misunderstood St. Augustine, who eventually turned the Luperci into creatures of Irish legend.","def":"A mischievous elf of Irish folklore believed to reveal the hiding place of treasure if caught.","answer":"LEPRECHAUN","tidbit":""},{"cat":"word","origin":"Originates from a Latin word meaning \"out of doors\" or \"outside.\"","def":"1) Derived from another country.\n2) Strange, alien.","answer":"FOREIGN","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"fear,\" this word that meant \"frightened\" fell out of use by the 1700s. It reemerged in the 19th century with a new meaning influenced by a French word for \"timidly fussy.\"","def":"Showing great attention to detail.","answer":"METICULOUS","tidbit":"The French word is meticuleux."},{"cat":"word","origin":"From the late 19th century, this term from horse racing referred to a horse that did not finish \"in the money,\" i.e., in one of the top three positions during a race.","def":"Of little importance.","answer":"ALSO-RAN","tidbit":""},{"cat":"phrase","origin":"This phrase was originally equestrian. Horses' teeth keep growing throughout their life and look even taller as they get older and their gums recede.","def":"Old and aging.","answer":"LONG IN THE TOOTH","tidbit":"Horses grind their teeth down while chewing, which prevents them from growing too long."},{"cat":"word","origin":"The ancient Greek word for a public gathering became the term for the athletic contests often held at these assemblies. This word came to refer to any difficult physical struggle and then for the physical or mental pain that went with it.","def":"Intense physical or mental pain.","answer":"AGONY","tidbit":"In Ancient Greek a public gathering was called agon."},{"cat":"word","origin":"From an Old English word meaning \"truth,\" because the truth will set you free from discomfort.","def":"To placate, relieve or bring comfort or peace to.","answer":"SOOTHE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning to \"lead astray.\"","def":"1) To lead astray, usually by persuasion or false promises.\n2) To persuade to have sex.","answer":"SEDUCE","tidbit":""},{"cat":"word","origin":"A boastful character in the English poet Edmund Spenser's 1590 epic poem The Faerie Queene.","def":"Empty boasting.","answer":"BRAGGADOCIO","tidbit":""},{"cat":"word","origin":"From Sanskrit meaning \"weighty, grave, venerable.\"","def":"1) An expert.\n2) A teacher or mentor.\n3) A Hindu spiritual teacher.","answer":"GURU","tidbit":""},{"cat":"word","origin":"In French this word originally referred to \"a court official who carried a prince's cloak,\" before becoming a word for a large suitcase. In Lewis Carroll's Through the Looking Glass, Carroll gave this word a new meaning when he had Humpty Dumpty tell Alice it meant \"two meanings packed up into one word.\"","def":"1) A word made by combining the spellings and meanings of two or more other words or word parts.\n2) A large suitcase.","answer":"PORTMANTEAU","tidbit":""},{"cat":"word","origin":"From a Greek word that means \"to speak in riddles.\"","def":"Someone or something mysterious or hard to understand or explain.","answer":"ENIGMA","tidbit":""},{"cat":"word","origin":"In 16th century Britain, the second syllable of this word meant to \"get drunk.\" And, of course when someone is drunk, they don't think clearly.","def":"To confuse.","answer":"BEFUDDLE","tidbit":""},{"cat":"phrase","origin":"Gnomologia, a collection of witty and wise sayings by the physician Thomas Fuller, published in 1732, is thought to have led to this phrase,","def":"A ruthlessly competitive environment.","answer":"DOG EAT DOG WORLD","tidbit":"Fuller wrote: Dogs are hard drove when they eat dogs."},{"cat":"word","origin":"Sections of the books of Maccabees in the Catholic Bible that describe the martyrdom of the Maccabees for trying to practice their faith were performed in medieval France as the \"dance of death\" or \"dance Maccabee.\" The latter phrase was spelled in several ways, one of which eventually led to this word, which developed a broadened meaning over time.","def":"1) Having death as a subject.\n2) Dwelling on the gruesome.","answer":"MACABRE","tidbit":"An alternative theory is that Maccabees was a mistranslated name of a French author."},{"cat":"phrase","origin":"In the mid-1500s, this phrase meant \"short leftovers of material.\" It expanded from referring to material like cloth to remnants from other items, like lumber. By the mid-1700s, the phrase changed a bit and was generalized.","def":"Miscellaneous, usually small, items.","answer":"ODDS AND ENDS","tidbit":"The original expression was odd ends."},{"cat":"word","origin":"From a Latin verb meaning \"to throw together.\" But think throwing together information, not physical things.","def":"To surmise.","answer":"CONJECTURE","tidbit":""},{"cat":"word","origin":"Borrowed from 17th century French legal phrases meaning \"this action lies/is based on,\" that referred to the foundation for a legal claim.","def":"The essential point.","answer":"GIST","tidbit":"Laccion gist and cest action gist are two such phrases."},{"cat":"phrase","origin":"Perhaps from the ancient Greeks' belief that earth, water, air and fire were the core substances at the heart of the universe and governed all things.","def":"Uncomfortable, in an unsuitable situation.","answer":"OUT OF YOUR ELEMENT","tidbit":""},{"cat":"phrase","origin":"In Satire VI, Roman poet Juvenal coined the Latin expression that translates to this avian phrase in English. Juvenal meant for this phrase to describe the qualities of his ideal wife: looks, charm, money, fertility and ancestry.","def":"A unique person.","answer":"RARE BIRD","tidbit":"Juvenal said a wife with these qualities would be as \"rara avis in terris nigroque simillima cygno\" (a bird rare on earth and similar to a black swan). This analogy is also behind the phrase black swan meaning \"an unexpected event.\"\nIn the first and second centuries, Romans believed all swans were white. Black swans actually do exist and are native to Australia."},{"cat":"word","origin":"This origin is not sneaky or underhanded at all. From Latin words meaning \"to flee below.\"","def":"A deceptive strategy used to escape or evade or to achieve an end.","answer":"SUBTERFUGE","tidbit":""},{"cat":"word","origin":"From the name for a handmade Indian fabric that comes from a Sanskrit word meaning \"bright.\" It was slightly altered and turned into a whole new word when British textile factories began making cheap imitations of the original Indian cloth.","def":"Cheap, gaudy.","answer":"CHINTZY","tidbit":"The cotton cloth is called chintz.\nAuthor Mary Ann Evans, known by her pen name George Eliot, is often credited with coining the word. In an 1851 letter to her sister, she wrote about chintz: \"The quality of the spotted one is best, but the effect is chintzy.\""},{"cat":"phrase","origin":"Popularized by a 1969 sketch from the British comedy series Monty Python's Flying Circus. The sketch takes place in a pub and features comedian Eric Idle interrogating fellow comedian Terry Jones about his romantic relationships.","def":"A phrase used to draw attention to an innuendo, often a sexual one.","answer":"NUDGE, NUDGE, WINK, WINK","tidbit":""},{"cat":"word","origin":"A Medieval Latin noun meaning \"an earthen pot\" is behind this word for this specialized vessel. Its figurative meanings first came over a century later, around the mid-1600s.","def":"1) A vessel used for heating substances to a high temperature.\n2) A severe test.\n3) A situation or place where forces interact to bring about great changes.","answer":"CRUCIBLE","tidbit":""},{"cat":"phrase","origin":"Yiddish phrases gey rekhn and/or gey farshtey, which mean \"go know\" and \"go understand,\" respectively, may have influenced the development of this phrase.","def":"Who would have thought?","answer":"GO FIGURE","tidbit":"Go figure may just be a shortened version of \"Go and figure it out,\" perhaps influenced by the Yiddish phrases."},{"cat":"word","origin":"Originally meaning \"to boil,\" this Middle English word has lost all its cooking meanings and only keeps its figurative sense, which, ironically, no one seems to be hot and bothered about.","def":"Inwardly very agitated.","answer":"SEETHE","tidbit":""},{"cat":"phrase","origin":"This phrase for not being discerning to differences in musical pitch developed its figurative sense in the late 1800s.","def":"1) Unable to distinguish differences in pitch in musical sounds.\n2) Unable to perceive public sentiment.","answer":"TONE DEAF","tidbit":""},{"cat":"word","origin":"In early use this word, which derives from a Latin word meaning \"to remind,\" related to a tomb and then a memorial statue or building. By the 17th century it referred to anything massive in size or significant in scope.","def":"","answer":"MONUMENTAL","tidbit":""},{"cat":"word","origin":"A Greek word meaning \"numbness\" or \"stupor\" and a name the Greeks gave to the electric rays, sea creatures capable of producing an electric discharge, is behind this word.","def":"A class of addictive substances, used for pain relief, sedation and sleep that blunt the senses and can produce euphoria, stupor or a coma.","answer":"NARCOTIC","tidbit":"The Greek root is nark\u0113."},{"cat":"phrase","origin":"In many cultures it is traditional to decorate a soldier's helmet or headgear with plumage to recognize bravery or a significant accomplishment, like earning a higher rank.","def":"A symbol of honor or achievement.","answer":"A FEATHER IN YOUR CAP","tidbit":""},{"cat":"phrase","origin":"According to legend, Lady Godiva, a noblewoman in Coventry during the 12th century, pleaded with her husband to reduce taxes. He agreed, if she would ride naked on a horse through the city. Surprisingly, she agreed, and all the townspeople respectfully refrained from looking, sans one tailor.","def":"A prying person, a voyeur.","answer":"PEEPING TOM","tidbit":""},{"cat":"phrase","origin":"The bottom of an accounting ledger where the totals are recorded developed a nickname related to the lowest point of a human's body, which then led to this phrase.","def":"To pay.","answer":"FOOT THE BILL","tidbit":""},{"cat":"word","origin":"A two-word phrase meaning the \"principal current of a river\" was extended to refer to \"any prevailing current or trend\" and eventually combined into one word.","def":"","answer":"MAINSTREAM","tidbit":""},{"cat":"word","origin":"From Latin words meaning \"to make holy.\" In English, it originally referred to the slaughter of an animal as an offering to a deity.","def":"To give up something for the sake of something else.","answer":"SACRIFICE","tidbit":"From the Latin words sacer, meaning \"sacred\" and facere, meaning \"to make.\""},{"cat":"word","origin":"This object, usually made from leather or feathers, is attached to a long cord and used by a falconer to recall or exercise a hawk. It forms the core of this word.","def":"Attracted, tempted or charmed by something flattering or desirable.","answer":"ALLURE","tidbit":""},{"cat":"phrase","origin":"The origin of this phrase is unknown. It is certainly true though, that if stepped on, the fragile item at the center of this idiom is easily broken.","def":"To navigate a conversation or situation delicately, especially to avoid offending or upsetting someone.","answer":"WALKING ON EGGSHELLS","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"to use words of good omen.\"","def":"An expression substituted for one that may offend or bother someone.","answer":"EUPHEMISM","tidbit":""},{"cat":"phrase","origin":"Likely from a story about Oliver Cromwell, who supposedly told artist Sir Peter Lely to paint his portrait without hiding his blemishes.","def":"To honestly show defects or imperfections.","answer":"WARTS AND ALL","tidbit":"The story was written in 1764, one hundred years after the portrait was painted. While the essence of the story may or may not be true, the author likely took poetic license in the retelling. The phrase was almost certainly never uttered by Cromwell."},{"cat":"phrase","origin":"Literally \"false step\" in French.","def":"A mistake or blunder, especially a socially awkward one.","answer":"FAUX PAS","tidbit":""},{"cat":"phrase","origin":"Over 200 years ago, British and Prussian forces decisively defeated Napoleon's troops in modern-day Belgium. The victory marked the end of the Napoleonic Wars and spawned this idiom.","def":"To encounter one's ultimate challenge and to be defeated by it.","answer":"TO MEET YOUR WATERLOO","tidbit":"Napoleon wasn't actually in Waterloo when he met his Waterloo. Most of the battle occurred a few miles south of the town in Braine-l'Alleud and Plancenoit.\nThe Duke of Wellington's day-after report described the fight as taking place in Waterloo, which gave the battle its enduring title."},{"cat":"phrase","origin":"For thousands of years the object at the center of this phrase has been used as a symbol for a truce or for surrendering.","def":"To give up.","answer":"WAVE THE WHITE FLAG","tidbit":""},{"cat":"word","origin":"From Old English words meaning \"steering oar\" and \"side of a ship.\" At one time, the rudder or large oar used for steering was located on the side of the ship to the right of a person facing toward the bow.","def":"The right side of a ship looking forward.","answer":"STARBOARD","tidbit":"St\u0113or means steering oar and bord in this case refers to a \"ship's side.\""},{"cat":"word","origin":"From a Latin word meaning \"to stick fast.\"","def":"To pause or delay a decision.","answer":"HESITATE","tidbit":""},{"cat":"phrase","origin":"Alludes to a vessel well organized with taut lines (ropes), sails set right, the crew and officers working well together and so on.","def":"A well-run, disciplined organization.","answer":"RUN A TIGHT SHIP","tidbit":""},{"cat":"word","origin":"Time to mix it up, this word comes from a French word meaning \"to mix.\"","def":"A confused struggle or fight or general turmoil.","answer":"MELEE","tidbit":""},{"cat":"phrase","origin":"This phrase, also written as one word or with a hyphen, is nautical in origin and meant \"to be in a ship.\"","def":"1) To support and agree with a point of view.\n2) To be in a vehicle.","answer":"ON BOARD","tidbit":""},{"cat":"phrase","origin":"This nautical phrase from the 1800s means \"progress without difficulty.\"","def":"","answer":"SMOOTH SAILING","tidbit":""},{"cat":"word","origin":"In Old English and numerous other languages, this word meant \"field\" before representing the amount of land that could be plowed in one day with a yoke of oxen.","def":"43,560 square feet.","answer":"ACRE","tidbit":""},{"cat":"phrase","origin":"From the 19th century. Experienced sailors are experts at tying knots and handling the various lines and sails on a ship.","def":"To understand the details or have know-how about a specific situation or task.","answer":"KNOW THE ROPES","tidbit":"An alternative theory suggests the phrase could come from the world of theater where stagehands were required to know which ropes to pull to raise curtains and move stage scenery."},{"cat":"phrase","origin":"The origin of this phrase is unclear. It may allude to angels or to the word of God descending from the heavens.","def":"1) To be brought back to reality.\n2) Unpretentious, practical and realistic.","answer":"DOWN TO EARTH","tidbit":""},{"cat":"phrase","origin":"Likely a nautical phrase referencing the importance of keeping ropes on a vessel bound and/or to keep them from fraying or unraveling, both of which could be dangerous.","def":"To complete a task, often to avoid dealing with unwanted consequences.","answer":"TIE UP LOOSE ENDS","tidbit":""},{"cat":"word","origin":"These two phrases, where the words are swapped, have mysterious origins. But one might say that the police are experts at this maneuver.","def":"1) To know something very well and be very proficient at it.\n2) To frisk.","answer":"DOWN PAT & PAT DOWN","tidbit":""},{"cat":"word","origin":"From an Old English word meaning \"outstretched arms.\"","def":"1) Six feet.\n2) To understand.","answer":"FATHOM","tidbit":"The two dissimilar meanings of fathom may be different ways to think about \"stretching out.\""},{"cat":"word","origin":"This plural of the Italian word for \"sweetmeat\" once referred to marble-sized pellets made of soft plaster that partygoers threw at each other in the streets during Carnevale. The tiny balls, which left a white mark, were substitutes for expensive sugarplum candies.","def":"Small bits or streamers of brightly colored paper thrown at festive occasions.","answer":"CONFETTI","tidbit":"Confetti as we know it today was developed around 1875. Textile merchants discovered that placing pieces of perforated paper above trays full of silkworms' eggs assisted their hatching. A Milanese mill owner cut these papers and gave them to his employees to throw during Carnevale."},{"cat":"word","origin":"After Julius Caesar became dictator of the Roman Republic, his heir, Gaius Julius Caesar Octavianus, known as Augustus, also used the Caesar name. Subsequently, \"Caesar\" became a title used by Roman emperors and eventually influenced this word.","def":"1) Having great power or authority.\n2) Emperor, especially the ruler of Russia until the 1917 revolution.","answer":"CZAR","tidbit":""},{"cat":"phrase","origin":"We may just be spreading misinformation, but the base of the first word of this phrase derives from Sanskrit and ancient Greek words meaning \"roars.\" In Old French, it first referred to the \"noise produced by a marching army,\" which led to a meaning of \"clamor\" in multiple languages.","def":"The spread of unverified information.","answer":"RUMOR MILL","tidbit":""},{"cat":"word","origin":"A Latin word meaning \"let him beware.\"","def":"A warning or proviso with specific conditions or limitations.","answer":"CAVEAT","tidbit":""},{"cat":"phrase","origin":"We don't want to get into too much detail, but the key word in this phrase comes from an Old English word meaning \"to dig\" and referred to digging with a tool like a spade.","def":"To thoroughly investigate or research something.","answer":"DELVE INTO","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to leap,\" as in a male animal sexually leaping on a female.","def":"Lustful.","answer":"SALACIOUS","tidbit":""},{"cat":"word","origin":"From an ancient Greek word meaning \"newly planted,\" this word referred to a someone \"newly converted,\" before broadening in meaning.","def":"A novice or beginner.","answer":"NEOPHYTE","tidbit":""},{"cat":"phrase","origin":"The person controlling the reins controls where the coach travels. This phrase took on its figurative meaning in the 1800s.","def":"To be in control; in a dominant or influential position.","answer":"IN THE DRIVER'S SEAT","tidbit":""},{"cat":"phrase","origin":"Perhaps a shortened version of a longer phrase that meant \"to spend each year only as much as you earned.\" An earlier, very similar phrase referred to the amount of cloth necessary for a garment to reach around the body.","def":"To earn just enough money to cover living expenses.","answer":"MAKE ENDS MEET","tidbit":"The full expression was make both ends of the year meet.\nThe expression related to clothing was make both ends meet."},{"cat":"word","origin":"Related to a word meaning \"needle,\" this word comes from a Latin term meaning \"sharp point.\"","def":"Keen perception.","answer":"ACUMEN","tidbit":""},{"cat":"phrase","origin":"From the Amendment to the U.S. Constitution containing several provisions related to criminal law.","def":"1) To refuse to testify against oneself in court.\n2) To decline to answer a question.","answer":"TAKE THE FIFTH","tidbit":""},{"cat":"phrase","origin":"In theater, movies and television, the audience is considered to be behind an invisible barrier that's opaque to the actors.","def":"Addressing the audience directly in a performance.","answer":"BREAKING THE FOURTH WALL","tidbit":""},{"cat":"word","origin":"Annoying insects that bother livestock are behind the figurative sense of this word with a first syllable that means \"chisel.\"","def":"1) A person who persistently annoys or provokes others.\n2) Insects that annoy cattle.","answer":"GADFLY","tidbit":""},{"cat":"word","origin":"From a Late Latin word meaning \"make a collection,\" this word refers to gathering grain left after reaping. But it also means to gather information a little bit at a time.","def":"","answer":"GLEAN","tidbit":""},{"cat":"word","origin":"From the 1962 song Little Boxes written by folk singer Malvina Reynolds and first released by Pete Seeger a year later, this song was inspired by the poor quality, small tract houses Reynolds saw while driving through Daly City, California.","def":"Inferior, flimsy and cheap material.","answer":"TICKY-TACKY","tidbit":"The first stanza of the song:\n\"Little boxes on the hillside\nLittle boxes made of ticky-tacky\nLittle boxes on the hillside\nLittle boxes all the same\""},{"cat":"word","origin":"A Dutch word meaning \"take in hand\" is the likely source of this word that initially referred to cheating at dice by secretly hiding a loaded die in the palm of one hand.","def":"1) To introduce surreptitiously.\n2) To force another to accept.","answer":"FOIST","tidbit":""},{"cat":"phrase","origin":"From an ancient Chinese method of execution known as Lingchi.","def":"Lots of small bad things, none of which are fatal themselves, that, added together, are devasting.","answer":"DEATH BY A THOUSAND CUTS","tidbit":""},{"cat":"phrase","origin":"The story goes that Harpo Marx coined this phrase after he noticed that William Randolph Hearst would place a guest he didn't like in a chair near the fireplace and never invite them back. But that story is made up, and the true origin of this phrase is unknown. Some guess it comes from a slang term for the electric chair, while others speculate it comes from poker when players are under pressure to bet or play their cards.","def":"Facing intense questioning, criticism or scrutiny.","answer":"IN THE HOT SEAT","tidbit":""},{"cat":"phrase","origin":"In one of Aesop's fables, a poor farming couple owns a magical bird that lays a highly valued egg every day that they can sell for income. Overtaken by greed, the couple kills the bird hoping to get all the eggs at once, but when they kill it, they find its insides are empty.","def":"A very good source of money or business.","answer":"GOLDEN GOOSE","tidbit":""},{"cat":"word","origin":"One theory suggests this word is Lydian, an extinct Indo-European language from Lydia (now part of Turkey), and that it means \"palace of the double-axe.\" In Greek mythology, it refers to the structure Daedalus built for King Minos of Crete to imprison the Minotaur.","def":"1) A maze.\n2) Something extremely complex.","answer":"LABYRINTH","tidbit":"Another theory contends labyrinth derives from a Minoan word meaning \"cavern,\" or an \"underground grotto.\" It may also come from a Greek word meaning \"narrow street.\""},{"cat":"word","origin":"It means \"to laugh down\" in Latin.","def":"To mock or ridicule.","answer":"DERIDE","tidbit":""},{"cat":"phrase","origin":"Theater productions, circuses or vaudeville acts going out on tour are behind this phrase.","def":"To begin an activity or journey.","answer":"GET THE SHOW ON THE ROAD","tidbit":""},{"cat":"word","origin":"It means to \"pluck out\" or \"stretch out\" in Latin.","def":"Slender.","answer":"SVELTE","tidbit":""},{"cat":"phrase","origin":"As any bird might tell you, traveling by land is often not the fastest or most direct route.","def":"The straight-line distance between two points.","answer":"AS THE CROW FLIES","tidbit":""},{"cat":"word","origin":"From French and Latin words meaning \"to work with the hands,\" this word referred \"to working or tilling the land\" and, through the late 18th century, it figuratively meant to \"cultivate the mind.\" But the dirty rotten truth is that the definition that stuck is the one that \"working the earth\" evolved into.","def":"Dung, fertilizer.","answer":"MANURE","tidbit":""},{"cat":"phrase","origin":"Think of a boxer landing a blow before his opponent does.","def":"To act more swiftly than someone else.","answer":"BEAT YOU TO THE PUNCH","tidbit":""},{"cat":"word","origin":"From a Greek verb meaning \"to show side by side.\"","def":"1) An example or model.\n2) A worldview underlying the theories and methodology of a particular scientific subject.","answer":"PARADIGM","tidbit":""},{"cat":"phrase","origin":"A sports catchphrase that developed a more general sense. Don't make an error on this one.","def":"Make a mistake.","answer":"DROP THE BALL","tidbit":""},{"cat":"word","origin":"Behind this word is a Hindi term literally meaning \"Bengalese\" but understood to mean \"house in the Bengal style.\"","def":"A single-story house with a low-pitched roof, often surrounded by a veranda.","answer":"BUNGALOW","tidbit":""},{"cat":"word","origin":"Old Italian words meaning \"public square\" and \"public speech\" were borrowed into Middle French and turned into this English word in the 16th century. Public speeches back then apparently were not calm or sweet.","def":"A long, angry, scolding rant.","answer":"HARANGUE","tidbit":""},{"cat":"phrase","origin":"Going back to at least the 1700s, this phrase was popularized by a 1997 book about a fishing boat caught in the 1991 Halloween nor'easter extratropical cyclone.","def":"A disastrous event caused by an exceptionally rare combination of circumstances.","answer":"A PERFECT STORM","tidbit":"Sebastian Junger's 1997 book, The Perfect Storm, was released as a movie in 2000."},{"cat":"phrase","origin":"Before the era of refrigeration, food was stored in large drums. When the containers got low, the remaining lower-quality food had to be scrubbed off the base of the container.","def":"The lowest possible condition, level or class.","answer":"THE BOTTOM OF THE BARREL","tidbit":"This longer version of this phrase is scrape the bottom of the barrel.\nAn alternative theory contends this phrase originally referred to the poor-quality wine sediment left at the bottom of the barrel, which in Roman times was a metaphor for the lowest classes of society."},{"cat":"phrase","origin":"The main word in this phrase derives from a Latin word meaning \"serving as a hinge.\" Since a hinge is central to movement (think of a door), the word developed a figurative meaning of \"essential\" and has uses in mathematics, religion and more.","def":"A principle of paramount importance.","answer":"CARDINAL RULE","tidbit":"The cardinal bird got its name because its coloring resembles the deep red robes of religious cardinals, who are so called because they are important clergymen."},{"cat":"word","origin":"A backformation from a 1920's avant-garde art movement that posited the unconscious mind (especially dreams) as the source of all imagination.","def":"Bizarre, hard to believe, having the intense irrational reality of a dream.","answer":"SURREAL","tidbit":"The art movement is called surrealism."},{"cat":"word","origin":"A 19th century imitative French word meaning \"rustling\" described the fashionable dresses of the period with drooping layers of fabric (such as satin or silk) that swished as the wearers moved around. The word later developed a broader figurative meaning.","def":"Ostentatious, showy elaborate.","answer":"FROUFROU","tidbit":""},{"cat":"phrase","origin":"This American football idiom reflects that, in hindsight, it is easy to act like you have the right answers to problems or challenges.","def":"A person who second-guesses decisions after the event.","answer":"MONDAY MORNING QUARTERBACK","tidbit":"Most American football games are played on Sundays, and the quarterback is the principal player who calls the signals and direct the plays."},{"cat":"phrase","origin":"Though this phrase may lead you to think about a large omnivorous or carnivorous mammal, its first word is from an Old English word meaning, among other things, \"to carry or produce.\" Think about carrying something in your thoughts.","def":"Something to consider or remember, especially as a warning.","answer":"BEAR IN MIND","tidbit":"This version of the word bear is behind phrases like bearing fruit and bearing children.\nThough the spelling is the same, the animal bear derives from a different Old English word that means \"the brown one.\""},{"cat":"word","origin":"This word ultimately derives from a Portuguese word meaning \"quince.\"","def":"A clear sweetened jelly with pieces of fruit and fruit rind.","answer":"MARMALADE","tidbit":"Marmelos was a quince paste similar in texture to orange marmalade (which began to be commercially produced in the late 18th century)."},{"cat":"phrase","origin":"In ancient times, a flower was suspended from ceilings to symbolize that the people in the room were sworn to silence about what was discussed. The ritual was inspired by the Roman myth that Cupid gave a flower to Harpocrates, the god of silence and secrets, to ensure that his mom Venus's liaisons remained hidden.","def":"Secretly.","answer":"SUB ROSA","tidbit":"Sub rosa literally means \"under the rose.\"\nIn Greek mythology Eros gives the rose to Harpocrates to hide Aphrodite's dalliances."},{"cat":"phrase","origin":"Originally this term described a stopwatch invented in the late 1800s with two hands that could be stopped independently of each other. It was used for timing multiple athletes in a race or intervals by a single athlete.","def":"An instant of time.","answer":"SPLIT SECOND","tidbit":""},{"cat":"word","origin":"A Latin word for \"a bundle of ten hides\" that comes from the Latin for \"ten\" is behind this word. Picture American frontiersman haggling over animal hides.","def":"To bargain or haggle.","answer":"DICKER","tidbit":"Decuria is the Latin word for a bundle of ten hides, from the Latin word decem, meaning \"ten.\""},{"cat":"word","origin":"Yankee Doodle Dandy, ironically, a song written to mock Americans, is the source of this word that itself was originally used to mock young men who were overly concerned with trendy fashions. Later the word evolved to describe city dwellers naive about frontier life, before eventually developing a broader, simple meaning.","def":"A man.","answer":"DUDE","tidbit":""},{"cat":"phrase","origin":"Soldiers were trained to hold their ground and position despite enemy fire.","def":"To have a strong sense of conviction and refuse to change your decision or opinion about something.","answer":"STICK TO YOUR GUNS","tidbit":""},{"cat":"phrase","origin":"Wet, muddy, spongy ground that is difficult to walk or ride a horse through inspired this phrase.","def":"To be impeded, slowed or prevented from making progress.","answer":"BOGGED DOWN","tidbit":""},{"cat":"phrase","origin":"It may not scare you much, but the core word in this phrase meant \"afraid\" before meaning \"a brawl\" around the 15th century. The idiom itself conjures an image of a leader on a hill watching troops battle below.","def":"Staying impartial in a conflict or dispute.","answer":"ABOVE THE FRAY","tidbit":""},{"cat":"phrase","origin":"The definitive origin of this phrase is unknown. It may come from fireworks or torchlight parades. It may come from a similar reference in Dante's The Inferno or may even be an allusion to the color of people's faces after they get drunk. One legend claims the phrase comes from the antics of Melton Mowbray, the Marquis of Waterford - known as the \"Mad Marquis,\" who led his friends in a drunken rampage through Leicestershire one night in 1837.","def":"To go out carousing through town and thoroughly enjoying yourself.","answer":"PAINT THE TOWN RED","tidbit":"As the story goes, the revelers stole red paint and splattered it on doors and windows. Afterward, the perpetrators were fined \u00a3100 each. An engraving of the event shows the Marquis being hoisted up to paint the sign of the town's inn.\nThe phrase isn't first documented until fifty years later, so the drunken rampage is unlikely to be the source."},{"cat":"word","origin":"Feeling bubbly? This word comes from Latin words meaning \"to boil over\" and \"to begin to boil.\"","def":"1) Vivacious and enthusiastic.\n2) Bubbly, fizzy.","answer":"EFFERVESCENT","tidbit":""},{"cat":"phrase","origin":"First a Black slang phrase from the 1960s, this phrase likely comes from the name for a loose segment of rope.","def":"To be more accommodating or show more latitude or leniency.","answer":"CUT ME SOME SLACK","tidbit":""},{"cat":"word","origin":"Animals, especially dogs, startling or becoming upset at the sound of firearms inspired this phrase.","def":"Anxious, hesitant.","answer":"GUN-SHY","tidbit":""},{"cat":"phrase","origin":"Horse racing has beaten all other contenders as the origin of this phrase.","def":"To maneuver or manipulate to gain an advantage.","answer":"JOCKEY FOR POSITION","tidbit":""},{"cat":"word","origin":"An alteration of an Old English phrase meaning \"to have or not have,\" evolved into a phrase meaning \"to take turns drinking.\" Who doesn't want to hang out at a pub chatting with friends?\"","def":"To socialize.","answer":"HOBNOB","tidbit":"The phrase was to drink hab nab which is likely from the Old English habban, nabban."},{"cat":"word","origin":"This exciting origin is from Latin words meaning \"to be abundant\" and \"fruitful.\"","def":"Joyously enthusiastic.","answer":"EXUBERANT","tidbit":""},{"cat":"phrase","origin":"The entirety of this phrase's origin is a mystery. The unusual third word once denoted a \"shack\" or \"hut,\" and later it referred to a \"vehicle.\" But none of those meanings seems to have anything to do with what the phrase means now.","def":"Every part of something.","answer":"THE WHOLE SHEBANG","tidbit":""},{"cat":"word","origin":"The second syllable of this word comes from the Old English word maeth, which means \"a mowing.\" The word itself originally meant \"a second crop of grass grown on the same land after the first had been harvested.\"","def":"What follows an event, especially one of a disastrous or unfortunate nature.","answer":"AFTERMATH","tidbit":""},{"cat":"word","origin":"The Duc de Richelieu's victory over the British at Mah\u00f3n on the island of Minorca in 1756 at the beginning of the Seven Years' War may have led to the creation of this sauce.","def":"A dressing made chiefly of egg yolks, oil, and lemon juice or vinegar.","answer":"MAYONNAISE","tidbit":"This origin is suspicious because it is first attested 48 years after the taking of Mah\u00f3n and was not written as \"mahonnaise.\""},{"cat":"word","origin":"Sanskrit words meaning \"abode of snow\" are behind the name of this mountain range.","def":"","answer":"HIMALAYAS","tidbit":""},{"cat":"phrase","origin":"The origins of this phrase are hazy. It first shows up in the mid-1950s as U.S. advertising industry jargon. It was likely popularized as a key line in the jingle for a Firestone tire company television campaign that began in the1960s ran for decades.","def":"The point at which an idea or theory is put to the test in real-world situations.","answer":"WHERE THE RUBBER MEETS THE ROAD","tidbit":"The chorus of the jingle:\n\"Forever wheels are turning.\nNo matter what the load.\nThe name that's known is Firestone.\nWhere the rubber meets the road.\""},{"cat":"word","origin":"From a Greek term meaning \"to rub away,\" and inferring \"to waste time.\" This word meant \"discourse\" and in English first referred to the famous ethical lectures of ancient Greek and Roman philosophers. But over time this term developed a more general meaning of \"any prolonged discussion.\" Don't be angry about how the word evolved from there.","def":"A bitter and abusive attack or criticism.","answer":"DIATRIBE","tidbit":""},{"cat":"phrase","origin":"Probably the best theory on the origin of this phrase, first documented in the 1940s, is that it comes from someone getting hysterical and angry.","def":"A temper tantrum.","answer":"HISSY FIT","tidbit":"While a contraction of hysterical is probably the best theory, hissy fit may come from the hissing of a cornered cat. It could also be a shortening of histrionics."},{"cat":"word","origin":"Swiss psychiatrist Eugen Bleuler introduced this term in 1910. It literally means \"both strong,\" though one could argue that it would be more accurate if it meant \"both weak.\"","def":"Having mixed feelings toward someone or something.","answer":"AMBIVALENT","tidbit":"Ambivalent is a backformation of the term Bleuler coined, ambivalence.\nBleuler also invented the terms schizophrenia and autism."},{"cat":"phrase","origin":"The fruit at the center of this alliterative phrase, first documented in the early 18th century, is indeed about 20 degrees colder on the inside than the air temperature.","def":"To be assured and composed.","answer":"COOL AS A CUCUMBER","tidbit":""},{"cat":"word","origin":"A phrase from the 1300s referring to \"plundering dead bodies from battlefields\" was formed from French verbs denoting \"to carry off spoils.\" Perhaps reflective of the thieves stealing everything, the phrase was shortened to a word meaning \"every single piece\" or \"one and all\" before developing its current derogatory reference.","def":"A group of disreputable people.","answer":"RIFFRAFF","tidbit":""},{"cat":"word","origin":"Originally this word reflected its Latin etymology and meant to \"search among the trash,\" probably for items of value. This sense of a careful examination reflects this word's current definition.","def":"Careful searching study, inquiry or inspection.","answer":"SCRUTINY","tidbit":"In the 15th century, scrutiny also referred to the official counting of votes in an election. Later scrutiny also had specific ecclesiastical meanings, such as, in the early Roman Catholic Church, referring to the examinations of catechumens."},{"cat":"phrase","origin":"Though the origin of this phrase is unknown, two stories are speculated to be the source. The first comes from 168 BC when invading Syrian King Antiochus IV Epiphanes was ordered to withdraw his armies from Alexandria if he wanted to step out alive of the circle Roman envoy Popillius Laenas had etched around him. The second explanation comes from the Alamo legend of William Barret who, besieged by a Mexican army, supposedly used his sword to mark the ground while exclaiming to his troops, ''Those prepared to die for freedom's cause, come across to me.''","def":"To issue an ultimatum.","answer":"DRAW A LINE IN THE SAND","tidbit":""},{"cat":"word","origin":"Billy DeBeck's comic strip Barney Google, which debuted in 1919 and has been running for over a century, featured Barney's futile attempts to get his inept racehorse Spark Plug to win races. On October 26, 1923, Barney once again gets frustrated with Spark Plug and yells this rhyming, hyphenated word in frustration. DeBeck thereafter frequently used the expression in his strip.","def":"A state of extreme anxiousness or nervousness.","answer":"HEEBIE-JEEBIES","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"dirty,\" this word referred to a \"body sore\" in the 15th century. But, by the 17th century, it referred to the nonphysical, vile actions and behavior.","def":"1) Morally ignoble or vile.\n2) Meanly selfish or greedy.\n3) Filthy.","answer":"SORDID","tidbit":""},{"cat":"word","origin":"This Old English word recorded before 900 meaning \"spear\" referred to a \"pointed rod used to drive animals.\" Its figurative sense came in the 16th century.","def":"To incite or prod.","answer":"GOAD","tidbit":""},{"cat":"phrase","origin":"This phrase was likely cemented in our lexicon during World War I when troops from opposite sides agreed to an impromptu ceasefire and traded holiday wishes in what is called the Christmas truce. The first word of this phrase comes from a Latin word for \"brother.\"","def":"To be friendly with your foe.","answer":"FRATERNIZE WITH THE ENEMY","tidbit":""},{"cat":"words","origin":"Two French words brought into English mean \"evening\" and \"morning,\" respectively, in French but refer to an \"evening party\" and a \"daytime, usually afternoon, performance\" in English.","def":"","answer":"SOIREE & MATINEE","tidbit":""},{"cat":"word","origin":"Hacking culture originated this term which is slang for \"dropping documents.\"","def":"Revealing someone's private personal information online.","answer":"DOXING","tidbit":""},{"cat":"word","origin":"This word is from Latin words meaning \"to urge out.\"","def":"To urge strongly.","answer":"EXHORT","tidbit":""},{"cat":"word","origin":"This word is from Latin words meaning \"to twist out.\"","def":"To force money or information from someone via violence or intimidation.","answer":"EXTORT","tidbit":""},{"cat":"word","origin":"In the 12th century, this word referred to coming ashore after a long voyage at sea and is from Latin words meaning \"to the shore.\"","def":"To reach a destination or make an appearance.","answer":"ARRIVE","tidbit":""},{"cat":"phrase","origin":"Not a good idea to disturb a grizzly or any of its large mammal cousins.","def":"To provoke a situation or person that could become dangerous or troublesome.","answer":"POKE THE BEAR","tidbit":""},{"cat":"word","origin":"Perhaps the verb form of this word is from a Dutch word meaning \"to boast.\" One must be confident to deceive another.","def":"To deceive, usually via a show of strength.","answer":"BLUFF","tidbit":""},{"cat":"phrase","origin":"The first word of this phrase is rarely used otherwise and comes from an Old English word meaning \"to increase.\"","def":"To frugally or barely make something last.","answer":"EKE OUT","tidbit":""},{"cat":"word","origin":"A Dutch word meaning \"to sail to and fro\" is behind this word that has many meanings related to traveling.","def":"","answer":"CRUISE","tidbit":""},{"cat":"phrase","origin":"This phrase possibly comes from the practice of putting ailing seamen below deck.","def":"Not feeling well.","answer":"UNDER THE WEATHER","tidbit":""},{"cat":"word","origin":"A Scottish shortening of \"effect,\" ultimately led to this word that effectively communicates ineffectiveness.","def":"Weak, ineffective, worthless.","answer":"FECKLESS","tidbit":""},{"cat":"word","origin":"The Latin root of this word means \"chest\" or \"box,\" which led to another Latin word meaning \"secret.\"","def":"Secret, mysterious, obscure.","answer":"ARCANE","tidbit":""},{"cat":"phrase","origin":"The last word of this phrase derives from a Latin noun for an ancient threshing tool with a wooden frame studded beneath with sharp iron teeth that, when dragged over a harvest, separated grain seed from the rest of the plant. Quite difficult to endure and painful if the grain had feelings.","def":"Situations that test a person's endurance or forbearance; troubles, difficulties.","answer":"TRIALS AND TRIBULATIONS","tidbit":""},{"cat":"word","origin":"Apparently of French origin, this word's roots translate to \"dismiss\" or \"to put away.\" Initially it referred to a \"transfer of an estate by will or lease\" or \"the transfer of sovereignty,\" as by the death or deposing of a king. Eventually, it referenced the death that was the cause of the transfer.","def":"1) Death.\n2) The loss of position or status.","answer":"DEMISE","tidbit":""},{"cat":"word","origin":"From an Old English verb meaning \"to devour\" and a related verb that means \"to eat,\" this word was used to describe monsters and Vikings and the eating habits of animals. It was also used to describe corroding substances. Around the 12th century, it was applied figuratively to emotions.","def":"To worry.","answer":"FRET","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"coming after,\" this noun's original, now obsolete definition was \"a descendant.\" Around the 17th century, this noun became the butt of the joke as it began to be used colloquially and humorously.","def":"Buttocks.","answer":"POSTERIOR","tidbit":""},{"cat":"word","origin":"\"Goose summer\" is the literal translation of this Middle English word which referred to \"late fall,\" possibly because geese were around then. This word was also used to describe a fine, filmy, cobwebby substance, either because it floats in the air in calm autumn weather or because it resembles goose down. By the 1400s, the latter definition had led to a broader meaning.","def":"Very light and delicate.","answer":"GOSSAMER","tidbit":""},{"cat":"word","origin":"\"From the outside,\" is the literal translation of this Greek word that originally meant \"foreigner\" but developed a more unusual meaning in the 1600s.","def":"Strikingly unusual or strange.","answer":"EXOTIC","tidbit":"Exotic as a reference to stripteasers and burlesque dancers is from the early 1900s."},{"cat":"phrase","origin":"Rumors that the CIA invented this phrase after the assassination of JFK are false. It goes back at least to 1863, when it was used following the shooting of President James Garfield. The first word of this phrase comes from Latin and means \"to breathe together.\"","def":"A belief, often false, that interested parties, usually powerful ones, are responsible for an unexplained event.","answer":"CONSPIRACY THEORY","tidbit":"Ironic that a popular origin of the phrase conspiracy theory is itself a conspiracy theory."},{"cat":"word","origin":"One theory links this insect's name to the color of its excrement, another to the hue of its wings, while a third suggests the name originated from its habit of pilfering uncovered dairy products.","def":"","answer":"BUTTERFLY","tidbit":"Old Dutch had the term boterschijte, which literally means \"butter s#!t\" and supports the excrement theory."},{"cat":"phrase","origin":"This saying may come from a story about Dionysius of Syracuse (430-367 BC) who, according to Cicero, had ear-shaped chambers hidden in his palace so that he could secretly listen in on conversations. The de' Medicis were thought to have built similar listening tubes in their Louvre Palace in Paris during the 1500s.","def":"Be careful, because conversations can be overheard.","answer":"THE WALLS HAVE EARS","tidbit":""},{"cat":"phrase","origin":"During the 1801 Battle of Copenhagen, Britain's flagship signaled a retreat. Lord Horatio Nelson, disagreeing, put the telescope to his glass eye so he could claim he did not see the withdrawal order. His continued attack led to a French surrender and inspired this phrase.","def":"To deliberately overlook something.","answer":"TURN A BLIND EYE","tidbit":""},{"cat":"phrase","origin":"Famously uttered by Jesus when he speaks of false prophets in the Sermon on the Mount, this phrase probably originated from an Aesop's fable about a cunning canine trying to satisfy its appetite.","def":"An enemy disguised as a friend.","answer":"WOLF IN SHEEP'S CLOTHING","tidbit":"Jesus warns of \"false prophets which come to you in sheep's clothing but inwardly they are ravening wolves\" (Matthew 7:15).\nThe Aesop fable is about a wolf that dresses up in the skin of a sheep to sneak up on a flock."},{"cat":"word","origin":"This created word was introduced in \"Lisa the Iconoclast,\" an episode of the television series The Simpsons that first aired on February 18, 1996.","def":"Acceptable, satisfactory.","answer":"CROMULENT","tidbit":""},{"cat":"word","origin":"This is the character name of \"Lord High Everything Else\" in Gilbert and Sullivan's 1885 comic operetta, The Mikado and was perhaps further popularized by the 1960s cartoon series The Flintstones.","def":"Someone in a high position or giving an impression of importance.","answer":"POOH-BAH","tidbit":""},{"cat":"word","origin":"From an Old French word which means \"to seize or take away hastily,\" this word developed a figurative sense of being \"carried away by beauty or delight\" by the late 14th century.","def":"Very beautiful.","answer":"RAVISHING","tidbit":""},{"cat":"word","origin":"A Latin term meaning \"orphan\" or \"ward\" led to one unsurprising English definition of this word, but also to a second less obvious meaning, thought to have been inspired by the tiny doll-like image of oneself seen reflected in another's eye.","def":"1) A young student.\n2) The expanding and contracting opening in the iris of the eye.","answer":"PUPIL","tidbit":""},{"cat":"phrase","origin":"Robert K. Merton, considered a founding father of modern sociology, coined this phrase in 1948. Believe it, and it will come true.","def":"A belief or expectation, whether accurate or not, that brings about an outcome that confirms the original belief.","answer":"SELF-FULFILLING PROPHECY","tidbit":"Merton also coined the term role model."},{"cat":"word","origin":"Homophones that both referred to a strong physical substance also developed a figurative meaning of \"courage and fortitude.\" Eventually, this spelling took the figurative sense.","def":"","answer":"METTLE","tidbit":""},{"cat":"phrase","origin":"Ray Charles popularized this phrase with a chart-topping song in 1961.","def":"Leave.","answer":"HIT THE ROAD, JACK","tidbit":"\"Hit the road, Jack\" was written by rhythm and blues artist Percy Mayfield."},{"cat":"phrase","origin":"According to Greek mythology, Alkyone, the daughter of the god of the winds, became so saddened over her husband's death she plunged into the sea to join him. The gods took pity on them and turned them into kingfishers and created a period of unusual calm until the birds' eggs hatched.","def":"1) A calm period.\n2) An idyllic time in the past characterized by happiness and prosperity.","answer":"HALCYON DAYS","tidbit":"Halcyon is likely a misspelling of Alkyone. Alkyone means \"kingfisher.\""},{"cat":"word","origin":"This origin must be constructed brick by brick. It is an abbreviation of a Danish phrase which means \"play well.\"","def":"","answer":"LEGO","tidbit":"The Danish phrase is leg godt. The company was originally called Billund Maskinsnedkeri."},{"cat":"phrase","origin":"Tailoring is the source of this idiom. In the 1600s, it referred to clipping pieces of fabric to make it easier to construct a garment. A couple of centuries later it meant the opposite.","def":"To be faced with a difficult task.","answer":"HAVE YOUR WORK CUT OUT FOR YOU.","tidbit":""},{"cat":"phrase","origin":"In Old English, the last word of this phrase referred to \"a symbol of something else.\" It evolved to mean \"evidence, something serving as proof of a fact.\" The phrase itself originally indicated that \"the evidence used to prove one thing can be used to prove another\" before broadening in meaning.","def":"For the same reason.","answer":"BY THE SAME TOKEN","tidbit":""},{"cat":"words","origin":"In multiple languages, this first word translates to \"pig fish\" and this second word is Afrikaans Dutch for \"earth pig.\"","def":"1) A small toothed whale.\n2) A large burrowing nocturnal mammal of sub-Saharan Africa.","answer":"PORPOISE & AARDVARK","tidbit":""},{"cat":"word","origin":"In Latin this word means \"maternal uncle.\"","def":"1) Kindness suggestive of an uncle.\n2) Of or having to do with an uncle.","answer":"AVUNCULAR","tidbit":""},{"cat":"word","origin":"\"Internal organs out\" is the Latin etymology of this word.","def":"1) To deprive something of what is vital or essential; to badly weaken.\n2) To disembowel.","answer":"EVISCERATE","tidbit":""},{"cat":"word","origin":"This animal's name is from an Algonquian language and likely means \"he strips off,\" supposedly because this animal strips tree bark for food in winter.","def":"Large North America mammal noted for its enormous horns.","answer":"MOOSE","tidbit":""},{"cat":"word","origin":"In Greek mythology, a massive serpent -eventually defeated by Apollo - was the protector of Gaia (earth) and guardian of the oracle at Delphi. This word, the name of the serpent, likely comes from an old name for Delphi.","def":"A large constricting snake.","answer":"PYTHON","tidbit":"Pytho is the old name of Delphi."},{"cat":"word","origin":"Coined in 1985 by U.S. Senator Lloyd Bentsen of Texas, this term describes the efforts of front groups or wealthy individuals to influence public opinion while concealing their advocacy and creating the illusion of a genuine grassroots movement.","def":"","answer":"ASTROTURFING","tidbit":""},{"cat":"word","origin":"Carolus Linnaeus, the famous Swedish naturalist regarded as the founder of modern taxonomy, named this animal for a Latin term meaning \"evil spirits of the dead.\"","def":"A nocturnal, arboreal Madagascar primate.","answer":"LEMUR","tidbit":""},{"cat":"phrase","origin":"Child psychiatrist and psychoanalyst David Levy coined this phrase in 1941 to refer to jealousy of a mother's love.","def":"","answer":"SIBLING RIVALRY","tidbit":""},{"cat":"phrase","origin":"English philosopher and sociologist Herbert Spencer, best remembered for his doctrine of social Darwinism (according to which the principles of evolution, including natural selection, apply to human societies), coined this term in his 1864 work Principles of Biology.","def":"","answer":"SURVIVAL OF THE FITTEST","tidbit":""},{"cat":"phrase","origin":"In the 20th century many nonprofits started using drawings or photos of children to help them raise money.","def":"A person who is a prominent or model example of something.","answer":"POSTER CHILD","tidbit":""},{"cat":"word","origin":"This word is from a Latin verb meaning \"to run.\" Think of someone going too swiftly and not paying attention to detail.","def":"Rapidly reviewing something without noticing details; hasty, superficial.","answer":"CURSORY","tidbit":""},{"cat":"phrase","origin":"In the 1920s, this term described a cover combined with clips to strap a sleeping, potentially restless child to a crib or bed. In World War II, the phrase was applied to a measure taken to protect military secrets. But it was Charles Schulz's Peanuts cartoon character Linus who likely popularized this phrase, because he used it to describe this item that he always carried.","def":"1) Something that provides a feeling of safety, comfort or emotional stability.\n2) Protective measure designed to prevent the unauthorized dissemination of sensitive information.\n3) A small comforter held by a child for reassurance.","answer":"SECURITY BLANKET","tidbit":""},{"cat":"phrase","origin":"Disconnecting any machine or perhaps a life-support machine specifically, are two theories on the origin of this phrase. Another claim is that it comes from 18th century toilets that required removing a stopper to release water to flush everything out.","def":"To stop abruptly.","answer":"PULL THE PLUG","tidbit":""},{"cat":"phrase","origin":"This mammal's erratic flight patterns, which make them appear to be panicking, led to this phrase, which was popularized during World War I to describe the frenzied flight of warplanes. A 1977 album and song by Meat Loaf, one of the best-selling albums of all time, may have renewed the popularity of this phrase.","def":"To move really quickly.","answer":"BAT OUT OF HELL","tidbit":"Bats are not erratic flyers. They use echolocation and are frequently responding to sounds bouncing off objects. Plus, they are hunting insects, which also move unpredictably."},{"cat":"word","origin":"The origin of this word is unknown. It came from Middle English as the collective noun for hunted birds and mammals, especially quail.","def":"A large group or collection.","answer":"BEVY","tidbit":""},{"cat":"phrase","origin":"Two different Los Angeles restaurants claim to have originated this sandwich named for the roll it is made with.","def":"","answer":"FRENCH DIP","tidbit":"The two restaurants are Philippe The Original and Cole's. The former has more evidence to support its claim.\nPhilippe's French nationality may have also influenced the name. The name may also be a pun on a popular late 19th century and early 20th century dress called a \"French dip,\" which someone eating too many sandwiches would never be able to wear."},{"cat":"word","origin":"Sir Thomas More coined this word, which means \"no place\" in Greek, in a 1516 book about the impossibility of an ideal society ever existing.","def":"An ideal place or state.","answer":"UTOPIA","tidbit":""},{"cat":"word","origin":"From an Old English word meaning \"fixed place,\" this word was first used to describe warriors who held their ground.","def":"Firm in belief, determined.","answer":"STEADFAST","tidbit":""},{"cat":"word","origin":"\"Creature to be sacrificed\" is the Latin translation of this word.","def":"A person who suffers from a wrong or a crime or who is deceived or cheated.","answer":"VICTIM","tidbit":""},{"cat":"word","origin":"This word is from Old French for \"sour wine.\"","def":"A sour-tasting liquid containing acetic acid.","answer":"VINEGAR","tidbit":""},{"cat":"word","origin":"This word is from Old English for \"serpent.\" People must have scared easily in the old days.","def":"Any of numerous small, elongated, soft-bodied animals.","answer":"WORM","tidbit":""},{"cat":"word","origin":"From Latin words meaning \"together\" and \"key,\" this word probably first referred to \"a room that could be locked up.\" Today it refers not to locked rooms, but to the meetings held within them.","def":"1) A private meeting or secret assembly, especially of Roman Catholic cardinals assembled to choose a pope.\n2) A gathering of a group.","answer":"CONCLAVE","tidbit":""},{"cat":"word","origin":"James Fenimore Cooper coined this term in an 1840 novel, eponymously titled after this this descriptor for the character of Natty Bumppo, an archetypal American ranger and warrior.","def":"A trailblazer or one who discovers a way.","answer":"PATHFINDER","tidbit":"Bumppo is also featured in the book The Last of the Mohicans."},{"cat":"word","origin":"From Latin meaning \"completely black,\" this word meant \"to cast aspersions on someone's character\" before it developed the additional, literal definition of \"to make black.\" Now the literal definition is obsolete.","def":"To defame or belittle.","answer":"DENIGRATE","tidbit":""},{"cat":"word","origin":"From a Medieval Latin verb that meant \"to combine a metal with mercury.\"","def":"To unite or combine.","answer":"AMALGAMATE","tidbit":""},{"cat":"phrase","origin":"This gesture, from the Italian al bacio, is made by pinching the fingers and thumb of one hand together, giving them a smooch and then tossing them dramatically away from the lips. The image of an Italian cook performing this gesture spread through ads after World War II and took off on the internet in the early 2010s when it was used by a character on the original The Muppet Show.","def":"A gesture of appreciation for something excellent.","answer":"CHEF'S KISS","tidbit":"The Muppet Show character was the Swedish Chef."},{"cat":"word","origin":"No doubt about it, \"spark\" is the Latin meaning of this word.","def":"A tiny or scarcely detectable amount.","answer":"SCINTILLA","tidbit":""},{"cat":"phrase","origin":"Clothing made from identical fabric will look similar, even if the designs are different.","def":"People who are similar in nature.","answer":"CUT FROM THE SAME CLOTH","tidbit":""},{"cat":"phrase","origin":"One theory is that this insect was named after King William III of England, also known as the Prince William of Orange.","def":"","answer":"MONARCH BUTTERFLY","tidbit":""},{"cat":"phrase","origin":"Latin words meaning \"an alternation to turn\" are behind this phrase.","def":"With the order reversed, the other way around.","answer":"VICE VERSA","tidbit":""},{"cat":"phrase","origin":"One popular theory ties this phrase's origin to the term for the boxes of individual letters used for printing in the 1600s. If these letters got mixed up, it would make the printer's life very difficult. However, the phrase predates the 1600s world of printing and likely just means what it says.","def":"Not feeling well.","answer":"OUT OF SORTS","tidbit":""},{"cat":"word","origin":"Appropriately, the first two Greek letters give us this word.","def":"A system of characters or signs with which a language is written.","answer":"ALPHABET","tidbit":""},{"cat":"phrase","origin":"In the Middle Ages, it naturally cost a lot to secure the release of a captured or kidnapped monarch.","def":"An extremely large amount of money.","answer":"KING'S RANSOM","tidbit":""},{"cat":"phrase","origin":"This phrase first appeared in print in the early 18th century and referred to trusting what happens in life is God's will and, even when tragic, is for the best.","def":"An apparent misfortune that works to the eventual good of the recipient.","answer":"A BLESSING IN DISGUISE","tidbit":""},{"cat":"word","origin":"Food for thought: this word was originally used for prescriptions, to describe a list of medicines to be combined. From a Latin word meaning \"take.\"","def":"A set of instructions for making something.","answer":"RECIPE","tidbit":"Eventually, recipe was shortened to an R with a line through the leg, later written as \"Rx.\" On a doctor's prescription pad, Rx was followed by the prescription and later became a universal symbol for a pharmacy or pharmacist."},{"cat":"word","origin":"The daughters of Zeus and Mnemosyne, protectors of the arts and sciences, inspired this word.","def":"An institution devoted to the procurement, care, study and display of objects of lasting interest or value.","answer":"MUSEUM","tidbit":"The nine daughters of Zeus and Mnemosyne were the Muses."},{"cat":"word","origin":"Chinese words meaning \"golden citrus fruit\" make up this word.","def":"A small yellow-to-orange citrus fruit with a sweet, spongy rind.","answer":"KUMQUAT","tidbit":""},{"cat":"word","origin":"A centuries-old annual fair held outside a Dublin suburb gave its name to this public melee.","def":"Free-for-all, brawl.","answer":"DONNYBROOK","tidbit":"The annual Donnybrook Fair started in 1204 and continued until 1855. It initially ran eight days, but in 1252 was extended to 15 days. It was famous for its chaotic and lively atmosphere involving music, dancing and frequent brawls."},{"cat":"word","origin":"From a Middle English word meaning \"bald\" or \"with undressed hair.\"","def":"Untidy, unkempt, disordered.","answer":"DISHEVELED","tidbit":""},{"cat":"phrase","origin":"A person has limited vision in heavy low clouds and mist.","def":"Total ignorance.","answer":"DON'T HAVE THE FOGGIEST IDEA","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"finger or toe,\" as numbers under 10 were counted on fingers. As computers were developed using discrete electric signals (0s and 1s) to represent data, this word, previously unimportant, exploded in usage and significance.","def":"1) Related to computers and computerized technologies, including the internet.\n2) Composed of binary data.\n3) Providing a numerical readout.","answer":"DIGITAL","tidbit":""},{"cat":"word","origin":"In French (and Latin before that)this word means \"to walk away.\"","def":"To avoid or escape, especially by trickery or cleverness.","answer":"EVADE","tidbit":""},{"cat":"words","origin":"A Latin term meaning \"breath, soul\" gives us this noun and verb. The noun is alive, and the verb describes figuratively giving life.","def":"","answer":"ANIMAL & ANIMATE","tidbit":""},{"cat":"phrase","origin":"Dating from the 19th century, this phrase, usually uttered with contempt, has a murky history. It gained popularity in 1969 when Max Yasgur reportedly used it to tell local officials that the Woodstock Music Festival would proceed on his farm, whether they liked it or not.","def":"Leave, get lost.","answer":"GO POUND SAND","tidbit":"Go pound sand was likely a shortening of the earlier phrase not enough sense to pound sand down a rat hole.\nYasgur's full quote was \"well, you can all go pound sand up your a**, because come August 15, we're going to have a festival.\""},{"cat":"phrase","origin":"Originally this biblical phrase referenced rendering an account of one's life and conduct to God at death or on judgment day. It is also the name of a bad 2016 television movie.","def":"A time when the consequences of a course of mistakes or misdeeds are felt.","answer":"DAY OF RECKONING","tidbit":""},{"cat":"phrase","origin":"This is a shortening of a French phrase from around the early 19th century that many credit Napoleon with popularizing.","def":"An outwardly friendly manner used to disguise ruthless determination.","answer":"VELVET GLOVE","tidbit":"The full expression is an iron fist in a velvet glove."},{"cat":"phrase","origin":"A preflight inspection for a plane or a prepurchase examination of a car once involved this simple, unsophisticated step.","def":"To inspect, test or evaluate something.","answer":"KICK THE TIRES","tidbit":""},{"cat":"phrase","origin":"This phrase was coined by Henry Wadsworth Longfellow in his poem The Theologian's Tale, which tells the story of Elizabeth Haddon, who travels alone to the United States from England in 1701, meets John Estaugh, who then departs \"across the sea.\" He returns and they are married in 1702.","def":"1) People who meet briefly, by chance, and then do not see each other again.\n2) People who live together but don't see each other often.","answer":"SHIPS THAT PASS IN THE NIGHT","tidbit":""},{"cat":"phrase","origin":"T. S. Eliot coins this phrase at the end of his 1925 poem The Hollow Men that explores themes of spiritual emptiness, disillusionment and the decay of modern society in the aftermath of World War I.","def":"An anticlimactic, disappointing ending.","answer":"NOT WITH A BANG BUT A WHIMPER","tidbit":"The last line of The Hollow Men:\n\"This is the way the world ends\nThis is the way the world ends\nThis is the way the world ends\nNot with a bang but a whimper.\""},{"cat":"phrase","origin":"The name of a smelly moonshine facility in Al Capp's comic strip Li'l Abner, which used deceased animals, old shoes, kerosene and other odd ingredients to make \"Kickapoo Joy Juice,\" inspired Lockheed Martin workers to use the same name for their secretive aviation plant next to a foul-smelling plastics factory.","def":"A business undertaking consisting of a small, loosely structured team formed to foster innovation and work on nonmainstream projects.","answer":"SKUNKWORKS PROJECT","tidbit":"In the comic, the facility was called Skonk Works. Capp didn't like associating his comic with a military manufacturer, so Lockheed changed the spelling to Skunk Works and trademarked the name."},{"cat":"word","origin":"Borrowed from Medieval Latin, this word means \"word for word.\"","def":"","answer":"VERBATIM","tidbit":""},{"cat":"word","origin":"Borrowed from German, this word means \"noisy ghost.\"","def":"","answer":"POLTERGEIST","tidbit":""},{"cat":"phrase","origin":"The Old English meaning of the second word of this phrase is \"tree trunk.\" It frequently referred to \"something solid that things (metaphorically) could be fixed to.\" Think of the butt of the joke.","def":"An object of derisive laughter or ridicule.","answer":"LAUGHING STOCK","tidbit":""},{"cat":"word","origin":"Doodle, the source for the first part of this hyphenated word, once meant \"excrement,\" which could make this whole word a bit too graphic, though in the end it means nothing.","def":"Of little value or significance.","answer":"DIDDLY-SQUAT","tidbit":""},{"cat":"phrase","origin":"The origin of this phrase is unclear, though a likely source is the game Snakes and Ladders.","def":"To return to the beginning after a long effort that fails to make progress.","answer":"BACK TO SQUARE ONE","tidbit":""},{"cat":"phrase","origin":"Popularized by the pink puma cartoon character Snagglepuss, a regular on The Yogi Bear Show in the 1960s, this expression of surprise or disbelief was likely coined by the show's writers.","def":"","answer":"HEAVENS TO MURGATROYD","tidbit":"Snagglepuss was the inspiration for the Pink Panther cartoon character."},{"cat":"word","origin":"Some might think it is melodramatic that this word comes from a Latin word meaning \"actor.\"","def":"Exaggerated, dramatic behavior designed to attract attention.","answer":"HISTRIONICS","tidbit":""},{"cat":"word","origin":"Graduating from school is the ending one phase of life followed by the beginning of a new one, hence this word derived from Latin for \"to begin.\"","def":"School graduation ceremony.","answer":"COMMENCEMENT","tidbit":""},{"cat":"word","origin":"The name for an ancient Roman practice of interpreting omens (such as the flight of birds) led to a Roman ceremony for a person beginning an important new role. If the signs were considered favorable, the appointment had the sanction of the gods.","def":"The act of installing someone into office with formal ceremonies.","answer":"INAUGURATION","tidbit":"The ancient Romans practiced augury, the interpretation of omens. This practice led to a ceremony called inauguratio."},{"cat":"phrase","origin":"The first work of this phrase is the name of a village in Middlesex (now a borough in London) where nearby meadows were used to pasture horses as early as 1198. The word became the name for an \"ordinary riding horse\" before \"to make trite\" was added to the \"ordinary\" sense of the word's meaning.","def":"An overused expression that has become cliche.","answer":"HACKNEYED PHRASE","tidbit":""},{"cat":"word","origin":"Originally this word's definition was \"to blockade, to surround (a town) with troops,\" from a Dutch verb meaning \"to camp around.\"","def":"To besiege, trouble or harass.","answer":"BELEAGUER","tidbit":""},{"cat":"word","origin":"Several colorful stories, none of them definitive, try to explain the origin of this word. It may have come from the name for a legendary fictional baseball power hitter popular from the early 1900s. Or it's from the last name of a golfer who was given an extra stroke in a game at Winged Foot Golf Club in New York City in the 1930s (or at the Country Club of Montreal in the 1920s). If you can't get this origin, we should give you a second shot at it.","def":"1) An extra stroke after a poor shot in golf.\n2) A second chance.","answer":"MULLIGAN","tidbit":"Swat Mulligan was a fictional power-hitting baseball player introduced in the New York Evening World around 1908. The term transferred to a golfer with a powerful swing and may have developed its \"second shot\" meaning with a golfer hoping a second shot would be a \"Swat Mulligan shot.\""},{"cat":"phrase","origin":"The first word in this phrase originally referred to a cymbal but shifted in meaning to refer to a \"set of bells.\" Think of bells strung together to create a harmonious sound.","def":"To interject or join a conversation.","answer":"CHIME IN","tidbit":""},{"cat":"phrase","origin":"The first word of this name descends from a Latin root meaning \"away omen\" and meant \"to detest\" or \"to deprecate as an ill omen.\" The phrase itself is a mistranslation of Metoh-Kangmi, the term Lieutenant-Colonel Charles Howard-Bury's Sherpa guides used to explain large footprints found in the snow on a Mount Everest expedition in 1921.","def":"Yeti.","answer":"ABOMINABLE SNOWMAN","tidbit":"Metoh-Kangmi roughly translates to \"man-bear snowman\" in Tibetan. But journalist Henry Newman\nmistranslated metoh as \"filthy\" and, apparently for dramatic effect, replaced \"filthy\" with abominable."},{"cat":"phrase","origin":"This phrase likely comes from the practice of recording debts on a board, often used in taverns as early as the 16th century.","def":"Give credit to.","answer":"CHALK IT UP","tidbit":""},{"cat":"word","origin":"The Greek root meaning of this word means \"imitator of all.\"","def":"1) A performance without speech.\n2) A form of theater, common in England during the Christmas season, with stock characters who sing, dance and tell jokes.","answer":"PANTOMIME","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"curled,\" French folklore suggests this food was created when a 13th century housewife in Brittany accidentally dribbled some thin porridge onto a hot cooktop.","def":"A thin, delicate pancake.","answer":"CREPE","tidbit":""},{"cat":"word","origin":"Latin roots meaning \"not measurable\" give us this word.","def":"Huge.","answer":"IMMENSE","tidbit":""},{"cat":"phrase","origin":"Probably from an American football strategy to send multiple offensive players into the same area so it is difficult for the defense to guard all of them.","def":"To overwhelm an individual or group with a barrage of information or activity.","answer":"FLOOD THE ZONE","tidbit":""},{"cat":"word","origin":"Though the origin of this word is uncertain, the leading theory is it's an 18th century Latin language joke meaning \"I shall see,\" referencing the view from this structure.","def":"1) An open or latticework pavilion built on a site that provides an attractive view.\n2) A small roofed screened structure used for outdoor entertaining.","answer":"GAZEBO","tidbit":"The \"joke theory\" combines gaze with the Latin suffix ebo to mean \"I shall.\"\nAnother theory is that it could simply be a misunderstanding of a word for a Chinese-style summerhouse."},{"cat":"phrase","origin":"In the early 19th century, it was blasphemous to use Mary's name offensively, so this expression of surprise substituted something funny and absurd instead.","def":"","answer":"HOLY MACKEREL","tidbit":"It is conceivable that mackerel was chosen because Catholics eat fish on Fridays and were derogatorily known as \"mackerel snatchers\" since the fish was popular among budget-oriented Catholics."},{"cat":"word","origin":"Meaning \"to blow into or breathe,\" this 14th century word's Latin roots conjured the image of the divine breathing spirit into the human body to guide or influence action. Today the word has a similar but secular meaning.","def":"To give an idea to someone and give them the confidence to do it.","answer":"INSPIRE","tidbit":""},{"cat":"phrase","origin":"This expression took off in 2015 when Clemson student Mackenzie Pearson wrote a blog pos
