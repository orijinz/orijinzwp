 a skinny young man threatened and pushed by a bully and called a \"little boy\" by a young woman. The young man gets the Atlas book and returns a muscle-bound hero who earns the admiration of onlookers and the young woman by beating up the bully.","def":"Puny, not strong.","answer":"NINETY-EIGHT-POUND WEAKLING","tidbit":"Though \"98-pound weakling\" is the more popular phrase, the ads actually referred to a \"97-pound weakling.\""},{"cat":"phrase","origin":"In February 1964, Vincent Gaddis wrote a story for the pulp fiction magazine Argosy, coining this phrase for a stretch of the Atlantic Ocean where numerous ships and airplanes have supposedly disappeared without a trace or explanation.","def":"","answer":"BERMUDA TRIANGLE","tidbit":"The article was titled The Deadly Bermuda Triangle. Gaddis delineated the initial boundaries of the triangle, giving its vertices as Miami; San Juan, Puerto Rico; and Bermuda."},{"cat":"word","origin":"From an early Scandinavian word meaning \"to chop,\" this 16th century word meant \"to cut with heavy blows\" or \"to cut clumsily or hack.\" Its current definition is closer to cutting prices than wood.","def":"To bargain or wrangle in a quibbling and sometimes contentious way.","answer":"HAGGLE","tidbit":""},{"cat":"phrase","origin":"Lewis Carroll inspired this phrase with his 1865 novel Alice's Adventures in Wonderland. In the story, seven-year-old Alice notices a talking, clothed white bunny with a pocket watch run past. She follows it down a cavity where she suddenly falls a long way to a curious hall with many locked doors of all sizes.","def":"To get distracted by something interesting but not core to your task.","answer":"GO DOWN A RABBIT HOLE","tidbit":""},{"cat":"phrase","origin":"The figurative sense of this phrase appears to have developed mostly from movies over time. The first was from a Western in 1956, where a son tries to put the reputations of his bank robber father behind him only to become part of an Old West gang of juvenile delinquents. The second was another Western six years later. The third, which materially increased the usage of this phrase, was a 1988 movie about Billy the Kid and his crew with a cast that included Emilio Estevez, Kiefer Sutherland, Lou Diamond Phillips, Charlie Sheen and Dermot Mulroney.","def":"An up-and-coming adolescent or young man, especially one considered assertive and confident.","answer":"YOUNG GUN","tidbit":"The movies were: The Young Guns (1956), The Young Guns of Texas (1962) and Young Guns (1988)."},{"cat":"word","origin":"This 1950s term for a psychological concept used by the People's Volunteer Army during the Korean War is a literal translation of Chinese xi nao.","def":"To bring about or undergo forced indoctrination. Also, to persuade via propaganda or lies.","answer":"BRAINWASH","tidbit":""},{"cat":"word","origin":"Likely from German via Medieval Latin words meaning \"arm\" and \"branches like arms,\" this food was eaten during Lent, when meat, dairy and eggs were prohibited. It was also handed out by monks to children for saying their prayers.","def":"A salted thin or twisted crisp dry biscuit that also can come in a larger, usually soft, chewy form.","answer":"PRETZEL","tidbit":"In many German dialects, the letters b and p at the beginning of word are pronounced identically, hence the German word bretzel became pretzel in English.\nAn often-told legend is that a monk in Italy first made pretzels by taking leftover dough from bread baking and twisting it to resemble the crossed arms of a person in prayer."},{"cat":"word","origin":"From a Swahili word meaning \"journey\" that itself came from a similar Arabic word.","def":"A journey; a cross-country expedition, typically in an African country.","answer":"SAFARI","tidbit":""},{"cat":"word","origin":"This 16th century word comes from Latin via other languages and means \"square.\" Before the widespread use of automatic weapons, infantry troops used a square formation. By arranging the unit so that there was no undefended rear, an infantry could better repel a cavalry attack. This word was extended to sports and police work in the early 1900s.","def":"A small, organized group.","answer":"SQUAD","tidbit":""},{"cat":"word","origin":"From French via Latin, this 14th century word literally means \"to suffer together.\"","def":"Sympathy for others' distress together with a desire to alleviate it.","answer":"COMPASSION","tidbit":""},{"cat":"word","origin":"The name for the Greek goddess of vengeance is behind this 16th century word. The word literally means \"to give what is due\" but its original notion was \"divine allocation of good or bad fortune.\" Its current definition is from the 20th century.","def":"A persistent tormentor; a long-standing rival or archenemy.","answer":"NEMESIS","tidbit":""},{"cat":"phrase","origin":"This phrase was popularized because of the biblical story of the Flood (Genesis 8:11). After 40 days, Noah opens the door of the ark and releases a raven and then a dove, neither return. Noah lets seven days pass and then sends out another dove who returns with a twig and leaf in its beak, proving that the waters were receding, and that God had therefore shown mercy.","def":"A peace offering.","answer":"EXTEND AN OLIVE BRANCH","tidbit":"The olive branch as a symbol of peace is also found in Greek mythology. For example, Athena presented the city of Athens with an olive branch or tree."},{"cat":"phrase","origin":"This main word in this two-word phrase from the 13th century referred to a metalworker who made or mended pots and household utensils. Its verb form is from the 16th century.","def":"To fiddle with something to try and repair or adjust it.","answer":"TINKER WITH","tidbit":""},{"cat":"word","origin":"This later 19th century word from hydrodynamics and aerodynamics is the path of a particle that is flowing steadily past an object in a fluid. By the early 20th century, it also referred to any shape free from turbulence from the flow around it. Its figurative verb forms are first cited in the mid-1930s.","def":"To simplify to improve efficiency or organization.","answer":"STREAMLINE","tidbit":""},{"cat":"word","origin":"From a Sanskrit word meaning \"union,\" as in the union of the mind and the body.","def":"1) A system of physical postures, breathing techniques and sometimes, meditation.\n2) A Hindu theistic philosophy teaching freedom from all activity of body, mind and will to attain liberation.","answer":"YOGA","tidbit":""},{"cat":"phrase","origin":"Renowned geochemist and oceanographer Wallace Broecker of Columbia University introduced this term in a 1975 Science paper. In his article, Broecker countered the prevailing wisdom called \"inadvertent climate modification.\" At that time, many scientists accepted that human activities could impact climate, but the course of change was unknown since industrial emissions of aerosols might cause cooling, while greenhouse gas emissions would heat up the earth.","def":"The temperature increase in the earth's atmosphere caused by the addition of greenhouse gases.","answer":"GLOBAL WARMING","tidbit":"Broecker's article was titled Climatic Change: Are We on the Brink of a Pronounced Global Warming?"},{"cat":"phrase","origin":"While this military practice dates to ancient warfare, this phrase is a mid-1930s translation of the Chinese phrase jiaot\u016d zhengce, a tactic used by the Chinese army in the Second Sino-Japanese War to destroy anything that could be useful to the invading Japanese.","def":"1) Deliberate destruction of property and resources that might be useful to an invading enemy.\n2) To seek victory or supremacy at all costs.\n3) A firm facing a takeover attempting to make itself less valuable by selling off its assets.","answer":"SCORCHED EARTH","tidbit":"The phrase jiaot\u016d zhengce translates to \"scorched earth policy.\""},{"cat":"phrase","origin":"This phrase, perhaps inspired by the sinking of the RMS Titanic, alludes to most of the mass of this object being underwater.","def":"A hint of a much larger and more difficult issue or problem","answer":"TIP OF THE ICEBERG","tidbit":""},{"cat":"phrase","origin":"Picture a roller coaster speeding on its track, twisting in a complete circle with riders at one point upside down and perhaps nauseated, and you get a possible origin for this 20th century phrase.","def":"Very surprised and unsure what to do.","answer":"THROWN FOR A LOOP","tidbit":"A similar phrase is knocked for a loop."},{"cat":"word","origin":"From Late Latin meaning \"small wing,\" this French word originally referred to a showy, feathery plume on a hat or helmet. Its figurative sense was inspired by Edmond Rostand's depiction of Cyrano de Bergerac in his 1897 play of the same name.","def":"Flamboyance, swagger and verve.","answer":"PANACHE","tidbit":""},{"cat":"phrase","origin":"The standard number of strokes a topnotch golfer should need to complete a hole inspired this phrase.","def":"As expected, typical.","answer":"PAR FOR THE COURSE","tidbit":""},{"cat":"word","origin":"From a word meaning \"reef\" in Divehi, the official language of the Maldives, this 17th century word was popularized in the 19th century writings of Charles Darwin.","def":"A coral island consisting of a reef surrounding a lagoon.","answer":"ATOLL","tidbit":""},{"cat":"phrase","origin":"This large carnivorous member of the dog family usually hunts in packs, but there are exceptions. From the early 1900s.","def":"A person who prefers to be solitary.","answer":"LONE WOLF","tidbit":""},{"cat":"word","origin":"This Old English word from before the year 1,000 is from a Greek word, itself modified from an Iranian word, meaning \"enclosed park.\" The Greek word described an orchard or royal hunting park in Persia and was used in the Septuagint, an early Greek translation of Jewish scriptures, to refer to the Garden of Eden. Early Christian writers also used this word for Heaven and for the place where righteous souls await resurrection.","def":"1) The Garden of Eden, also heaven or an intermediate place for souls awaiting resurrection.\n2) A place or state of extreme beauty, bliss and happiness.","answer":"PARADISE","tidbit":"The Greek word is paradeisos."},{"cat":"word","origin":"The old English dialect word pick, which meant \"to throw or place\" led to the phrase pick pack or pick-a-pack which meant to \"place a load on the someone's back or shoulders.\" Eventually, with pick developing a different meaning, pick-a-pack was replaced with this word, which really doesn't make a lot of sense either.","def":"1) On the shoulders or back.\n2) To connect to something larger or more important.","answer":"PIGGYBACK","tidbit":"Pickpack became pickaback before it came piggyback. Try repeating that sentence five times fast."},{"cat":"phrase","origin":"Several years after the dime was minted in 1796, merchants started using it to advertise their products. This phrase, often used when selling food, and especially produce, originally meant you were getting a good deal, but with the dime losing its value to inflation over time, this phrase's meaning flip-flopped.","def":"Something common or easy to find. Also, something cheap or worthless.","answer":"A DIME A DOZEN","tidbit":""},{"cat":"word","origin":"This Nahuatl (Aztecan) word meaning \"sand water place\" was used by the Spanish to name this capital city of Veracruz, Mexico, and then to name this pepper, which was cultivated there.","def":"A small, plump, dark-green chili pepper.","answer":"JALAPENO","tidbit":"Jalapeno is Spanish for \"from Jalapa\" (also spelled \"Xalapa\")."},{"cat":"phrase","origin":"This phrase's definitive origin is unknown but may come from the fifth voyage of The Adventures of Sinbad when he meets a creature that tricks travelers into carrying it across a stream. The creature then tightens its grip and forces its victims to transport it wherever it wishes. The victims eventually die in the process. In the story, Sinbad subdues and kills the evil creature.","def":"To solve, remove or vanquish a persistent vexing burden.","answer":"GET THE MONKEY OFF YOUR BACK","tidbit":"The creature looked like a monkey. In the 1860s, having a monkey on your back meant \"carrying around anger.\" And in the 1930s was narcotics slang for \"being addicted.\""},{"cat":"phrase","origin":"This 20th century phrase may come from a humorous riddle: \"Where does an [this animal] sit?\"\nThe answer: \"Anywhere it wants to.\"","def":"One that is dominating or uncontrollable because of great size or power.","answer":"EIGHT-HUNDRED-POUND GORILLA","tidbit":"An adult male gorilla ranges from 300 to 430 pounds, while a female gorilla ranges from 150 to 250 pounds."},{"cat":"word","origin":"From Old Norse, this 13th century word literally means to \"search the house.\"","def":"To search thoroughly, often in a rough way. Also, to pillage.","answer":"RANSACK","tidbit":""},{"cat":"phrase","origin":"From Cervantes classic 1605 novel Don Quixote, when the hero sees large apparatuses \"with arms well-nigh two leagues in length,\" thinks that they are giants and tries to attack them.","def":"To waste time fighting enemies or trying to resolve issues that are imaginary or unimportant.","answer":"TILTING AT WINDMILLS","tidbit":""},{"cat":"phrase","origin":"Beginning with an Old English word meaning \"to listen,\" this phrase was used as a hunting cry to alert hunters or dogs to turn around and reverse direction in the quest for prey. The verb soon acquired its current figurative meanings.","def":"To cause one to think of or recall something.","answer":"HARKEN BACK","tidbit":"The original phrase was hark back. Hearken is the more popular British spelling."},{"cat":"word","origin":"This Arabic word, passed through multiple languages into English and the term for the symbol \"zero,\" was a translation of the Sanskrit term \u015b\u016bnya meaning \"empty.\" In the early 15th century, it came to mean \"any numeral\" before developing its current meaning, because early codes often substituted numbers for letters.","def":"A coded message.","answer":"CIPHER","tidbit":""},{"cat":"word","origin":"Likely meaning \"earth horn,\" this word probably derives from Ostyak, a Finno-Ugric language of the indigenous Mansi people of northern Russia. It was first referenced in Western Europe in the early 1600s. At the beginning of the 1800s, this word was used by Federalist newspapers to mock a 4-foot diameter, 1,200-pound cheese wheel sent to President Thomas Jefferson as a political statement about religious freedom. The cheese wheel, engraved with the motto \"Rebellion to tyrants is obedience to God,\" was sent as a gift to Jefferson by the ladies of a Baptist congregation in Cheshire, Massachusetts.","def":"1) Something of huge size.\n2) A very large, extinct elephant species with long curved tusks.","answer":"MAMMOTH","tidbit":"The controversy over the word mammoth came about because Federalists thought Jefferson (a Republican) was wasting funds supporting the research of Charles Willson Peale, the painter and naturalist who displayed mammoth bones at his Philadelphia museum."},{"cat":"phrase","origin":"This 16th century phrase started as a figurative expression and was used in its literal sense by the military and pirates 200 years later. Today, the phrase is used to argue that widely publicized catastrophes are staged by the government or interest groups for political purposes.","def":"1) A deliberate misrepresentation of motives or identity.\n2) A hostile or harmful action disguising the culprit to pin the blame on another party.","answer":"FALSE FLAG","tidbit":""},{"cat":"word","origin":"This rodent's prolific breeding and mass migrations to the sea that sometimes led to incidental drownings led to the figurative sense of this word first cited in the late 1950s.","def":"1) A small arctic rodent.\n2) A person who, without thought, rushes to joins a mass movement that leads to disaster.","answer":"LEMMING","tidbit":""},{"cat":"phrase","origin":"From a once rare and now obsolete French phrase signifying a \"two-fold meaning,\" this phrase was first used by English playwright John Dryden in the 1673 comic play Marriage a-la-Mode.","def":"A word or expression with two interpretations, with one often risque.","answer":"DOUBLE ENTENDRE","tidbit":""},{"cat":"word","origin":"From a Latin adverb meaning \"elsewhere,\" this was a legal term when it first entered English in the 18th century.","def":"1) A legal defense claiming to be at another place when a crime took place.\n2) An excuse.","answer":"ALIBI","tidbit":""},{"cat":"word","origin":"The Latin word for the marsh plant \"rush,\" morphed into this word in English in the 14th century to refer to a basket made of rushes used for carrying fish. About a century later, it referred to a type of cream cheese made in rush baskets and then it was the name for a series of sweets. By the 16th century, this word meant \"banquet\" or \"feast,\" perhaps because of picnic baskets, which later came to mean a \"pleasure trip\" in which eating and drinking were prevalent. Its more popular current definition is from the 19th century.","def":"A trip, usually one made by a government official ostensibly for official business that is generally regarded as a holiday at public expense.","answer":"JUNKET","tidbit":"Juncus is the Latin word for \"rush.\""},{"cat":"phrase","origin":"Hawaiian pidgin, a creole language that combines Hawaiian and English, is the source of this gambling phrase that raises the specter of a bet that risks bankruptcy. The phrase was popularized by, and the motto of, the 442nd Regimental Combat Team, an Army unit of Japanese Americans from Hawaii and the mainland United States. The 442nd was the most highly decorated regiment of World War II.","def":"To risk everything to achieve a goal.","answer":"GO FOR BROKE","tidbit":""},{"cat":"word","origin":"This 15th century word comes from a Latin word meaning \"wholeness\" or \"completeness,\" which just might imply that without strong principles, life is incomplete.","def":"1) Adhering to moral and ethical principles; honesty.\n2) The state of being whole or undiminished.\n3) Unimpaired.","answer":"INTEGRITY","tidbit":"Integrity is related to integer."},{"cat":"word","origin":"This 13th century Old French word developed a culinary sense in the 18th century. At the time, a typical formal dinner would consist of soup, fish, various side dishes, roasted meat and dessert, plus salad and cheese. Usually, after the fish came this starter, an introduction to the roast meat main course. But as dining habits changed, and meals were less extravagant with fewer courses, this word's meaning changed in the U.S.","def":"In the U.S., the main course of a meal. In France and some of Europe, it refers to the first course.","answer":"ENTREE","tidbit":"Entree was the source for the Middle English \"entre,\" which in the 13th century became \"enter\" in English."},{"cat":"phrase","origin":"This long pole or spear that extends from the mast of a boat to hold the foot of the sail is one of the most common causes of death and injuries on a sailboat.","def":"To deal a crushing blow or punishment.","answer":"LOWER THE BOOM","tidbit":""},{"cat":"phrase","origin":"This phrase, first documented around 1935, does not have a definitive origin, but may simply reflect something that is not black or white.","def":"A situation, not clearly or easily defined, or not covered by an existing category or set of rules.","answer":"GRAY AREA","tidbit":""},{"cat":"word","origin":"This 17th century word may come from the Middle French term harer, meaning \"to set a dog on.\"","def":"To persistently annoy, disturb or intimidate.","answer":"HARASS","tidbit":""},{"cat":"word","origin":"From Latin meaning to \"to bear or carry war,\" this word means \"a party or nation at war\" as a noun but means to \"to wage war\" or simply to be assertive, hostile or combative as an adjective.","def":"","answer":"BELLIGERENT","tidbit":""},{"cat":"word","origin":"This 16th century word comes from a Latin word meaning \"to renew.\"","def":"To introduce or invent something new; make changes in anything established.","answer":"INNOVATE","tidbit":"The Latin word is innovates."},{"cat":"phrase","origin":"From the name of the first popular daily comic strip, created by Harry Conway 'Bud' Fisher in 1907 and continued in syndication until the early 1980s. The comic was about the follies and adventures of two best friends, a tall racing enthusiast and gambler fixated on get-rich-quick schemes and a short former mental-asylum patient who was also a gambler.","def":"A nickname given to a pair of people, usually friends or partners, who have distinctly contrasting qualities.","answer":"MUTT AND JEFF","tidbit":"Mutt, a shortening of \"muttonhead,\" once meant \"fool,\" but is now commonly used as a term for a mixed-breed dog."},{"cat":"word","origin":"A misspelling of an alternative name for the wryneck, a type of European woodpecker known for twisting its head around when disturbed. The feathers of the wryneck were thought to be a key component of certain charms and spells.","def":"To bring about bad luck to another person.","answer":"JINX","tidbit":"The wryneck was also called a jynx."},{"cat":"phrase","origin":"This phrase has had different meanings throughout history. Starting around the 16th century, it was a sign of battle readiness or defiance. In 1865, groups threatened by the rise of the automobile helped pass the British Locomotive Act that stipulated a person carrying this item must walk at least 60 yards ahead of any self-propelled road vehicle. Since the 1900s, this item has been used in car racing to signal drivers of dangerous racing conditions. In the 20th century, it became the center of a phrase for allowing courts to prevent dangerous people from having access to firearms.","def":"1) To identify a problem needing attention.\n2) A warning sign.","answer":"RED FLAG","tidbit":"The British Locomotive Act, labeled the \"Red Flag Act,\" also prescribed the world's first road speed limit: 4 mph in the country and 2 mph in towns, with a \u00a310 fine for speeding."},{"cat":"word","origin":"Originally a 1940s Canadian-English slang term for a quick feinting move in ice hockey that draws an opponent out of position, this term today is used in many other sports and sometimes more generally.","def":"To deceive; to fake an opponent.","answer":"DEKE","tidbit":"Deke is a shortening of decoy."},{"cat":"phrase","origin":"Starting in the late 1800s, small traveling troupes of performers, generally low-budget circuses with a band, a ringmaster and animal acts, were labeled with this name that became synonymous with an event or presentation having more form than substance.","def":"An overly elaborate sales presentation or event.","answer":"DOG AND PONY SHOW","tidbit":""},{"cat":"word","origin":"From the name of a character in Chaucer's poem Troilus and Criseyde who acted as a go-between in the love affair between the main characters, this word's meaning has shifted from \"a go-between in clandestine love affairs\" to \"pimp\" and eventually to its current broadened meaning.","def":"To cater to vices of others. Also, to indulge the tastes or whims of another.","answer":"PANDER","tidbit":"The character Pandare appears as a Trojan archer in Homer's Iliad, but Chaucer borrowed this character name and made him a go-between in the love story from the Italian Renaissance writer Boccaccio. The same character appears as Pandarus in Shakespeare's play Troilus and Cressida."},{"cat":"words","origin":"These two nouns have different literal meanings but similar figurative meanings. The first means \"bedpost\" in Latin and is derived from its verb form meaning \"to prop up.\" In the 17th century, it referred to the point on which a lever is supported. The second noun is a corruption of a Middle English word meaning \"axle-pin,\" referring to the pin that held a wheel onto a carriage or wagon.","def":"Something that plays a central role in a complicated situation.","answer":"FULCRUM & LINCHPIN","tidbit":"The pin was called a \"lynis\" in Old English; Middle English speakers added \"pin\" to form \"lynspin,\" which was altered to linchpin (also spelled lynchpin)."},{"cat":"word","origin":"This word, from a euphemism for Jesus, became associated with British people who frequently advocated for going to war to prove their country's superiority. It comes from the refrain of a song sung in music halls and pubs supporting aggressive British policy toward Russia during the Russo-Turkish War of 1877-1878.","def":"Fanatical patriotism, often favoring an aggressive foreign policy advocating war over diplomacy.","answer":"JINGOISM","tidbit":"The lyrics of the refrain:\n\"We don't want to fight, yet by jingo if we do,\nWe've got the ships, we've got the men, we've got the money, too!\nWe've fought the Bear before, and while we're Britons true\nThe Russians shall not have Constantinople!\""},{"cat":"phrase","origin":"Perhaps from a 16th century adage not to sell this animal skin before first catching the animal, this practice was employed by middlemen in the hopes that the price would fall, allowing them to purchase the skins for less.","def":"When securities or commodities are persistently declining in value.","answer":"BEAR MARKET","tidbit":""},{"cat":"word","origin":"According to Norse mythology, the god Odin appointed Loki's daughter, who was named for an Old Norse word meaning \"hidden,\" to preside over the realm of the dead, which was then named after her.","def":"The underworld; the dwelling place of the dead and the region many religions believe sinners go to after death.","answer":"HELL","tidbit":""},{"cat":"phrase","origin":"The star Sirius has long been linked with sweltering weather in the northern hemisphere, because it rises simultaneously with the sun during the hottest days of summer. It is also the second brightest star that can be seen with the naked eye.","def":"1) In the northern hemisphere, the period between early July and early September.\n2) A period of lethargy or inactivity.","answer":"DOG DAYS","tidbit":"Sirius is also known as Alpha Canis Majoris and the Dog Star. In the ancient Greek constellation system, Sirius was considered the hound of the hunter Orion and named Kyon, meaning \"dog.\" The Greek writer Plutarch called the hot days of summer h\u0113merai kynades which translates to dog days."},{"cat":"word","origin":"In the 17th century this word, from an Ancient Greek word meaning \"jaw,\" referred to a horse's lower jaw. The word's meaning changed dramatically to \"imbecile\" when a renowned Parisian confectioner created a kind of bonbon and dubbed it with the name of a popular vaudeville play by French dramatist Victorien Sardou that mocked out-of-touch Parisians and was first performed in October 1862.","def":"A whipped mixture of chocolate and cream typically used as an icing or filling for pastries.","answer":"GANACHE","tidbit":"The play was Les Ganaches."},{"cat":"word","origin":"Ironically, from a Latin word meaning \"to fall together.\"","def":"To crumble suddenly or fail. Also, to fold up, usually for convenient storage.","answer":"COLLAPSE","tidbit":""},{"cat":"phrase","origin":"First recorded in the late 19th century as the name for the remote, uninhabited outback regions of Australia, this phrase was used by many English writers thereafter. Its best-known use was by author J.M. Barrie in Peter Pan as the name for the island home of the \"lost boys\" who \"fall out of their prams (baby carriages) when the nurse is looking the other way and are not claimed in seven days.\"","def":"An ideal but imaginary place.","answer":"NEVER-NEVER LAND","tidbit":""},{"cat":"word","origin":"\"Master builder\" in Greek.","def":"","answer":"ARCHITECT","tidbit":""},{"cat":"phrase","origin":"This late 19th century phrase comes from stud poker - perhaps crooked or rigged games - where having this powerful card facing down is a major advantage.","def":"A major advantage that one keeps hidden until an ideal time.","answer":"ACE IN THE HOLE","tidbit":"In many variants of poker, in particular stud poker, one or two cards are dealt face down and the rest are dealt face up. The face-down cards are called the \"hole\" cards."},{"cat":"word","origin":"This syrupy medicine containing an extract from the gentian root used in herbal medicines was likely named for the Native American Abenaki word for \"dark water.\" It became one of the first mass-produced soft drinks in the U.S. in the late 1800s and had a bitter taste like root beer. The brand name became slang for courage, nerve and determination, because the drink was believed to reinvigorate even the weariest person.","def":"Energy, pep, courage and determination, also, know-how.","answer":"MOXIE","tidbit":"Moxie was named the official soft drink of Maine in May 2005 and is still regionally popular. Moxie was purchased by The Coca-Cola Company in 2018."},{"cat":"word","origin":"This Hebrew word meaning \"beast\" may come from the Egyptian word pehemau, meaning \"water ox\" (hippopotamus). In the book of Job, this word is the name of a powerful grass-eating, river-dwelling beast with bones like bars of brass and iron.","def":"A creature or thing of monstrous size and/or power.","answer":"BEHEMOTH","tidbit":"The Hebrew word is b'h\u0113moth, the plural of b'h\u0113mah."},{"cat":"word","origin":"From a Latin word meaning \"cloud,\" this word evolved to a Middle French word meaning \"shade of color\" that developed a more subtle meaning when it came from French into English in the 18th century.","def":"A subtle distinction.","answer":"NUANCE","tidbit":""},{"cat":"phrase","origin":"This late 19th century phrase is centered around a word, likely of imitative origin, which means \"a forceful blow or strike.\"","def":"To try.","answer":"TAKE A WHACK AT","tidbit":""},{"cat":"phrase","origin":"Military aircraft flying low to avoid detection by the enemy is the source of this phrase.","def":"To act stealthily or secretly; to go unnoticed.","answer":"UNDER THE RADAR","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"image destroyer,\" this term was the name for people in the Byzantine Empire in the 8th and 9th centuries who rejected and often destroyed religious symbols because, among other reasons, they supported the Old Testament prohibition against worshipping images. The word entered English in the late 16th century, and its broader meaning came about 250 years later.","def":"Someone who attacks cherished beliefs or institutions.","answer":"ICONOCLAST","tidbit":"The Greek word is eikonoklast\u0113s."},{"cat":"phrase","origin":"The core word in this phrase comes from a French word meaning \"to prick\" and originally meant \"to irritate,\" a definition still sometimes used. But curiously, today this word more frequently refers to being captivated by something.","def":"To be intrigued or captivated by something.","answer":"PIQUE MY INTEREST","tidbit":""},{"cat":"word","origin":"Likely a modification of a German word meaning \"scoundrel\" that kept the same definition before being used as the name for this large marine fish.","def":"1) A crafty person who takes advantage of others.\n2) A large, voracious fish.","answer":"SHARK","tidbit":"The German word is schurke."},{"cat":"phrase","origin":"From the name of the apostle who doubted Jesus' resurrection.","def":"A skeptical person.","answer":"DOUBTING THOMAS","tidbit":""},{"cat":"word","origin":"Flipping a coin has equal odds of landing on \"heads\" or \"tails.\"","def":"An even choice or chance.","answer":"TOSS-UP","tidbit":""},{"cat":"phrase","origin":"This phrase is first recorded in an anonymously authored poem from around 1540. It originally referred to a cat's ability to identify the scent of rodents.","def":"To be suspicious; to believe something is wrong or to suspect someone of betrayal.","answer":"TO SMELL A RAT","tidbit":""},{"cat":"phrase","origin":"This exact phrase was first recorded June 8, 1982, in an early internet discussion forum about Star Trek II: The Wrath of Khan. The movie had been released just four days earlier, so the author wanted to warn readers that his post discussed details about the movie.","def":"A warning that some of the plot is about to be revealed.","answer":"SPOILER ALERT","tidbit":""},{"cat":"word","origin":"This word may derive from Old French via an Old Provencal term meaning \"at an angle, crosswise.\" In the 16th century, the game of bowls adopted this word to refer to balls that were weighted on one side so that they curved when bowled. Its figurative meaning came thereafter and became the primary meaning of the word.","def":"An illogical, usually preconceived preference or prejudice.","answer":"BIAS","tidbit":""},{"cat":"word","origin":"From the Latin levis, meaning \"having little weight,\" this word's original literal sense has been replaced by its figurative one.","def":"To relieve to lessen; to lighten a burden or correct a problem.","answer":"ALLEVIATE","tidbit":""},{"cat":"word","origin":"From a Tagalog term meaning \"mountains,\" occupying American soldiers in 1898 started using this word and broadened its meaning following the Philippine Revolution.","def":"A rural, faraway, backward area.","answer":"BOONDOCKS","tidbit":""},{"cat":"phrase","origin":"As washing machines became more popular in the 19th century, people began taking their dirty clothes to commercial shops to have them washed. It was very important to keep careful track of the apparel being cleaned, so all the clothes would be properly washed and returned to their owners.","def":"A long inventory of items.","answer":"LAUNDRY LIST","tidbit":""},{"cat":"word","origin":"From music, this word refers to the points in compositions when a conductor's baton is in a raised position. Music writers in the 1940s incorporated the word into a slang phrase that meant \"getting better,\" and from there the word developed its current, nonmusical meaning.","def":"Cheerful or optimistic.","answer":"UPBEAT","tidbit":"The phrase was on the upbeat."},{"cat":"phrase","origin":"From the name of a 16th century dice game in which the loser had to perform a foolish task or drink alcohol.","def":"Lively or boisterous antics or pranks; horseplay.","answer":"HIGH JINKS","tidbit":""},{"cat":"phrase","origin":"Hunting a defenseless mallard inspired this 20th century phrase.","def":"An easy target.","answer":"SITTING DUCK","tidbit":""},{"cat":"word","origin":"This word, probably imitative, originally described eels and later worms, snakes and similar reptiles until developing its figurative meaning in the 18th century.","def":"To twist about or fidget.","answer":"SQUIRM","tidbit":""},{"cat":"word","origin":"Ultimately both this word and phrase come from a Latin word meaning \"shade,\" though in both cases, the original meaning is now obsolete. The word originally referred to an implement that existed in many ancient societies used to protect people from the sun. The phrase, from the 17th century, developed a figurative meaning of \"vague suggestion; hint,\" which evolved to \"being offended by what someone has said or done.\"","def":"","answer":"UMBRELLA & TAKE UMBRAGE","tidbit":""},{"cat":"phrase","origin":"This phrase, and the image of a black-robed skeletal figure carrying a scythe, unsurprisingly came out of the Black Death pandemic, a 14th century bubonic plague that caused victims to be covered in black boils that oozed blood and puss and turned their skin black and gangrenous.","def":"Death.","answer":"GRIM REAPER","tidbit":"Over five years, the Black Death killed more than 50 million people across Europe and Asia, including an estimated one-third of Europe's population of 60 million."},{"cat":"word","origin":"The first part of this 19th century hyphenated word originally meant \"to speak rapidly and incoherently,\" then referred to \"a pack of animals\" and then to an \"unruly crowd.\" The second part originally referenced how a \"hawk shakes its feathers\" before it became a noun meaning \"one who incites.\"","def":"","answer":"RABBLE-ROUSER","tidbit":""},{"cat":"phrase","origin":"This phrase, borrowed from French in the late 1700s, means \"long chair.\" However, the French word for \"long\" is similar to an English word meaning \"to rest easily,\" which led to a new spelling and pronunciation for this phrase that is now more popular.","def":"","answer":"CHAISE LOUNGE","tidbit":"Chaise longue is the original, and still common, spelling (and pronunciation)."},{"cat":"phrase","origin":"This 19th century phrase refers to a string of flowers children fastened together in a garland.","def":"An interlinked sequence of things, events, people, etc.","answer":"DAISY CHAIN","tidbit":"The verb daisy-chain, meaning to link things together in a series, first came into use in 1955."},{"cat":"phrase","origin":"The consequences of making a pact to sell your soul to Satan is behind this phrase.","def":"Serious trouble to be dealt with.","answer":"THE DEVIL TO PAY","tidbit":""},{"cat":"word","origin":"From Middle English meaning \"maggot,\" this 17th century word originally meant \"squeamish\" and then referred to a \"nauseating, often sickeningly sweet flavor.\" Both those meanings are now obsolete. Today it means \"sickly sentimentality; insipid.\"","def":"","answer":"MAWKISH","tidbit":"The Middle English word is mawke."},{"cat":"word","origin":"From Latin meaning \"against letter,\" this 16th century word originally meant \"to remove from memory\" and then referred to \"blotting out something written\" before developing its broader, figurative definition in the late 18th century.","def":"To destroy all traces of. Also, to remove from memory.","answer":"OBLITERATE","tidbit":""},{"cat":"phrase","origin":"From a famous Robert Frost poem first published in 1915 in The Atlantic Monthly and later published in 1916 as part of a collection he titled Mountain Interval.","def":"The less popular or common option.","answer":"THE ROAD LESS TRAVELED","tidbit":"The last stanza of the poem:\n\"I shall be telling this with a sigh\nSomewhere ages and ages hence:\nTwo roads diverged in a wood, and I-\nI took the one less traveled by,\nAnd that has made all the difference.\""},{"cat":"word","origin":"It would not be an overstatement to say that this word is a combination of Greek terms and literally means \"to throw beyond.\"","def":"Extreme exaggeration.","answer":"HYPERBOLE","tidbit":"Hyper means \"beyond,\" and bole, \"a throwing.\""},{"cat":"word","origin":"From a Greek adjective meaning, among other things, \"out of one's senses.\" Originally it referred to any intense emotion though now it is about pleasurable ones.","def":"Extremely happy or excited.","answer":"ECSTATIC","tidbit":""},{"cat":"phrase","origin":"The French word for \"stern,\" as in the stern deck of a ship, is behind this phrase.","def":"A short, high deck located in the aft (back) of a ship.","answer":"POOP DECK","tidbit":"The French word is la poupe.\nThe poop deck was used for steering, observation and navigation. On most modern ships these duties are performed on the bridge."},{"cat":"words","origin":"Both of these words derive from a Latin word meaning \"empty.\" The first, from the 16th century, referred to the emptiness of space before Hubert Cecil Booth likely coined its use in 1901 as a generic term for \"Puffing Billy,\" his horse-drawn-carriage-propelled combustion-engine cleaning machine. The second term figuratively invokes an empty mind and means \"lacking intelligence or substance.\"","def":"","answer":"VACUUM & VACUOUS","tidbit":"The Latin term vacuus means \"empty.\""},{"cat":"word","origin":"Around the 1570s, this word originally described a sheet of paper printed on one side. Shortly thereafter it referred to the side of a ship above water and then to the guns on that side. Its figurative meaning of a strong or abusive verbal or written attack followed.","def":"","answer":"BROADSIDE","tidbit":""},{"cat":"phrase","origin":"This phrase comes from track and field in the early 20th century, when false starts were rarely penalized and runners would try to gain an edge by beginning slightly before the starting pistol was fired.","def":"Start something too early.","answer":"JUMP THE GUN","tidbit":""},{"cat":"word","origin":"Failing to strike the ball cleanly in billiards or pool led to this word, which developed its figurative meaning in the late 19th century.","def":"A mistake.","answer":"MISCUE","tidbit":"Cue is a variant of queue, which comes from cauda, the Latin word for \"tail.\""},{"cat":"phrase","origin":"The definitive origin of this phrase is unknown, but it may come from horse racing. Another theory is that it is a corruption of the 16th century Latin phrase legem pone, which begins the fifth verse of Psalm 119, read on the 25th day of each month in the Church of England. In March, the 25th was a Quarter Day, the first payday of the year and the day debts were settled.","def":"To pay.","answer":"PONY UP","tidbit":""},{"cat":"word","origin":"James Thomas Brudenell supposedly wore this knitted sweater or jacket while leading the Charge of the Light Brigade at Balaclava on October 25, 1854, during the Crimean War. The charge so captured the imagination of the British public that they celebrated the major general and popularized his signature outer garment, which was named after him.","def":"","answer":"CARDIGAN","tidbit":"Brudenell was the 7th Earl of Cardigan."},{"cat":"word","origin":"This word derives from a Latin word meaning \"weight.\" Often, we weigh intangibles, like thoughts.","def":"To think about carefully.","answer":"PONDER","tidbit":"Pondus means \"weight.\""},{"cat":"words","origin":"Both these words derive from a Latin word for \"vaulted ceiling\" or \"roof\" that came to mean \"room.\" The first word was applied to people, especially soldiers, sharing the same space, such as a barracks. The second word was a shortened version of a phrase meaning \"dark chamber\" that initially described \"a small darkened room with light admitted through a single tiny hole\" used to safely view solar eclipses.","def":"1) An intimate friend or associate.\n2) A device that takes pictures or videos.","answer":"COMRADE & CAMERA","tidbit":"The Latin word is camera or camara and the phrase was camera obscura."},{"cat":"word","origin":"A pre-12th century noun describing a grouchy, scolding woman is behind this adjective that originally meant \"wicked\" but whose definition was tamed over the centuries until its meaning changed dramatically to mean \"cunning.\"","def":"","answer":"SHREWD","tidbit":"The \"ill-tempered\" sense of the word shrew may have developed independently or may come from the animal shrew, a small meat-eating mammal."},{"cat":"word","origin":"This spotted beetle, sporting around 5,000 varieties, is named for the Virgin Mary, likely because the first one named had seven spots, believed to symbolize the seven sorrows Mary suffered.","def":"","answer":"LADYBUG","tidbit":"Ladybug is primarily the American English name, and ladybird, dating back to the 17th century, is the British English name."},{"cat":"phrase","origin":"This phrase from horse racing was inspired by the name for the part of a racecourse between the last turn and the finish line.","def":"The final stage or part of a long activity.","answer":"THE HOME STRETCH","tidbit":""},{"cat":"phrase","origin":"Originally made from spider silk, these very fine perpendicular wires or lines are stretched across the focal plane of an optical device, such as a telescope or microscope, to define the line of sight. The term's usage in gunnery led to this phrase.","def":"To be targeted for criticism or attack.","answer":"IN THE CROSSHAIRS","tidbit":""},{"cat":"words","origin":"Both these words, originally meaning \"majestic or lordly,\" reflect different views on nobility. The first derives from sire and grew to mean \"arrogant\" before settling into its current definition. The second word comes from a Latin term meaning \"of the same family\" and meant \"having the character of noble rank,\" which developed a much kinder meaning.","def":"1) Rude and ill-tempered.\n2) Having a mild, kind, tender temperament.","answer":"SURLY & GENTLE","tidbit":"Literally, surly means \"like a sir,\" while gentle comes from the Latin gentilis."},{"cat":"word","origin":"From a Middle English phrase meaning \"in harmony,\" this word originally meant \"to reconcile.\" Today's meaning implies that reparation for doing something bad returns harmony to a situation.","def":"To make amends.","answer":"ATONE","tidbit":"Atone is a combination of \"at\" and \"one.\""},{"cat":"word","origin":"A German word meaning \"to play\" is behind this word that originally meant \"to play music\" and apparently also referred to circus music. Perhaps imagining grand musical productions led to today's meaning.","def":"A longer speech, story or sales pitch.","answer":"SPIEL","tidbit":"The musical roots of spiel are illustrated in glockenspiel, the name of a musical instrument like the xylophone.\nIn Scottish English, spiel is also a shortened form of bonspiel, which refers to a curling match."},{"cat":"word","origin":"From the last name of a Swiss businessman known for luxurious, opulent hotels. Earliest documented use: 1919.","def":"Stylish, glamorous, fancy.","answer":"RITZY","tidbit":"Cesar Ritz founded several hotels including the Hotel Ritz in Paris and the Carlton Hotels in London (the forerunners of the Ritz-Carlton Hotel Company)."},{"cat":"phrase","origin":"This phrase likely comes from these hard-to-navigate vessels colliding with other boats.","def":"To abruptly intrude on someone.","answer":"BARGE IN","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase once referred to a medicinal drink or potion before it became slang for an alcoholic beverage. This phrase itself meant \"to select among drinks\" before developing its figurative meaning.","def":"To choose between options which are equally undesirable.","answer":"PICK YOUR POISON","tidbit":""},{"cat":"word","origin":"The alternately smooth and puckered surfaces of the stripes in this fabric inspired its name that comes from an East Indian corruption of a Persian phrase meaning \"milk and sugar.\"","def":"A thin fabric of linen, cotton or rayon, usually striped and slightly puckered.","answer":"SEERSUCKER","tidbit":"The Persian phrase is shir o shakkar."},{"cat":"phrase","origin":"From the British naval practice of the 1800s of harmlessly firing a cannon ball across the end of an opposing ship to signal willingness to engage in a battle. Its figurative use is from the 1900s.","def":"A warning.","answer":"A SHOT ACROSS THE BOW","tidbit":""},{"cat":"word","origin":"Left-handed people might have once been seen as awkward or clumsy, which likely explains why this word derives from a French word meaning \"left.\"","def":"Lacking social grace, tactless.","answer":"GAUCHE","tidbit":""},{"cat":"word","origin":"This slender-billed bird of the sandpiper family was considered a challenging target for a hunter.","def":"A sharpshooter who shoots from a hidden spot.","answer":"SNIPER","tidbit":""},{"cat":"phrase","origin":"This technology-name phrase, consisting of an acronym followed by a word, was inspired by the black and white pieces in the board game Go. Its original purpose was to help the Japanese company Denso Wave keep track of automotive parts during manufacturing.","def":"","answer":"QR CODE","tidbit":"QR is an acronym for \"Quick Response.\" A QR code is a two-dimensional pattern of square black and white dots that contains up to 200 times more information than a standard barcode."},{"cat":"word","origin":"Flugzeugabwehrkanone, the German word for an anti-aircraft gun (flieger means \"flyer,\" abwehr means \"defense\" and kanone means \"cannon\") was condensed to create this word in the late 1930s. Its figurative sense is from the from the 1960s.","def":"Criticism.","answer":"FLAK","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to come to know,\" but in this case being unknown might be better.","def":"Infamous.","answer":"NOTORIOUS","tidbit":"The Latin word is noscere."},{"cat":"phrase","origin":"The origin of this phrase is unknown. One theory posits that it came from another phrase referring to an intoxicated person losing control and destroying things. Today this phrase has a positive meaning.","def":"To be on a winning streak.","answer":"ON A TEAR","tidbit":"The other phrase is drunken tear."},{"cat":"word","origin":"During Prohibition, if you knew of a secret saloon to drink alcohol in, you wouldn't want to talk loudly or recklessly about it and alert the authorities.","def":"A bar where alcohol is sold illegally. In modern times, sometimes a hidden or secret bar that requires reservations or approval to frequent.","answer":"SPEAKEASY","tidbit":""},{"cat":"phrase","origin":"Originally, in the 15th century, this phrase literally referred to \"something made or manufactured.\" In the mid-16th century, it referred to \"a difficult task\" and by the 19th century it referred to \"a fuss.\" But another sense of the phrase from the 18th century is the one that has survived. In this case, the phrase was modified by one or more negative adjectives to refer to a \"a person unpleasant and difficult to deal with.\" Eventually the negative adjectives were dropped but the definition remained the same.","def":"","answer":"A PIECE OF WORK","tidbit":"Shakespeare's use of the phrase in a famous Hamlet speech may have popularized the phrase:\nHamlet. What a piece of work is a man, how noble in reason, how infinite in faculties, in form and moving how express and admirable, in action how like an angel, in apprehension how like a god!"},{"cat":"phrase","origin":"Roman writer Phaedrus, who lived around 15 BC to AD 50, is generally credited with penning this phrase in his Latin translation of the Aesop fable The bald man and the fly. In the story, a bald man, bitten on the head by a fly, slaps the spot, misses and bonks himself painfully on the head. The fly laughs and says, \"You wanted to avenge the prick of a tiny insect with death. What will you do to yourself, who have [this phrase, past tense]?\"","def":"To make a bad situation worse.","answer":"ADD INSULT TO INJURY","tidbit":""},{"cat":"word","origin":"In a 1950 speech, Winston Churchill called for opening a dialogue with the Soviet Union. He said it was time for \"another talk with the Soviet Union at the highest level,\" commenting, \"it is not easy to see how matters could be worsened by a parley at the [this word].\" Churchill used this term for \"the highest peak or point\" to mean \"conference of leaders\" again in 1953 and eventually the new meaning caught on.","def":"","answer":"SUMMIT","tidbit":""},{"cat":"phrase","origin":"The most likely, but by no means definitive, origin of this phrase argues that a child looking just like a parent metaphorically could have been projected out of the parent's mouth.","def":"Someone who looks like someone else.","answer":"SPITTING IMAGE","tidbit":"Spitten is believed to be a corruption of the words \"spit and.\" Spitten image became spitting image in the 19th century."},{"cat":"word","origin":"From Latin meaning \"to drive both ways.\" Cattle driven in multiple directions would be confused.","def":"Uncertain, also capable of being interpreted multiple ways.","answer":"AMBIGUOUS","tidbit":""},{"cat":"phrase","origin":"The earliest documented utterance of this phrase is by Faye Dunaway playing Joan Crawford in the 1981 film, Mommie Dearest. In the scene, Dunaway is passionately responding to the other Pepsi board members attempting to vote to remove her. A decade later, country music artist Vern Gosdin wrote a song with the same phrase as its name, having heard the idiom from a local carpenter.","def":"I'm prepared; I am not a novice (often said sarcastically).","answer":"THIS AIN'T MY FIRST RODEO","tidbit":""},{"cat":"phrase","origin":"Invented in the late 1800s, this paper was made with dried ink on its bottom side and wax on its top. It was used to create duplicate documents as they were being written or typed.","def":"An exact duplicate.","answer":"CARBON COPY","tidbit":"The email abbreviation cc stands for \"carbon copy.\""},{"cat":"word","origin":"The Latin roots of this word mean to \"flatten out.\" It is easier to understand something smooth and uncomplicated.","def":"To make known or understandable.","answer":"EXPLAIN","tidbit":""},{"cat":"phrase","origin":"The core word in this late 19th century U.S. phrase is a contraction of \"would rather.\"","def":"My preference.","answer":"IF I HAD MY DRUTHERS","tidbit":""},{"cat":"word","origin":"Named after a physician and member of France's National Assembly who, for humanitarian reasons, lobbied for executions to be done with this machine instead of an axe. He saw the machine as an interim step toward completely banning the death penalty.","def":"","answer":"GUILLOTINE","tidbit":"The French physician was Joseph-Ignace Guillotin."},{"cat":"phrase","origin":"Every horse in a race must carry an assigned number of pounds or kilos. To help ensure compliance, jockeys began submitting to this procedure in the latter third of the 19th century. The figurative meaning of this phrase is from the early 20th century.","def":"To offer an opinion.","answer":"WEIGH IN","tidbit":""},{"cat":"word","origin":"In the 15th century this word referred to sharply pointed barriers placed across roads to prevent sudden attacks by men on horseback. About two centuries later, British toll roads used barriers modeled after these predecessors and adopted the same name.","def":"A highway, especially one maintained by tolls.","answer":"TURNPIKE","tidbit":""},{"cat":"phrase","origin":"Perhaps from a bird-hunting tactic where a rock dove was used as a decoy and tied to a moving chair or tree stump to make the bird flutter and attract other birds.","def":"An informer.","answer":"STOOL PIGEON","tidbit":""},{"cat":"word","origin":"An Italian word meaning \"belief, credit,\" this word once referred to a servant tasting the food and drink of a noble person to ensure it was not poisoned. The tasting was done at a dining room side table that adopted the same name.","def":"A buffet table or closed cabinet often in an office or study.","answer":"CREDENZA","tidbit":""},{"cat":"phrase","origin":"Though this phrase can be found in Jane Austen's 1814 novel Mansfield Park, its current usage comes from the 1980s Black and Latino gay communities as shown in the 1990 documentary Paris is Burning about the New York drag scene. It was popularized in 2010 because of an episode of the American reality television series RuPaul's Drag Race.","def":"To subtly insult or disrespect someone.","answer":"THROW SHADE","tidbit":""},{"cat":"word","origin":"From a Middle French word meaning \"snout,\" (of an animal) that came to mean \"to gape\" or \"to stare,\" perhaps because of the face of a dog or other animal when it has lost the scent it is tracking. That same animal face may have led to this word's current meaning, because it was associated with the face a person makes when thinking deeply or when lost in thought.","def":"To ponder.","answer":"MUSE","tidbit":"The origin of muse is not related to the mythological Muses, but is related to muzzle."},{"cat":"phrase","origin":"The name of the realm from a play called The Birds by the Greek dramatist Aristophanes (c. 448-385 BC). In the play, the birds decide to build a utopian city in the sky to separate the gods from mankind.","def":"A fantasy realm.","answer":"CLOUD CUCKOO LAND","tidbit":""},{"cat":"word","origin":"The origin of this word is also the origin of the words \"fragrant\" and \"fragrance.\" Not surprisingly, in the 14th century it meant \"odor.\" This meaning became obsolete, but in the 1920s a new meaning developed, perhaps because of a hound's ability to track scent.","def":"A natural talent or intuitiveness. Also, stylish.","answer":"FLAIR","tidbit":""},{"cat":"phrase","origin":"From the mid-19th century, this phrase comes from the name of hypothetical cases and debates argued by students in law schools. Of course, nothing comes out of these exercises.","def":"An irrelevant argument.","answer":"MOOT POINT","tidbit":"In medieval England, moots, or meets, were assemblies where policy and governance was debated."},{"cat":"word","origin":"Ultimately from the Greek enkaustos meaning \"to burn in,\" this word was once the name for a purple-red liquid, the sacrum encaustum, created by grinding and heating the remains of certain shellfish and used by Roman emperors to sign documents.","def":"A liquid material for writing and printing.","answer":"INK","tidbit":""},{"cat":"phrase","origin":"This phrase was first used in the mid-19th century at the trial of William Thompson, documented in a June 8 edition of the New York Hearld. Thompson would walk up to strangers and ask them if they had the confidence to lend him their watch. When they did, he would leave with the watch and never return.","def":"Swindler.","answer":"CON MAN","tidbit":"Con man is short for confidence man."},{"cat":"phrase","origin":"The catchphrase from a 1937 ad campaign for the Gem Micromatic Razor and Blades.","def":"A man's beard growth which becomes visible in the late afternoon following a morning shave.","answer":"FIVE O'CLOCK SHADOW","tidbit":""},{"cat":"word","origin":"From Old Germanic broda meaning \"warmth, fostering heat.\" Think of incubation or birds warming their eggs to help them hatch.","def":"To produce young.","answer":"BREED","tidbit":""},{"cat":"word","origin":"The name of this metallic element comes from a German word meaning \"goblin.\" Miners felt goblins stole the silver within the ore, making the metal worthless. In addition, miners believed goblins were making them ill, a sickness that was actually caused by the arsenic and sulfur that was combined with the ore.","def":"A magnetic metallic element that is used in alloys, in batteries and as a pigment in paint and glass.","answer":"COBALT","tidbit":""},{"cat":"word","origin":"From an Old English term meaning \"mass of rock, hill,\" this word developed a new meaning starting around the 13th century because these formations, though appearing fluffy, resembled rock masses.","def":"A visible mass of particles of condensed vapor suspended in the atmosphere of a planet.","answer":"CLOUD","tidbit":""},{"cat":"word","origin":"In 8 BC, the Roman senate changed the name of the month Sextilis to honor the first Roman emperor Caesar.","def":"","answer":"AUGUST","tidbit":"In the the old Roman calendar Sextilis was the sixth month."},{"cat":"phrase","origin":"Likely from stories about players being addicted to and continuing to play card games they knew were crooked because such games were the only ones available to play in their locale. One such game, called Faro, very popular in Europe and North America in the 1800s, was particularly corrupt.","def":"The only option.","answer":"THE ONLY GAME IN TOWN","tidbit":""},{"cat":"word","origin":"Literally this word means \"like a donkey.\" Its figurative meaning is from the 1600s. Donkeys get no respect.","def":"Obstinate, stupid.","answer":"ASININE","tidbit":"Ass is another name for donkey."},{"cat":"phrase","origin":"In the 17th century sailors placed barriers with loopholes across a ship's deck to provide protected space to fight an enemy in case the ship was boarded.","def":"A crowded, cramped place.","answer":"CLOSE QUARTERS","tidbit":"The phrase was originally close-fights. Close in this case meant \"closed,\" though it now refers to proximity."},{"cat":"phrase","origin":"The noun in this two-word phrase meant \"young fish\" starting in the 16th century. It may have come from the Old Norse word meaning \"seed or offspring.\" Alternatively, it may come from a Middle English word meaning \"to spawn.\"","def":"1) A child.\n2) An unimportant person or object.","answer":"SMALL FRY","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"flock,\" in the 17th century this word described animals. Its figurative meaning is from the 18th century.","def":"Sociable.","answer":"GREGARIOUS","tidbit":""},{"cat":"word","origin":"A Greek word meaning \"mosquito, gnat\" was extended to refer to an \"Egyptian couch with mosquito curtains\" before developing a broader definition.","def":"A suspended covering serving as protection or shelter.","answer":"CANOPY","tidbit":"Canape in French, Spanish and Portuguese took the other part the Greek sense and means \"sofa, couch.\""},{"cat":"word","origin":"In Latin, this word means \"to overflow in waves.\"","def":"1) To enclose on all sides.\n2) To extend around.","answer":"SURROUND","tidbit":""},{"cat":"phrase","origin":"Magician Johann Georg Schr\u00f6pfer coined this phrase in the 18th century, but it was popularized as an idiom by journalist Jimmy Breslin in 1975 in describing the illusion of political power in the book How the Good Guys Finally Won: Notes from an Impeachment Summer.","def":"Trickery or deception.","answer":"SMOKE AND MIRRORS","tidbit":""},{"cat":"word","origin":"The name of this organ that secretes digestive enzymes and the hormones insulin and glucagon comes from Greek words meaning \"all flesh.\"","def":"A gland of the abdomen.","answer":"PANCREAS","tidbit":"In Greek, pan means \"all\" and kreas means \"flesh.\""},{"cat":"word","origin":"The official uniform of the local rowing crew was named after this town on the Thames River that, since 1839, has been the site of the annual Royal Regatta.","def":"","answer":"HENLEY","tidbit":""},{"cat":"phrase","origin":"The American cartoonist who often depicted devices performing simple tasks in outlandishly impractical and convoluted ways is the namesake of this type of object.","def":"Extraordinarily or deviously complex and impractical.","answer":"RUBE GOLDBERG MACHINE","tidbit":""},{"cat":"phrase","origin":"First coined in the 1950s, this phrase gained popularity among African American newspapers like The Philadelphia Tribune, Pittsburgh Courier and Chicago Defender. Its usage broadened during the 21st century because of its relevance during recessions and the growth in freelancing and work-from-home opportunities created by the internet.","def":"A secondary job to earn extra money.","answer":"SIDE HUSTLE","tidbit":""},{"cat":"word","origin":"A borrowing from Japanese that means \"to leave a decision to someone else.\"","def":"When the chef at a Japanese restaurant decides what food the customer receives.","answer":"OMAKASE","tidbit":"The \"o\" is honorific. Makase means \"leaving (something) to another.\""},{"cat":"phrase","origin":"Two 17th century fairy tales inspired this term popularized, though not necessarily used as this exact phrase, in stories like Snow White, Sleeping Beauty and Cinderella.","def":"An idealized suitor.","answer":"PRINCE CHARMING","tidbit":""},{"cat":"word","origin":"From Latin words meaning \"to look through.\"","def":"1) A point of view or way of regarding something.\n2) Representing on a flat or curved surface the spatial relation of objects as they appear to the eye.","answer":"PERSPECTIVE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"price.\"","def":"Highly valued or cherished.","answer":"PRECIOUS","tidbit":""},{"cat":"phrase","origin":"This phrase first used in the 14th century meant the legal requirements had been clearly satisfied to prove criminal guilt. The first word of the phrase, meaning \"certain,\" is a slang definition of a common word, and the two-word prepositional phrase means \"in a proper manner or condition.\"","def":"Caught in the act. Also completely certain, without a doubt.","answer":"DEAD TO RIGHTS","tidbit":"The slang meaning of dead in this phrase is used in other phrases as well, such as dead ringer, dead asleep and dead broke."},{"cat":"word","origin":"This teardrop-shaped pattern with Persian and Indian roots is named for the Scottish town where shawls with this design were made.","def":"","answer":"PAISLEY","tidbit":""},{"cat":"word","origin":"The first syllable of this word meant \"course\" and, when combined with the second syllable, once referred to the North Star, a key point of reference for navigation. Today only the figurative meaning of this word remains.","def":"Someone or something that serves as an inspiration, model or guide.","answer":"LODESTAR","tidbit":""},{"cat":"phrase","origin":"This gruesome punishment for treason was established in 1283 and involved a prisoner being tied to a horse, dragged to the gallows on a type of sledge, then hanged and disemboweled.","def":"Severely punished or admonished.","answer":"DRAWN AND QUARTERED","tidbit":"The prisoner was drawn to the gallows on the sledge and then beheaded and cut into quarters."},{"cat":"phrase","origin":"The phrase literally refers to \"an uninterrupted practice of a play where actors wear their full costumes.\" Its figurative meaning is a \"practice exercise.\"","def":"","answer":"DRESS REHEARSAL","tidbit":""},{"cat":"word","origin":"Originally this word, the plural of a Latin word for ores used in minting, such as brass and copper, meant \"counters used for calculation.\" The chronological meaning of the word may have originated around 38 BC when Augustus first ordered the taxation of Spain's citizens.","def":"A period of time marked by distinctive characteristics or events.","answer":"ERA","tidbit":""},{"cat":"word","origin":"The name given to a group of Hindu merchants and traders in the 1500s was also given to these wide branched fig trees that provided shade for their markets and pagodas.","def":"","answer":"BANYAN","tidbit":"Banyan is from the Gujarati vaniyo meaning \"a man of the trading caste.\" Gujarati evolved from Sanskrit, and vanija in Sanskrit means \"merchant.\""},{"cat":"phrase","origin":"The second word of this two-word derogatory phrase originated in the 16th century, likely from a Dutch word meaning \"little barrel,\" and was used by the English to describe the Dutch, whom they inappropriately viewed as short and chubby.","def":"A person with no culture or sophistication.","answer":"COUNTRY BUMPKIN","tidbit":"The Dutch word bommekijn means \"little barrel.\""},{"cat":"phrase","origin":"In Greek mythology, the first king of Phrygia, father of Midas, dedicated his wagon to Jupiter and used a rope to secure it to a beam so tightly that it could not be untied. The king declared that the person to loosen the rope would rule all of Asia. Centuries later, around 333 BC, Alexander the Great quickly handled the dilemma by slicing the rope in half with his sword.","def":"To easily or creatively overcome a seemingly insurmountable problem.","answer":"CUT THE GORDIAN KNOT","tidbit":"The peasant Gordius was the first king of Gordium in Phrygia."},{"cat":"phrase","origin":"The English literary critic Thomas Rymer coined this phrase in his 1678 essay The Tragedies of the Last Age Consider'd .... Rymer argued that drama should reward virtue and good character and punish evil.","def":"An outcome in which vice is punished and virtue rewarded, often in an especially appropriate or ironic manner.","answer":"POETIC JUSTICE","tidbit":""},{"cat":"word","origin":"Originally intended to be a substitute for rubber to further the war effort in World War II, the name for this material is an anagram of the word \"expands.\"","def":"A synthetic fiber.","answer":"SPANDEX","tidbit":""},{"cat":"phrase","origin":"In the mid-20th century, laundry was cleaned in a basin with soap and water, then pressed through a pair of rollers operated by turning a handle.","def":"Subjected to a difficult ordeal or hardship.","answer":"PUT THROUGH THE WRINGER","tidbit":""},{"cat":"phrase","origin":"This phrase is named after an Italian racketeer who, in 1919, offered investors a 50% return in 45 days by selling international reply coupons, which supposedly could be used to buy postage stamps in different countries to be redeemed in America for a profit. When the plan didn't work, he began paying earlier investors with funds from later investors.","def":"An investment swindle in which early investors are paid from funds of later investors.","answer":"PONZI SCHEME","tidbit":""},{"cat":"word","origin":"This soft woven fabric with a fuzzy pile comes from a French word meaning \"caterpillar.\"","def":"","answer":"CHENILLE","tidbit":""},{"cat":"phrase","origin":"Think about the evil Emperor and/or Darth Vader, and you come up with this phrase from the 1977 film Star Wars Episode IV: A New Hope.","def":"The negative, troubled or antagonistic part of someone or something.","answer":"THE DARK SIDE","tidbit":""},{"cat":"word","origin":"This nutty word is Greek, from words meaning \"shadow tailed.\"","def":"A rodent.","answer":"SQUIRREL","tidbit":""},{"cat":"phrase","origin":"In the book of Matthew, Pontius Pilate condemns Jesus to death, but absolves himself of all responsibility. While rinsing his hands with water in front of the crowd, Pilate exclaims: \"I am innocent of the blood of this just person. It is your responsibility.\"","def":"To refuse to take responsibility or blame for something.","answer":"WASH ONE'S HANDS OF","tidbit":""},{"cat":"phrase","origin":"From the name of the principal character at a very popular 18th century comedic puppet show common at summer fairs in and around London. The main character was a hunchbacked, hook-nosed, violent, wife-beating serial killer who was thrilled with his evil deeds, yelling \"That's the way to do it!\" whenever he killed another victim.","def":"Very happy.","answer":"PLEASED AS PUNCH","tidbit":""},{"cat":"word","origin":"Though today the second syllable of this word means \"to momentarily close one's eye,\" in the 16th century, it meant \"to close one's eyes,\" and this word itself meant \"to blindfold by covering the eyes.\" The figurative meaning, the only definition in use today, is not surprising, since all sorts of trickery is possible if one is blindfolded.","def":"To dupe.","answer":"HOODWINK","tidbit":""},{"cat":"phrase","origin":"In cooking, often the rear burners are used for simmering and the front burners are used for dishes needing more handling or attention.","def":"A low priority that can be handled later.","answer":"ON THE BACK BURNER","tidbit":""},{"cat":"word","origin":"For hundreds of years this word referred to something \"twisted and rough, especially with age.\" In the 1970s it became surfer slang to describe a treacherous wave and, in the 1980s, the slang broadened to sometimes mean \"excellent\" but other times mean \"disgusting.\"","def":"","answer":"GNARLY","tidbit":"Gnarly comes from gnarled which comes from knarled, which derives from knar meaning \"a knot or protuberance on a root or tree trunk.\""},{"cat":"phrase","origin":"Despite reinforcing sex- and age-based stereotypes, this 14th century disparaging cliche can be found frequently in literature, including in the writings of Plato, Erasmus, Christopher Marlowe and in the New Testament.","def":"A superstition or traditional belief that is apocryphal.","answer":"OLD WIVES' TALE","tidbit":""},{"cat":"phrase","origin":"Though not definitive, the core word in this phrase is likely a play on a Scandinavian word meaning \"mockery.\"","def":"A con man.","answer":"FLIMFLAM ARTIST","tidbit":"The Old Norse word flim, means \"mockery.\""},{"cat":"word","origin":"Appropriately, the name of this part of the eye comes from a Greek word for \"rainbow.\"","def":"The circular, colored portion of the eye containing the pupil in its center.","answer":"IRIS","tidbit":""},{"cat":"word","origin":"In the 17th century, this word referred to \"textiles or fabric with a rough surface.\" One theory, likely an urban legend, is that the name came from Silesia, a place in central Europe that gave its name to cotton fabric. A few centuries later the current definition developed.","def":"Disreputable, sordid, flimsy.","answer":"SLEAZY","tidbit":""},{"cat":"phrase","origin":"This 1980s phrase may have derived from a much older kids' game, a variant of hide-and-seek in which a container is placed on the street and the seeker tries to tag all the hiders before they can be freed by nontagged hiders touching or booting the container.","def":"To delay dealing with a situation until some unspecified future time.","answer":"KICK THE CAN DOWN THE ROAD","tidbit":"The phrase may simply come from the image of a kid aimlessly kicking a can down the road."},{"cat":"phrase","origin":"From a saying in John Heywood's 1546 proverb collection and popularized by William Shakespeare in his play Henry VI, Part 3. This idiom means that even the humblest creature or person eventually will turn to fight an oppressor. It also can refer to a situation that changes quickly, such as a weak person becoming strong or an unlucky person becoming lucky.","def":"","answer":"THE WORM HAS TURNED","tidbit":"Quoting John Heywood: \"Treade a worme on the tayle, and it must turne agayne.\"\nFrom Henry VI, Part 3:\nClifford. Who scapes the lurking serpent's mortal sting? Not he who sets foot upon her back. The smallest worm will turn, being trodden on, and doves will peck in safeguard of their brood."},{"cat":"word","origin":"This 16th century culinary word for the edible pancreas or thymus gland of an animal, usually a calf or lamb, may be related to an Old English term for animal flesh. Though not sugary, this gland may be considered tastier than muscles, like shoulders and loin.","def":"","answer":"SWEETBREADS","tidbit":"Bread in sweetbreads may be a modernization of the Old English br\u00e6d, meaning \"animal flesh.\""},{"cat":"phrase","origin":"The origin of this phrase is unclear: It could simply be poking fun at the ridiculousness of fables with talking animals and may also have been a variant of the 17th century French term sauter du coq-a-l'ane, meaning \"to jump from rooster to jackass.\"","def":"An improbable story used as an explanation or excuse.","answer":"COCK AND BULL STORY","tidbit":""},{"cat":"word","origin":"This curved area in the brain is named for a sea monster ridden by sea-gods rode that had the body of a horse and the tail of a dolphin or fish.","def":"A curved area in the brain's temporal lobe involved with forming, storing and processing memories.","answer":"HIPPOCAMPUS","tidbit":"In Greek hippos means \"horse\" and kampos means \"a sea monster.\""},{"cat":"phrase","origin":"A shortening of an old proverb about the negative consequences of putting too heavy a load on a camel or a horse.","def":"Something trivial that, when added to accumulating difficulties causes an extreme reaction.","answer":"THE LAST STRAW","tidbit":"The longer phrase is the straw that broke the camel's back, which was preceded by the feather that broke the horse's back."},{"cat":"word","origin":"This weapon name is an acronym based on the title of the 1911 science fiction novel Tom Swift and His Electric Rifle.","def":"An electroshock weapon used to incapacitate people.","answer":"TASER","tidbit":""},{"cat":"phrase","origin":"This nautical expression reflects all the details seamen must understand to successfully operate sail boats.","def":"To discover the basic details of how to do a job, task or activity.","answer":"LEARN THE ROPES","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"the writing of books.\"","def":"A list of sources used or referred to in a text.","answer":"BIBLIOGRAPHY","tidbit":""},{"cat":"word","origin":"From an Old French term meaning \"to choose.\"","def":"The best of a group or collection. Also, people from a privileged or high-status group.","answer":"ELITE","tidbit":""},{"cat":"word","origin":"The name for an iron hook used for catching large fish may be the origin of this word, though the reason why is unclear. Perhaps bombing Vaudeville actors yanked away by a giant hook or cane, and how this practice became a staple comedy gag, helped increase the popularity of this word's current definition.","def":"A blunder or faux pas, especially one made by a politician.","answer":"GAFFE","tidbit":""},{"cat":"phrase","origin":"At the end of World War II, the Cooperative for American Remittances to Europe was formed to send food and later carpentry tools, blankets, clothes, books, school supplies and medicines to struggling communities in Europe. The organization eventually changed its name to Cooperative for Assistance and Relief Everywhere, and began focusing on broader development efforts rather than individual aid boxes.","def":"A parcel of food or other items sent to a distant loved one.","answer":"CARE PACKAGE","tidbit":"Care is an acronym for Cooperative for American Remittances to Europe."},{"cat":"word","origin":"Think of a strutting rooster and you get the origin of this word that originally meant \"lecherous\" or \"lustful.\"","def":"Conceited, arrogant, overconfident.","answer":"COCKY","tidbit":"The word cock was likely created to imitate the rooster's call."},{"cat":"word","origin":"From the name of the main character and hero of Miguel de Cervantes' most well-known novel.","def":"Extravagantly chivalrous or naively idealistic.","answer":"QUIXOTIC","tidbit":"The novel is Don Quixote."},{"cat":"phrase","origin":"First seen on Twitter in 2009, this phrase went viral on social media in February 2022 after being tweeted in a mocked-up headline. Influenced by the pandemic, it captured the prevailing mood of those who rejected the curated lifestyles exhibited on social media.","def":"Behavior which shows little concern for one's self-image or social norms and is unapologetically self-indulgent, typically in a way that rejects social norms or expectations.","answer":"GOBLIN MODE","tidbit":"The Oxford English Dictionary, based on the voting of more than 300,000 people, named goblin mode its 2022 word of the year."},{"cat":"word","origin":"A militant 1st century Jewish sect opposed to paganism, polytheism and Rome's domination of Palestine fought its most famous battle at Masada, where 1,000 fighters took their own lives just as the Romans were about to storm the fort. The sect's name later took on a broader meaning.","def":"A fanatic.","answer":"ZEALOT","tidbit":""},{"cat":"word","origin":"In ancient Rome, voting in legal assemblies was done by group, with the majority in a group determining its vote. This word, from Latin meaning \"to ask before,\" descends from the name for the first group to vote.","def":"An exclusive or special right, power or privilege.","answer":"PREROGATIVE","tidbit":"The group chosen to vote first on an issue was called the prerogativa."},{"cat":"word","origin":"Originally an Arabic word meaning \"house of manufacture,\" this word was slightly altered and used by the Venetians as the name for the naval dockyard or wharf of Venice. This sense was borrowed into English, though its meaning changed in the 1500s to refer to the storage of weapons.","def":"A collection of weapons or a location where they are manufactured or stored.","answer":"ARSENAL","tidbit":""},{"cat":"word","origin":"From a Nahuatl (Aztec) word believed to mean \"the swelling fruit.\"","def":"A large, rounded, edible, pulpy berry of the nightshade family.","answer":"TOMATO","tidbit":"The Nahuatl word is tomatl."},{"cat":"phrase","origin":"Radio broadcasts of boxing matches describing boxers' punches and maneuvers led to this idiom.","def":"To explain in detail.","answer":"BLOW-BY-BLOW ACCOUNT","tidbit":""},{"cat":"phrase","origin":"In 1920, when actor George Arliss was staying at San Francisco's Palace Hotel, head chef Phillip Roemer created this special dressing inspired by and named for the play Arliss was performing in.","def":"","answer":"GREEN GODDESS","tidbit":""},{"cat":"phrase","origin"
