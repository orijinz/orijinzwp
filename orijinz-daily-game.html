naments. It also referred to the jousting course itself. Over time the definition evolved from a racecourse to the course of one's life and work.","def":"A profession, often requiring special training, that someone does for a long time.","answer":"CAREER","tidbit":""},{"cat":"phrase","origin":"From the name for an ethics thought experiment in which someone has the choice of saving five people in danger of being hit by a train or diverting the train and killing one person.","def":"A difficult ethical or moral decision about what is an acceptable sacrifice for the greater good, especially an action that would harm one person to prevent harming multiple people.","answer":"THE TROLLEY PROBLEM","tidbit":""},{"cat":"word","origin":"A British author and journalist coined this term in 2004 by combining the name of a personal media device with a word referring to the transmission of a radio or television program.","def":"An episodic series of digital audio programs that are downloaded or streamed over the internet.","answer":"PODCAST","tidbit":"Podcast is a portmanteau of \"iPod\" and \"broadcast.\""},{"cat":"word","origin":"This homonym's noun origin is different from its verb origin. The former comes from Dutch and before that Old High German and Old English words meaning \"honeycomb\" and \"to weave,\" respectively. The verb comes from an obsolete imitative English word meaning \"to yelp\" or \"bark like a puppy.\"","def":"1) A crispy breakfast cake.\n2) Equivocate, vacillate.","answer":"WAFFLE","tidbit":"The Dutch word is wafel."},{"cat":"phrase","origin":"The core word in this phrase comes from a mid-to-late 19th century minstrel song and might relate to the poor quality of acting those shows employed. Another theory is that the phrase is taken from a song title and refers to amateur or low-income actors, like those in minstrel shows, using cheap substances like meat fat to apply or remove their makeup.","def":"Overacting.","answer":"HAMMING IT UP","tidbit":"The song is called The Ham-Fat Man."},{"cat":"word","origin":"In season 6 of the television show Seinfeld, Jerry Seinfeld gives his Super Bowl tickets to Tim Whatley (Bryan Cranston), who thanks Jerry by giving him a label maker. It turns out that Whatley originally got the label maker from Elaine Benes (Julia Louis-Dreyfus) as a Christmas present, and both Jerry and Elaine, unhappy with Whatley, use this term to describe his shenanigans.","def":"To give a present you received to someone else.","answer":"REGIFTING","tidbit":"When Elaine realizes Jerry's present from Whatley came from her, she passionately exclaims to Jerry, \"He's a regifter!\""},{"cat":"word","origin":"Not surprisingly, this word originally meant \"to remove a person from office or a position of authority.\" It also meant \"missing a meeting,\" which might have led to its current meaning.","def":"To let down.","answer":"DISAPPOINT","tidbit":""},{"cat":"phrase","origin":"U.S. President Dwight Eisenhower articulated what became this Cold War phrase in 1954 when he argued that if Vietnam fell to communism, all of southwest Asia would as well.","def":"If one act or event is allowed to take place, a series of similar acts or events will follow.","answer":"DOMINO THEORY","tidbit":"Quoting Eisenhower: \"Finally, you have broader considerations that might follow what you would call the 'falling domino' principle. You have a row of dominoes set up, you knock over the first one, and what will happen to the last one is the certainty that it will go over very quickly. So, you could have a beginning of a disintegration that would have the most profound influences.\""},{"cat":"word","origin":"This word combines two early Afrikaans words for \"earth\" and \"hog.\"","def":"A medium-sized nocturnal African mammal.","answer":"AARDVARK","tidbit":"In early Afrikaans aardvarken is from aarde, meaning \"earth\" and vark, meaning \"hog.\"\nAfrikaans, a language that has changed over the centuries, developed from 17th century Dutch. Erdvark is the modern Afrikaans word for aardvark."},{"cat":"phrase","origin":"The Bible phrase, that initially described the deaths of martyrs at the stake, was used in France in the mid-19th century to describe a soldier's initial experience in battle before its meaning broadened to any tough initiation.","def":"A difficult, painful or challenging new undertaking or experience.","answer":"BAPTISM BY FIRE","tidbit":"The verse, from Matthew 3:11, describes John the Baptist speaking to a large crowd near a river: \"I indeed baptize you with water unto repentance, but He who is coming after me is mightier than I, whose sandals I am not worthy to carry. He will baptize you with the Holy Spirit and fire.\""},{"cat":"phrase","origin":"The core word in this phrase from the beginning of the 20th century is probably an alteration of the word daisy, which once meant \"a first-rate person or thing.\"","def":"One of a kind, excellent.","answer":"A REAL DOOZY","tidbit":"It is an urban legend that the phrase comes from the luxurious Duesenberg automobile, which was actually introduced after the phrase was in use."},{"cat":"phrase","origin":"Though its origin is not clear, it may relate to the sourness of the fruit in the phrase being associated with disappointment or something that is worthless.","def":"A law requiring car buyers get relief for defects detected during a specified period after purchase.","answer":"LEMON LAW","tidbit":"Lemons have had a negative association in some uses since the early 20th century. In addition to being synonymous with a defective car, lemon was criminal slang for a loser; a pool hall hustle was called a lemon game and the lemon symbol on a slot machine usually offers the smallest payout (or no payout at all). And don't forget the adage \"When life gives you lemons, make lemonade.\""},{"cat":"word","origin":"From Old French and Latin words meaning \"butterfly,\" because the wings of this tent resemble a butterfly.","def":"1) A large, stately tent.\n2) A large structure in a park or place of recreation used for entertainment or shelter.\n3) An isolated building connected to a larger one.","answer":"PAVILION","tidbit":""},{"cat":"word","origin":"Author Theodore Geisel, better known as Dr. Seuss, invented this name that first appeared in his 1953 book Scrambled Eggs Super! and again in a second book a couple of years later. But the word's popularity stems from the title character of a 1957 Seuss book who tries to stop Christmas by stealing the decorations and presents of the villagers of Whoville.","def":"A spoilsport.","answer":"GRINCH","tidbit":"After the Whos sing a Christmas song, despite having their presents stolen, the Grinch has a change of heart:\n\"\u201bMaybe Christmas,' he thought, 'doesn't come from a store.\nMaybe Christmas ... perhaps ... means a little bit more!'\nAnd what happened then? Well ... in Whoville they say,\nThat the Grinch's small heart grew three sizes that day!\nAnd the minute his heart didn't feel quite so tight,\nHe whizzed with his load through the bright morning light,\nAnd he brought back the toys! And the food for the feast!\nAnd he, HE HIMSELF! The Grinch carved the roast beast!\""},{"cat":"word","origin":"From German meaning \"lightning,\" this word is a shortening of a longer German noun that means \"lightning war,\" that came into use during World War II. It described the German military strategy in Europe of using rapid, violent, overwhelming force by combining tanks, artillery and motorized infantry with air support. Over time, the word has been used in a much broader context, including in American football, chess and fishing.","def":"1) An intensive aerial military campaign\n2) A fast intensive nonmilitary campaign or attack.","answer":"BLITZ","tidbit":""},{"cat":"phrase","origin":"A cliched ending of cowboy movies starting in the 1920s where the hero hops on his horse and gallops away, heading west toward the horizon, is the source of this phrase.","def":"To begin a new life at the end of a story or endeavor.","answer":"RIDE OFF INTO THE SUNSET","tidbit":""},{"cat":"word","origin":"Popularized after 1811's Battle of Albuera during the Napoleonic Wars. A wounded British officer named William Inglis supposedly used this word as part of a speech to encourage his unit forward despite significant casualties.","def":"A person who vigorously maintains or defends a seemingly hopeless situation.","answer":"DIE-HARD","tidbit":"\"Stand your ground and die hard ... make the enemy pay dear for each of us!\" and \"Die hard 57th, die hard!\" are both cited as Inglis' rally cry.\nInglis' 57th Regiment suffered 75 percent casualties during the battle and earned the nickname \"the Die-Hards.\""},{"cat":"words","origin":"An Italian word meaning \"pasteboard,\" is the source of both of these words. In the late 1600s, it was adopted into English to refer to sketches of artistic works made on pasteboard. The English word was extended to comical drawings in newspapers and magazines during the mid-1800s. The second word comes via a French borrowing of the Italian word to refer to the material used for making paper boxes.","def":"1) Drawings, often comical, in print publications and animated for TV and movies.\n2) A light box or container.","answer":"CARTOON & CARTON","tidbit":"The Italian word is cartone."},{"cat":"word","origin":"From a Sanskrit word meaning \"learned,\" English speakers used this term to refer to Hindu sages, highly respected teachers, and leaders in India. By the 1800s, the term referred more broadly to wise individuals. Today the word is sometimes used cynically to refer to experts who may be opining on more than they really know.","def":"An expert who gives opinions in an authoritative manner, usually through the mass media.","answer":"PUNDIT","tidbit":""},{"cat":"phrase","origin":"A boxer pinned against one of the four sides of the boxing ring with little room to maneuver is the source of this phrase.","def":"In a near helpless or defensive position.","answer":"ON THE ROPES","tidbit":"A boxing \"ring,\" so called because boxing matches were once held in round spaces, is now a square space bounded on four sides by ropes."},{"cat":"word","origin":"Both of these phrases probably come from the image of being buried in a snowstorm.","def":"1) An exaggerated, deceptive explanation.\n2) Overwhelmed.","answer":"SNOW JOB\n& SNOWED UNDER","tidbit":"Snow job may have originated among GIs during World War II to describe presenting a superior officer with an elaborate fiction to excuse some misdeed."},{"cat":"word","origin":"In the 1820s and '30s it was trendy to use abbreviations for words. It was also in vogue for humorists to adopt bumpkin personas and misspell words. An 1839 article in the Boston Morning Post used this abbreviation for a misspelling of all correct, which was further popularized in 1840 when supporters of Martin Van Buren's presidential campaign used the same abbreviation for their candidate, nicknamed \"Old Kinderhook,\" because Kinderhook, New York, was his hometown.","def":"All right.","answer":"OK","tidbit":"All correct became o.k., as an abbreviation for oll korrect.\n\"Old Kinderhook\" became OK as well, building on the original initialism's popularity. Van Buren supporters even joined \"OK Clubs\" and would exclaim \"OK!\""},{"cat":"phrase","origin":"This phrase comes from American theater slang. Though not definitive, in 1958 Comedian Phil Silvers credited burlesque comedian Harry Steppe with establishing this phrase in 1927 in a routine full of doubletalk in which three comedians try to share two pieces of this fruit.","def":"1) The leading comic in a burlesque show.\n2) The leader of an organization.","answer":"TOP BANANA","tidbit":""},{"cat":"word","origin":"A combination of the Japanese words for \"sour\" or \"vinegar\" and \"rice.\" Sour rice, anyone?","def":"Cold rice shaped, dressed with vinegar and garnished, especially with bits of raw seafood or vegetables.","answer":"SUSHI","tidbit":"Su means \"vinegar\" and meshi means \"rice.\""},{"cat":"word","origin":"This fabric is named for the Syrian city that was famous for creating it.","def":"A firm lustrous fabric woven in elaborate patterns.","answer":"DAMASK","tidbit":"The city is Damascus."},{"cat":"word","origin":"This scented liquid created in the 18th century is named for where it was invented and first manufactured.","def":"A perfumed liquid made of alcohol and fragrant oils, typically marketed to men.","answer":"COLOGNE","tidbit":"The name is short for Cologne water, a translation of the French eau de Cologne."},{"cat":"word","origin":"Meaning \"foot soldier\" in Medieval Latin, the relative lack of power of this chess piece led to its current figurative meaning.","def":"A person or thing used by another for his or her own purposes.","answer":"PAWN","tidbit":""},{"cat":"word","origin":"From the name of a small West African parrot, noted for the remarkable attention mating pairs pay to one another.","def":"Two people in a romantic relationship.","answer":"LOVEBIRDS","tidbit":""},{"cat":"phrase","origin":"Imagine a priest proselytizing to loyal churchgoers who are already believers, and you get the origin of this this late 20th century U.S. phrase.","def":"To try to convince a person or group to accept an opinion they already agree with.","answer":"PREACH TO THE CHOIR","tidbit":"An older similar meaning phrase is preaching to the converted."},{"cat":"word","origin":"From Latin words meaning \"not warm.\" Maybe you don't care, but it is a very cool origin.","def":"Calm, casual, and indifferent.","answer":"NONCHALANT","tidbit":""},{"cat":"word","origin":"Named for the inventor of a type of exploding, fragmenting shell. This early 1800s invention consisted of a hollow cannon ball filled with shot, which burst in midair and scattered the content. In the early 20th century this word developed a secondary meaning of \"shell fragments.\"","def":"","answer":"SHRAPNEL","tidbit":"Harry Shrapnel invented his device during the Peninsular War (1808-1814)."},{"cat":"word","origin":"From Latin meaning \"common people,\" this word, originally from the 14th century, referred to what was common or ordinary. It was used to describe common language (that everyone spoke), common fractions and more. By the 16th century the word referred to the \"common or lower class\" people viewed as lacking in refinement. From there, around a century later, this word developed a more offensive meaning.","def":"Coarse, crude, offensive in language.","answer":"VULGAR","tidbit":""},{"cat":"word","origin":"The Proto-Indo-European roots of this word meant \"not to know,\" so unsurprisingly it meant \"ignorant\" and \"foolish\" in the 12th and 13th centuries. But over time it developed multiple meanings including \"wantonness or lasciviousness,\" \"fussy, fastidious,\" \"dainty, delicate,\" \"chaste,\" and to \"precise, careful.\" Today it has the most pleasant meaning in its long history.","def":"Agreeable, delightful, pleasant.","answer":"NICE","tidbit":""},{"cat":"phrase","origin":"Perhaps from a practice called handfasting practiced in Hindu Vedic communities, as well as by the ancient Mayans and the Celts in Scotland, where a couple's hands are tied with cloth and bound together.","def":"Get married.","answer":"TIE THE KNOT","tidbit":""},{"cat":"word","origin":"From Latin words meaning \"dazzling whiteness,\" \"purity\" and \"to shine,\" which may reinforce that honesty shines brightest and really is the best policy.","def":"Honest and sincere expression.","answer":"CANDOR","tidbit":""},{"cat":"phrase","origin":"Likely from a now obsolete horse race in which participants had to follow a set of difficult, irregular and unpredictable maneuvers set by the race leader. First attested by Shakespeare in Romeo and Juliet.","def":"A complicated and fruitless pursuit or search.","answer":"WILD-GOOSE CHASE","tidbit":"Romeo and Mercutio trade off jokes, an exchange Mercutio likens to a wild-goose chase."},{"cat":"word","origin":"From the Latin spirare meaning \"to breathe,\" this word, first documented in the late 16th century, originally described the passage of vapor through the walls or surface of a body. About 150 years later that meaning led to its figurative sense: \"to escape from secrecy\" or \"to become known.\" That sense was misused around the same time, but that misused definition stuck.","def":"To take place, also to give off or pass vapor from a living body.","answer":"TRANSPIRE","tidbit":""},{"cat":"phrase","origin":"Alluded to by Shakespeare in Hamlet and popularized in the 18th century, this phrase originally marked midnight-the hour when supernatural forces were thought to roam. Over time, it came to mean any late-night moment when ominous events might occur. By the 1980s, its meaning broadened further, describing other volatile periods: the inconsolable crying spells of infants, or the final trading hour on the third Friday of each month, when expiring options and futures contracts make stock market activity especially turbulent.","def":"An hour when supernatural events are thought to occur, especially midnight. Also, a regular time of volatility or precariousness.","answer":"THE WITCHING HOUR","tidbit":"Quoting Hamlet:\n\"Tis now the very witching time of night,\nWhen churchyards yawn, and hell itself breaks out\nContagion to this world. Now could I drink hot blood,\nAnd do such business as the bitter day\nWould quake to look on.\""},{"cat":"phrase","origin":"This 20th century phrase probably comes from swimming pools where one end is safe, and the swimmer's feet can touch bottom, but the other end is more precarious.","def":"To act recklessly or hysterically.","answer":"GO OFF THE DEEP END","tidbit":""},{"cat":"phrase","origin":"This 17th century phrase meant to be able to perform a composition just by hearing it, not from memory or from sheet music. Its figurative sense is from the early 20th century.","def":"To decide based on how things develop.","answer":"PLAY IT BY EAR","tidbit":""},{"cat":"word","origin":"The Anglo-Saxon word maeth, which means \"a mowing\" is key to this 15th century term that referred to harvesting a second crop of grass after the first had been mown. Its figurative meaning is from the 1650s.","def":"The consequences or repercussions of a significant, usually unpleasant, event.","answer":"AFTERMATH","tidbit":""},{"cat":"word","origin":"Meaning \"holding place\" in French, this 14th century word meant \"one who takes the place of another.\" Its military sense is from the 1570s.","def":"1) A deputy or substitute acting for a superior.\n2) A commissioned officer in the Navy or Coast Guard.","answer":"LIEUTENANT","tidbit":""},{"cat":"phrase","origin":"In an Aesop Fable, retold and rewritten with many variations in many cultures, several beasts join a lion in a hunt, but, when it is time to divide the spoils, the lion successfully claims all or most of the meat. First documented in the 18th century.","def":"The larger of two or more amounts.","answer":"THE LION'S SHARE","tidbit":"Aesop was a Greek storyteller who is remembered for some of the most popular fables ever written. While his stories were compiled by others and passed on throughout history, there is no actual evidence he ever told these stories or whether he existed."},{"cat":"word","origin":"J. R. R. Tolkien, author of The Lord of the Rings, once tried to sort out the confusing origins of this word. Probably the Old Norse word hrosshvalr, which translates to \"horse whale\" and was a kind of whale, was confused with the actual Norse word for this animal, rosmhvalr. The Dutch then translated \"horse whale\" into their language to get this word.","def":"","answer":"WALRUS","tidbit":"Tolkien worked on the first edition of the Oxford English Dictionary."},{"cat":"phrase","origin":"Some contend this 19th century phrase, first cited in a novel by Sir Walter Scott, derived from guests being served this unappetizing piece of mutton. It is probably more likely that it was a reference to a dismissive turn of the upper body.","def":"To give someone an icy reception or show them disregard and indifference.","answer":"COLD SHOULDER","tidbit":""},{"cat":"phrase","origin":"Imagine how much easier it is to drink soup if you don't have to worry about bones in the broth and you get the likely origin of this phrase from the 15th century.","def":"To be blunt or candid about something.","answer":"MAKE NO BONES ABOUT IT","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase is Scottish with Germanic and perhaps Old Norse roots and is first attested in the 18th century. It means to \"squat or crouch low.\" When first used in American English it meant \"to get down to work,\" though it now also means \"to take shelter.\"","def":"","answer":"HUNKER DOWN","tidbit":""},{"cat":"word","origin":"In the 15th century this word meant \"easy to handle or control,\" but this sense was soon extended to mean \"fit or suitable.\" In the 16th century the meaning was extended again to mean \"suitable to the eye or attractive.\"","def":"Having a pleasing and impressive or dignified appearance.","answer":"HANDSOME","tidbit":""},{"cat":"phrase","origin":"The less well-known word in this phrase is a shortened version of an English word dating to the 14th century that means \"to signal silently or gesture\" and often referenced a command by someone considering themselves superior. The phrase itself is from the 16th century.","def":"Always available to do someone's bidding.","answer":"BECK AND CALL","tidbit":"Beck is short for beckon. The former is now seldom used which, along with the enunciation of the phrase beck and call, leads some to incorrectly spell this phrase beckon call."},{"cat":"phrase","origin":"The word and sometimes preposition that begins this idiom meant \"adjacent to\" when it showed up in Middle English in the late 1200s. By the late 1300s, it had taken on the sense of \"outside of,\" a meaning that is now obsolete, except perhaps in this phrase.","def":"A distraught person in an extremely volatile emotional state.","answer":"BESIDE ONESELF","tidbit":""},{"cat":"phrase","origin":"Around 350 BC Aristotle described a logical fallacy that occurs when an argument's premise assumes the truth of the conclusion. For example, \"Telling the truth is morally righteous because we shouldn't lie.\" Unfortunately, the name for his principle was poorly translated from Greek to Latin and then again, in the late 16th century, from Latin to English. The poor English translation led to a new meaning that would make anyone unfamiliar with the origin of this phrase wonder what Aristotle's maxim was all about.","def":"The issue that really needs to be raised and answered.","answer":"BEG THE QUESTION","tidbit":"A better translation would be \"assuming the conclusion.\"\nBeg could mean \"assuming\" in the 16th century, but it wasn't a great word choice for the translator to use since beg more commonly refers to asking for something."},{"cat":"word","origin":"The Roman god Mercury, the swift winged messenger of the gods, the god of merchants and thieves, and the god behind the name of the planet and the metallic element mercury, also called \"quicksilver,\" is also at the root of this word. Mercury's fickle personality and the similar belief about the traits of those born under his namesake planet, as well as the changeable nature of quicksilver, the only metal which is liquid at room temperature, all influenced the meaning of this word.","def":"Characterized by sudden unpredictable mood changes, fickle.","answer":"MERCURIAL","tidbit":""},{"cat":"phrase","origin":"In World War II, when the Soviet Union invaded Finland, the Soviet Commissar for Foreign Affairs claimed in radio broadcasts that the Soviet Union was delivering food to the starving Finns rather than dropping bombs on them. The Finns dubbed the handmade explosives they used to retaliate with the last name of the foreign minister.","def":"","answer":"MOLOTOV COCKTAILS","tidbit":"Vyacheslav Molotov was the name of the Soviet People's Commissar for Foreign Affairs. The Finns started calling the Soviet air bombs Molotov breadbaskets and felt the \"food\" deserved a decent cocktail to accompany it.\nThe name Molotov translates to \"hammer.\""},{"cat":"word","origin":"This word's long history dates to an ancient Greek word meaning \"leisure\" and \"learned discussion.\" A favorite pastime in Greek culture was to contemplate life and seek knowledge, often at this place.","def":"A place of learning.","answer":"SCHOOL","tidbit":"The school in \"school of fish\" comes from a different word entirely, the Middle Dutch schole, meaning \"multitude.\""},{"cat":"phrase","origin":"This 19th century phrase was inspired by the wild version of this plant that grows in the shade and has small flowers partially hidden under its leaves.","def":"A shy or modest person.","answer":"SHRINKING VIOLET","tidbit":""},{"cat":"phrase","origin":"This flame-like phosphorescence caused by methane gases ignited by traces of hydrogen phosphide from decaying plants in marshy areas was once a source of superstitions about its origin. Some thought the flames were the work of a mischievous sprite trying to lure unwary travelers astray. The effect was named using a common name to represent the sprite combined with a word meaning a \"bundle of hay used as a torch.\" This phrase's figurative meaning is from the 1600s.","def":"An elusive goal that appears enticing but is ultimately impractical and/or unobtainable.","answer":"WILL-O'-THE-WISP","tidbit":""},{"cat":"phrase","origin":"A player winning the maximum 13 tricks in a card game called Boston is the earliest known use of this phrase. Then eighty years later, in 1880, when the card game bridge emerged, it borrowed the same phrase for the same feat. The popularity of bridge led to this phrase's popularity in baseball, golf, tennis and other sports, before the phrase developed its figurative meaning of a \"total success\" in the 20th century.","def":"","answer":"GRAND SLAM","tidbit":"Slam may come from slampant an obsolete term meaning \"trickery\" from a 17th century card game."},{"cat":"phrase","origin":"This Mandarin Chinese expression dating from the 14th century was brought to the U.S. in the 19th century but popularized in English with the 1964 translation of Mao Tse-tung's Little Red Book, which labeled \"imperialism and all reactionaries\" with this phrase.","def":"Someone appearing powerful or dangerous but who is actually weak and ineffective.","answer":"PAPER TIGER","tidbit":"In Mandarin Chinese, the expression is zhilaohu from zhi meaning \"paper\" and laohu meaning \"tiger.\""},{"cat":"word","origin":"From Latin meaning \"in the wrong order,\" this word combines Latin roots meaning \"in front of, before\" and \"following\" or \"behind.\" A silly combination when you think about it.","def":"Ridiculous.","answer":"PREPOSTEROUS","tidbit":"The prefix prae means \"in front of, before,\" and posterus means \"following\" or \"behind.\""},{"cat":"word","origin":"The Latin word for \"lead\" is behind this word from the Roman Empire. Around AD 52, Rome had an estimated 220 miles of gravity-powered aqueducts, pipes and water channels, often containing lead, that carried 300 gallons of fresh water for Rome's citizens to supply baths, homes and public wells. Professionals needed to build and maintain these systems.","def":"","answer":"PLUMBER","tidbit":"The Latin for \"lead\" is plumbum."},{"cat":"word","origin":"Originally this word was the signal unleashing French-Norman troops to pillage an enemy. It was first brought to English in the 15th century and was often used as part of a two-word phrase: A phrase also immortalized in Shakespeare's play Julius Caesar.","def":"Destruction and devastation.","answer":"HAVOC","tidbit":"From Julius Caesar:\nAntony: \"Cry 'Havoc!' and let slip the dogs of war.\""},{"cat":"word","origin":"This word traces its history to an Old French word that means \"slaughterer of goats.\"","def":"A person whose trade is the preparation and selling of meat. Also, someone that kills brutally.","answer":"BUTCHER","tidbit":"The Old French word bochier."},{"cat":"phrase","origin":"Though the origin of this mid-18th century phrase is not clear cut, it seems likely that at a time when whipping horses to make them go faster was acceptable, doing this would be pointless.","def":"To continue talking about a subject that has already been discussed or decided.","answer":"BEAT A DEAD HORSE","tidbit":""},{"cat":"phrase","origin":"In the book and movie series Harry Potter, it was taboo to mention the name of the Dark Lord Voldemort, dubbed \"he who must not be named,\" because anyone saying his name could be located by the evil Death Eaters. Perhaps Harry Potter author J.K. Rowling knew that in the 16th century, and perhaps before, it was considered bad luck to talk about Satan, which led to a phrase telling people he would appear if they mentioned his name. Eventually the phrase was shortened and is now used in a totally different, comedic context.","def":"When a person appears just after being mentioned.","answer":"SPEAK OF THE DEVIL","tidbit":"The phrase, which had some variants, was speak of the devil and he will appear."},{"cat":"phrase","origin":"One of the earlier uses of this 19th century phrase is attributed to Davy Crockett. Picture hunting dogs yelping at an animal they had discovered high in the treetops, such as a squirrel, not realizing the wily creature had jumped elsewhere.","def":"To follow a mistaken course.","answer":"BARK UP THE WRONG TREE","tidbit":""},{"cat":"word","origin":"Based on a Latin word meaning \"one who goes to see,\" this term referred to judgments, not made based on law or statute, but made by an authority with sole discretion. Apparently, some people did not like these judges' opinions very much because, over time, this word came to mean decisions that were capricious or based on a judge's opinion or preference rather than reason and facts.","def":"Based on whim or personal preference.","answer":"ARBITRARY","tidbit":"Arbitrary comes from Latin arbiter, which means \"judge\" and is the source of the English arbiter."},{"cat":"word","origin":"In the 17th century this word referred to a large piece of wood placed at the rear of a fireplace to keep the blaze burning. By the 1880s it meant \"something stored for later use.\" By the 20th century it meant an \"unfulfilled order.\"","def":"","answer":"BACKLOG","tidbit":"It is also possible the backlog's later meanings were from or influenced by the alternative meaning of log \"to make a note or record.\""},{"cat":"word","origin":"Procopius was a prominent 6th century Greek historian of the Byzantine period. This word from Medieval Greek meaning \"unpublished\" was the name of his famous book, also known as Secret History that he never published since it contained scandalous accounts of Roman officials and Emperor Justinian. When the book was discovered in the Vatican Library and published in 1623, the association with the book shifted this word's meaning to \"revelation of secrets,\" which over time softened significantly.","def":"A brief, amusing story.","answer":"ANECDOTE","tidbit":"Procopius's book was titled Anecdota."},{"cat":"words","origin":"The Latin verb mandare, meaning \"to commit into one's hands or charge,\" \"to entrust\" or \"to order\" is behind all three of these closely related words. The first is about \"ordering,\" the second about \"a judicial or legal order\" and the third more about \"praise.\" Hopefully these clues are giving you a helping hand.","def":"","answer":"COMMAND & MANDATE & COMMEND","tidbit":"Mandare is also behind other words including demand, mandatory, and countermand.\nMandare comes from the Latin manus meaning \"hand.\""},{"cat":"word","origin":"Don't get bogged down in the details, but this 16th century two-syllable-word origin literally means \"marsh marsh.\" The verb form of the second syllable unsurprisingly means \"stuck,\" so the word itself refers to boggy, spongy ground that is easy to get stuck in. The figurative sense of the full word dates from the 18th century but was rarely used until the Vietnam war, where it was revived to describe the difficulties the U.S. faced.","def":"A precarious situation that is difficult to get out of.","answer":"QUAGMIRE","tidbit":"Quagmire was popularized in Pulitzer-prize-winning author David Halberstam' book about the events that led to America's full involvement in the Vietnam war titled The Making of a Quagmire: America and Vietnam During the Kennedy Era."},{"cat":"word","origin":"Both this word and phrase have nautical roots. The word from the 17th century referred to the \"sideways drift of a ship caused by the wind\" and developed its figurative meaning in the 19th century. The phrase is an 18th century nautical expression and referred to a vessel moving in a forward direction and developed its broader meaning in the 19th century.","def":"1) Extra time or space to operate with.\n2) To advance or progress.","answer":"LEEWAY & MAKE HEADWAY","tidbit":"Headway is short for \"ahead-way.\"\nLee is from Old English hleo meaning \"shelter, protection.\" Its nautical sense is of Scandinavian origin from the 1400s and means \"that part of the hemisphere to which the wind is directed.\""},{"cat":"word","origin":"Twice in the late 13th century, fleets of Mongol ships led by Kublai Khan attempted to invade Japan. When, both times, a powerful storm suddenly destroyed those ships, the Japanese considered it a gift from the gods and labeled it with a Japanese word meaning \"divine wind.\" The same term was used for World War II Japanese pilots that deliberately committed suicide by crashing their planes into enemy targets, usually warships. This word's extended sense is from the 20th century.","def":"A person or thing that is wildly reckless or destructive.","answer":"KAMIKAZE","tidbit":""},{"cat":"phrase","origin":"From an 1810 story about a boy convinced to sharpen a man's hatchet. He works until he has blistered his hands and is \"almost tired to death\" when the school bell rings. But, since the job is only half-done, he continues at the grindstone until the work is completed. The man, instead of thanking the boy, scolds him for being truant and shoos him off to school. From that moment on, the boy attaches this phrase to the hidden motives of others.","def":"A selfish or ulterior motive.","answer":"AXE TO GRIND","tidbit":""},{"cat":"phrase","origin":"From a Latin word meaning \"able to be heard,\" this 15th century word was used in American football in the late 1950s on its own and as part of this phrase. By the 1970s, the phrase was being used beyond football.","def":"To change a plan at the last minute.","answer":"CALL AN AUDIBLE","tidbit":""},{"cat":"word","origin":"These official documents, such as passports and state papers, were originally stamped out on double metal plates and stitched together, which explains why the origin of this word dates from Greek meaning \"to double or fold over.\" Since international relations was the subject of some of these 17th century documents, the meaning of this word shifted accordingly.","def":"The management of international relations.","answer":"DIPLOMACY","tidbit":"Diploma and diplomatic have the same origin."},{"cat":"phrase","origin":"Perhaps from a 17th century conversational parlor game where a series of questions were separated from their answers and distributed. Players then created ludicrous combinations of ideas by combining a question taken from one person with an explanation taken from another.","def":"Having conflicting plans that try to accomplish the same goal.","answer":"AT CROSS-PURPOSES","tidbit":""},{"cat":"word","origin":"Coined in 1596 by Edmund Spenser in his poem The Faerie Queene to describe a thousand-tongued monster, offspring of the three-headed dog, Cerberus, and a fire-breathing Chimera. The monster was used as a symbol of slander. The word itself first meant \"offensively noisy\" before acquiring its current definition in the late 1800s.","def":"Lacking in subtlety, obvious, conspicuous, done openly.","answer":"BLATANT","tidbit":""},{"cat":"word","origin":"From a Medieval Latin word meaning \"farmhand\" or \"inhabitant of a country house,\" this word, dating from the 13th century and influenced by the stereotypes held by the landed aristocracy and \"higher society,\" came to refer to a person who is \"low-born,\" \"uncouth\" and \"dishonorable.\" Over time, the word's meaning got harsher.","def":"1) A scoundrel or criminal.\n2) A character in a story who opposes the hero.","answer":"VILLAIN","tidbit":"Villain is from the Medieval Latin villanus and from the Latin villa."},{"cat":"phrase","origin":"This early 19th century phrase's extremely troubling origin refers to the sale of slaves from the upper South to the harsher plantations of the Deep South. Its figurative use dates from the late 19th century, coming from the loss of security, home, family and the brutal conditions that resulted from this slave trading.","def":"Profound betrayal.","answer":"SELL DOWN THE RIVER","tidbit":"Specifically, the phrase refers to slaves being sold down the Mississippi and, to a lesser extent, the Ohio River to work as laborers on cotton plantations."},{"cat":"phrase","origin":"The origin of the first noun in this phrase from the 1300s is unknown and refers to \"an out of the way corner.\" The second noun, now only used in this phrase, is from the 1400s and means \"a small narrow opening or crevice.\"","def":"Everywhere. Often used to refer to having searched everywhere for a missing item.","answer":"NOOK AND CRANNY","tidbit":""},{"cat":"phrase","origin":"In William Shakespeare's Macbeth, Macbeth considers assassinating King Duncan of Scotland and taking the throne for himself. Macbeth uses this phrase to highlight that it would be ideal if killing Duncan would truly be the end of it, he would become king, and there would be no consequences. But he realizes that is unlikely as he goes on say that, if he does assassinate King Duncan, there are bound to be unpredictable and unmanageable consequences to his current and future life.","def":"The essential element, the supreme aim.","answer":"BE-ALL AND END-ALL","tidbit":"Quoting Macbeth:\n\"If it were done when 'tis done, then 'twere well\nIt were done quickly: if the assassination\nCould trammel up the consequence, and catch,\nWith his surcease, success; that but this blow\nMight be the be-all and the end-all here,\nBut here, upon this bank and shoal of time,\nWe'd jump the life to come.\""},{"cat":"word","origin":"Based on the legend of the Greek soldier Pheidippides, who supposedly, in 490 BC ran from this town, whose name translates to \"fennel field,\" to Athens to announce the Greeks' victory over the Persian army and then dropped dead. Other accounts say he ran around six times as far, 150 miles, from Athens to Sparta to seek aid.","def":"Something taking a very long time and requiring exceptional endurance.\nA 26-mile running race.","answer":"MARATHON","tidbit":"The marathon was added as an event in the 1896 revival of the Olympic games and covered about 25 miles. In 1924, the marathon distance was standardized at 42,195 meters (26 miles, 385 yards) so the race could start at Windsor Castle and finish next to the royal box at the stadium in London."},{"cat":"phrase","origin":"This 16th century phrase likely stems from open-hearth cooking that darkened the cast iron cookware.","def":"Hypocritical.","answer":"THE POT CALLING THE KETTLE BLACK","tidbit":""},{"cat":"word","origin":"Invented and trademarked by Burroughs Wellcome & Company in 1884, it was the name for a small, compressed piece of a solid substance such as a medicinal pill. By 1898 it was being used metaphorically to refer to a compacted form of anything including these newspapers.","def":"Newspapers with pages half the normal size and condensed, sensationalistic stories.","answer":"TABLOID","tidbit":"Tabloid is a hybrid of \"tablet\" and the Greek suffix oid, meaning \"having the form or appearance of.\""},{"cat":"phrase","origin":"A horse-racing bet, in which a wager is placed on the same horse to win, place or show, is the source of this phrase from the 1900s.","def":"Applying to all the individuals in a group.","answer":"ACROSS THE BOARD","tidbit":"The board is the \"tote board,\" sometimes called the \"notice-board\" or \"odds board,\" on which the races and betting odds are listed."},{"cat":"phrase","origin":"Railroad workers in the 19th century used manually operated levers to transfer trains from one track to another. To avoid a major collision required paying attention.","def":"Inattentive.","answer":"ASLEEP AT THE SWITCH","tidbit":""},{"cat":"word","origin":"From a Latin adjective meaning \"a brook or stream\" and its similar noun referring to people who \"use the same stream for water\" or \"live on opposite banks of the same stream.\" This latter meaning extended to refer to \"people competing.\" In early uses, such as by Shakespeare, this competition was over love interests, but over time expanded broadly.","def":"A person competing with another for the same objective, or for superiority in the same field of activity.","answer":"RIVAL","tidbit":""},{"cat":"phrase","origin":"While the definitive origin of this 17th century phrase is unknown, there are multiple theories. One is that it comes from tailoring or dressmaking and refers to the amount of material needed to make a piece of clothing reach around the body. A second hypothesis is that it comes from bookkeeping, in which the income column needs to meet or exceed the expense column to avoid debt.","def":"To earn enough money to live on.","answer":"MAKE ENDS MEET","tidbit":"The longer phrase both ends of the year meet supports the accounting origin theory, but the phrase does not exist in print until the 18th century."},{"cat":"word","origin":"The figurative meaning of this word comes from Scotland in the 1800s. The source may be Dundee, a principal location for workers who split and combed out flax and hemp fibers as part of the process to turn those fibers into linen. Reportedly, boisterous Dundee workers wielded material power, influencing wages, conditions and bonuses (often in the form of drink). In the factory, one worker would read out the day's news while the others worked and interrupted the speaker with commentary and debate.","def":"A person who harasses or taunts a public figure with impertinent questions and/or insults.","answer":"HECKLER","tidbit":"The flax comb itself, dating from the 13th or 14th century, was called a heckle."},{"cat":"word","origin":"From a Latin verb meaning \"to fly,\" this 14th century word referred to birds and winged creatures. By the end of the 16th century, its use was extended to items so fine or light they seemed capable of flying and then extended again to refer to vapors and gases. Since gases are subject to sudden change, that sense was applied to other things and people in the 17th century.","def":"Characterized by or subject to rapid or unexpected change.","answer":"VOLATILE","tidbit":"The Latin word volare means \"to fly\" and is also the source for volley and volleyball, since a tennis volley and a volleyball are supposed to be returned before they hit the ground."},{"cat":"phrase","origin":"From a 16th century ballad about two small children left in the care of an uncle and aunt after their parents' death. The story has been reused and altered over time, but the basic plot is the uncle tries to have the children killed to get their inheritance, but the criminals end up squabbling, one kills the other, who leaves the children to wander alone in the woods until they die of starvation. Their bodies are covered in leaves by birds. The story ends with a warning to take care of orphans and children to avoid God's wrath.","def":"Innocent and naive.","answer":"BABE IN THE WOODS","tidbit":""},{"cat":"word","origin":"Likely from a Slavic word for \"beans\" that in Yiddish was a word meaning \"goat droppings.\" It was popularized in the US in 1965 after being used frequently on The Dick Van Dyke Show. The writer learned the term from his mother but neither he nor the censors realized it was actually a swear word. It was used on the show as a Yiddish word meaning \"nothing.\"","def":"1) Nothing.\n2) Nonsense.\n3) Worthless or of little value.","answer":"BUPKIS","tidbit":"Bupkis is short for the Yiddish word kozebubkes, which means \"goat droppings.\""},{"cat":"phrase","origin":"From a 1941 cartoon in The New Yorker by the U.S. cartoonist Peter Arno that shows a burning airplane which has just crashed headfirst. In the background, the pilot is descending by parachute. Service personnel are aghast and rushing forward to help, while a civilian engineer, with a rolled-up blueprint under his arm, is walking away saying this one sentence, expressed in the caption.","def":"Start over.","answer":"BACK TO THE DRAWING BOARD","tidbit":"The full caption is:\n\"Well, back to the old drawing board.\""},{"cat":"phrase","origin":"The origin of this phrase, dating from at least 1945, is likely from the game of baseball and may reflect how game announcers would guess the attendance at games.","def":"A reasonable or acceptable estimate.","answer":"IN THE BALLPARK","tidbit":"Related phrases include: out of the ballpark, in the right ballpark and ballpark estimate."},{"cat":"phrase","origin":"This nautical phrase meant to prepare for a storm by placing canvas covers over doorways and other openings and securing the tarps with wood strips or iron bars.","def":"To prepare for a difficult, dangerous, or challenging situation.","answer":"BATTEN DOWN THE HATCHES","tidbit":"Batten is the name of the wood strip or iron bar used to secure the hatches."},{"cat":"phrase","origin":"Though the definitive origin of this 20th century phrase is unknown, there are numerous theories. One hypothesis is that it comes from a 1917 copper dispute in Bisbee, Arizona, where many mineworkers, denied their demands for better compensation, had to choose between unemployment or continuing excavation under harsh conditions and poverty wages. Many ended up deported to New Mexico. Another theory is that this phrase is a modern take on a story in Homer's The Odyssey, where Odysseus must navigate a narrow sea passage between Charybdis, a treacherous whirlpool, and Scylla, a horrid six-snakelike-headed, man-eating, cliff-dwelling monster.","def":"A very difficult decision with two poor options.","answer":"BETWEEN A ROCK AND A HARD PLACE","tidbit":"The phrase between Scylla and Charybdis was common from Homer's time through the early 20th century.\nThere are other origin theories for this phrase as well, including that it is just an allusion to being crushed between two rocks."},{"cat":"word","origin":"From Latin meaning \"fireplace\" or \"hearth.\" Johannes Kepler used this word in 1604 to describe the convergence point for rays of light refracted by a lens, perhaps because of the heat or flames that scenario can generate. In the 1650s, English philosopher and author Thomas Hobbes used the same word to describe a kind of fixed point in geometry, as did Isaac Newton in the 1690s. With this history, the word developed several optical meanings and the broader meaning it has today.","def":"A center of activity, attraction, attention or concentration.","answer":"FOCUS","tidbit":""},{"cat":"word","origin":"This word's origins are animal challenged. The French word for it translates to \"little dog,\" but an Old French translation is \"hairy or downy cat.\" A Swiss-German name means \"devil's cat.\" Multiple species of this insect are called \"Woolly bear\" in multiple languages. But the general name in English means \"hairy cat,\" more specifically referring to \"a coat of short, furry hairs.\"","def":"The larva of a butterfly or moth.","answer":"CATERPILLAR","tidbit":""},{"cat":"phrase","origin":"Tom Lacino casually coined this phrase in 1976 to describe a friend of his, Robert Armstrong. Armstrong loved the phrase so much he recruited Tom and several others to work with him to create a float for the 1979 Doo Dah Parade (a parody of the famous Tournament of Roses parade). The float consisted only of the group lounging on a few sofas watching TVs. The float was a big hit, the LA Times wrote about it, and the phrase became commonplace.","def":"Lazy.","answer":"COUCH POTATO","tidbit":"The group on the float called themselves \"The Couch Potatoes.\""},{"cat":"phrase","origin":"This early 20th century phrase was popularized in a comic strip created by the cartoonist Frank King, who also created Gasoline Alley, that ran in the Chicago Tribune between 1916 and 1920. The strip humorously illustrated the trivial idiosyncrasies and nuisances that bother people.","def":"A usually minor thing that is a major annoyance.","answer":"PET PEEVE","tidbit":"The comic was called The Little Pet Peeve. Peeve is an early 20th century back-formation of the 15th century word \"peevish.\"\nIn the 19th century, pet broadened to mean \"cherished\" as in pet peeve or pet project."},{"cat":"word","origin":"In Old English, dating to at least the year 890, this noun referred to a \"shackle\" or \"band\" used to tie someone up. The verb form, first recorded around 1000, meant \"to constrain a bow with the string,\" and then \"the curved shape into which the bow is brought.\" The connection to archery led to multiple additional definitions.","def":"1) To yield.\n2) To force something straight into any kind of arched or angular shape.","answer":"BEND","tidbit":""},{"cat":"phrase","origin":"This variety of the polecat, whose name literally means \"robber\" or \"thief,\" is at the center of this 16th century phrase because it was used to kill rats and drive rabbits from their burrows.","def":"To search out, discover.","answer":"FERRET OUT","tidbit":""},{"cat":"phrase","origin":"Dead fish, floating with their undersides facing upward in the water after dying, is the source of this 19th century phrase.","def":"To go bankrupt or to die.","answer":"GO BELLY-UP","tidbit":""},{"cat":"phrase","origin":"This term for a small wave is at the center of this phrase likely coined and popularized by educational theorist Jacob Kounin in the late 1950s. Kounin observed that when a teacher asked a student to stop a behavior in front of the rest of the class, this also impacted the other students in the class. Alternatively, if one student misbehaved without being told publicly to stop, the other students were more likely to misbehave.","def":"A spreading and usually unintentional consequence of an action.","answer":"RIPPLE EFFECT","tidbit":""},{"cat":"word","origin":"This word for a U.S. naval academy cadet training to become an ensign comes from a 17th century British Royal Navy practice of stationing experienced soldiers in the center of a vessel.","def":"","answer":"MIDSHIPMAN","tidbit":""},{"cat":"phrase","origin":"The first word of this 20th century phrase is a pet name for a Scottish proper name akin to John or Jack. Its verb form came to mean \"to try to outwit or use trickery to gain an advantage,\" while as a noun it evolved to be a horse-racing term. The phrase itself evokes horses maneuvering to best situate themselves to win a race.","def":"Maneuvering to try to gain an advantage.","answer":"JOCKEY FOR POSITION","tidbit":"The Scottish name is Jock."},{"cat":"phrase","origin":"First cited in the 1960s, this expression comes from sales and marketing and at first reflected the need to find what motivates a customer so a salesperson can close a sale or a marketer or advertiser can sell a product. By the late '70s its use had been extended.","def":"A strongly emotive, popular or controversial concern or issue, usually social or political.","answer":"HOT BUTTON","tidbit":""},{"cat":"word","origin":"This tactic was used in World War I and World War II to conceal military and naval forces. The extended sense is from the 1920s.","def":"Something deliberately designed to conceal or mislead.","answer":"SMOKESCREEN","tidbit":""},{"cat":"phrase","origin":"Coined from the last name of the educator who developed the theory that members of a hierarchical organization are often promoted until they reach the level at which they are incompetent.","def":"","answer":"PETER PRINCIPLE","tidbit":"The concept was explained in the 1969 book The Peter Principle by Laurence Peter and Raymond Hull. The book was a satire but was perceived as making a serious point about the shortcomings of the promotion process within companies."},{"cat":"word","origin":"This word's original 14th century English definition is from its Old French and Late Latin roots meaning \"a course of a meal.\" It also referred to a serving of liquid or pulpy food, such as milk, porridge or boiled vegetables and then, by the 18th century, to liquid or mixed food for an animal. The latter meaning likely led to its broader definition of \"untidy\" or \"a confused state of affairs.\" The phrase makes sense figuratively since, if you heat the food, things get even more untidy, chaotic, confused, uncomfortable and challenging.","def":"","answer":"MESS & HOT MESS","tidbit":"Mess also referred to a communal place to eat food as in \"mess hall.\""},{"cat":"phrase","origin":"Firearms rarely hit a distant target.","def":"An unlikely occurrence.","answer":"LONG SHOT","tidbit":""},{"cat":"phrase","origin":"This 19th century phrase comes from playing card games. After all, once you mix them up, it is hard to find the card you want.","def":"Ignored or forgotten amid a confusion or a chaotic situation.","answer":"LOST IN THE SHUFFLE","tidbit":""},{"cat":"phrase","origin":"From medieval German folklore popularized in English in an 1842 poem by Robert Browning about a man hired by the citizens of a town to get rid of a plague of rats. The man, dressed in multicolored clothing, plays a magic flute to lure the rats to a river outside the town where they drown. But the townspeople refuse to pay him, and so he uses the flute to lure their children away from home.","def":"A person who, often through personal charm, entices people to follow, only to disappoint or fool them.","answer":"PIED PIPER","tidbit":"Pied comes from the Middle English word pie, a shortening of \"magpie,\" a black-and-white-feathered bird. In the Middle Ages, black-and-white, and later multicolored clothing, was called pied. Piper comes from the Latin word pipare meaning \"to peep or chirp.\""},{"cat":"words","origin":"The ninth letter of the Greek alphabet, the smallest letter, was spelled two different ways when transcribed by Latin scholars because the letters I and J were interchangeable. Different translations of Matthew 5:18, part of the Sermon on the Mount, then used these two words figuratively to mean \"a tiny amount or detail.\"  The first word also came to mean \"to write a short note.\"","def":"","answer":"JOT & IOTA","tidbit":""},{"cat":"phrase","origin":"The principal word in this phrase may come from the Old Norse word lemja meaning \"to lame,\" though it colloquially meant \"to beat soundly.\" This slang phrase itself is from the early 19th century, and you might describe its definition as \"to beat it.\"","def":"To escape or run off, especially from the police.","answer":"ON THE LAM","tidbit":""},{"cat":"word","origin":"This Germanic-inherited word referred to a \"long stuffed pillow\" in Old English and by the 16th century it developed its figurative meaning as a verb meaning \"to prop up or support.\"","def":"","answer":"BOLSTER","tidbit":""},{"cat":"word","origin":"During the Middle Ages, Europeans embarked on eight major military campaigns to recover the Holy Land from Muslim control. These campaigns were dubbed with this word that comes from Latin and means \"to mark with a cross.\" The word developed its extended definition in the 18th century.","def":"A campaign for change carried out with zeal. Often political, social or religious in nature.","answer":"CRUSADE","tidbit":""},{"cat":"word","origin":"Supposedly coined by Voltaire as a synonym for a cul-de-sac or a blind alley, this word's figurative meaning is from the mid-19th century.","def":"A situation in which progress is blocked; often used to refer to a deadlock between two parties.","answer":"IMPASSE","tidbit":""},{"cat":"phrase","origin":"The core word in this phrase meant \"to invade\" and combines the prefix in with a word that in the 16th century meant \"riding,\" a sense of the word now obsolete. The idea was riding on horseback into a country to raid or invade. The extended sense of the idiom came thereafter.","def":"To successfully advance into, make progress on or encroach upon some new area.","answer":"MAKE INROADS INTO","tidbit":""},{"cat":"word","origin":"This word from Arabic, Persian and Turkish roots literally means \"something forbidden or kept safe.\" In the 17th century it referred to a part of a Middle Eastern Muslim home reserved for women. Over time, the definition extended to refer to its occupants and later came to be used figuratively outside Islam.","def":"1) The female members of a Muslim household or the part of the household they live in.\n2) A group of women connected sexually to a particular man.","answer":"HAREM","tidbit":"Harem can also refer to a group of female animals who are controlled by a dominant male during breeding season."},{"cat":"word","origin":"From an Old Norse term for a female dog. In 15th century English, it denoted a dog, especially a mutt. It also described a lazy or foolish man. Because it was said playfully to kids in the early 20th century, it came into its current meaning.","def":"A small child, especially a mischievous one.","answer":"TYKE","tidbit":"The Old Norse word is t\u00edk.\nTyke is also used as a nickname for a person from Yorkshire, England."},{"cat":"word","origin":"This word from the 16th century combines a prefix meaning \"away\" with a Latin verb meaning \"to clothe,\" so it is not surprising that it meant \"to undress.\" It also meant \"to strip of possessions.\" In the 1960s it developed an additional meaning: \"to sell off an investment.\"","def":"","answer":"DIVEST","tidbit":"The Latin verb is vestire."},{"cat":"phrase","origin":"In marbles, this phrase, originating in the 1800s, means that any competitor's marbles you knock out are added to your personal collection.","def":"To do something seriously or for an indefinite period of time.","answer":"PLAYING FOR KEEPS","tidbit":""},{"cat":"word","origin":"\"Sawdust\" or \"something sawed\" is the literal meaning of this 16th century word, which Euclid may have chosen, imagining a column with its sides sawn off.","def":"1) A solid figure with two end faces that are similar, equal and parallel rectilinear figures and whose sides are parallelograms.\n2) A medium that distorts or colors light viewed through it.","answer":"PRISM","tidbit":""},{"cat":"phrase","origin":"This 20th century phrase extends the meaning of the term for the annual period during which hunting or fishing restrictions are lifted.","def":"A time when someone or something is the object of unrestrained attack or criticism.","answer":"OPEN SEASON","tidbit":""},{"cat":"word","origin":"This thick, soft, tan-colored leather is not only also a word for its color, it additionally means \"to polish,\" referencing maintaining the leather or using it to shine metals. In the early 1900s, this word was also applied to people who admired and shadowed leather-coat-wearing New York firefighters, and was later extended in use to any \"enthusiast.\" Much later, in the 1980s, the \"polish\" sense led to yet another meaning describing a \"muscular, well-toned person.\" The phrase meaning \"naked,\" comes from the association of leather with hide and skin and of the color being close to some people's skin color.","def":"","answer":"BUFF & IN THE BUFF","tidbit":"Buff comes from the French, Italian and Latin words for \"buffalo.\""},{"cat":"phrase","origin":"In the 14th century, scientists discovered this mixture of lichens could be used as an acid-base indicator because it turns red in acid solutions and back to its natural blue in alkaline solutions. Its figurative meaning is from the late 1950s.","def":"A single indicator that determines a decision.","answer":"LITMUS TEST","tidbit":""},{"cat":"word","origin":"Today the second word in both of these phrases is chiefly used to refer to size, amount or degree and specifically means \"big.\" But it once had other definitions including \"free\" and \"well-to-do,\" meanings obsolete today except in these phrases.","def":"1) At liberty, free, without restraint.\n2) Having a luxurious or extravagant lifestyle.","answer":"AT LARGE & LIVING LARGE","tidbit":""},{"cat":"word","origin":"From the Latin verb salire, meaning \"to leap,\" this word from the 16th century was originally used in English in heraldry to refer to leaping animals such as a frog or deer. It came to mean \"pointing outward\" and then \"prominent, striking\" from the writings of Aristotle that used the word as part of a phrase referring to the heart of an embryo which appears to leap out.","def":"1) Of notable significance, prominent or striking.\n2) Jetting upward.","answer":"SALIENT","tidbit":"The phrase used by Aristotle was salient point."},{"cat":"word","origin":"A combination of Greek words meaning \"sacred carving.\"","def":"A system of writing using pictorial characters.","answer":"HIEROGLYPHIC","tidbit":"Hier\u00f3s means \"holy, sacred\" and glyph\u1e17 means \"carving.\""},{"cat":"word","origin":"The lowest temperature at which vapor will momentarily ignite was dubbed with this word in the 19th century; it developed a figurative meaning in the 1950s.","def":"The point at which a situation turns critical or explodes in violence.","answer":"FLASHPOINT","tidbit":""},{"cat":"word","origin":"From a Latin verb meaning \"to hammer.\" Some people must be pounded into submission.","def":"Pliable, capable of being shaped, altered or controlled by outside forces.","answer":"MALLEABLE","tidbit":"Malleus is the Latin word for \"hammer\" and malleare, means \"to hammer.\" Malleus is the source of the words mallet and maul."},{"cat":"phrase","origin":"The core word in this phrase comes from Middle English and Old English words meaning \"to look or gaze\" and \"become red, glow.\" The former sense is now obsolete, except in this phrase.","def":"When first examined; after an initial glance.","answer":"AT FIRST BLUSH","tidbit":""},{"cat":"word","origin":"German chemist Heinrich Dreser coined this once trademarked name in 1899 from the Latin name for \"meadowsweet,\" the plant in which the processed acid in the medicine is naturally found.","def":"An anti-inflammatory agent often used to relieve headaches.","answer":"ASPIRIN","tidbit":"Salicylic acid was known by the German term spiroylige s\u00e4ure, later shortened to spirs\u00e4ure. An A was used at the beginning to designate \"acetyl,\" followed by \"spir\" followed by the suffix \"in,\" commonly used in the names of drugs."},{"cat":"word","origin":"This mineral water was named in the 18th century for the German town where it was found.","def":"A carbonated mineral water.","answer":"SELTZER","tidbit":"The German word is Selterser, named for the German village Selters."},{"cat":"phrase","origin":"Originally meaning \"typhus\" in the 19th century, this phrase, as we use it today, stems from a 1918 novel that describes the agitation that could afflict those living remotely in the American West. The book starts out: \"There is a certain malady of the mind induced by too much of one thing. Just as the body fed too long upon meat becomes a prey to that horrid disease called scurvy, so the mind fed too long upon monotony succumbs to the insidious mental ailment the West calls [by this phrase.]\"","def":"Extreme irritability and restlessness from living in isolation or a confined indoor area for a prolonged time.","answer":"CABIN FEVER","tidbit":"The book Cabin Fever was written by B. M. Bower."},{"cat":"word","origin":"In various languages this noun meant \"a sowing or planting\" which in Vulgar Latin shifted to refer to the time to do so. This sense of the right time to plant extended to mean \"to ripen,\" which influenced a broader definition for the verb form of the word.","def":"1) A period of the year.\n2) To improve the flavor of a dish by adding ingredients, such as spices to it.\n3) To bring to maturity.","answer":"SEASON","tidbit":""},{"cat":"phrase","origin":"In the Bible (Matthew 3:12; Luke 3:17), John the Baptist uses this phrase to describe how Jesus will separate those who go to heaven from those who go to hell. The analogy John the Baptist uses involves the winnowing of grain to make the grain suitable for eating, whereby farmers remove the husk, other seed coverings and small pieces of stems or leaves that are inedible.","def":"To distinguish valuable people or things from worthless ones.","answer":"SEPARATE THE WHEAT FROM THE CHAFF","tidbit":"Chaff is the outer cover of wheat or other cereals which are separated from the grain by a process called winnowing."},{"cat":"word","origin":"This noun, originally used in Northern England, meant \"a narrow piece of land running up between other and larger divisions of ground.\" Influenced by a Scandinavian word meaning \"linger, go slowly\" and Danish and Old Norse words meaning \"a gang\" and \"tramp,\" respectively, the word was spread by traveling merchants and grew to mean \"territory that tramps wander in\" to their \"camping ground\" to \"the language they spoke.\" The word's meaning continued to evolve over time.","def":"1) An informal, colloquial, nonstandard vocabulary.\n2) Language of a particular group.","answer":"SLANG","tidbit":""},{"cat":"word","origin":"The name of this metal comes from the Latin name for the Island of Cyprus, where it was mined.","def":"","answer":"COPPER","tidbit":"The classical Latin name was Cyprium aes, meaning \"Cyprian metal\" which was contracted in Late Latin to cuprum, which navigated various languages to the Late Old English coper. Aes, via Germanic, became the English word ore."},{"cat":"phrase","origin":"This phrase combines a word that can mean \"to conjure up\" with the name of the first murderer cited in the Bible.","def":"To get into or cause trouble.","answer":"RAISE CAIN","tidbit":"Cain, the first son of Adam and Eve, who killed his brother Abel and was cursed by God.\nFrom the St. Louis Daily Pennant (May 2, 1840): \"Why have we every reason to believe that Adam and Eve were both rowdies? Because ... they both raised Cain.\""},{"cat":"phrase","origin":"Though it is not the definition we first think of, the core word in this phrase referred to an \"enclosure for sheep\" and developed its figurative meaning in the 1300s.","def":"To return to participating with a group that one previously left.","answer":"BACK IN THE FOLD","tidbit":"Similar phrases are return to the fold and keep in the fold."},{"cat":"phrase","origin":"Avena fatua is a wild European grass species that is difficult to eradicate, grows extensively and is useless as a cereal crop. Trying to plant it would be foolhardy, but if you are young and inexperienced, maybe you would try to do so anyway.","def":"To have many sexual relationships when one is young.","answer":"SOW YOUR WILD OATS","tidbit":"Avena fatua are called \"wild oats\" in English. Sow your wild oats was first recorded as an idiom in the 16th century."},{"cat":"word","origin":"Derived from a French word meaning \"a binding or union,\" in the 17th century this word described a thickening agent for sauces using mainly egg yolks but also cream, butter and/or flour. By the early 19th century, it referred to a union among people.","def":"1) An illicit intimate relationship, an affair.\n2) A go-between, a person who manages and maintains connections between different groups, especially in the military.","answer":"LIAISON","tidbit":""},{"cat":"word","origin":"A combination of Greek words meaning, \"flesh-eating.\" This word was also part of a phrase referring to a limestone quarried near the ancient Greek town of Assos. Roman historian Pliny the Elder wrote about the stone: \"It is well known that the bodies of the dead placed in it will be completely consumed after forty days, except for the teeth.\"","def":"A stone coffin above ground, often with inscriptions.","answer":"SARCOPHAGUS","tidbit":"Sarx means \"flesh,\" and phagein means \"to eat.\" The phrase referring to the stone was Greek sarkophagos lithos, meaning \"stone used for coffins.\""},{"cat":"word","origin":"From a Latin word meaning \"buffoon.\" Samuel Johnson, the 18th century scholar, literary figure and author of the famed 1755 A Dictionary of the English Language defined this word as \"using such language as only the licence [sic] of a buffoon can warrant.\"","def":"Using or containing coarse, vulgar, slanderous or evil language.","answer":"SCURRILOUS","tidbit":""},{"cat":"phrase","origin":"A translation from French, this 19th century idiom invokes something sent into the air to test weather and/or air currents.","def":"A test of public opinion.","answer":"TRIAL BALLOON","tidbit":"The French phrase is ballon d'essai."},{"cat":"word","origin":"From an obsolete French word for a sharp noise, this word is believed to have been treated by the French as synonymous with another French word meaning \"a smack or clap of the hand\" that referred to people hired and scattered throughout a theater to applaud during the performance.","def":"A small, exclusive set of people, often deemed arrogant and/or privileged.","answer":"CLIQUE","tidbit":"The French word is also clique. The other French word is claque. In the 19th century, professional clappers, called claqueurs, were commonplace, hired by theater managers from a company in Paris and often managed by a boss called a chef de claque."},{"cat":"phrase","origin":"This phrase from the early 1900s stems from physics and chemistry and was postulated in nuclear physics in 1938.","def":"1) A self-sustaining chemical or nuclear effect yielding energy or products that cause further similar outcomes.\n2) A series of events, each triggered or influenced by the previous.","answer":"CHAIN REACTION","tidbit":""},{"cat":"word","origin":"This 19th century word comes from a French phrase that means \"perpendicularly\" or literally \"according to the plummet.\" A plummet, also called a \"plum line,\" is a lead weight attached to the end of a line and used to determine vertical alignment. This word ultimately traces back to the Latin word for \"lead.\"","def":"Composure, self-confidence.","answer":"APLOMB","tidbit":"The French phrase a plomb, with a figurative meaning of \"poised upright, balanced\" is the source of the English aplomb.\nPlumbum is the Latin word for \"lead.\""},{"cat":"phrase","origin":"A shooting position from the game of marbles, which requires players to keep at least one finger joint on the ground, inspired this 18th century phrase.","def":"To earnestly apply oneself.","answer":"KNUCKLE DOWN","tidbit":""},{"cat":"word","origin":"From a Latin verb meaning \"to gape,\" this 16th century word referred to a gap or opening, such as a cave opening or a chasm. In the early 17th century, it referenced a time-based gap.","def":"To take a break; to suspend an activity for a period of time.","answer":"HIATUS","tidbit":""},{"cat":"phrase","origin":"Picture a soldier pulling out his sword to threaten an opponent and you get the source of this phrase dating from the early 20th century.","def":"1) Military aggression.\n2) Threatening violence.\n3) Aggressive blustering or attempts at intimidation.","answer":"SABER-RATTLING","tidbit":"Spelled sabre-rattling in British English."},{"cat":"word","origin":"From a French word borrowed from a Greek word that translates to \"one that is based or goes topmost or at the farthest extreme.\" The Greek word meant \"tightrope walker\" and itself is derived from a Greek word meaning \"walking on tiptoe.\"","def":"A skilled performer of gymnastic feats.","answer":"ACROBAT","tidbit":"The Middle Greek word akrob\u00e1t\u0113s means \"tightrope walker,\" which itself comes from akr\u00f3batos, which means \"walking on tiptoe.\""},{"cat":"phrase","origin":"The Hindus' reverence of this animal is behind this 20th century phrase.","def":"Someone or some organization that is unreasonably immune from criticism.","answer":"SACRED COW","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"to spread or extend.\" A June 22, 1622, Pope Gregory XV papal edict establishing a committee of cardinals to oversee Catholic missions abroad and spread the faith is credited with sparking the modern meaning of this word, which developed a secular meaning in the late 18th century.","def":"The systematic spread of information in a biased or misleading way to promote a cause or point of view.","answer":"PROPAGANDA","tidbit":"The committee was called the Congregatio de Propaganda Fide, (Congregation for the Propagation of the Faith). Missionaries were sometimes called \"missionaries of the Propaganda.\""},{"cat":"word","origin":"From a Latin word meaning \"to blow,\" this word in the 1400s referred to flatulence and swelling caused by air in the body. In the 1500s, it figuratively meant being \"puffed up with vanity and pride.\" By the 1800s, it was used to describe rising prices. I guess with this word has always been about gas.","def":"1) A persistent, substantial rise in the general level of prices.\n2) The act of swelling or expanding with air or gas.","answer":"INFLATION","tidbit":""},{"cat":"word","origin":"In the 1930s, with radio technology still in its infancy and channel availability limited, shorthand codes were invented to communicate information quickly to ensure lines were open for the police. The codes were adopted by others communicating via radio, such as CB radio users and truckers. This code became a part of mainstream language because of the 1950s crime drama Highway Patrol and the 1975 chart-topping song Convoy.","def":"OK or message received.","answer":"TEN-FOUR","tidbit":"Since it took a split second for the motor in the radios to warm up and the first syllables of a radio transmission were often clipped, the ten was added as throwaway prefix. The second part of the \"ten-codes\" was meaningful: Four meant \"acknowledgement\" of a message."},{"cat":"phrase","origin":"Surprisingly, this expression can be translated as \"a nail and a fresh chip of wood.\" The new wood chip is from the Old Norse term spann-nyr, while the nail comes from the Dutch saying spiksplinternieuw, which referred to a ship that was freshly built with all-new nails and timber. The words were combined in the 16th century into this phrase.","def":"Very clean and neat.","answer":"SPICK-AND-SPAN","tidbit":"The phrase was spick-and-span new before the new got dropped."},{"cat":"phrase","origin":"Theaters in the 18th century generally sold their standard tickets through a ticket agent, a business in town or at the stage door, but the more luxurious balcony seats were sold at the theater. Eventually those venues sold the standard tickets as well.","def":"A place where tickets are sold, or the revenue generated by those tickets.","answer":"BOX OFFICE","tidbit":"Box may also or alternatively refer to the \"money box\" where the ticket revenue was kept."},{"cat":"word","origin":"From the latter part of the 19th century, both this word and phrase probably originate from a walking contest where Southern Black couples would perform a dance mocking the mannerisms of their enslavers. The most graceful couple would receive a fresh baked dessert as a prize.","def":"Very easy.","answer":"CAKEWALK & PIECE OF CAKE","tidbit":"The winners were said to have taken the cake."},{"cat":"word","origin":"From the phrase ob portum veniens: \"coming toward a port,\" referencing the wind blowing toward the port, and Port\u016bnus, the Roman name for the protecting god of harbors. It is good fortune to have the wind make it easier to get to land.","def":"A potential positive outcome due to a favorable combination of circumstances.","answer":"OPPORTUNITY","tidbit":""},{"cat":"word","origin":"From Greek meaning \"a flood,\" this word originally referred to a \"great flood\" and was often used to describe \"Noah's flood.\" Its figurative sense is from the 17th century as a noun, and this adjective form is from the 19th century.","def":"Something that causes great destruction.","answer":"CATACLYSMIC","tidbit":"Cataclysmic comes from cataclysm which is from the Greek kataklysmos."},{"cat":"phrase","origin":"Picture two male animals fighting one another with their antlers, and you get the source of this 19th century phrase.","def":"To fight or clash.","answer":"LOCK HORNS","tidbit":""},{"cat":"word","origin":"Strangely, this 18th century word comes from a Sanskrit word meaning \"uncultivated land, dry land, waterless place.\"","def":"Dense growth of trees and other tangled vegetation.","answer":"JUNGLE","tidbit":"The Sanskrit word is ja\u1e45gala.\nThere are various theories why jungle developed its current definition despite the word's origin. One is that jungles were \"uncultivated,\" without human habitation. Another is that jungle was associated with \"tangle.\""},{"cat":"phrase","origin":"The first word in this phrase is ultimately from Latin words meaning \"to dress in disguise\" or \"wear clothing of a different kind of person.\" In the 17th century this word meant \"a parody or a burlesque\" and referred to a satirical or comic treatment of a serious work. Its extended sense of \"a mockery\" and \"something misrepresenting its intended qualities in a shocking or offensive way\" is often applied to the legal system in this phrase.","def":"An act that is an insult to the legal system.","answer":"TRAVESTY OF JUSTICE","tidbit":""},{"cat":"word","origin":"If you fire a gun without first raising it to aim properly, you may fire quickly but are not likely to hit your target. It gets even worse if you fire in the black of night.","def":"1) To act impulsively.\n2) To guess.","answer":"SHOOT FROM THE HIP & SHOT IN THE DARK","tidbit":""},{"cat":"word","origin":"In early Rome, magistrates counted the population, assessed property values and regulated public manners and moral conduct of the citizens. They were called by this name, which comes from a Latin word meaning \"to estimate or assess.\"","def":"One who oversees morals and conduct or the act of doing so.","answer":"CENSOR","tidbit":""},{"cat":"word","origin":"This 16th century word combines the Latin word for \"great\" with the Latin word for \"soul.\"","def":"Generous, noble, kind.","answer":"MAGNANIMOUS","tidbit":"Magnus means \"great\" and animus means \"soul.\""},{"cat":"phrase","origin":"From a myth, first recorded by the Roman historian Pliny the Elder, that ostriches hide when facing a predator.","def":"Refusal to accept reality or face a problem.","answer":"BURY YOUR HEAD IN THE SAND","tidbit":""},{"cat":"word","origin":"This 16th century word's roots mean \"to inspect\" and referred to officers who collected a tax on nonresidents to favor local merchants. These officials were later tasked with street cleaning before the sense of this word was broadened further.","def":"A person who salvages discarded items. Also, an animal that feeds on refuse or dead flesh.","answer":"SCAVENGER","tidbit":""},{"cat":"phrase","origin":"From the then famous advertisements for Charles Atlas fitness training. The ads, often in a cartoon form, frequently appeared in comic books and magazines starting in the 1940s. The comic book ads, with variations, featured
