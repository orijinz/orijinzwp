d beef and vegetables."},{"cat":"phrase","origin":"This phrase was first recorded in a 1516 text, but Captain James Cook helped popularize it in 1772 when describing soldiers who would \"get drunk with opium ... indiscriminately killing and maiming villagers and animals in a frenzied attack.\" The adverb in this two-word phrase comes from a Malay word meaning \"attacking furiously.\"","def":"To be wildly out of control.","answer":"RUN AMOK","tidbit":""},{"cat":"word","origin":"From the Spanish cucaracha (koo-kah-rah-chah), this word for a type of beetle was altered when borrowed into English in the 1600s.","def":"A voracious insect considered a household nuisance.","answer":"COCKROACH","tidbit":"English speakers misheard cucaracha and transformed it to cock (rooster) and roach, which at the time was a kind of fish."},{"cat":"phrase","origin":"Recorded by Captain John Smith in 1627, this nautical term refers to the end of the anchor rope, often marked with colored rags, attached to a post on the ship's deck. When the sailors lowering the anchor got to the rags, the water was too deep to set anchor.","def":"The conclusion of a difficult or unpleasant situation; the last or furthest extremity.","answer":"BITTER END","tidbit":"Bitter is from the bitts (timber posts) on the ship's deck to which the anchor rope was tied.The figurative meaning of bitter end may come from, or have been influenced by, the phrase's usage in the Bible."},{"cat":"phrase","origin":"A nautical phrase from the late 17th century. A victorious battleship would return home and then enter the harbor with its flags fully unfurled.","def":"To be extremely successful.","answer":"PASS WITH FLYING COLORS","tidbit":"The word colors in this phrase refers to the naval flags or pennants flown from a ship's masts."},{"cat":"word","origin":"Out Our Way, a popular newspaper comic strip drawn by James R. Williams from 1922 to 1957, is the source of this word, which was particularly popular in the 1930s. One of the boys in the comic strip received this nickname from his brothers because he was such a pest. By the 1950s the phrase had shifted to refer to someone who frets all the time.","def":"","answer":"WORRYWART","tidbit":""},{"cat":"word","origin":"In the 14th century this word meant \"stuffing or forcemeat\" (a finely chopped and highly seasoned meat). By the 15th century, it described religious plays that were being \"stuffed\" with tomfoolery such as clowning and acrobatics. Those plays established a type of humorous dramatic genre. Later, around 1690, the word evolved into a general term for an empty or patently ridiculous act or drama.","def":"","answer":"FARCE","tidbit":""},{"cat":"word","origin":"From a Latin word for \"full\" and a subsequent phrase meaning \"full dish\" and referring to a fruit salad. The idea of a fruit medley evolved into the more figurative meaning of \"a poetic medley\" and especially \"a poem that criticizes prevailing vices.\" The meaning expanded further in the 17th century.","def":"A literary work holding up human vices to ridicule or scorn. Also, wit, mockery or sarcasm used to tease or discredit.","answer":"SATIRE","tidbit":""},{"cat":"word","origin":"From the Hindi word \u010dampo, meaning \"to press or knead the muscles.\" English travelers during the mid-18th century experienced Asian hair and body massages and brought these practices back to England. In 1814, Bengali entrepreneur Sake Dean Mahomed brought the service to retail with Mahomed's Indian Vapour Baths in Brighton, England. Clients could receive Turkish baths or an Indian treatment of champi. Over time the word's association with massage dissipated, perhaps because of British and Victorian modesty, but the word kept its association with hair.","def":"To wash something, usually hair, with a special preparation; also, the preparation itself.","answer":"SHAMPOO","tidbit":"Mahomed was appointed \"shampooing surgeon\" to George IV and William IV."},{"cat":"word","origin":"From the 15th century, this word with Latin and Greek roots meant \"the point in the progress of a disease when a change takes place that is decisive to recovery or death.\" By the 17th century, the word's meaning had expanded beyond medicine.","def":"An unstable or crucial time or situation in which a decisive change is impending. Also, any situation that has reached a critical phase.","answer":"CRISIS","tidbit":""},{"cat":"phrase","origin":"In the 18th century, this was the name given to a murder using a cleaver, perpetrated by a hired Chinese assassin in the United States. Over time, the word began to be used metaphorically for vicious, often untrue criticisms or accusations meant to destroy someone's reputation.","def":"","answer":"HATCHET JOB","tidbit":"Or Hatchet man."},{"cat":"phrase","origin":"This nautical phrase from the early 17th century referred to setting the \"yards\" (the poles or \"spars\" that carry the sails) at right angles to the keel so the ship would sail directly downwind. Around the end of the 18th century the phrase was slightly altered and extended to refer to getting the ship prepared and launching without delay. Its figurative use beyond sailing began in the 1860s.","def":"To put everything in order.","answer":"SQUARE AWAY","tidbit":"The original phrase was square the yards."},{"cat":"word","origin":"A popular 12th-century comedic love poem, \"Pamphilus, seu de Amore,\" was widely circulated and inspired this word, which perhaps reinforces why we should all love reading. (Pamphilus is from the Greek pamphilos, which means \"loved by all.\")","def":"A small unbound book.","answer":"PAMPHLET","tidbit":""},{"cat":"word","origin":"In the late 18th century, people wore crude rubber-soled shoes called plimsolls. In 1892, the US Rubber Company began selling more comfortable rubber-soled shoes with canvas tops and then, in 1917, consolidated all its rubber-soled shoe brands under the name Keds. Henry Nelson McKinney, a copywriter who worked for the N. W. Ayer & Son Advertising Agency, coined this term for the shoes because they were so quiet to wear.","def":"A sports shoe with a flexible rubber sole.","answer":"SNEAKERS","tidbit":"Converse All Stars, the first shoes designed for basketball, were also introduced in 1917."},{"cat":"word","origin":"This noun was originally an adjective in the 18th century, borrowed from a French word meaning \"a state of being unprepared.\" It referred to simple attire that seemed slovenly contrasted with the formal dress of the time. Its modern definition stems from 1930.","def":"A woman's sheer dressing gown.","answer":"NEGLIGEE","tidbit":"The French word is neglige, so it originally applied to a person who was negligently dressed."},{"cat":"word","origin":"In the 14th century, this word meant \"windless.\" It comes from Old French and Old Italian words meaning \"tranquility\" and \"quiet, fair weather,\" respectively. Both words are probably further derived from multiple languages in which they meant something akin to \"the heat of the day,\" which was considered a time of quiet and stillness. The word's current, figurative meaning of \"peacefulness\" is from the 1540s.","def":"","answer":"CALM","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"turning away,\" this 16th-century noun refers to the symbol used to indicate the omission of letters in a word. In modern English, it is also the symbol for the possessive case.","def":"","answer":"APOSTROPHE","tidbit":""},{"cat":"word","origin":"In The Spectator in 1711, British poet Joseph Addison wrote about a device in his room that he exercised on for \"an Hour every Morning\" that \"does everything I require of it in the most profound Silence.\" Though the details of how the device worked are not clear, the pulley-like apparatus apparently had four iron arms, each with a lead ball at the end, so using it was like pulling a church bell with no ring or clang. Though it retains the name of the 1700s contraption, this piece of exercise equipment has changed and modernized dramatically over the centuries.","def":"A short bar with weights at each end, used for exercise. Also, a stupid person.","answer":"DUMBBELL","tidbit":""},{"cat":"word","origin":"From a Latin term meaning \"to carry across.\" In the 14th century, this word meant \"to move a dead body or relics of a saint or ruler to a new place,\" but over time it developed a much broader meaning.","def":"To render from one language into another; to turn or change from one place, state or condition into another.","answer":"TRANSLATE","tidbit":""},{"cat":"word","origin":"In 49 BC, Julius Caesar famously defied a Roman Senate order to disband his army and return to Rome. Instead, he boldly took his army past this northern boundary of Italy, which later became the core word in a famous phrase. Once he did so, he uttered the second phrase, an exclamation.","def":"Both phrases refer to passing a point of no return.","answer":"CROSS THE RUBICON & THE DIE IS CAST","tidbit":"The river called the Rubicon separated Italy from the province of Gaul. Caesar won the three-year civil war to become the ruler of the Roman world."},{"cat":"word","origin":"This word from the 16th century likely comes from a Middle English word meaning \"to fart.\" Today's meanings are from the 19th century.","def":"To make a hissing or sputtering sound that dies out quickly; to fail feebly after a promising start.","answer":"FIZZLE","tidbit":""},{"cat":"word","origin":"From the Greek strouthion, meaning \"big sparrow.\" The ancient Greeks also called this bird strouthokamelos, which means \"camel-sparrow,\" because of its long neck.","def":"A large flightless bird.","answer":"OSTRICH","tidbit":""},{"cat":"phrase","origin":"Marilyn Loden coined this phrase in 1978 at a Women's Exposition in New York. She was on a panel titled \"Mirror, Mirror on the Wall,\" about how women's self-images were responsible for their lack of workplace advancement. Loden disagreed with the premise of the panel and argued that there was an unacknowledged invisible barrier preventing women from advancing their careers.","def":"An invisible barrier to workplace advancement.","answer":"GLASS CEILING","tidbit":""},{"cat":"word","origin":"From the 18th century. This word is Italian for \"bad air.\" Italians thought this disease was caught by breathing contaminated or poisonous air in marshlands.","def":"A human disease transmitted by the bite of certain mosquitoes.","answer":"MALARIA","tidbit":""},{"cat":"word","origin":"From a French word meaning \"one who heats,\" referring to a person paid to stoke a steam engine and keep it running. With the invention of automobiles, the French began to use the same word to describe the driver. The latter sense was carried over to English in the late 19th century.","def":"A person employed to drive a car.","answer":"CHAUFFEUR","tidbit":""},{"cat":"word","origin":"This word is a rough acronym of the Russian term glavnoe upravlenie lagerei, which means \"main camp administration.\" The word became familiar in the West because of a 1973 book by former prisoner Aleksandr Solzhenitsyn.","def":"A system of forced labor camps in the Soviet Union, established by Joseph Stalin.","answer":"GULAG","tidbit":"Solzhenitsyn's 1973 book was The Gulag Archipelago. The gulag system in the USSR was officially disbanded in 1960."},{"cat":"word","origin":"Invented and named by Scottish scientist David Brewster (1781-1868). He derived the name from the Greek kalos, meaning \"beauty\"; the Greek eidos, meaning \"shape\"; and the word scope, as in telescope, which it somewhat resembles.","def":"An instrument containing loose bits of colored material that reflect off mirrors at the end of a rotating tube to show an endless variety of patterns.","answer":"KALEIDOSCOPE","tidbit":""},{"cat":"word","origin":"Coined by evolutionary biologist Richard Dawkins in his 1976 book The Selfish Gene. Dawkins derived it from multiple Greek roots - such as mimeisthai, meaning \"to imitate\" - and then altered the word because he wanted it to \"sound a bit like gene.\"","def":"The cultural counterpart of a gene; an idea, behavior or style that spreads from person to person within a culture. Also, an image, snippet of video, text or combination thereof considered humorous or incisive.","answer":"MEME","tidbit":""},{"cat":"phrase","origin":"In ancient Athens, the Great Panathenaia was an important and grand multi-day festival held every four years, starting in 566 BC, to celebrate the goddess Athena, the city's protector. As a part of the activities, a ceremonial flame was carried by a relay of runners between the altar of Prometheus and the altar of Athena. This ritual eventually became a popular relay race and inspired this phrase.","def":"To hand over responsibilities to a successor.","answer":"PASS THE TORCH","tidbit":""},{"cat":"word","origin":"In the late 18th century, English physician Edward Jenner tested the validity of an urban legend that milkmaids who got cowpox didn't get the much more lethal smallpox. His inoculations worked and got named after a Latin word meaning \"from cows.\"","def":"A preparation to increase immunity to a particular disease.","answer":"VACCINE","tidbit":""},{"cat":"word","origin":"Perhaps from the Latin nausea, literally \"seasickness,\" which evolved figuratively to mean \"upset\" or \"malaise,\" then \"disturbance\" and \"uproar.\" In 1200, this word meant \"sound of a musical instrument,\" and by the mid-13th century it meant \"clamor.\"","def":"A loud or unpleasant sound.","answer":"NOISE","tidbit":""},{"cat":"word","origin":"From the 14th century, from a French word meaning \"storeroom for bread.\" Originally it referred to a room where bread and other provisions were kept. Its later use extended to a room also used for storing housewares.","def":"A room or closet in which food, groceries and other housewares are kept.","answer":"PANTRY","tidbit":""},{"cat":"word","origin":"From the 19th century, likely from the name of a West African snake god associated with voodoo reanimation of corpses. It may also be from a Louisiana Creole word meaning \"phantom\" or \"ghost.\"","def":"A reanimated soulless corpse; also, a person whose behavior is listless.","answer":"ZOMBIE","tidbit":""},{"cat":"phrase","origin":"This US phrase is derived from a now defunct idiom used in the late 1840s to contrast communicating with the straight wires of the then-new electric telegraph with passing information via word of mouth. It is often associated with the secret communications of Southern black slaves, who passed information and gossip between themselves via an informal, often clandestine network. The term became widely known during the Civil War period and has been used ever since.","def":"","answer":"HEARD IT THROUGH THE GRAPEVINE","tidbit":"The original idiom was grapevine telegraph. Marvin Gaye's 1968 Motown hit, \"I Heard It Through the Grapevine,\" helped popularize the more modern phrase."},{"cat":"phrase","origin":"This phrase originated in the USA in the late 1800s. The analogy is that a woodcutter should focus on cutting logs and not worry about the small pieces of wood that scatter during the process.","def":"To allow events to happen without trying to change them.","answer":"LET THE CHIPS FALL WHERE THEY MAY","tidbit":""},{"cat":"phrase","origin":"Though it did not become popular until centuries later, this phrase and principle is named after a 14th century philosopher and theologian who embraced it. It is also known as the \"law of parsimony,\" and one of its core tenets is that to solve a problem extraneous information and unnecessary assumptions should be cut away.","def":"The simplest explanation is usually the right one.","answer":"OCCAM'S RAZOR","tidbit":"William of Ockham died in 1347. The concept of \"cutting away unnecessary information and assumptions\" is where the term razor comes from in this phrase."},{"cat":"word","origin":"This word from the early 14th century was likely a variant of the Anglo-French word gridil and referred to a \"metal grate used for cooking over a fire.\" A backformation of this word then became a common word for the same metal grate formation and a common term for a network of electrical power conductors. In the 1970s, this third related phrase came into use to describe the state of being disconnected from all private or public utilities.","def":"","answer":"GRIDIRON & GRID & OFF THE GRID","tidbit":"In the late 1800s, gridiron became a nickname for an American football field because the white lines added to better track yardage made the field look like a cooking grate."},{"cat":"word","origin":"Early 20th century. From Hindi/Urdu and Persian words meaning \"pleasure\" or \"happiness.\" Life is less burdensome when one is happy.","def":"Easy","answer":"CUSHY","tidbit":"From Hindi khu\u015b, Urdu khush and Persian kh\u016bsh."},{"cat":"word","origin":"From an Old English adjective, halgian, meaning \"to make holy\" and the noun even meaning \"the end of the day.\" This day before All Saints' Day has been recognized and celebrated since the Middle Ages, but its name wasn't popularized until it appeared in a 1785 poem by Scottish poet Robert Burns.","def":"","answer":"HALLOWEEN","tidbit":"The evening that preceded All Hallows' Day was All Hallows' Eve or All Hallow Even - or, as we know it today, Halloween."},{"cat":"word","origin":"This fruit is named after a former Papal summer estate near Rome, where it was first planted around 1739. Though it may be folk etymology, the estate name is said to come from two Italian words meaning \"singing wolf.\" The seeds of this fruit were likely first acquired via trade with Armenia.","def":"","answer":"CANTALOUPE","tidbit":"The theory that Cantalupo means \"singing wolf\" holds that the estate name comes from combining cantere, meaning \"to sing\" with lupus meaning \"wolf.\""},{"cat":"phrase","origin":"From the 18th century, this phrase is from cloth-making. After weaving, woolen cloth was rinsed to remove residual dirt and oil from the fleece. To prevent shrinkage, the wet cloth was stretched on wooden frames and left out to dry. The core word in this phrase comes from the name for the frames and the sharp hooked nails used to attach the cloth to them.","def":"Anxious suspense","answer":"ON TENTERHOOKS","tidbit":"Tenter comes from the Latin tendere meaning \"to stretch.\""},{"cat":"word","origin":"Popularized in Shakespeare's play Julius Caesar, this phrase meaning \"incomprehensible speech\" comes from a Medieval Latin proverb. The Spanish word derived from this phrase, often used disparagingly, means \"foreigner\" in Spain or Latin America.","def":"","answer":"IT'S GREEK TO ME & GRINGO","tidbit":"From Julius Caesar:Casca: Ay, he spoke GreekCassius: To what effect?Casca: Nay, an I tell you that, I'll ne'er look you i' the face again: but those that understood him smiled at one another and shook their heads; but, for mine own part, it was Greek to me.The Spanish version of \"It's Greek to me\" is hablar en griego, so gringos are literally \"foreigners\" because they \"speak Greek\" and are unintelligible."},{"cat":"words","origin":"Both of these foods derive their names from Ashkelon, a seaport and city on the Mediterranean coast in what is now Israel. Ashkelon probably grew and shipped both plants to cities in Ancient Rome.","def":"Types of onions","answer":"SCALLION & SHALLOT","tidbit":"The Latin name for Asheklon was Ascalonia."},{"cat":"word","origin":"The core word in both of these phrases is from a Spanish word meaning \"dunce,\" which in turn comes from a Latin word meaning \"stammering,\" because the ancient Romans considered stammering a sign of stupidity. The first phrase is an award given to the loser of a game, and the second is a ploy to catch an unsuspecting victim and originally referred to a teenage prank.","def":"","answer":"BOOBY PRIZE & BOOBY TRAP","tidbit":"Boob traces from the Spanish bobo and the Latin balbus."},{"cat":"word","origin":"Originally referring to a small group of Native Americans who lived in Connecticut, this Algonquian word likely translates to \"swampy place.\" Its popularity as a nickname for a typical, unimportant and mythical small town comes from a column in Buffalo's Daily National Pilot newspaper that first ran on January 5, 1846.","def":"A small, unimportant and isolated town.","answer":"PODUNK","tidbit":"The series was called Letters from Podunk."},{"cat":"word","origin":"From the 16th century, this word is a combination of a Latin prefix meaning \"not\" with the Latin verb peccare meaning \"to sin.\"","def":"Flawless","answer":"IMPECCABLE","tidbit":""},{"cat":"word","origin":"A Middle Dutch verb meaning \"to bite\" led to the common 15th century dog term \"snaked\" or \"took a snake.\" Since dogs sometimes eat only a portion of their food, this word's meaning broadened to refer to a small glass of alcohol in the 18th century and a \"light meal\" or \"food eaten between regular meals\" by the early 19th century.","def":"The Middle Dutch verb is snacken.","answer":"SNACK","tidbit":""},{"cat":"phrase","origin":"A 2004 Saturday Night Live sketch starring Rachel Dratch featured a character who ruins a Walt Disney World family vacation with her incessant negative remarks. The character caught on and was featured numerous times in SNL sketches from 2004 to 2006.","def":"A depressing person.","answer":"DEBBIE DOWNER","tidbit":"In one sketch, Debbie Downer falls in love with host Steve Carell's character, Bob Bummer, who is just as negative as she is."},{"cat":"word","origin":"Reflecting its Latin root, this word meant \"sportive\" or \"playful\" in the early 17th century. Over the rest of that century it became increasingly associated with joking and mockery before it shifted to meaning \"being the joke\" and \"ridiculous.\"","def":"","answer":"LUDICROUS","tidbit":""},{"cat":"word","origin":"In the early 17th century, the Italian village of Cerreto was known for quack physicians, called cerretano (inhabitant of Cerreto), who sounded like circus barkers in their attempts to attract customers. The Italian word for \"chatter\" is ciarlare, and chattering was so associated with the cerretano that the spelling shifted and, by the early 17th century, had anglicized to this word.","def":"A person who pretends to have more knowledge or skill than he possesses.","answer":"CHARLATAN","tidbit":"The Italian word for charlatan is ciarlatano."},{"cat":"word","origin":"From the 16th century, this word is a compound of Latin terms meaning \"with or together\" and \"to bear witness.\" The original notion was the calling of witnesses to begin a legal trial, which then expanded to mean \"to dispute,\" and in the 17th century the meaning broadened again to refer to a \"competition.\"","def":"","answer":"CONTEST","tidbit":""},{"cat":"phrase","origin":"From a proverb first found in print in the 16th century. The analogy is of a drowning person desperately and futilely grabbing for the thin reeds that grow on the riverbank.","def":"To rely on something that has no chance for success.","answer":"GRASPING AT STRAWS","tidbit":""},{"cat":"word","origin":"Originally a type of coffee named for the Red Sea port in Yemen where it was exported from, the term first appeared in 1773. Its meaning expanded in the mid-1800s to refer to a mixture of coffee and chocolate.","def":"","answer":"MOCHA","tidbit":""},{"cat":"word","origin":"Both of these 16th century phrases relate to dogs' passion for their bones and refer to a grievance between people that needs resolution. The first phrase originally meant someone talking just to occupy your time.","def":"","answer":"BONE TO PICK & BONE OF CONTENTION","tidbit":""},{"cat":"word","origin":"From Greek meaning \"bearing well\" and ultimately from the Indo-European root bher (\"to carry, to bear children\"), this word was a doctor's term in the 18th century to express the well-being of a healthy person before its use broadened beyond medicine in the 19th century.","def":"A feeling of elation","answer":"EUPHORIC","tidbit":""},{"cat":"phrase","origin":"The definitive origin of this 19th century phrase is unknown. One theory is that pagans, believing gods lived in trees, would bang on trees to call for good luck. Another theory with Christian roots argues that the phrase refers to banging on the cross to ward off misfortune. Perhaps most likely is that this phrase comes from a 19th century children's tag game called Tiggy Touchwood, where players were immune to being caught whenever they touched a piece of wood, such as a door or a tree.","def":"To ward off bad luck or misfortune","answer":"KNOCK ON WOOD","tidbit":""},{"cat":"word","origin":"First led by Zahir ud-Din Mu\u1e25ammad Babur (1483-1530), a descendant of Genghis Khan, this Muslim family ruled much of South Asia from the early 16th century to the 19th century. In the 17th century, the European name for this Mongolian emperor of India became synonymous with an important leader.","def":"","answer":"MOGUL","tidbit":""},{"cat":"phrase","origin":"The origin of this 1970s phrase is disputed. It may come from the German idiom Du bist ein Erbsenz\u00e4hler which translates to \"you're a pea counter\" but means \"you're a nitpicker.\" Apparently, as he climbed the Milan Cathedral, Karl Baedeker (1801-1859), founder of the tourism guidebook company Baedeker, would reach into his right pants pocket after every 20 stairs, take out a dried pea and place it in his left pants pocket. When he got to the top, Baedeker calculated the total number of stairs he climbed by checking how many peas he had in his left pocket and multiplied that number by 20. According to the story, to verify that his calculations were correct, Badaeker repeated the same procedure on the way back down.","def":"An accountant or bureaucrat, usually perceived as wasting time on controlling expenditures or related menial tasks.","answer":"BEAN COUNTER","tidbit":""},{"cat":"phrase","origin":"A 16th century phrase meaning \"to die\" inspired this 2006 phrase credited to screenwriter Justin Zackham, who used the phrase as the title of his 2007 movie starring Morgan Freeman and Jack Nicholson.","def":"A list of things one wants to do before dying; a wish list to be accomplished by a certain deadline.","answer":"BUCKET LIST","tidbit":"The movie, inspired by the phrase kick the bucket, is The Bucket List."},{"cat":"phrase","origin":"In the 20th century, billiard players coined this term for winning a game of pool and preventing the opponent from even getting another turn by consecutively sinking all the remaining balls without missing.","def":"To win all remaining contests.","answer":"RUN THE TABLE","tidbit":""},{"cat":"word","origin":"This word from Taino, the now extinct language of the Taino people (spoken before Spanish colonization of the Caribbean) combines the words for \"wind\" and \"center.\" It was adopted into Spanish and then into English. The Oxford English Dictionary records 39 different spellings, mostly from the late 16th century. The current spelling became common around 1650.","def":"A tropical cyclone","answer":"HURRICANE","tidbit":"The Taino word for a storm was hurakan, from hura meaning \"wind\" and kan meaning \"center.\" In Taino mythology, that \"center of the wind\" was personified as a fierce, destructive goddess."},{"cat":"word","origin":"These phrases mean the same thing and come from 19th century terms for an illegal punch in boxing.","def":"Criticism that is very unfair or cruel.","answer":"BELOW THE BELT & LOW BLOW","tidbit":""},{"cat":"word","origin":"This word from the mid-16th century combines a verb and a noun. The imitative verb means to make violent, noisy movements, and the noun refers to a small round shield held in the fist, useful for deflecting blows in hand-to-hand combat.","def":"A swaggering or daring swordsman, soldier or adventurer.","answer":"SWASHBUCKLER","tidbit":"Buckler comes from the Latin root buccula, the round piece of material at the center of a shield. The \"buckle\" of a belt has the same origin."},{"cat":"word","origin":"From an Urdu (Persian) word meaning \"dusty-colored.\" In the mid-19th century, the British army was still wearing heavy woolen bright-red uniforms that were easy for opponents to target and uncomfortable in India's sweltering heat. British officers, observing that their Indian privates wore light cotton garments smeared with soil and tea for camouflage, adapted the more practical uniforms, and their wear spread beyond the military.","def":"A light yellowish-brown color; a yellowish-brown cloth or garment (especially pants) made usually of cotton or wool.","answer":"KHAKI","tidbit":""},{"cat":"word","origin":"Both of these phrases, originating in the 18th and 19th centuries respectively, hail from the ringing of a bell to mark a person's passing.","def":"1) A harbinger of the (imminent) end, death or destruction of something.2) The number of people who die in an accident, disaster or war.","answer":"DEATH KNELL & DEATH TOLL","tidbit":"Knell, from the 10th century, is from Old English cnyll, meaning \"sound made by a bell when struck or rung slowly.\""},{"cat":"phrase","origin":"This phrase from the early 20th century comes from wrestling and means to make an all-out effort.","def":"","answer":"GO TO THE MAT","tidbit":""},{"cat":"phrase","origin":"George Orwell's 1949 novel 1984 popularized this phrase meaning an all-powerful government or organization monitoring and directing people's actions.","def":"","answer":"BIG BROTHER","tidbit":""},{"cat":"word","origin":"From a Latin adjective meaning \"leaden blue.\" When it came into English (via French) in the 17th century, it described flesh discolored by a bruise before it portrayed the complexion of a person pale with rage.","def":"Incredibly angry.","answer":"LIVID","tidbit":""},{"cat":"word","origin":"In medieval times, a king's male subject could become a vassal to the monarch in a formal ritual that was known by this noun from a Latin root meaning \"man.\" The vassal knelt and placed his hands between those of his king. The vassal was to revere and serve his lord, and the king's role was to protect the vassal and his family.","def":"Respect or reverence paid or acknowledged.","answer":"HOMAGE","tidbit":"Homo is the Latin root meaning \"man.\""},{"cat":"phrase","origin":"The main word in this 17th century phrase comes from the word gantlope, which itself comes from the Swedish word gatlopp, meaning \"lane-course.\" It referred to a military punishment where the offender ran between two rows of soldiers who struck him with sticks or knotted ropes.","def":"To go through an unpleasant experience in which a lot of people threaten, criticize or attack you.","answer":"RUN THE GAUNTLET","tidbit":""},{"cat":"word","origin":"John le Carre popularized a new definition for the name of this burrowing animal in his novel Tinker, Tailor, Soldier, Spy.","def":"A spy who works within the ranks of an enemy.","answer":"MOLE","tidbit":"Quoting le Carre in Tinker, Tailor, Soldier, Spy: \"Ivlov's task was to service a mole. A mole is a deep penetration agent so called because he burrows deep into the fabric of Western imperialism.\""},{"cat":"word","origin":"Originally this Middle English word, principally based on the old Norse adjective ofugr, meant \"in the wrong direction.\" By the 16th century, it meant \"lacking in dexterity or social grace\" and by the 18th century it also meant \"causing embarrassment.\"","def":"","answer":"AWKWARD","tidbit":"Ward indicates \"having a specific direction,\" such as onward, forward or backward."},{"cat":"phrase","origin":"A Presbyterian minister developed a following in the early 1800s for his unique, unconventional healthy living ideas. He advocated abstinence and strict vegetarianism. He preached the benefits of hard mattresses; a lot of open, fresh air; cold showers and loose clothing. He warned that mustard and ketchup cause insanity. He also advocated for a high-fiber diet and the use of homemade unsifted, coarsely ground wheat flour, which led to this food being named for him.","def":"A slightly sweet biscuit made of whole-wheat flour.","answer":"GRAHAM CRACKER","tidbit":"The Reverend Sylvester Graham's (1794-1851) beliefs led to the eponymous graham cracker, which was popularized almost 50 years after his death by National Biscuit Company (now Nabisco). Today's graham crackers would not meet with Graham's approval because of ingredients like refined flours and sugar, but they are much tastier than the originals."},{"cat":"phrase","origin":"This phrase from the early 1800s derives from an orchestra's organizational structure. The first violin is considered the best violinist, leader of the violin section and is usually the concertmaster, the highest ranked musician in the orchestra. This second violinist is left with this duty.","def":"To take a secondary or subordinate role.","answer":"PLAY SECOND FIDDLE","tidbit":""},{"cat":"phrase","origin":"A 17th century Cambridge innkeeper, who was also a licensed mail carrier between Cambridge and London, England, rented his horses to university students when he wasn't using them. To prevent the most popular horses from being overworked, he launched a strict rotation system, requiring each customer to take the most rested horse nearest the stable door. If a customer demurred, the innkeeper would refuse to rent him any of his horses.","def":"Taking what is offered or nothing. Also, having multiple equally bad options.","answer":"HOBSON'S CHOICE","tidbit":"Some etymologists have found Hobson's Choice used in various forms many years before Thomas Hobson's (c. 1544-1631) death, indicating that the phrase did not originate with his rotation system. But, his system is still likely the source of the phrase's popularity because of the famous poet John Milton, a Cambridge student who wrote two poems as epitaphs for Hobson."},{"cat":"words","origin":"Both of these words are from Old French for \"to forcefully seize.\" The first word originally meant to rape or violently rob a woman, but, in the 14th century, it came to refer to the soul moving to heaven and more generally to intense spiritual experiences. That sense led to a meaning (referring to a woman) of \"enchanting beauty.\" The second word developed a specialized meaning of an animal devouring its prey, which led to a broader meaning of \"extremely hungry.\"","def":"","answer":"RAVISHING & RAVENOUS","tidbit":"Ravage and rapid have similar origins to ravishing."},{"cat":"phrase","origin":"A boil, abscess or pimple about to burst inspired this phrase dating from the mid-15th century.","def":"Cause to reach a turning point or crisis.","answer":"COME TO A HEAD","tidbit":""},{"cat":"phrase","origin":"A scratched or damaged phonograph album that sticks at a particular point, endlessly repeating the same musical segment, led to this idiom with a first-recorded use around 1940.","def":"A statement or experience that is annoying or exasperating because it is tediously repeated.","answer":"BROKEN RECORD","tidbit":""},{"cat":"phrase","origin":"Guido of Arezzo was a Benedictine monk who, around 1025, developed a system for designating musical notes, the do, re, mi, fa, sol, la and ti of its day. Guido used a hexatonic scale (six notes) with the syllables ut, re, mi, fa, sol and la. Guido named his system by combing ut, representing the lowest sung tone, with the name for the ut note, gamma. That name became the central word in this phrase.","def":"To extend over the entire range of something.","answer":"RUN THE GAMUT","tidbit":"Guido chose ut from the hymn Ut Queant Laxis Resonare, sung to honor St. John the Baptist and attributed to the Italian monk and scholar Paulus Diaconus (720-799 AD)."},{"cat":"phrase","origin":"In medieval times, archers carried a reserve bowstring in case the first one broke.","def":"A substitute. Frequently used in sports to refer to a reserve player.","answer":"SECOND-STRING","tidbit":""},{"cat":"word","origin":"From the Greek verb perdesthai, which means \"to break wind,\" this bird's weight and wing shape cause it to produce a low, whirring noise that sounds like, well you know...","def":"Any of a widely distributed family of game birds with a compact body and short legs.","answer":"PARTRIDGE","tidbit":""},{"cat":"word","origin":"From a Sanskrit word meaning \"descent,\" this 18th century word originally referred to \"the descent of a Hindu deity to earth in an incarnate form.\" About two decades later, its meaning generalized to \"a visible representation of something abstract.\" The Neal Stephenson 1992 science fiction novel Snow Crash popularized a new definition: \"a computer-generated image representing or associated with a particular person on the internet and/or in computer games.\"","def":"","answer":"AVATAR","tidbit":""},{"cat":"phrase","origin":"From the name of a comic strip created by Arthur R. \"Pop\" Momand that ran from 1913 to 1940. The strip depicted the social-climbing McGinis family who strove to achieve the same status and income as their neighbors.","def":"","answer":"KEEPING UP WITH THE JONESES","tidbit":"The neighbors, the Joneses, were often discussed in the strip but were never shown."},{"cat":"phrase","origin":"An allusion to English poet Samuel Taylor Coleridge's The Rime of the Ancient Mariner (1798), in which a sailor shoots a large, friendly seabird that had navigated the ship away from ice. Because the killing curses the ship, and the winds strand it in uncharted waters, the mariner is forced to wear the bird's carcass around his neck as punishment. One by one, all of the crew members die. The mariner lives, and only when he begins to see the beauty in the sea creatures swimming in the water and blesses them, is the curse lifted.","def":"A burden which is difficult to rid oneself of.","answer":"AN ALBATROSS AROUND ONE'S NECK","tidbit":""},{"cat":"phrase","origin":"From a character in medieval German folklore who, bored and depressed with his life as a scholar, agrees to surrender his soul to the devil's representative, Mephistopheles, at a specified time in the future in exchange for knowledge and magical powers to access the world's pleasures.","def":"An agreement to sacrifice one's principles for power, wealth or other benefits.","answer":"FAUSTIAN BARGAIN","tidbit":""},{"cat":"phrase","origin":"From the Old Testament tale of Jonah who, having angered God, sails on a ship to escape. God summons turbulent seas, forcing the sailors to throw Jonah overboard to calm the squalls. Jonah is swallowed by \"a great fish\" and is marooned in its stomach for three days and three nights until he is vomited out onto dry land.","def":"To be in the center of a dangerous situation or place.","answer":"BELLY OF THE BEAST","tidbit":""},{"cat":"word","origin":"This word, which entered the English language in the 1800s, traces its roots to a Hindi and Urdu word meaning \"thief,\" which itself comes from the Sanskrit verb sthagati, meaning \"to conceal.\" It referred to a group of professional robbers and murderers in India, also known as p'hansigars meaning \"stranglers,\" because they reportedly strangled thousands of people on India's roadsides.","def":"A violent criminal or bully.","answer":"THUG","tidbit":"The Hindi and Urdu word is thag. The group was called the Thuggees or Thugs. Some historians now argue that the \"Thuggee Cult\" was partly an embellishment by the British to better control India."},{"cat":"phrase","origin":"From the 1831 book The Young Duke by Benjamin Disraeli about a horse race in which the favorites surprisingly lose to an unknown stallion.","def":"An unknown or little-known competitor who would be or is an unexpected winner or choice.","answer":"DARK HORSE","tidbit":"Quoting from the book: \"The first favourite was never heard of, the second favourite was never seen after the distance post, all the ten-to-oners were in the rear, and a dark horse, which had never been thought of, and which the careless St. James had never even observed in the list, rushed past the grand stand in sweeping triumph.\""},{"cat":"word","origin":"From the late 16th century, this word comes from a Latin word auspex meaning \"bird seer.\" In ancient Rome, some priests based their predictions on the flight and feeding patterns of birds.","def":"Promising, a good omen.","answer":"AUSPICIOUS","tidbit":"Auspex was formed by combining the noun avis meaning \"bird\" with the verb specere meaning \"to look.\""},{"cat":"word","origin":"From an Icelandic name for a specific hot spring in the Haukadalur geothermal valley in South Iceland that traveling writers mistook as the generic name for jetting hot springs. In Old Norse it means \"the gusher.\"","def":"A spring that intermittently erupts in jets of heated water and steam.","answer":"GEYSER","tidbit":""},{"cat":"phrase","origin":"Dating from the 1500s, this phrase originally alluded to eagerly looking forward to scrumptious food. The last word in this phrase derives from the Old English word chaps, meaning \"jaws\" or \"side of the face.\"","def":"Eagerly anticipate. This phrase also meant warming up before a performance among jazz musicians in the 1930s and '40s.","answer":"LICK ONE'S CHOPS","tidbit":""},{"cat":"word","origin":"From an Ancient Greek verb meaning \"to wander,\" this word referred to celestial bodies that moved independently of fixed stars.","def":"Any of the large celestial bodies that revolve around a sun.","answer":"PLANET","tidbit":"The Ancient Greek planet comes from the Greek verb planasthai."},{"cat":"phrase","origin":"American boxing manager Benjamin \"Evil Eye\" Finkle (1899-1978) used this phrase of unknown origin to describe hexing his fighters' opponents, but its popularity stems from the comic strip Li'l Abner (1934-1977). The character Evil-Eye Fleegle, reputedly inspired by Finkle, could paralyze someone with his gaze, either with one eye, 11/4 eyes, 11/2 eyes or most powerfully, with both.","def":"A twofold blow or setback.","answer":"DOUBLE WHAMMY","tidbit":"Quoting Fleegle: \"And, lastly-th' 'double whammy'-namely, th' full power o' both eyes-which I hopes I never hafta use-because, in my opinion, it might endanger and louse up th' univoise!!\""},{"cat":"word","origin":"From the early 17th century, this word refers to a layer of earth for growing plants that is enclosed in a glass frame and heated by fermenting manure. In the 18th century it developed a figurative meaning of \"a place that promotes rapid growth or development.\"","def":"","answer":"HOTBED","tidbit":""},{"cat":"phrase","origin":"From the barking sounds that hunting dogs make when they have their prey cornered and the prey turns to face the hounds and defend itself. This phrase is first recorded in the English romantic story Guy of Warwick, circa 1330.","def":"Fend off.","answer":"KEEP AT BAY","tidbit":"From the Old French abai meaning \"barking,\" which came into English as abay and later as at bay in the 16th century. At a bay evolved to keep at bay by the 18th century."},{"cat":"phrase","origin":"From the Roman parable dubbed the \"Sword of Damocles,\" popularized by Cicero in his 45 BC book Tusculan Disputations. Dionysius II was a powerful, tyrannical, unhappy king who feared assassination. When a court sycophant named Damocles remarked how blissful the king's life must be, Dionysius seated Damocles on a golden couch and gave him a feast and servants. But when Damocles noticed a sword dangling from the ceiling above his head, suspended by only a single strand of horsehair, he was no longer able to enjoy the opulence and asked to leave.","def":"To be in a precarious situation.","answer":"HANG BY A THREAD","tidbit":""},{"cat":"phrase","origin":"Picture a car stuck in sand, mud or snow, its tires turning futilely, for the source of this 20th century phrase.","def":"To use a lot of effort but not achieve anything.","answer":"SPIN YOUR WHEELS","tidbit":""},{"cat":"phrase","origin":"In England in the 1700s, this fruit name was popular in everyday speech meaning \"something very good.\" It also meant \"100,000 pounds,\" which was a vast sum of money at the time and may have become associated with employment because it was the fixed salary for certain cushy government positions.","def":"A good job coveted by others. Sometimes a choice job that pays well but does not require hard work.","answer":"PLUM JOB","tidbit":""},{"cat":"word","origin":"Starting in the late 1800s century and continuing into the 1950s, local U.S. newspapers used stories from large publishing syndicates. The syndicates provided copy on metal sheets with the type already in place so the local papers wouldn't have to set it. Printers apparently dubbed those syndicated plates and the text printed on them with this word because of their resemblance to the plating used in making steam boilers.","def":"Standardized text or formulaic, unoriginal or cliched language.","answer":"BOILERPLATE","tidbit":""},{"cat":"phrase","origin":"First recorded in Nicholas Udall's 1548 book Paraphrase of Erasmus that translates the Dutch scholar's Latin biblical paraphrases and rewritings of the Gospels. In one sentence Udall uses two phrases to describe \"The Sophistes of Grece.\" The first, borrowed from the second-century Greek writer Lucian, is that he could make an \"Elephant of a flye.\" But it is this second conceptually similar phrase that has stood the test of time and been used for centuries.","def":"An extreme exaggeration.","answer":"MOUNTAIN OUT OF A MOLEHILL","tidbit":""},{"cat":"phrase","origin":"The core word in this phrase was first used in cricket in the 1900s, then in bare-knuckle boxing as the name for the line drawn across the ring where the boxers would meet to start a bout and later to designate the starting line for a running race. This phrase itself was in use in the 1860s and meant \"to run a race with no advantage\" before developing its figurative sense of \"beginning with nothing\" a few decades later.","def":"","answer":"START FROM SCRATCH","tidbit":""},{"cat":"phrase","origin":"This phrase, first recorded in the 19th century, may have come from Freemasonry, which was originally an organization of skilled stone workers who, over time, used stonecutting and the tools and language of that trade as metaphors for moral virtues. A flat, strong foundation is essential to the integrity of a building.","def":"Fair, honest, or straightforward.","answer":"ON THE LEVEL","tidbit":""},{"cat":"word","origin":"Both of these phrases from the 14th and 15th centuries come from the blacksmith trade and reflect how important it is to forge metal at the right temperature.","def":"1) To quickly take advantage of an opportunity.2) Attempting to do too many things at once.","answer":"STRIKE WHILE THE IRON IS HOT & TOO MANY IRONS IN THE FIRE","tidbit":"If a blacksmith tries to heat too many pieces of iron at once, it cools the fire, and the iron doesn't heat properly."},{"cat":"word","origin":"This eponym comes from the name for a fierce Germanic tribe who lived in an area south of the Baltic Sea, invaded Western Europe, overran Gaul, Spain, and North Africa and sacked Rome in the fourth and fifth centuries.","def":"A person who willfully or ignorantly destroys or damages something beautiful or valuable.","answer":"VANDAL","tidbit":""},{"cat":"words","origin":"Both of these words come from a Latin word meaning \"mist\" or \"cloud.\" The first word from the 1300s meant \"cloudy\" before developing its figurative meaning of \"vague\" or \"unclear\" in the 1800s. The second word, from the 1600s, referred to a cloudy formation in urine or to a cloudiness in the eye (cataracts) before being used to describe a cloud of interstellar gas and dust in the early 1700s.","def":"","answer":"NEBULOUS & NEBULA","tidbit":""},{"cat":"phrase","origin":"Ma Perkins, a radio serial drama about a woman who ran a lumberyard in the fictitious town of Rushville Center, was launched in 1933, targeting that era's plentiful population of housewives. Procter & Gamble's (P&G) Oxydol laundry detergent sponsorship of the show was so successful that, over time, P&G and its competitors became frequent sponsors (and in some cases, producers) of daytime serials on radio and television. These frequent sponsorships led to serial dramas becoming known by this phrase.","def":"A melodramatic serial radio or television program.","answer":"SOAP OPERA","tidbit":""},{"cat":"phrase","origin":"This phrase, first documented in the late 16th century and likely enduring because of its alliteration, originally had nothing to do with physical fitness, as it does today. It probably referred to a violin being well maintained or more broadly to the violin being a quality instrument.","def":"In exceptionally good health.","answer":"FIT AS A FIDDLE","tidbit":"Fit originally meant \"fine\" or \"suitable.\""},{"cat":"phrase","origin":"In the 19th century, cotton quality was graded. The multitude of levels started at \"fine\" (the highest quality) and ended with \"inferior.\" This phrase represented the range of quality between \"good,\" the level just below \"fine,\" and \"ordinary,\" the grade just above \"inferior.\" The phrase was common enough to later develop a figurative meaning of \"moderate\" or \"just OK.\"","def":"","answer":"FAIR TO MIDDLING","tidbit":""},{"cat":"word","origin":"In the 16th century, this word referred to the small cavities this common city-dwelling bird would nest in. Over time it picked up additional meanings, including \"small compartments in a desk or cabinet for keeping documents.\" By the end of the 19th century, it developed its now common figurative definition.","def":"To categorize narrowly or restrictively, often incorrectly.","answer":"PIGEONHOLE","tidbit":""},{"cat":"word","origin":"In the late 16th century, this word was an astrology term to describe those born under the influence of Jupiter. Since the planet and astrological sign were supposed to impart happiness, the definition broadened to mean \"cheerful.\"","def":"","answer":"JOVIAL","tidbit":"Jove, the Roman god of the bright sky, is another name for Jupiter."},{"cat":"phrase","origin":"This phrase, originating in the 19th century, came from the belief that this foraging insect returns straight to its hive to communicate the location of nectar-laden flowers.","def":"Go quickly and directly.","answer":"MAKE A BEELINE","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase comes from a Japanese word meaning \"group leader\" that was picked up by American prisoners of war in Japanese POW camps during World War II.","def":"The boss or leader.","answer":"HEAD HONCHO","tidbit":"The Japanese word hancho means \"group or squad leader\" from han meaning \"squad\" and cho meaning \"head or chief.\""},{"cat":"word","origin":"This adjective comes from the name of the giant king in a Francois Rabelais 16th century satiric novel.","def":"Gigantic.","answer":"GARGANTUAN","tidbit":"Gargantua is Rabelais' 1534 novel and the name of its main character."},{"cat":"phrase","origin":"In the 1977 opening episode of the fifth season of the hit TV show Happy Days, Fonzie, played by Henry Winkler, dons his trademark leather jacket and a swimsuit and leaps over this iconic large and scary marine fish while waterskiing. The series continued for another seven years, but many consider this episode the point at which the show began to decline.","def":"A conspicuous moment, such as a silly gimmick, to try to revitalize a once popular television show when you know that, from now on, it's all downhill.","answer":"JUMPING THE SHARK","tidbit":"Jumping the shark was popularized by TV and fast-food critic Jon Hein, who, in December 1997, launched the now defunct website jumptheshark.com. The phrase was actually coined by Sean Connolly, Hein's roommate at the University of Michigan."},{"cat":"phrase","origin":"A hunting term from the late 19th century for a variety of game birds killed in one outing and put into the same bag that broadened in meaning in the early 20th century.","def":"1) A random assortment.2) Having positive and negative characteristics","answer":"MIXED BAG","tidbit":""},{"cat":"phrase","origin":"The French game piquet, one of the world's oldest card games, became popular with the English in the mid-1600s. This phrase was the name for a hand with no face cards. By the early 1700s, it referred to a signed blank document or contract where the owner could create the terms. The latter meaning led to the current figurative definition.","def":"Unconditional authority.","answer":"CARTE BLANCHE","tidbit":"Carte blanche translates to \"blank (or white) paper.\" Piquet is played with 32 cards, with the four suits containing the sevens through 10s, the face cards and aces."},{"cat":"word","origin":"From a Latin word meaning \"account-book.\" In ancient Rome, debts and interest were recorded in a ledger and due the first day of the Roman month.","def":"A system for organizing the time within a year.","answer":"CALENDAR","tidbit":""},{"cat":"phrase","origin":"This phrase alludes to insects or rodents crawling out of the interior crevices of a house, such as baseboards and moldings.","def":"To emerge from obscurity, often opportunistically.","answer":"COME OUT OF THE WOODWORK","tidbit":""},{"cat":"word","origin":"This late 14th century word literally means \"to look back\" and meant to \"direct one's gaze toward, to take notice of, to face.\"","def":"To have high regard for.","answer":"RESPECT","tidbit":"The Latin verb specere meaning \"to look\" or \"to look at\" is the source of many English words including inspect, aspect, prospect, speculate, suspect, expect, perspective, despise, species, specimen, introspection and circumspect."},{"cat":"word","origin":"This 16th century word comes from a Latin, and later, a French word meaning \"illusion\" or \"trickery.\" Around 300 years later the definition magically shifted to refer to \"esteemed reputation.\" So, status really is an \"illusion.\"","def":"","answer":"PRESTIGIOUS","tidbit":""},{"cat":"word","origin":"English borrowed this word from French in the 1600s. The French word came from an Italian word meaning \"tart\" which came from the Medieval Latin name for butcher's-broom, a small evergreen shrub with stiff and flat branches used for making brooms. In English this word initially referred to a tartness in wine.","def":"A harsh, stiff manner.","answer":"BRUSQUE","tidbit":""},{"cat":"word","origin":"This word comes from the 17th century Latin root fatuus, which means \"foolish.\"","def":"Obsessively passionate love, admiration or interest in someone or something.","answer":"INFATUATION","tidbit":""},{"cat":"phrase","origin":"Thomas D. Rice (1808-1860) is considered the father of the minstrel show, American comedy performed in blackface that caricatured the singing and dancing of slaves. His signature character went by this name that became a derogatory and offensive term for a Black person in the 19th century and in the 20th century became associated with racial discrimination against Blacks, often codified in law.","def":"","answer":"JIM CROW","tidbit":""},{"cat":"phrase","origin":"In Shakespeare's play King John, the character of Salisbury argues the king's second coronation was ridiculously excessive, like covering gold with gold. A new idiom was created in the 19th century when a line from Salisbury's speech expressing this sentiment was later misquoted.","def":"To unnecessarily adorn something already beautiful.","answer":"GILD THE LILY","tidbit":"From King John:\"Salisbury. Therefore, to be possess'd with double pomp,To guard a title that was rich before,To gild refined gold, to paint the lily,To throw a perfume on the violet,To smooth the ice, or add another hueUnto the rainbow, or with taper-lightTo seek the beauteous eye of heaven to garnish,Is wasteful and ridiculous excess.\""},{"cat":"word","origin":"From Ancient Greek boutyron which most etymologists believe combines the words bous meaning \"cow or ox\" with tyros meaning \"cheese.\" In the 10th century, it was used as a bath additive and as a medicine.","def":"","answer":"BUTTER","tidbit":"Since butter wasn't a native product to the ancient Greeks (they used oil), some believe the word came from Iranian-descended nomads and traders called the Scythians."},{"cat":"phrase","origin":"Alicia Garza posted this phrase on Facebook in July 2013, because she was still outraged and saddened by the acquittal of George Zimmerman, a member of a local neighborhood watch, for the shooting death of 17-year-old Trayvon Martin in 2012. The phrase caught on, especially on Twitter, starting in August 2014 during protests over the killing of Michael Brown by police officer Darren Wilson in Ferguson, Missouri.","def":"A political and social movement campaigning against racism and for human rights and equality for Black people.","answer":"BLACK LIVES MATTER","tidbit":""},{"cat":"phrase","origin":"This phrase may come from a religious practice in ancient India in which the devout would throw balls of ghee (a semifluid clarified butter) at the statues of their gods to seek favor and forgiveness.","def":"Lavish flattery.","answer":"BUTTER SOMEONE UP","tidbit":"The phrase may also come from:1) An old Tibetan New Year's custom of crafting sculptures from colored butter to bring happiness and peace in the coming lunar year.2) How spreading butter on bread improves the taste."},{"cat":"phrase","origin":"This proverb was first recorded in the 17th century and its basic notion goes back to the 14th century. But sometime in the 20th century the ending of the phrase, is in the eating, was dropped so that, while its meaning is still broadly understood, the proverb literally no longer makes sense.","def":"The quality of an item can only be determined by using it.","answer":"THE PROOF IS IN THE PUDDING","tidbit":"The original proverb is the proof of the pudding is in the eating, where proof means \"test.\" Of course, the proof is not in the pudding, it is in the eating!"},{"cat":"word","origin":"From a 16th century French dice game lourche (or l'ourche), supposedly a bit like backgammon, where to incur a lourche meant to be in a hopeless position, far behind the other players. The term lourche was altered and borrowed into English and later was used in cribbage and other games. The details of the game are lost to history, as are most uses of the English version of lourche, except for its use in this phrase.","def":"Abandon someone in a difficult situation.","answer":"LEFT IN THE LURCH","tidbit":""},{"cat":"phrase","origin":"Chick Hearn, an iconic sportscaster for the Los Angeles Lakers, inspired by a powerful, dynamic shot by the 7-foot-1-inch basketball legend Wilt Chamberlain, coined this term in which a player jumps in the air above the horizontal plane of the rim and dramatically puts the ball through the basket. Given that this shot is made almost all the time, the phrase developed a broader meaning in the 1980s.","def":"A sure thing.","answer":"SLAM DUNK","tidbit":""},{"cat":"phrase","origin":"From the title of a 1956 bestselling novel written by Edwin O'Connor about a politician in his final campaign. The book was also adapted into a 1958 movie starring Spencer Tracy.","def":"A final attempt or performance.","answer":"LAST HURRAH","tidbit":"Hurrah is believed to have been a battle cry of Prussian soldiers during the War of Liberation (1812-13). It likely was a modification of huzza, a sailor's shout of encouragement."},{"cat":"word","origin":"The Scottish inventor James Watt, whose name is behind watt as a term for a standard unit of electrical power, is also well known for inventing this word to describe the power of his improved steam engine that was fundamental to the industrial revolution in the late 18th century. Watt wanted a term that could convey to potential customers how his steam engine could replace the work previously done by animals.","def":"1) The power of an engine.2) The capacity to achieve or produce; talent.","answer":"HORSEPOWER","tidbit":"Watt believed his improved steam engines could produce enough power to replace 10 cart-pulling horses - or 10 horsepower. Though Watt overestimated the power of a standard horse, the term and calculation stuck."},{"cat":"word","origin":"The Old English word utlendisc described a \"foreigner.\" By the late 16th century this definition was archaic, and the word referred to something unfamiliar or strange and by extension anything considered outrageous or extravagant.","def":"","answer":"OUTLANDISH","tidbit":"Someone from another country is utlendisc literally from an \"outland.\""},{"cat":"word","origin":"From a combination of the Greek words ex, meaning \"out of,\" and kentron, meaning \"center.\" Originally it referenced circles not having the same center but developed a figurative meaning of \"odd\" in the 17th century.","def":"1) Odd or unusual.2) Something that doesn't follow a truly circular path.","answer":"ECCENTRIC","tidbit":"Originally eccentric was the opposite of concentric."},{"cat":"phrase","origin":"This old common word for \"table\" and, by extension, the dining table and the food eaten on it, is behind this phrase.","def":"Lodging with meals.","answer":"ROOM AND BOARD","tidbit":""},{"cat":"phrase","origin":"The phrase likely came from rap and hip-hop battles. Its first recorded use is from 1991. LL Cool J used it in his Inaugural Rap performed for Bill Clinton in 1993.","def":"To make an unexpected or dramatic change from what has been done previously. Also, to reverse the usual or preexisting positions in a situation.","answer":"FLIP THE SCRIPT","tidbit":""},{"cat":"word","origin":"This candy was invented in 1927 in Vienna, Austria, by Eduard Haas III as an alternative to smoking. The candy name comes from the German word for peppermint, Pfefferminz.","def":"A small, dry, straight-edged, curved-corner block candy associated with plastic manual candy dispensers.","answer":"PEZ","tidbit":"Haas took the P from the first letter, the E from the middle and Z from the last letter of Pfefferminz.\nThe first dispenser was introduced at the Vienna Trade Fair in 1949."},{"cat":"word","origin":"From the Latin meaning \"to beat against,\" this word meant \"dull\" in the early 15th century before quickly developing its additional figurative meanings.","def":"1) Difficult to understand.\n2) Dull.\n3) Lacking insight.\n4) An angle exceeding 90\u00b0 degrees but less than 180\u00b0.","answer":"OBTUSE","tidbit":"The definition \"difficult to understand\" likely stems from confusion with the similar-sounding abstruse."},{"cat":"word","origin":"Though its Latin translation is \"to play together,\" this word refers to a \"secret agreement to cooperate\" and implies deceit or trickery rather than fun.","def":"","answer":"COLLUDE","tidbit":""},{"cat":"word","origin":"Adamas, the Greek name for the hardest imaginable (and hypothetical) substance, is the source of this word dating from the 14th century.","def":"A crystalline carbon that is the hardest known mineral and highly valued as a precious stone.","answer":"DIAMOND","tidbit":""},{"cat":"word","origin":"In the 17th century, sailors used a \"common log,\" a rope with markers 14.4 meters apart, to measure speed. One end was attached to the ship, and the log was thrown into the water. Using an hourglass, sailors counted the markers passing through their fingers as the rope unspooled, indicating the ship's speed.","def":"A measure of speed at sea.","answer":"KNOT","tidbit":"The markers were knots. A nautical mile is based on the circumference of the earth and it is equal to one minute of a degree latitude: 14.4 meters divided by 30 seconds equals 1.85166 kilometers per hour or one nautical mile."},{"cat":"word","origin":"Perhaps because of its wine-like color, this stone was thought to thwart inebriation. The name of the stone comes from an ancient Greek word meaning \"remedy against drunkenness.\"","def":"A clear purple or bluish violet variety of crystallized quartz.","answer":"AMETHYST","tidbit":"The Greek word amethystos comes from a, meaning \"not\" and methyskein, meaning \"make drunk.\" Methyskein comes from methys, meaning \"wine.\""},{"cat":"word","origin":"From Greek words meaning \"drinking together,\" this word originally referred to an ancient Greek aristocratic social gathering where men drank together, conversed and enjoyed themselves with music, dancers and other entertainment. Its current definition is from the 18th century, likely stemming from the title of one of Plato's dialogues.","def":"A formal meeting or conference at which several experts deliver short talks on a topic.","answer":"SYMPOSIUM","tidbit":""},{"cat":"phrase","origin":"According to Islam, Judaism and other religions, there are multiple levels of heaven. The highest is where God resides and sits upon a throne.","def":"A state of extreme joy.","answer":"SEVENTH HEAVEN","tidbit":""},{"cat":"word","origin":"This Spanish word, borrowed into English, comes from the Latin words sexta hora, meaning \"sixth hour.\"","def":"A midday nap.","answer":"SIESTA","tidbit":"Noon for the Romans came six hours after sunrise."},{"cat":"phrase","origin":"In the fairy tale of Hansel and Gretel, the siblings are stranded in the forest by their parents, who believe they are too poor to feed them. The kids drop clues along the way so they can trace their steps back home.","def":"1) Hints or clues leading to a person or place.\n2) A navigation aid showing users where they are in a program or on a website.","answer":"TRAIL OF BREADCRUMBS","tidbit":""},{"cat":"word","origin":"Originally a shortened variant of the word \"ordinary,\" this word came to describe items that were common or of poor quality and then evolved to mean \"lazy.\" By the end of 19th century, it had developed its current meaning.","def":"Irritable.","answer":"ORNERY","tidbit":""},{"cat":"phrase","origin":"The magical command used by Ali Baba to open the door to the robbers' cave of treasures in the story Ali Baba and the Forty Thieves.","def":"Something that leads to a desired result in an easy and sometimes amazing way.","answer":"OPEN SESAME","tidbit":"The tale was added to the story collection One Thousand and One Nights by one of its European translators, Antoine Galland, in the 18th century."},{"cat":"phrase","origin":"This early 20th century phrase originated in horse racing, referring to the winner of a rigged race. The core of this phrase is an onomatopoeia from the noise people often make when driving a person or an animal in a specific direction.","def":"A certain winner.","answer":"SHOO-IN","tidbit":"George E. Smith quoted in his Racing Maxims and Methods of \"Pittsburgh Phil\" in 1908: \"There were many times presumably that 'Tod' would win through such manipulations, being 'shooed in', as it were.\""},{"cat":"phrase","origin":"This phrase likely started in 19th century London with the Romani slang word for prison, stardo or sturiben. When this word came to the U.S. in the 20th century, a word was added to refer to \"a prison-induced insanity.\" The broader definition evolved thereafter.","def":"Anxious and restless because of prolonged confinement.","answer":"STIR-CRAZY","tidbit":""},{"cat":"words","origin":"Both of these words come from a Latin word meaning \"workshop\" or \"building.\" During the Middle Ages, the French used the first meaning to refer to a blacksmith and in the 13th century, the English applied it to the blacksmith's actual work process. Two centuries later, the English also adopted the second meaning of the word, which evolved to refer to \"any structure or its framework,\" then to \"manufactured material\" and then, in the 18th century, to \"textiles or woven cloth.\"","def":"1) To form by heating and hammering. Also, to develop via a concentrated effort.\n2) A cloth made by weaving, knitting or felting fibers.","answer":"FORGE & FABRIC","tidbit":"The Latin word is fabrica."},{"cat":"word","origin":"From a Latin word meaning \"east and sunrise.\" European cartographers positioned their maps with east at the top, since the Holy Land and Jerusalem were the places of Christ's death and resurrection.","def":"To position in a certain way, especially in relation to the points of the compass. Also, to direct something toward the interests of a particular group.","answer":"ORIENT","tidbit":""},{"cat":"word","origin":"From Greek mythology. To make her son immortal, the sea-nymph goddess Thetis dips her young son in the Styx, the river of the Underworld. But the part of his foot that wasn't submerged was vulnerable.","def":"A weak point.\nThe cord of connective tissue that stretches up the calf from the back of the foot.","answer":"ACHILLES HEEL\n& ACHILLES TENDON","tidbit":""},{"cat":"word","origin":"In a 17th-century English game, two players traded items based on an umpire's valuation. All three put \"forfeit money\" and their hands into a hat. Players removed their hands open to agree or closed to disagree. If both agreed, they traded items and paid any valuation difference, with the umpire taking the forfeit. If both disagreed, no trade occurred, and the umpire took the forfeit. If one agreed and the other didn't, no trade happened, and the agreeing player got the forfeit.","def":"An extra condition imposed on competitors to equalize their chances of winning.","answer":"HANDICAP","tidbit":"The game was called hand-in-cap which developed a broader definition and became handicap over time."},{"cat":"word","origin":"This drink is a diminutive form of the Italian word for \"hood,\" because it was the same color as the dark brown hoods of an order of Franciscan friars.","def":"Hot espresso and foamed milk, often topped with cinnamon.","answer":"CAPPUCCINO","tidbit":"The friars were called the Capuchin Monks. First recorded in 1790, the original Kapuzinerkaffee (\"Capuchin coffee\") contained sugar, cream and egg yolks."},{"cat":"phrase","origin":"This phrase from the 19th century comes from the idea that if you throw \"straws in the wind,\" you can see which way the wind is blowing.","def":"An unofficial tally taken to see which way people are leaning in an election.","answer":"STRAW POLL","tidbit":""},{"cat":"word","origin":"From the Greek word glykyrrhiza, from glykys, meaning \"sweet\" and rhiza, meaning \"root.\"","def":"The dried root of a leguminous plant once frequently used in medicine, liquors and sweets.","answer":"LICORICE","tidbit":""},{"cat":"word","origin":"There are two theories for the origin of this word: the first is that it comes from the Latin root gignere, meaning \"to beget, produce\" and the second is that it comes from the Latin word genu, meaning \"knee\" via a Roman custom in which a father would place a newborn child on his knee to acknowledge his paternity.","def":"Authentic or sincere.","answer":"GENUINE","tidbit":"In the 16th century, genuine meant \"natural\" or \"proper\" before developing its current meaning."},{"cat":"word","origin":"One of Rome's famous Seven Hills, named the Palatine, where the emperor resided in an extravagant home, is the source of this word.","def":"The official residence of a chief of state. Also, a large, majestic building.","answer":"PALACE","tidbit":"Palace (and the word palatial) come from the Old French word palais, which referred to the Palatine Hill."},{"cat":"word","origin":"From a Latin word meaning \"to squander,\" which itself comes from combining the Latin words meaning \"apart\" and \"to throw stones at.\"","def":"Decayed or rundown, especially from neglect.","answer":"DILAPIDATED","tidbit":""},{"cat":"word","origin":"Originally from an Ancient Greek word referring to \"a balance, pair of scales,\" and meaning \"weight,\" this word evolved to refer to a sum of money via the value of the gold, silver, etc. being weighed. Scholars' interpretations of a famous Bible parable about what work should be while awaiting Christ's return influenced today's more prevalent definition.","def":"An exceptional natural ability.","answer":"TALENT","tidbit":"In the Parable of the Talents (Matthew 25:14-30), before leaving on a trip, a man entrusts his talents to his slaves. The first two slaves double their money and return all of it to their master when he returns. The third slave buries his talent and returns the same talent to his master. The master is pleased with the first two slaves but is unhappy with the third and casts him out into the darkness."},{"cat":"phrase","origin":"First attributed to General Emilio Mola in 1936 at the siege of Madrid during the Spanish Civil War. Mola indicated he would take the city with his four brigades outside Madrid and another contingent of nationalistic supporters inside the city.","def":"Secret supporters that engage in espionage or sabotage within defense lines or national borders of an enemy.","answer":"FIFTH COLUMN","tidbit":"Mola called his troops outside the city his \"four columns\" and his supporters inside the site his quinta columna (fifth column)."},{"cat":"word","origin":"In French, this word originally referred to a black cape worn by a priest over his surplice (the loose white outer ecclesiastical robe). The tiles of this game, once made with ebony and ivory, may have been given the same name because they resembled the priest's black cape contrasting with the white surplice.","def":"Games played with a set of tiles with dots representing numbers.","answer":"DOMINOS","tidbit":"Domino was also the name for a long-hooded cloak worn with a mask during carnival season or at a masquerade."},{"cat":"word","origin":"This adjective is an extension of its shorter 13th century noun that comes from Old French and Latin roots and means \"tale\" and \"story with a lesson\" and originally meant \"characteristic of legends.\" By the early 17th century, it described the incredible things that happened in these tales.","def":"Wonderful.","answer":"FABULOUS","tidbit":"The shorter 13th century noun is fable."},{"cat":"word","origin":"From Old Provencal sobresaut, meaning \"over\" and \"a leap,\" which itself comes from Latin words having the same meaning.","def":"An acrobatic movement in which the body rolls end over end, making a complete revolution.","answer":"SOMERSAULT","tidbit":"Provencal is a dialect of and another name for Occitan, a Romance language still spoken today in southern France. Somersault was first recorded in English in the 1520s."},{"cat":"word","origin":"From Greek words meaning \"a running back.\"","def":"A word, sentence or number that reads the same backward and forward.","answer":"PALINDROME","tidbit":"Palin means \"back\" or \"again\" and dramein means \"to run.\" Palindromes were once thought to be magical and were carved on walls or amulets to protect people from harm."},{"cat":"word","origin":"From the Latin words meaning \"young again.\"","def":"To restore vigor, appearance or power.","answer":"REJUVENATE","tidbit":"Juvenis, Latin for \"young,\" is used in other words such as juvenile."},{"cat":"phrase","origin":"From the faux-Latin stage name of William Vincent, an early 17th century juggler and magician in the court of King James I of England.","def":"A magical incantation.","answer":"HOCUS POCUS","tidbit":"During his act, Vincent used the fake Latin phrase: Hocus pocus, tontus talontus, vade celeriter jubeo.\nThe word hoax may be a shortening of hocus."},{"cat":"words","origin":"Ancient Romans believed that all people were born with a guiding spirit that attended to them throughout their lives and was responsible for their fortune and character. From a Latin word meaning \"to beget,\" the word evolved to refer to the talent itself. The second word is from the notion that people who like one another must share a similar guiding spirit.","def":"1) An exceptionally intelligent or talented person.\n2) Pleasant or friendly","answer":"GENIUS & CONGENIAL","tidbit":"The Latin verb is gignere. Combining the Latin prefix com, meaning \"together\" with the word genius led to congenial."},{"cat":"word","origin":"From the Greek word koim\u0113t\u0113rion, which means \"sleeping place.\"","def":"A tract of land used for burials.","answer":"CEMETERY","tidbit":""},{"cat":"phrase","origin":"In the 1940s, legendary American football coach Paul Brown wanted to keep a group of promising players on his Cleveland Browns team but was prevented from doing so by All-American Conference rules limiting team roster size. To circumvent these restrictions, Browns' owner Arthur McBride put these players on the payroll of his company, Yellow Cab of Cleveland.","def":"A group of players signed by a sports team but not part of their main roster.","answer":"TAXI SQUAD","tidbit":""},{"cat":"phrase","origin":"From a Hebrew word meaning \"scroll,\" the key word in this phrase technically refers to one of five books of the Hebrew Bible, though it usually references the Book of Esther, read aloud in its entirety during the Purim holiday and festival.","def":"A long, involved story.","answer":"THE WHOLE MEGILLAH","tidbit":""},{"cat":"phrase","origin":"From the book of Job in the Bible: Satan tries to destroy Job's righteousness. Job uses this now famous phrase to describe how he narrowly survives his tormentor.","def":"A very narrow margin.","answer":"BY THE SKIN OF YOUR TEETH","tidbit":"Since teeth don't have skin, Bible translators and commentators have struggled to understand this phrase's true meaning."},{"cat":"phrase","origin":"Aristotle believed that humans first come with biological characteristics, but that they also have habits and acquired behaviors.","def":"An acquired, deeply ingrained habit or skill.","answer":"SECOND NATURE","tidbit":"His philosophies led to the Latin phrases secundum naturam, meaning \"according to nature\" and consuetudo est altera (or secunda) natura, meaning \"habit is second nature.\""},{"cat":"phrase","origin":"This phrase was coined by the U.S. Strategic Bombing Survey in 1944 to describe the point on the Earth's surface closest to a nuclear bomb detonation point.","def":"The very beginning; the origin of rapid, intense or violent activity or change.","answer":"GROUND ZERO","tidbit":""},{"cat":"phrase","origin":"This Kansas town, known for its lawlessness in the late 1800s, became an iconic symbol in the media of the violence and anarchy of the Old West. It was also the setting for the long-running radio and television show Gunsmoke. The use of this expression on the show cemented the phrase's popularity.","def":"To flee or leave quickly.","answer":"GET OUT OF DODGE","tidbit":""},{"cat":"phrase","origin":"In the late 1960s, a Soviet nuclear submarine mysteriously sank.The CIA secretly found the sub but needed to hide their recovery efforts from the USSR, so the agency covertly worked with billionaire Howard Hughes to build the Glomar Explorer. The public cover story was that the ship was built to mine for manganese, but it hid a clawlike device to surreptitiously raise the sub into the ship's hull. The press got wind of the operation and started asking questions, and the CIA had to respond because of the Freedom of Information Act. Not wanting to alert the Soviets about their retrieval, the CIA responded with this now famous phrase.","def":"No comment.","answer":"WE CAN NEITHER CONFIRM NOR DENY","tidbit":"The entire Glomar response was: \"We can neither confirm nor deny the existence of the information requested but, hypothetically, if such data were to exist, the subject matter would be classified, and could not be disclosed.\""},{"cat":"word","origin":"From a Latin word meaning \"wagon\" and \"road,\" this word traveled through various languages and evolved to refer to \"a short gallop at full speed,\" as knights would employ in medieval jousting tour
