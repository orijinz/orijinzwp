:"In the 17th century, the first word of this two-word phrase meant \"a brimming cup or glass\" before becoming an adjective meaning \"unusually abundant.\" That meaning is basically obsolete, except for this farming phrase.","def":"A large harvest or unexpected windfall.","answer":"BUMPER CROP","tidbit":""},{"cat":"phrase","origin":"A blade sharpened on both sides cuts both ways and just might cut its own wielder.","def":"Something that has both favorable and unfavorable consequences.","answer":"DOUBLE-EDGED SWORD","tidbit":""},{"cat":"word","origin":"Gold coins minted by the Venetian Republic called zecchino were later sewn into clothing, which led to this word.","def":"An ornamental disc or spangle.","answer":"SEQUIN","tidbit":"Zecca means \"a mint,\" which is from Arabic sikka meaning \"a minting die,\" i.e., coins.\nKing Tut, whose tomb was discovered in 1922, had gold sequin-like discs on his royal garments."},{"cat":"word","origin":"In his 1930 review of a novel titled Half-Mast Murder, Daniel Gordon coined this new name for a detective story or mystery.","def":"","answer":"WHODUNIT","tidbit":""},{"cat":"phrase","origin":"From the notion that a person stretching their neck to observe something resembles an adult male goose doing the same.","def":"To take a long look at something.","answer":"TAKE A GANDER","tidbit":""},{"cat":"word","origin":"From Old Norse flaga, meaning \"stone slab,\" this word once referred to \"something detached,\" such as \"a flake of snow\" or a \"spark of fire.\" Its current meaning from the 16th century may come from the sense of a broken fragment of stone.","def":"A defect or imperfection.","answer":"FLAW","tidbit":""},{"cat":"phrase","origin":"Hungarian-born mathematician John von Neumann first mentioned this term in a 1928 paper called Zur Theorie der Gesellschaftsspiele, (Theory of Parlor Games) published in the German journal Mathematische Annalen. He further expounded on the concept in the 1944 groundbreaking work Theory of Games and Economic Behavior co-written with Oskar Morgenstern.","def":"When a gain for one side entails a corresponding loss for the other side.","answer":"ZERO-SUM GAME","tidbit":"Sometimes the phrase is shortened as zero-sum."},{"cat":"word","origin":"In Latin, this word literally means \"to climb down.\" Originally, its meaning was literal: to \"come down or go down.\" It also meant \"to deign\" or to \"come down to a less formal level.\" Today it most commonly means \"to assume an air of superiority.\"","def":"","answer":"CONDESCEND","tidbit":""},{"cat":"phrase","origin":"The definitive origin of the core word in this phrase is unclear. It may derive from a French word meaning \"cabin\" or \"hut,\" suggesting two or more people away from the mainstream secretly working together. Some sources argue it comes from a French word that originally meant \"a band of soldiers.\"","def":"A secret or conspiratorial partnership with someone.","answer":"IN CAHOOTS","tidbit":"The French word for cabin is cahute.\nThe French word cohorte, the source of the English word cohort, originally meant \"a band of soldiers.\""},{"cat":"phrase","origin":"Shakespeare used this phrase in Othello, but it is likely the composer Edward Elgar who popularized this phrase as the subtitle of the first, and most popular, of his five orchestral military marches that was performed for the coronation of Britain's Edward VII in 1902. This march is now commonly played at graduation ceremonies.","def":"Lavish formal activities or ceremonies.","answer":"POMP AND CIRCUMSTANCE","tidbit":"Pomp and circumstance was played at Yale University in 1906 as Elgar walked off stage after receiving an honorary doctorate. Yale began using the march regularly. Princeton, the University of Chicago, Columbia and others then followed.\nAn archaic meaning of circumstance is \"a ceremony or public display at an important event.\""},{"cat":"word","origin":"In Latin this word translates to \"small, sharp stone.\" Picture an annoying pebble in your shoe that keeps you from comfortably going where you want to go.","def":"An ethical or moral consideration keeps you from doing something you think is wrong.","answer":"SCRUPLE","tidbit":""},{"cat":"phrase","origin":"Building on the work of other mathematicians, Albert Tucker coined the name for this game theory in 1950, based on a scenario in which two members of a criminal gang are arrested and separated, but, lacking evidence, the police offer each the opportunity to betray the other for a reward. But, if both confess, they each get a year in jail.","def":"When the outcome of one person's decision is determined by the decisions of the other participant(s), resulting in a bad outcome for everyone if they act in their own self-interest.","answer":"PRISONER'S DILEMMA","tidbit":""},{"cat":"phrase","origin":"From farming, turning a line of soil by hand for planting seeds can be difficult and challenging.","def":"A difficult task","answer":"A HARD ROW TO HOE","tidbit":""},{"cat":"word","origin":"From a shortening of a Latin phrase that means \"the fickle crowd\" that referred to a large disorderly crowd of common people.","def":"1) A large and disorderly crowd of people.\n2) A criminal gang, usually referring to the Mafia.","answer":"MOB","tidbit":"The Latin phrase is mobile vulgus."},{"cat":"phrase","origin":"William Shakespeare coined this phrase in The Tempest when the sprite Ariel deceives Prince Ferdinand into believing that his father drowned in a shipwreck. Its meaning expanded beyond its oceanic origins in the 1800s.","def":"A transformation.","answer":"SEA CHANGE","tidbit":"Ariel:\n\"Full fathom five thy father lies,\nOf his bones are coral made,\nThose are pearls that were his eyes,\nNothing of him that doth fade,\nBut doth suffer a sea change,\ninto something rich and strange,\nSea-nymphs hourly ring his knell,\nDing-dong.\nHark! now I hear them, ding-dong, bell.\" (The Tempest, Act 1, Scene 2)"},{"cat":"phrase","origin":"Machines crushing or grinding grain inspired this phrase.","def":"Harsh treatment.","answer":"PUT THROUGH THE MILL","tidbit":""},{"cat":"phrase","origin":"Variations of this phrase date back to the 13th century, and its current form dates to the 15th century. The phrase's figurative meaning comes from the notion that when buying an animal (perhaps more likely some meat) in a bag, it is smart to check the contents of the bag before you buy.","def":"A proposal or deal that is accepted without being examined first.","answer":"PIG IN A POKE","tidbit":"Poke is a now seldom used word meaning \"a bag or sack.\""},{"cat":"word","origin":"This word is from a Latin root meaning \"heavy,\" but don't let this origin weigh on you or weigh you down.","def":"1) Of a serious or critical nature.\n2) The force that attracts a body toward the center of a celestial body.","answer":"GRAVITY","tidbit":""},{"cat":"phrase","origin":"This phrase from the 14th century may come from tools peasants were allowed to use to gather firewood from the forest. Under this practice, known as fire-bote, it was only acceptable to take deadwood from the ground or to pull down dead branches.","def":"By any means.","answer":"BY HOOK OR BY CROOK","tidbit":""},{"cat":"phrase","origin":"This phrase, originally from the 14th century, used slightly different words and referred to a \"blow for a blow,\" a light hit given in retaliation for another. The phrase in its current form first appeared in John Heywood's 1556 parable The Spider and the Flie.","def":"An equivalent given in return.","answer":"TIT FOR TAT","tidbit":"The expression was originally tip for tap and then tap for tap before its current form."},{"cat":"phrase","origin":"The definitive origin of this late 19th-century phrase is unknown. Most theories don't hold water. One theory suggests the phrase comes from billiards, referring to balls close to the pocket and easy to sink. Another links it to a popular carnival shooting game, while yet another ties it to a type of bowling with shorter, squatter pins than in the common tenpin game. Most likely, the phrase simply derives from baby waterbirds swimming or walking behind their mother.","def":"To be well organized.","answer":"GET YOUR DUCKS IN A ROW","tidbit":"In pool, a ball in front of a pocket is called a duck, a shortening of sitting duck.\nDuckpin bowling is a bowling variant with shorter and squatter pins."},{"cat":"word","origin":"From a Latin word meaning \"to touch,\" not only because some things are physical, but because some things are sensed so strongly, it's as if they were physical.","def":"1) Perceptible by the senses, especially touch.\n2) Palpable.\n3) Having physical substance and monetary value.","answer":"TANGIBLE","tidbit":"From the Latin tangere."},{"cat":"phrase","origin":"Dating back to at least the 14th century, this phrase originally meant \"country and family,\" but now means \"friends and family.\" Except for this phrase, the first word is now obsolete.","def":"","answer":"KITH AND KIN","tidbit":""},{"cat":"word","origin":"Commedia dell'arte, scripted and improvisational comedy shows performed in 16th century Italy, is the source of this word, from a nickname for Giovanni, a stock buffoonish servant character.","def":"Eccentric in an amusing way.","answer":"ZANY","tidbit":"Zanni comes from Gianni a pet name for Giovanni, the Italian form for John."},{"cat":"phrase","origin":"A proverb from the 16th century is the source of this phrase. The original proverb ended \"with their tails forward,\" but that ending is rarely found after the 17th century.","def":"Something that will never happen.","answer":"WHEN PIGS FLY","tidbit":""},{"cat":"phrase","origin":"An old story about a farmer who was so obsessed with getting rid of all of his rats that he set his farm on fire is behind this word that became the name for a faction of the New York State Democrat party of the 1840s, whose foremost issue was opposing slavery. In the 20th century the word developed its current meaning.","def":"A very exciting game or event.","answer":"BARN BURNER","tidbit":"Slightly before the Barn burners of New York, the term described radical politicians in Pennsylvania."},{"cat":"word","origin":"Originally from a 12th century Old French word meaning \"to appease or satisfy,\" this word evolved into its current meaning about a century later. Think of satisfying a debt.","def":"To provide what is due for goods or services.","answer":"PAY","tidbit":""},{"cat":"phrase","origin":"The original and full version of this phrase dates from the 1858 play Our American Cousin. It came to mean \"a minor part directing the actions of the whole.\" A shortened version of the phrase, adding a new meaning, comes from the title of a 1997 film in which the US president and his team fabricate a war to distract the country from a sex scandal.","def":"1) Unnecessary military action to distract from domestic scandal.\n2) A less important thing or person controlling a more important one.","answer":"WAG THE DOG","tidbit":"The movie, Wag the Dog, was coincidently released just a month before President Clinton became entangled in his own sex scandal. The original, and still used, phrase is the tail wagging the dog."},{"cat":"word","origin":"From a Middle English word that passed through Old French on its way to English, its original meaning is \"a shoot or twig.\" Its figurative meaning is from the 14th century.","def":"A descendant of a wealthy, aristocratic or influential family.","answer":"SCION","tidbit":"The Middle English word was spelled sion or sioun. The c was added so the word resembled the Latin term scindere, meaning \"to cut.\""},{"cat":"word","origin":"When chugging a drink, Germans would exclaim trinks gar aus or just gar aus, which literally meant \"drink all-out.\" The French adopted and altered the German phrase, which then was adopted into English as this word in the 1500s.","def":"To participate in a noisy, rambunctious drinking spree.","answer":"CAROUSE","tidbit":"Gar aus became carous, also spelled carrousse, in French."},{"cat":"phrase","origin":"In the 1300s, large-headed studs were hammered through wood boards to build doors. The pointed back ends of the studs were bent to increase their strength and durability. This process, like riveting, was called \"clenching.\" Once a stud was clenched, it could not be reused, which was unfortunate given that, at that time, studs were handmade and expensive.","def":"Something completely inactive or no longer functioning.","answer":"DEAD AS A DOORNAIL","tidbit":""},{"cat":"words","origin":"Etymologically you could jokingly say both of these words are \"chain linked.\" The first word comes from Latin words meaning \"into feet\" or literally to \"shackle the feet,\" while the second word means \"to free feet from fetters (chains).\"","def":"1) To hinder movement or progress because of obstacles.\n2) To speed up or execute promptly.","answer":"IMPEDE & EXPEDITE","tidbit":""},{"cat":"phrase","origin":"One might incorrectly think this phrase refers to smiling at a big animal. In reality, the first word comes from an Old English word meaning \"to show the teeth in pain or anger,\" and the other noun in this phrase comes from an Old English word meaning, among other things, \"to endure without resistance.\"","def":"To accept an unpleasant or tough situation without complaining.","answer":"GRIN AND BEAR IT","tidbit":"The animal bear is from the Old English word bera.\nGrin evolved to mean \"smile\" in the late 15th century."},{"cat":"word","origin":"This neckcloth, perhaps a precursor to the necktie and bow tie, was popularized in the 1650s when it was worn by French nobles and subsequently by King Charles II of England. Both adopted this garment from the Croats (or Crabats), 17th century light cavalry forces who fought with the French in the Thirty Years' War.","def":"","answer":"CRAVAT","tidbit":"Cravate is the French word for \"Croat.\""},{"cat":"phrase","origin":"Both main words in this three-word phrase come from Old English. The first means \"to grow,\" and the second means \"to diminish.\" This phrase was first used in English in the 14th century to describe the moon's phases.","def":"Something that increases and decreases over a period of time.","answer":"WAX AND WANE","tidbit":"Wax comes from weaxan and wane from wanian."},{"cat":"word","origin":"In Latin, this word literally means \"up to (the) threshold.\" Its first definition, dating from the Middle Ages, is \"the purifying process by which substances turn into a gas when subjected to heat, then cool and condense back to a solid.\" Over the centuries, its meaning has shifted, but generally it was used, often in poetry and in art, to describe something of grandeur.","def":"Excellence, grandeur or beauty that inspires great admiration or awe.","answer":"SUBLIME","tidbit":""},{"cat":"word","origin":"This word once referred to a physical interpretation of its Latin translation, \"to seize or grasp,\" but its meaning is now figurative.","def":"To grasp the nature, significance or meaning of.","answer":"COMPREHEND","tidbit":""},{"cat":"phrase","origin":"This two-word phrase originated in African American culture of the 1960s to describe how Blacks were paid insignificant wages compared to their white counterparts. The first word originally referred to a \"lump of wood\" in the 1700s before referring to a \"fool\" well over a century later.","def":"Any trivial amount of money.","answer":"CHUMP CHANGE","tidbit":"Chump may have been a combination of the words chunk and lump."},{"cat":"word","origin":"Once a compliment meaning \"remarkably good,\" this word, from a Latin word meaning \"distinguished,\" literally translates to \"out of (above) the flock.\" Today, the meaning is an ironic use of its original sense.","def":"Flagrant. Outlandishly bad.","answer":"EGREGIOUS","tidbit":""},{"cat":"word","origin":"The Dutch word for cabbage, kool, is the cool word behind this etymology.","def":"A salad or side dish made of shredded cabbage.","answer":"COLESLAW","tidbit":"The Dutch word koolsla, combines kool, meaning \"cabbage,\" and sla, meaning \"salad.\""},{"cat":"word","origin":"Believed to be a phonetic shortening of the word godfather, in the 16th century, this word was a title of respect for an older gentleman and later meant \"old man.\" In the early 19th century, it was used in reference to \"foremen and supervisors\" before developing its specific current definition.","def":"The chief lighting technician on a movie or television crew.","answer":"GAFFER","tidbit":""},{"cat":"phrase","origin":"In Ecclesiastes 10:1 the analogy is made that just as a dead insect ruins a cosmetic, a little mistake can overshadow wisdom and honor.","def":"A small flaw that threatens to ruin a well-conceived plan.","answer":"A FLY IN THE OINTMENT","tidbit":"King James Version (1611):\n\"Dead flies cause the oyntment of the Apothecary to send forth a stinking sauour: so doeth a little folly, him that is in reputation for wisedome and honour.\""},{"cat":"phrase","origin":"In the late 1800s, this phrase was the name for a hair style where the hair was cropped but the ends hung down over the forehead. Theodore Roosevelt gave the phrase a whole new (and its current) meaning in a presidential address to the American Historical Association in December 1913.","def":"A minority radical political extremist group.","answer":"THE LUNATIC FRINGE","tidbit":"Roosevelt said, \"there is apt to be a lunatic fringe among the votaries of any forward movement.\""},{"cat":"word","origin":"From a German word meaning \"splash dog,\" this breed was likely originally bred for hunting waterfowl.","def":"","answer":"POODLE","tidbit":"From the German word pudel, short for pudelhund, from pudeln meaning \"to splash\" and hund, meaning \"dog.\""},{"cat":"phrase","origin":"Pearl Bailey's 1952 recording of this song first popularized this phrase, which pointed out a key requirement of a sensual Argentine dance.","def":"Multiple people must cooperate for something to succeed. Often used to indicate multiple people are needed to cause trouble.","answer":"IT TAKES TWO TO TANGO","tidbit":"\"Takes Two to Tango\" was written by Al Hoffman and Dick Manning in 1952."},{"cat":"phrase","origin":"In a 1922 football game against Georgia Tech, University of Notre Dame players recited a prayer in their huddle before scoring a touchdown. The prayer's \"success\" led to this phrase, later cemented into the lexicon by Dallas Cowboys quarterback Roger Staubach in 1975 when he used it to describe a desperation 50-yard touchdown pass he completed with 24 seconds left in the game to defeat the Minnesota Vikings.","def":"A last-ditch, desperation attempt to succeed at something.","answer":"HAIL MARY","tidbit":"Hail Mary, is the English translation of the Latin Ave Maria."},{"cat":"word","origin":"In French this word literally means \"clear seeing.\"","def":"Being able to see beyond the range of normal perception, usually referring to someone with psychic powers.","answer":"CLAIRVOYANT","tidbit":""},{"cat":"word","origin":"This name for the enclosed area on a boat where the ship is piloted was introduced into baseball in the 1990s and then given a broadened figurative meaning from there.","def":"1) A deckhouse for a ship's helmsman.\n2) In baseball, the part of the strike zone where the batter can best hit the ball.\n3) An area that best matches a person's skills or expertise.\n4) A center of control or leadership.","answer":"WHEELHOUSE","tidbit":""},{"cat":"phrase","origin":"In Matthew 7:14 in the New Testament, Matthew quotes Jesus as telling his followers that few people take the harder path to heaven.","def":"To take a conventional and law-abiding course; also to live an honest and moral life.","answer":"STRAIGHT AND NARROW","tidbit":"Jesus quoted in the Gospel of Matthew: \"Enter yee in at the strait gate, for wide is the gate, and broade is the way that leadeth to destruction, and many there be that goe in thereat:\nBecause strait is the gate, and narrow is the way that leadeth vnto life, and few there be that find it.\" (King James Version, 1611)"},{"cat":"word","origin":"Originally a weaving term, this word in Latin means \"under web,\" where web refers to a series of yarns or threads, often the finest ones, extended lengthwise on a loom. Over time its figurative definitions developed, probably almost without anyone noticing.","def":"1) Delicate, elusive.\n2) Difficult to perceive.\n3) Clever and indirect.","answer":"SUBTLE","tidbit":""},{"cat":"word","origin":"Named for the Italian city where it originated, this sausage developed a different spelling and additional meanings over time. It was used to describe wrestlers and oafish boxers in the 1920s, which led to a meaning of \"foolishness,\" popularized in at least three 1920s comic strips.","def":"1) A smoked sausage and lunchmeat made of seasoned mixed meats.\n2) Foolishness, nonsense.; also used to express disagreement.","answer":"BALONEY","tidbit":""},{"cat":"phrase","origin":"From a Greek legend about the advice the Oracle of Delphi gave Polycrates to help him find a long-buried hidden treasure. This legend was translated into English in the 1500s.","def":"Search thoroughly.","answer":"LEAVE NO STONE UNTURNED","tidbit":""},{"cat":"word","origin":"From a Yiddish word meaning \"squeeze\" or \"press\" that comes from a German word with a similar meaning. If you press too hard, people can get annoyed.","def":"Whine and complain.","answer":"KVETCH","tidbit":""},{"cat":"word","origin":"From a Latin word meaning, among other things, \"loose structure, porous, widely spaced and sparse.\" Originally it referred to something with particles not closely packed together, such as tissue or soil. In later use, it referred to compounds having low density, chiefly air or a gas. Its figurative definition came in the 15th century.","def":"Uncommon and distinctive.","answer":"RARE","tidbit":""},{"cat":"phrase","origin":"An allusion to how Judas Iscariot identified Jesus Christ to the soldiers who came to arrest him. Perhaps popularized as a phrase starting in the 1940s because in books, television shows and movies it was used as a sign that a member of a Mafia crime family was marked for assassination.","def":"An action, event or association that causes inevitable ruin or failure.","answer":"KISS OF DEATH","tidbit":""},{"cat":"word","origin":"This name for a sweet liqueur comes from the notion that it invigorates the heart.","def":"A sweet liqueur.","answer":"CORDIAL","tidbit":"The Latin root cord means \"heart\" and is also behind the adjective cordial meaning \"warm or polite.\""},{"cat":"word","origin":"A word for a toy wooden riding horse, based on an archaic pet name for Robert, was shortened to get this word, probably because the toy was used purely for amusement.","def":"An activity practiced for relaxation or pleasure.","answer":"HOBBY","tidbit":"Hobby came from hobbyhorse. Hobby was the diminutive of Hob, which was a pet name for Robert."},{"cat":"phrase","origin":"Where this animal got its unintuitive name is a mystery, but its figurative meaning comes from its use in medical experiments.","def":"1) A small rodent of South American origin.\n2) A test subject.","answer":"GUINEA PIG","tidbit":""},{"cat":"phrase","origin":"Russian history scholar Suzzanne Massie taught the Russian proverb \"Doveryai, no proveryai\" to Ronald Reagan, who used it to when discussing nuclear weapons disarmament deals with the Soviet Union.","def":"","answer":"TRUST, BUT VERIFY","tidbit":""},{"cat":"word","origin":"A Greek word meaning \"forgetfulness\" was also the name of a river in the underworld where the dead were given a drink of water to forget their past lives. With no past life to remember, one could certainly lack the energy to live or to get stuff done.","def":"Sluggish.","answer":"LETHARGIC","tidbit":""},{"cat":"phrase","origin":"From Aesop's fable The Cobbler Turned Doctor about a shoemaker, who, unable to make a living, becomes a quack selling an antidote to all poisons. When the swindler himself becomes ill, the king pretends to mix poison and the antidote as a remedy, forcing the cobbler to confess that his cure is worthless.","def":"To be mistreated just as you have mistreated others.","answer":"A TASTE OF YOUR OWN MEDICINE.","tidbit":""},{"cat":"phrase","origin":"The second word of this two-word phrase comes from Japanese words meaning \"squad\" and \"chief.\" American prisoners of war picked up the word from their captors during World War II. The alliterative first word may have been added and popularized by Barry Goldwater in 1964 when he was asked about his presidential campaign manager.","def":"The boss.","answer":"HEAD HONCHO","tidbit":""},{"cat":"word","origin":"The Greek name for the hardest imaginable (and hypothetical) substance is the source of the word diamond as well as this 14th century word, which originally referred to stones before turning into an adjective in the early 19th century.","def":"Unyielding, insistent.","answer":"ADAMANT","tidbit":"Adamas was the Greek name for the hardest imaginable (and hypothetical) substance."},{"cat":"word","origin":"From Greek meaning \"pressure meter.\"","def":"1) A device for determining atmospheric pressure.\n2) Something used as a gauge or as an indicator of change.","answer":"BAROMETER","tidbit":""},{"cat":"phrase","origin":"Dating from the mid-1800s, this idiom alludes to the heavy charge of powder or lead that hunters needed to take down large animals.","def":"Prepared to fight, argue or deal with criticism.","answer":"LOADED FOR BEAR","tidbit":""},{"cat":"word","origin":"According to the English monk Bede, when the nun St. Audrey was exhumed 17 years after her death at age 43 in AD 679, her body had not decayed, and the large tumor on her neck was miraculously healed. St. Audrey's lace was then dubbed a good luck lace or ribbon worn by people with illness, especially in the neck area. The name St. Audrey was shortened, and the lace dropped, which led to this word.","def":"1) Showy but cheap.\n2) Shameful or indecent.","answer":"TAWDRY","tidbit":"St. Audrey's lace became Tawdry's lace (the initial S being dropped, and the spelling altered). Tawdry's lace is now obsolete, but tawdry survived."},{"cat":"word","origin":"An allusion to this bird's habit of leaving her eggs in another bird's nest.","def":"A man whose wife is unfaithful.","answer":"CUCKOLD","tidbit":""},{"cat":"phrase","origin":"In nuclear physics, this phrase describes the smallest amount of matter needed to trigger a chain reaction.","def":"An amount necessary to have a significant effect.","answer":"CRITICAL MASS","tidbit":""},{"cat":"phrase","origin":"A fashion popularized by Ivy League rowing teams in the 1930s to keep their hair out of their faces.","def":"Hair that is very closely cropped, with some extra length on top.","answer":"CREW CUT","tidbit":""},{"cat":"word","origin":"Derived from an Old English word meaning \"a stone,\" this 14th century word referred to a \"whetstone,\" a stone used for sharpening tools.","def":"1) To sharpen on a whetstone.\n2) To improve or perfect.","answer":"HONE","tidbit":""},{"cat":"word","origin":"Who invented this Italian dessert isn't clear, but its Italian name translates to \"pick-me-up.\"","def":"A dessert made with ladyfingers, mascarpone and espresso.","answer":"TIRAMISU","tidbit":""},{"cat":"word","origin":"A combination of Latin words meaning \"right\" and \"angle.\"","def":"A parallelogram having four right angles.","answer":"RECTANGLE","tidbit":""},{"cat":"phrase","origin":"A military or maritime command issued to avoid detection or to increase the likelihood of hearing faint distress signals is the source of this idiom.","def":"To stop all communication.","answer":"RADIO SILENCE","tidbit":""},{"cat":"word","origin":"The Massachusett people spoke a now extinct form of the Native American Algonquian language and they named this animal from the words for \"urinate\" and \"fox.\"","def":"A weasel-like mammal of North America.","answer":"SKUNK","tidbit":""},{"cat":"word","origin":"Edward Stanley established an annual horse race and named it for this city in northern England that he was the 12th Earl of. The race was run on his estate at Epsom, Surrey.","def":"1) A type of stiff felt hat.\n2) Any major horse race.\n3) Any major annual event open to multiple contestants.","answer":"DERBY","tidbit":"Derby itself come from the Old English deorby, meaning \"deer village.\"\nThe derby hat may have gotten its name because it was worn by riders."},{"cat":"phrase","origin":"The core word in this phrase comes from a Scots dialect, and ultimately from Gaelic, meaning \"to grab.\"","def":"To stick to or attach oneself to; also, to grab or seize.","answer":"GLOM ONTO","tidbit":""},{"cat":"phrase","origin":"This phrase was in use by the US Army in the late 1950s, though it is often attributed to IBM computer programmer and instructor George Fuechsel, who, in the early 1960s, explained that a computer only processes what it is programmed into it.","def":"Flawed input leads to flawed results.","answer":"GARBAGE IN, GARBAGE OUT","tidbit":""},{"cat":"phrase","origin":"This late 18th century phrase referred to frequently cleaned clothing losing its color and wearing out. Its figurative meaning may have started in theater in the 1920s, an allusion to an actor wiping off his stage makeup after a performance or, metaphorically, after a final performance.","def":"Someone who has lost his skills and whose career is ruined.","answer":"WASHED UP","tidbit":""},{"cat":"phrase","origin":"The first word in this phrase comes from an Old English word meaning \"dung\" or \"dirt.\" It evolved to refer to \"clotted blood,\" which led to this 19th century phrase referring to the intricacies of acts of violence and bloodshed. Over time the phrase developed a broader meaning.","def":"To convey in a shocking or sensational way the minutiae of something scandalous, unpleasant or interesting.","answer":"GORY DETAILS","tidbit":"The Old English word was gor."},{"cat":"word","origin":"The name of this animal, with mammary glands on its upper body near its armpits, comes from a Spanish word derived from a Carib word meaning \"breast.\" Because of its flippers, the Latin word for \"hand\" may also have influenced this animal's name.","def":"Large plant-eating sea mammal.","answer":"MANATEE","tidbit":"Carib are American Indian people who lived in the Lesser Antilles and parts of the adjacent South American coast at the time of the Spanish conquest. Their name was given to the Caribbean Sea."},{"cat":"word","origin":"From a character in Charles Dickens' 1843 story A Christmas Carol.","def":"A miserly curmudgeon.","answer":"SCROOGE","tidbit":""},{"cat":"word","origin":"Though it does not refer to abducting people, this word comes from a Latin word meaning \"kidnapper.\"","def":"To take the work or idea of someone else and pass it off as your own.","answer":"PLAGIARIZE","tidbit":""},{"cat":"phrase","origin":"This unglamorous, disregarded appetizer or side dish was often used by Jewish comedians in the Borscht Belt as a humorous metaphor for something or someone insignificant, leading to this oft-repeated phrase.","def":"A semiserious expression of frustration or indignation at having been overlooked.","answer":"WHAT AM I, CHOPPED LIVER?","tidbit":"The Borscht Belt was a summer resort area in the Catskill Mountains frequented chiefly by Jewish guests from the 1920s through the 1960s. At that time, many hotels and resorts refused to accept Jews as guests.\nBorscht is a beet soup brought by Jewish immigrants to the U.S. Borscht Belt was a play on the names for other American regions, such as the Bible Belt and the Rust Belt."},{"cat":"word","origin":"The shape of the roots of this plant inspired its name from a Greek word meaning \"testicle.\"","def":"A type of plant often having flowers of unusual shapes and beautiful colors.","answer":"ORCHID","tidbit":"The Greek word is orchis."},{"cat":"word","origin":"Borrowed from French and Latin, this word's roots trace to 12th century words referring to the buttocks, or rump of an animal. After all, where you sit is the core of your body.","def":"Serving as a basis or essential element.","answer":"FUNDAMENTAL","tidbit":""},{"cat":"phrase","origin":"In French this phrase means \"I know not what.\"","def":"An indefinable, elusive, pleasing quality.","answer":"JE NE SAIS QUOI","tidbit":""},{"cat":"phrase","origin":"This phrase now has a broader meaning but comes from an accident that can happen when a mobile phone is placed in one's back pocket.","def":"To accidentally call someone.","answer":"BUTT DIAL","tidbit":""},{"cat":"word","origin":"From a Latin noun meaning \"small wreath of flowers,\" which later blossomed into another Latin noun meaning \"a garland given as a reward\" or a \"gratuity.\" This should be an easy origin to follow, but it's hard to deduce.","def":"1) Something that naturally follows.\n2) In mathematics, a theorem inferred from a proven proposition.","answer":"COROLLARY","tidbit":"The Latin nouns are corolla and corollarium."},{"cat":"phrase","origin":"This expression from the late 18th century referred to where consumed alcohol, and later, food, went in the body. By the 1920s and1930s, it referred to consuming knowledge instead of food or drink.","def":"To acquire knowledge, talent or experience.","answer":"UNDER ONE'S BELT","tidbit":""},{"cat":"word","origin":"Zeno of Citium's philosophy of virtue obtained through self-control, fortitude and justice in accordance with nature was named after \"The Painted Porch,\" the Athens public hall where he taught in the 4th century BC. By the 14th century, English speakers used the name of his philosophy as a general term.","def":"Not showing emotion.","answer":"STOIC","tidbit":"Stoa Poikile was the Ancient Greek name for the public hall."},{"cat":"word","origin":"From a French word (via Latin) meaning \"lust,\" this word came to mean \"lasciviousness\" and in Elizabethan times, \"adultery.\" But by the 17th century, this word had lost its sensual meaning and referred to an \"opulent lifestyle.\"","def":"The state of great comfort and extravagant living.","answer":"LUXURY","tidbit":""},{"cat":"phrase","origin":"From a Chinese word meaning \"sparrows,\" because sparrows were typically depicted on the traditional game pieces.","def":"A tile-based game.","answer":"MAH JONG","tidbit":"Why Mah Jong is named for sparrows is unclear. Some claim that the clacking of tiles resembles the prattle of sparrows, while others cite Confucius' love for birds as the origin of the name."},{"cat":"word","origin":"In Latin, this word means \"go out of the furrow.\" It is a bit crazy to plow outside of the trench.","def":"1) An acutely disturbed state of mind characterized by restlessness, illusions and incoherence, often temporary.\n2) A state of wild excitement or ecstasy.","answer":"DELIRIOUS","tidbit":""},{"cat":"phrase","origin":"This phrase, used to describe a prearranged time to rouse someone from sleep, developed a figurative meaning in the 1970s.","def":"1) A situation so unsatisfactory that it prompts someone to fix it.\n2) A scheduled call to rouse someone from sleep at a certain time.","answer":"WAKE-UP CALL","tidbit":""},{"cat":"word","origin":"This Late Latin word resulted from a misprint in a 15th century edition of Cicero's Ad Atticum. It is a misreading of a Greek word that referred to \"the parchment label that outlined the title and contents of a document.\"","def":"A summary outline of the subjects covered in a discourse, a treatise or by a course of instruction in a school.","answer":"SYLLABUS","tidbit":"The Greek misread word was sittybos."},{"cat":"word","origin":"From a Latin word meaning \"female servant.\" Handmaids were certainly considered less important.","def":"Subordinate or supplementary.","answer":"ANCILLARY","tidbit":""},{"cat":"phrase","origin":"An attack on this part of an anatomy would cause someone to bleed to death leading to this phrase's figurative meaning first cited in 1879.","def":"To savagely attack the weakest point of an opponent.","answer":"GO FOR THE JUGULAR","tidbit":""},{"cat":"phrase","origin":"First cited in an 1870 book, this phrase refers to being educated by the difficulties of everyday life.","def":"","answer":"THE SCHOOL OF HARD KNOCKS","tidbit":""},{"cat":"word","origin":"The past participle of a term that meant \"to talk\" and \"to explain,\" this word came to mean \"to discuss in advance.\" It came into use when customers needed to review with a merchant the specifications of an item to be made, such as corsets, footwear and eventually tailored men's suits in the mid-1900s. Its meaning broadened even further in the early 2000s.","def":"Custom-made.","answer":"BESPOKE","tidbit":"Bespoke comes from bespeak."},{"cat":"word","origin":"This herb name comes from Greek words meaning \"rock\" and \"celery.\"","def":"","answer":"PARSLEY","tidbit":"Parsley is an alteration of the Greek word petroselinon, which is made up of petros, meaning \"stone\" and selinon, meaning celery."},{"cat":"word","origin":"From the Latin phrase ex grege, meaning \"rising above the flock,\" this adjective originally meant \"distinguished,\" but an ironic use of its original sense flipped its meaning.","def":"Flagrantly bad.","answer":"EGREGIOUS","tidbit":""},{"cat":"phrase","origin":"A Swahili phrase meaning \"there are no problems\" popularized in song in the 1994 movie The Lion King.","def":"No worries.","answer":"HAKUNA MATATA","tidbit":""},{"cat":"word","origin":"The phrase letter of [this word] meant \"a letter under the private seal of a French king, often an order of exile or imprisonment.\" From a French word referring to a \"seal affixed to a letter or document.\"","def":"Prestige.","answer":"CACHET","tidbit":""},{"cat":"word","origin":"This article of clothing comes from the name of a popular 1882 play by Victorien Sardou. The main character who the play is named for was initially performed by the famous French actress Sarah Bernhardt.","def":"A low soft felt hat with the crown creased lengthwise.","answer":"FEDORA","tidbit":""},{"cat":"phrase","origin":"From the U.S. military wage system where salary is based on rank and years of service.","def":"Beyond the scope one's responsibilities.","answer":"ABOVE MY PAY GRADE","tidbit":""},{"cat":"word","origin":"From Greek meaning \"experienced,\" this word comes from the name for doctors who used treatments observed to be clinically effective rather than the theoretical principles of Galen, a 2nd century Greek physician whose practices, including the theory of bodily humors, dominated medicine in Europe from the Middle Ages until the mid-17th century.","def":"Based on experience.","answer":"EMPIRICAL","tidbit":"The doctors were called empirics and empirical means \"in the manner of an empiric.\""},{"cat":"word","origin":"From the name of a West Germanic tribe who held power in France in the early Middle Ages. Their name lost its ethnic sense and referred to any inhabitant who was free and not a slave or captive.","def":"Forthright.","answer":"FRANK","tidbit":"France got its name from the Franks."},{"cat":"phrase","origin":"A solid form of carbon dioxide, this product was named, trademarked and produced in the United States starting in 1925.","def":"","answer":"DRY ICE","tidbit":"The Dry Ice trademark has expired."},{"cat":"word","origin":"From an Italian word meaning \"springboard,\" which comes from another Italian word meaning \"stilts.\"","def":"A base of elastic material used as a springboard.","answer":"TRAMPOLINE","tidbit":"Trampolino which means \"springboard\" comes from trampoli which means \"stilts.\""},{"cat":"word","origin":"From Greek meaning \"to burn,\" this word originally described chemicals such as lime and lye before developing its figurative sense in the 18th century. Watch what you say.","def":"1) Scathingly sarcastic.\n2) Corrosive.","answer":"CAUSTIC","tidbit":""},{"cat":"word","origin":"From Latin meaning \"to say repeatedly,\" this word referred to a chief magistrate in ancient Rome who was temporarily appointed in emergencies and given total authority.","def":"An autocratic leader with absolute power.","answer":"DICTATOR","tidbit":""},{"cat":"phrase","origin":"Used at NASA in the late 1950s or early 1960s, this euphemistic version of a vulgar expression was popularized by Tom Wolfe's 1979 book and its 1983 movie adaptation, The Right Stuff, about the Mercury space program.","def":"To commit a disastrous, humiliating mistake.","answer":"SCREW THE POOCH","tidbit":"If you want to know the original vulgar expression it can be found with a little internet research."},{"cat":"words","origin":"In ancient Rome different types of military victories resulted in different types of celebrations. This first word described the award given to generals who achieved notable victories, and the second word described the award for a Roman general winning battles that were not as significant.","def":"1) A notable success.\n2) A burst of applause.","answer":"TRIUMPH & OVATION","tidbit":""},{"cat":"phrase","origin":"In the 16th century, likely because of its even geometric dimensions, one meaning of the third word of this rhyming phrase meant the same thing as the first word.","def":"Just and honest.","answer":"FAIR AND SQUARE","tidbit":""},{"cat":"phrase","origin":"This expression originally referred to a medieval method of treating a bite from a rabid canine.","def":"Having a small drink to cure a hangover.","answer":"HAIR OF THE DOG","tidbit":"The full version of the original phrase was the hair of the dog that bit me. It was believed that a cure to a dog bite was to apply that same dog's hair to the infected wound."},{"cat":"phrase","origin":"Popularized by William Shakespeare in his play The Merchant of Venice. In the play the moneylender Shylock demands Antonio repay his loan or suffer the dire consequences Antonio had agreed to.","def":"A severe payment or what is exacted to fulfill a deal or punishment.","answer":"A POUND OF FLESH","tidbit":"Shylock:\nIf you repay me not on such a day,In such a place, such sum or sums as areExpress'd in the condition, let the forfeitBe nominated for an equal poundOf your fair flesh, to be cut off and takenIn what part of your body pleaseth me."},{"cat":"word","origin":"From Greek words meaning \"backward time.\"","def":"1) Out-of-date, old-fashioned.\n2) Involving a person or thing in the wrong historical period.","answer":"ANACHRONISM","tidbit":""},{"cat":"word","origin":"Given its shape, it is not surprising that the name of this percussion instrument comes from a Spanish word meaning \"chestnut.\"","def":"","answer":"CASTANET","tidbit":""},{"cat":"phrase","origin":"Alludes to cheating in cards by concealing high value cards.","def":"To have a secret plan, idea, or advantage that can be used if needed.","answer":"ACE UP YOUR SLEEVE","tidbit":""},{"cat":"word","origin":"Combines Latin words meaning \"honey\" and \"to flow.\"","def":"Sweet-sounding.","answer":"MELLIFLUOUS","tidbit":""},{"cat":"phrase","origin":"In the Bible, Jesus was forced to drag and carry his own cross to the site of his crucifixion.","def":"A burden or hardship someone endures.","answer":"CROSS TO BEAR","tidbit":""},{"cat":"word","origin":"From an Old English term meaning \"free peasant,\" this word evolved to refer to someone rude and insensitive, as, over time, free peasants, the lowest rank of free men, were perceived as ill-bred and of low rank.","def":"Rude, surly.","answer":"CHURLISH","tidbit":""},{"cat":"word","origin":"Coined in 1944 by Texas lawyer Maury Maverick, who expressed disdain for the bureaucratic doubletalk of his colleagues.","def":"Unintelligible, nonsensical language.","answer":"GOBBLEDYGOOK","tidbit":"Maverick said the word was inspired by the turkey,\" always gobbledy gobbling and strutting with ludicrous pomposity.\""},{"cat":"word","origin":"From Latin and French words for a Roman high priest that was then used as a title for the Pope and Catholic bishops. Its figurative meaning would require a long-winded explanation.","def":"To talk in a dogmatic and pompous manner.","answer":"PONTIFICATE","tidbit":""},{"cat":"word","origin":"The story goes that Countess Amalia Nani Mocenigo, like many famous people in the 1950s, frequented Harry's Bar in Venice, Italy. The Countess, on her doctor's orders, was not permitted to eat cooked meat. So, bar owner Giuseppe Cipriani concocted this dish and named it after a renaissance painter.","def":"","answer":"CARPACCIO","tidbit":"The painter was Vittore Carpacci.\nCipriani also invented the Bellini, a cocktail made with Prosecco and peach puree or nectar."},{"cat":"name","origin":"This publication was conceived in the early 1950s, when Sir Hugh Beaver attended a party where the guests argued about which was the fastest game bird in Europe and could not determine the answer. Beaver observed similar debates among pub patrons and thought this publication could resolve their disputes.","def":"","answer":"GUINNESS BOOK OF WORLD RECORDS","tidbit":"Beaver was the Managing Director of the Guinness Brewery."},{"cat":"word","origin":"From Latin words meaning \"to cook together.\"","def":"To prepare by combining raw materials. Also, to devise or fabricate.","answer":"CONCOCT","tidbit":""},{"cat":"phrase","origin":"Don't tell anyone, but this early 18th century phrase was coined by Richard Steele, a politician, playwright and journalist who often wrote about morality and politics.","def":"Payment given to someone to keep information secret.","answer":"HUSH MONEY","tidbit":""},{"cat":"phrase","origin":"The unusual third word of this phrase comes from an Irish word meaning \"small bit or fragment.\" Looney Tunes cartoon character Yosemite Sam helped popularize this expression, using a slight variant of it as a catchphrase.","def":"To pummel something forcibly.","answer":"BLOWN TO SMITHEREENS","tidbit":"The Irish word is smidirin."},{"cat":"word","origin":"From a Latin verb meaning \"white,\" \"bright\" or \"glisten,\" this word originally meant \"white\" and once meant \"pure\" as well. It is usually helpful to have the truth come to light.","def":"Honest, often blunt, expression.","answer":"CANDID","tidbit":"The Latin verb cand\u0113re is also behind the word candle."},{"cat":"phrase","origin":"The last word of this phrase comes from an Old English word meaning \"doorsill\" that referred to a \"point of entering.\"","def":"A major inflection point.","answer":"CROSSING THE THRESHOLD","tidbit":"The wedding ritual of crossing a threshold, now a fun event, likely stems from a Roman tradition that a bride was going to lose her virginity, perhaps reluctantly, and thus had to be carried to the bedroom."},{"cat":"word","origin":"During the Italian Renaissance, Romans excavating ancient buildings discovered walls with unusual drawings of humans, animals, strange fruits and flowers. They named these depictions for an Italian word meaning \"of a cave\" which, in the 17th century became an adjective describing anything bizarre.","def":"Odd in shape, appearance or character; extremely ugly or absurd.","answer":"GROTESQUE","tidbit":"The Italian grottesco (think grotto) means \"of a cave.\""},{"cat":"word","origin":"Italian and Latin words meaning \"square\" and related to a word meaning \"four\" are behind this word that meant \"picture frame.\" The word came to refer to any \"framework\" and was used specifically to describe a group of officers in a military regiment before developing an even broader meaning.","def":"A group of people having some unifying relationship.","answer":"CADRE","tidbit":""},{"cat":"phrase","origin":"The last word of this phrase, from Latin meaning \"two premises,\" was originally a technical term in rhetoric that grew to refer to \"two undesirable choices\" and then broadened to mean \"to face a difficult choice or problem.\" The expression itself may metaphorically refer to the two sharp, bony protrusions on an animal, such as a bull, that are painful to run into.","def":"To face difficult options.","answer":"ON THE HORNS OF A DILEMMA","tidbit":""},{"cat":"word","origin":"The name for a stingless male honeybee who does not gather nectar or pollen and whose only role is mating with the queen inspired the name for this mindless aircraft invented in the late 1940s.","def":"1) Unmanned aircraft.\n2) Male honeybee.\n3) A deep sustained or monotonous sound.","answer":"DRONE","tidbit":""},{"cat":"word","origin":"This word was originally the name of a powerful whirlpool off the west coast of Norway that was believed to destroy any ships nearby. Perhaps popularized in English because of an Edgar Allan Poe story and Jules Verne's use of it in Twenty Thousand Leagues Under the Sea. It's from Old Dutch words that literally mean \"grinding stream.\"","def":"1) A powerful, violent whirlpool.\n2) A state of turbulence.","answer":"MAELSTROM","tidbit":"The Edgar Allan Poe story is called A Descent into the Maelstrom."},{"cat":"word","origin":"This World War II bomb that could destroy multiple buildings soon developed figurative meanings, including, beginning in the 1950s, as a descriptor of hit movies.","def":"1) A large bomb.\n2) Something of great power, size or success.","answer":"BLOCKBUSTER","tidbit":""},{"cat":"phrase","origin":"French for \"Fat Tuesday,\" this celebration is so named because participants can eat foods forbidden during Lent, which starts the next day on Ash Wednesday.","def":"","answer":"MARDI GRAS","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"wandering.\"","def":"Unclear or indistinct.","answer":"VAGUE","tidbit":""},{"cat":"word","origin":"Artist Marcel Duchamp coined this name around 1931 to describe the artwork of American Alexander Calder.","def":"A kinetic sculpture.","answer":"MOBILE","tidbit":""},{"cat":"phrase","origin":"Popularized by Rudyard Kipling in his 1889 story The Story of the Gadsbys, this phrase likely originally described cavalry charges, referring to putting the maximum strain on the horse's harness to attack at breakneck speed.","def":"Recklessly determined.","answer":"HELL BENT FOR LEATHER","tidbit":""},{"cat":"word","origin":"Decalcomanie was a fad that started in Paris in the early 1860s. Images were transferred from specially prepared paper to surfaces such as glass or porcelain. Many decades later this turned into decals, paper strips with pictures that were transferred to skin. But children developed another shortening for decalcomania by dropping the first syllable, eventually leading to this word with a broader definition.","def":"Ridiculous.","answer":"COCKAMAMIE","tidbit":"Kids called the decals cockamanies which led to cockamamie. The latter's current meaning may have been influenced by its similarity to cock-and-bull story and poppycock."},{"cat":"word","origin":"From a Bantu word meaning \"okra,\" which is often used as an ingredient in this dish.","def":"A stew or thick soup known for its popularity in Louisiana.","answer":"GUMBO","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"sausage,\" this disease was first traced to eating contaminated sausage.","def":"A disease of the nervous system acquired from a bacterium in spoiled foods.","answer":"BOTULISM","tidbit":""},{"cat":"word","origin":"The richest type of milk rising to the top influenced both of these phrases first recorded in the 16th century. The first French phrase likely inspired the second English one.","def":"The best of the best.","answer":"CREME DE LA CREME & CREAM OF THE CROP","tidbit":""},{"cat":"word","origin":"From a Greek word meaning \"she-goat,\" that may come from the Old Norse gymbr meaning \"ewe-lamb one winter (or year) old.\"","def":"1) A fire-breathing monster in Greek mythology having a lion's head, a goat's body and a dragon's tail.\n2) A wild fantasy, especially an unrealizable dream.\n3) A hybrid creature consisting of two or more species.","answer":"CHIMERA","tidbit":""},{"cat":"word","origin":"Are you feeling relaxed? This word comes from French, Italian and Latin words meaning different types of \"calm.\" The Italian word means \"evening song,\" but translates to \"calm sky.\"","def":"A vocal or instrumental performance, especially one given outdoors at night to a woman being courted.","answer":"SERENADE","tidbit":""},{"cat":"word","origin":"\"Commission man\" is the literal translation of this Swedish word.","def":"1) An independent official who investigates complaints against the government.\n2) A person who investigates and attempts to resolve complaints between parties.","answer":"OMBUDSMAN","tidbit":""},{"cat":"word","origin":"In Latin this word's literal meaning is \"to go off the wheel track.\" Its original, now archaic, definition was to \"wander off course.\" In the 15th century it referred to something that \"fell outside the scope of the law.\" Over time it developed the more generalized meaning of \"excessive.\"","def":"A price or cost that materially exceeds what is reasonable.","answer":"EXORBITANT","tidbit":""},{"cat":"word","origin":"The doctrine of an 18th century group of French economists who believed in natural economic laws without government intervention. The phrase literally translates to \"let do.\"","def":"1) To be hands-off.\n2) A policy opposing governmental interference in economic affairs.","answer":"LAISSEZ-FAIRE","tidbit":"The original phrase was laissez faire, laissez passer, meaning \"let do, let pass.\""},{"cat":"word","origin":"From a Greek word meaning \"grace,\" this word originally meant \"a special spiritual gift bestowed by the Holy Spirit.\"","def":"A magnetic charm or appeal; a leadership quality that attracts followers.","answer":"CHARISMA","tidbit":"Rizz, coined as slang for charisma, was named as one of Merriam-Webster's words of the year for 2023."},{"cat":"word","origin":"From a Latin word meaning \"beast of burden.\"","def":"An animal doctor.","answer":"VETERINARIAN","tidbit":""},{"cat":"word","origin":"Apparently coined by Norman Mailer in his 1973 book about Marilyn Monroe titled Marilyn, this word was originally defined by Mailer as \"something believed to be true because it appears in print.\"","def":"A briefly stated and usually trivial truth.","answer":"FACTOID","tidbit":""},{"cat":"phrase","origin":"Coined in the 1984 mockumentary This Is Spinal Tap, this phrase came up in dialogue between Spinal Tap lead guitarist Nigel Tufnel (played by Christopher Guest) and documentary director Marty DiBergi (played by the film's actual director, Rob Reiner).","def":"To surpass the maximum level.","answer":"TURN IT UP TO ELEVEN","tidbit":"The band's amplifier volume control knobs went to 11 instead of 10:\nNigel:\n\"The numbers all go to eleven... You're on ten on your guitar, where can you go from there?\"\nMarty:\n\"Put it up to eleven.\"\nNigel:\n\"Eleven. Exactly. One louder.\"\nMarty:\n\"Why don't you just make ten louder and make ten be the top number and make that a little louder?\"\nNigel (after a long pause):\n\"These go to eleven.\""},{"cat":"phrase","origin":"Captain Jean Luc Picard and crew's most powerful adversary in Star Trek: The Next Generation, \"The Borg,\" used this decision-making process that was coined in 1950s science fiction stories, inspired by colonies of social insects like bees and ants.","def":"1) The collective mental activity and coordinated behavior of a colony of social insects.\n2) The collective thoughts, ideas and opinions of a group of people.","answer":"HIVE MIND","tidbit":""},{"cat":"word","origin":"From a French word meaning \"rung of a ladder,\" this word first referred to troops arranged in a steplike diagonal formation behind and to the right or left of the unit in front of it.","def":"A level of authority, rank, reputation or worthiness.","answer":"ECHELON","tidbit":""},{"cat":"phrase","origin":"While some speculate that the first word of this 17th century seafaring phrase is an abbreviation of the word \"deduce,\" this theory is likely an urban legend. It is more likely that the first word refers to a stationary object in the water used as a basis for calculating a position.","def":"1) To estimate the position of an airplane or ship based solely on speed and direction of travel and the time elapsed since the last known position.\n2) Guesswork.","answer":"DEAD RECKONING","tidbit":"The \"deduced\" theory comes from logbooks that used the abbreviation ded reckoning."},{"cat":"word","origin":"Dating from the 1500s, this name for a jester's hood became the name of a paper size when its depiction was inexplicably used as a watermark on long, approximately 8\" x 13\" sheets of writing or printing paper.","def":"","answer":"FOOLSCAP","tidbit":""},{"cat":"word","origin":"From Latin words meaning \"not alarmed.\" Think explorers.","def":"Resolutely fearless; undaunted.","answer":"INTREPID","tidbit":""},{"cat":"phrase","origin":"The Bible has been believed to be, and quoted as, the ultimate authority among the devoted, especially in the 1600s, when this phrase was first recorded.","def":"Full, precise information or detail. Also, the exact reference or source.","answer":"CHAPTER AND VERSE","tidbit":"The text of the Bible is organized into chapters and verses."},{"cat":"phrase","origin":"The definitive origin of this phrase is unknown. Its popularity may stem from a mid-19th century joke about a farmer tricked by his boarders after they complain about his food. The farmer dismisses their complaints, claiming he can eat anything. The boarders take him up on the challenge and feed him an awful-tasting bird. The story ends with the farmer saying, \"I can eat this bird, but I be darned if I hanker after it.\"","def":"To admit that one was wrong or accept that one has been defeated.","answer":"EAT CROW","tidbit":""},{"cat":"word","origin":"Originally the first word of a two-word phrase that Medieval Latin translates as \"force of the county.\" It referred to a group of able-bodied men whom a sheriff could all upon to preserve the public peace.","def":"1) A large group with a common interest.\n2) A body or force armed with legal authority.","answer":"POSSE","tidbit":"The phrase was posse comitatus."},{"cat":"phrase","origin":"There are two popular theories on the origin of this phrase: The first is that it refers to actors peering at the orchestra pit and the theater audience, potentially a hostile one, when they go on stage. The second is of military origin, where a soldier's expulsion might be accompanied by the band playing Rogue's March.","def":"To confront an unpleasant situation, a danger or the consequences of one's actions.","answer":"FACE THE MUSIC","tidbit":""},{"cat":"phrase","origin":"Likely a translation of a 17th century French phrase meaning \"we gave him his bag,\" in reference to a servant being dismissed. It may also just reflect that before the Industrial Revolution many factory workers traveled from job to job carrying their tools and supplies. When tradesmen were terminated, they took their bags of supplies with them.","def":"To be fired from a job.","answer":"GET THE SACK","tidbit":""},{"cat":"phrase","origin":"First popularized in Robert A. Heinlein's 1966 science fiction novel, The Moon Is a Harsh Mistress, this phrase was later used by economist Milton Friedman as the title of his 1975 collection of essays. The expression dates to the mid-19th century, when American saloons offered complimentary meals to attract customers. Naturally, the salty food prompted patrons to buy more drinks. By the end of the century, the phrase was being used in political and economic debates.","def":"It is impossible to get something for nothing.","answer":"THERE IS NO SUCH THING AS A FREE LUNCH","tidbit":""},{"cat":"phrase","origin":"This phrase may be derived from the practice of butchers giving customers a discount for buying an entire slaughtered animal instead of just the choice parts. Alternatively, it may be from an 18th century satirical fable about religious scholars debating which part of an animal they were allowed to eat, only to eat all of it in the end, each contending the part they ate was not forbidden.","def":"To fully do something.","answer":"GO WHOLE HOG","tidbit":""},{"cat":"word","origin":"Originally this word referred to the jarring recoil of a wheel or set of connected wheels or gears in a machine caused by malfunctions or unbalanced loads.","def":"A strong adverse reaction by a large group of people to a social or political development.","answer":"BACKLASH","tidbit":""},{"cat":"phrase","origin":"It means \"good faith\" in Latin.","def":"Genuine, sincere, legitimate.","answer":"BONA FIDE","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase from the 1500s meant \"the critical moment\" and was paired with the word \"stick\" to describe a device with notches that were used as markers to record time, points, transactions and sporting events. The full phrase, as we use it today, is from the 1600s.","def":"Just before the final moment when something can be changed or something bad will happen.","answer":"IN THE NICK OF TIME","tidbit":"The device was called a nick-stick."},{"cat":"phrase","origin":"In the late 18th century this phrase literally described a fire protection device used in theaters. Though it was used before him with a similar meeting, it was Winston Churchill who, in a 1946 speech, popularized the current meaning of this phrase as the name for the barrier created by the Soviet Union and its allies.","def":"1) A political, military and ideological barrier that cuts off and isolates an area.\n2) An impenetrable barrier.","answer":"IRON CURTAIN","tidbit":""},{"cat":"word","origin":"This Bohemian-born German-language novelist, widely regarded as one of the major figures of 20th century literature, was so skillful at expressing nightmarish settings and the anxieties and alienation felt by many in 20th century Europe and North America, that his name was adopted as an adjective a mere 16 years after his death.","def":"Extremely unpleasant, frightening and confusing.","answer":"KAFKAESQUE","tidbit":""},{"cat":"phrase","origin":"Sometimes you have to keep a tight hold on the reins to keep your steed under control.","def":"To slow down or stop.","answer":"HOLD YOUR HORSES","tidbit":"When it first appeared in print around 1844 and for many years thereafter, hold your horses was written as hold your hosses."},{"cat":"phrase","origin":"Think of a river flowing under an overpass and moving downstream, signifying that whatever has passed is gone and cannot be reclaimed. Perhaps influenced by or a translation of a 19th century French phrase.","def":"What's done is done. Something that happened in the past is no longer important or worth arguing about.","answer":"WATER UNDER THE BRIDGE","tidbit":"The French phrase is il passera bien de l'eau sous le pont, which means \"much water will pass under the bridge.\""},{"cat":"word","origin":"From Greek words meaning \"chest\" and \"observe.\"","def":"A medical device for listening to internal sounds of an animal or human body. Invented in 1816.","answer":"STETHOSCOPE","tidbit":""},{"cat":"word","origin":"From French words meaning \"to protect against a fall.\"","def":"An apparatus used to retard a free fall.","answer":"PARACHUTE","tidbit":""},{"cat":"phrase","origin":"Think of a boxer who loses a match because he is knocked down and can't stand up before the referee counts to 10.","def":"1) Defeated.\n2) Unconscious or fast asleep.","answer":"DOWN FOR THE COUNT","tidbit":""},{"cat":"phrase","origin":"One unproven theory traces this phrase's origin to the California gold rush. Miners panning for gold would shake sand and gravel until it was flat and revealed the ore.","def":"To do as well as one can at something.","answer":"LEVEL BEST","tidbit":""},{"cat":"phrase","origin":"Nineteenth century stories, which may or may not be true, about an Irishman who was tried for abducting his wife after eloping with her, but was then acquitted after she professed her love for him were turned into popular ballads that likely led to this phrase.","def":"A carefree and comfortable way of living.","answer":"LIFE OF RILEY","tidbit":"The Irishman was named Willie Reilly."},{"cat":"word","origin":"From a Middle French word meaning \"of a hawk,\" this word described adult birds caught for use in falconry. Because the adult birds were more difficult to control than young birds taken from nests, this word soon became used to describe things wild in appearance. From there, it gained its current meaning.","def":"Having an emaciated or exhausted appearance.","answer":"HAGGARD","tidbit":""},{"cat":"word","origin":"A rough translation of a Chinese phrase which meant \"to suffer public disgrace\" referred to the act of covering one's expressions with a fan to avoid revealing emotions. This phrase became a part of English jargon in the late 1800s when Britain's consular official to China, Sir Robert Hart, used it in essays he penned about China. The second phrase, the opposite of the first, was first documented over a decade later, in 1899.","def":"1) Be embarrassed.\n2) To regain dignity or avoid embarrassment.","answer":"LOSE FACE & SAVE FACE","tidbit":"In China, lose face referred to covering one's face with a fan as a sign of disgrace after revealing one's emotions."},{"cat":"phrase","origin":"Likely from circus acts and sideshows in the early 1900s featuring a horse trained to perform a specific feat, such as playing dead.","def":"Skilled in only a single area.","answer":"ONE-TRICK PONY","tidbit":""},{"cat":"word","origin":"These beasts were named after an Old French word meaning \"throat\" in the 13th century because of the water that poured out of their mouths.","def":"A carved downspout in the form of a grotesque human or animal figure.","answer":"GARGOYLE","tidbit":"Gargoyle is related to the word gargle."},{"cat":"phrase","origin":"A poor roll in a game of dice may be the origin of this expression.","def":"Not extraordinary or important.","answer":"NO GREAT SHAKES","tidbit":""},{"cat":"phrase","origin":"Baseball-specifically a ball hit into the air with a high-arching trajectory that the fielders must quickly react to in order to catch-is the likely source of this expression.","def":"Spontaneously.","answer":"ON THE FLY","tidbit":""},{"cat":"word","origin":"This color means \"cuttlefish\" in numerous languages. Secretions from the cuttlefish were used as an ink or paint.","def":"A rich brown color.","answer":"SEPIA","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase is likely from the name for a long whip made of hippopotamus or rhinoceros hide. The term was documented in a poem called Penal Servitude! in 1830, but was popularized when a Cockney chimney sweeper used the phrase in a trial to complain about the 1834 Chimney Sweepers Act. His diatribe was widely reported in the press, and the phrase caught on.","def":"To put an end to.","answer":"PUT THE KIBOSH ON IT","tidbit":""},{"cat":"word","origin":"From the name of the public school and town in Warwickshire, England, where this game was first played.","def":"A type of football game with kicking, dribbling, lateral passing and tackling, but no forward passing.","answer":"RUGBY","tidbit":"The town was named after the rook bird, the Anglo-Saxon Hroca burh, which meant \"Rook Fort.\" Later the burh was changed to by, meaning \"village,\" to become Rugby."},{"cat":"phrase","origin":"This phrase, attested from the 17th century, reinforces that for centuries, people have used body parts to help measure things.","def":"A general approximation or principle, based on experience or practice.","answer":"RULE OF THUMB","tidbit":""},{"cat":"phrase","origin":"In the 17th century, this meat was slang for the human body.","def":"To be rescued from a difficult situation.","answer":"SAVE YOUR BACON","tidbit":"In medieval times, bacon was a more generic term, equivalent to what we now call pork."},{"cat":"phrase","origin":"This television quiz show from the 1950s, based on an earlier radio quiz show, required contestants to answer 11 questions in a row to earn the top prize.","def":"The crucial or essential matter where the outcome can't be foreseen and on which much hinges.","answer":"THE SIXTY-FOUR-THOUSAND-DOLLAR QUESTION","tidbit":"After four initial questions, the fifth question was worth $1,000, with the stakes doubling thereafter.\nThe radio quiz show was Take It or Leave It. Winning contestants made it to the final $64 question."},{"cat":"word","origin":"From Latin words meaning \"to blow together.\"","def":"To combine or blend two or more things. Also, to fail to differentiate or confuse things that are similar.","answer":"CONFLATE","tidbit":""},{"cat":"phrase","origin":"This 19th century expression comes from using this tool to remove lice eggs from hair. Lice eggs are so tiny one must go through the hair strand by strand to get them out.","def":"To examine every detail.","answer":"GO OVER WITH A FINE-TOOTH COMB","tidbit":""},{"cat":"phrase","origin":"While the definitive origin of this expression from the first half of the 16th century is unclear, some contend its use comes from the awful scent of a hidden dead rodent. Others argue the origin describes how a hunting cat might know something is amiss when it detects the odor of a rodent even if it can't see it.","def":"To suspect something is wrong, especially something underhanded. Also, to suspect a person as an informant.","answer":"SMELL A RAT","tidbit":"In the 16th century poem, The Image of Ipocrysy, the cat represents the clergy and the rat, people who run afoul of church doctrine:\n..And smelle we wote not what: But then beware the catt; For yf they smell a ratt, They grisely chide and chatt, And, Haue him by the jack, A fagott for his backe, Or, Take him to the racke, And drown hyme in a sacke, Or burne hyme on a stake!"},{"cat":"word","origin":"From the name of a sixth century Greek poet, who is considered the father of Greek tragedy.","def":"An actor. Also, relating to drama and the theater.","answer":"THESPIAN","tidbit":""},{"cat":"word","origin":"A French word meaning \"small horse\" became the name of this bathroom fixture because one sits on it as if sitting on a pony.","def":"A low oval basin used for washing one's genital and anal areas.","answer":"BIDET","tidbit":""},{"cat":"phrase","origin":"Dating from the late 1500s, this expression comes from this farm animal that can lazily graze around the pasture all day long before returning to the barn.","def":"For a very long, indefinite amount of time.","answer":"UNTIL THE COWS COME HOME","tidbit":""},{"cat":"word","origin":"\"To write with chapters and headings,\" is the Latin meaning behind this word that in Latin translates to \"little head.\" It originally meant to \"to negotiate terms with an enemy\" or \"to draw up articles of agreement.\" But those meanings were given up for this word's current definition.","def":"To acquiesce or surrender, often after negotiation of terms.","answer":"CAPITULATE","tidbit":""},{"cat":"phrase","origin":"First documented in 1807, this phrase was likely popularized in an 1810 parody of Shakespeare's Hamlet. The phrase probably comes from a tobacco product that was believed to sharpen the mind.","def":"Meeting the applicable standard, of sufficient quality.","answer":"UP TO SNUFF","tidbit":"In the play, Hamlet is feeling depressed but won't explain why. His friend Guildenstern says:\n\"He won't be sounded; he knows well enough\nThe game we're after: Zooks, he's up to snuff.\""},{"cat":"phrase","origin":"Though it is almost certainly a myth, in the late 1700s, Catherine the Great wanted to tour the Crimean lands Russia had won in battle. According to legend, because the lands had not been properly colonized, a statesman and nobleman arranged for fake pasteboard towns with waving, happy peasants, farm animals and fireworks to be setup along the river to be seen by Catherine as her boat sailed by.","def":"An elaborate facade design to hide an undesirable reality.","answer":"POTEMKIN VILLAGE","tidbit":"The statesman was Grigory Potemkin."},{"cat":"phrase","origin":"From medieval literature and later fantasy stories, especially Arthurian legends, where a hero such as Lancelot or Sir Galahad is portrayed as the gallant, virtuous, brave adventurer who gallops in on his horse to fight and triumph against evil.","def":"A savior who rescues another person from harm or a difficult situation.","answer":"WHITE KNIGHT","tidbit":"In business jargon, a white knight is a company that makes a welcome bid for a company facing a hostile takeover.\nIn internet slang the term can be used to describe men, who, usually expecting some sexual reward, excessively defend a woman even if she has done something wrong."},{"cat":"word","origin":"From a French and Latin word meaning \"seed.\" Think of a seed as the laying of groundwork for future development.","def":"A work, event, person or idea that strongly influences future developments.","answer":"SEMINAL","tidbit":"Ultimately from semen meaning \"seed.\""},{"cat":"word","origin":"Perhaps from a Latin phrase meaning \"from the stars,\" with the original sense coming from fortune telling, as in \"await what the stars will bring.\"","def":"To strongly wish for, long for or want something.","answer":"DESIRE","tidbit":"Desire is from d\u0113siderare. Sider generally is believed to mean \"star.\" A competing theory contends that sider means \"mark,\" or \"goal,\" making d\u0113siderare's meaning \"to miss the mark.\""},{"cat":"word","origin":"The first syllable of this word once referred to \"an unsophisticated rural person\" but derogatorily meant \"dull\" or \"stupid.\" It was used to describe poor drivers in the early 1900s, before being applied to unsafe pedestrians.","def":"Crossing the street dangerously or illegally.","answer":"JAYWALKING","tidbit":""},{"cat":"phrase","origin":"This expression may come from a World War II phrase about putting the clip back in a grenade, so it doesn't explode, and you can save it for later. Others contend it may come from sewing or attaching notices to cork or bulletin boards.","def":"Hold on to an idea or thought to return to it later.","answer":"PUT A PIN IN IT","tidbit":""},{"cat":"phrase","origin":"This phrase was popularized by Shakespeare in his play, The Taming of the Shrew. It has been popular for a very long time.","def":"A really long time.","answer":"FOREVER AND A DAY","tidbit":"Forever and a day is likely an evolution of an earlier phrase, forever and ay. Ay meant \"ever\" or \"always.\""},{"cat":"phrase","origin":"This cliche, often used as a formulaic ending to fairy tales or a sarcastic ending to stories, originated with The Decameron, written by Italian writer Giovanni Boccaccio in the 14th century. At that time, the phrase meant \"experiencing joy in the afterlife.\"","def":"To have a joyous and perfect future.","answer":"LIVE HAPPILY EVER AFTER","tidbit":""},{"cat":"phrase","origin":"Because the primary ground route, the Burma Road, was captured by the Japanese, during World War II, Allied pilots flew the dangerous route over the eastern end of the Himalayan mountains to transport supplies to and from India and China. This phrase was used by airmen to signal they had successfully flown past the flight path's highest point.","def":"To get past the most challenging part of something.","answer":"OVER THE HUMP","tidbit":""},{"cat":"phrase","origin":"In games like poker, it can really help if you are dealt good cards.","def":"The outcome is determined by chance.","answer":"LUCK OF THE DRAW","tidbit":""},{"cat":"word","origin":"This 13th century word is ultimately from a Latin term, used in dice and elsewhere, which means \"to fall out\" or \"to be cast.\"","def":"Something beyond human control, unforeseen, luck.","answer":"CHANCE","tidbit":""},{"cat":"word","origin":"John Loudon McAdam invented a form of pavement made from crushed stone and sand and named it after himself. Almost a hundred years later, in the early 20th century, the material was improved by mixing it with a dark viscous liquid that acted as a binding agent. The combination of materials also led to a new name.","def":"A paving material. Also, a name for an airport runway.","answer":"TARMAC","tidbit":"When tar was added to macadam it became tarmacadam, which was shortened to tarmac."},{"cat":"phrase","origin":"The name for a high-pressure basketball defense invented in the 1950s by coaching legend John McLendon, the first Black head coach in professional basketball. The phrase developed a figurative meaning of \"an all-out effort or offensive.\"","def":"","answer":"FULL-COURT PRESS","tidbit":"McLendon was also the first Black head coach of a predominantly white university."},{"cat":"phrase","origin":"The industriousness of this rodent led to this phrase used as military slang to describe cadets keen to impress their commanding officers.","def":"An overzealous or extremely ambitious individual.","answer":"EAGER BEAVER","tidbit":""},{"cat":"word","origin":"This beverage from crushed fruit comes from Hebrew, meaning \"strong drink.\"","def":"A fermented fruit juice.","answer":"CIDER","tidbit":""},{"cat":"word","origin":"This color is from a French word meaning \"chestnut.\"","def":"Dark red.","answer":"MAROON","tidbit":""},{"cat":"word","origin":"Pilgrims on horseback bound for a famous English city led to this term.","def":"An easy gallop.","answer":"CANTER","tidbit":"The city was Canterbury."},{"cat":"word","origin":"Probably from a French drinking word meaning \"let us guzzle\" that was a frequent refrain in 17th century French satirical poems.","def":"A sharp, often virulent satire directed at an individual or institution.","answer":"LAMPOON","tidbit":""},{"cat":"word","origin":"Iconic rapper and entrepreneur Jay-Z boasts, likely correctly, that he coined and popularized the slang sense of this word, a shortening of a longer word with the same meaning.","def":"Bold assurance and self-confidence.","answer":"SWAG","tidbit":"Swag is a shortening of swagger."},{"cat":"phrase","origin":"The fretsaw, a bow saw for intricate cutting work, was used to create this item, and led to its name.","def":"1) Small, irregularly cut pieces that fit together to form a picture.\n2) A difficult problem.","answer":"JIGSAW PUZZLE","tidbit":"The fret saw, invented in 1865, came to also be known as the jigsaw."},{"cat":"word","origin":"From an old French word meaning \"blaze,\" this term originally referred to a florid French Gothic architectural style with waving curves before developing its figurative sense in the late 19th century.","def":"Showy.","answer":"FLAMBOYANT","tidbit":""},{"cat":"phrase","origin":"In the 15th century the core word in this phrase meant \"something that has passed before.\" Over time, this core word also referred to previous unpleasant events. Putting the latter meaning and the original meaning together led to this phrase.","def":"To forget past offenses and reconcile.","answer":"LET BYGONES BE BYGONES","tidbit":""},{"cat":"word","origin":"Lu parti, an Old French phrase from the 1300s meaning \"a divided game\" or an \"even game,\" hence \"uncertainty,\" developed into this word, with an additional meaning that is its definition today.","def":"Danger.","answer":"JEOPARDY","tidbit":""},{"cat":"phrase","origin":"The key word in this phrase probably comes from a children's game dating back to the 17th century that closely resembled the game of jacks, involving tossing up small objects and catching them on the backs of hands.","def":"To establish the initial claim on something.","answer":"FIRST DIBS","tidbit":"The game was called dibstones. The obsolete verb dib, meant \"to dab.\" The game
