t describing the men her roommate (and other women) found attractive. Men who \"go to the gym occasionally but also drink heavily on the weekends and enjoy eating eight slices of pizza at a time.\"","def":"","answer":"DAD BOD","tidbit":""},{"cat":"phrase","origin":"Don't be upset, but the origin of the core word of this phrase is unknown. It may be an alteration of the word corruption, which meant \"anger\" in the late 1700s. It may even have been coined by someone trying to sound educated with a bit of pseudo-Latin.","def":"A sudden angry outburst.","answer":"CONNIPTION FIT","tidbit":""},{"cat":"word","origin":"Named for this place in Thessaly (northern Greece) where this attractive ore was found.","def":"1) An iron or steel object that attracts certain substances, like iron.\n2) Something that attracts.","answer":"MAGNET","tidbit":"From Greek ho Magnes lithos meaning \"the Magnesian stone.\""},{"cat":"word","origin":"This word was as a mocking rhyming nickname given by 18th century poet Henry Carey to his contemporary, Ambrose Philips, whose singsong verses Carey (and other poets) considered simplistic and childish.","def":"Weak, indecisive. Also lacking character or substance.","answer":"NAMBY-PAMBY","tidbit":"\"Namby-Pamby's doubly mild,\nOnce a man and twice a child...\nNow he pumps his little wits\nAll by little tiny bits.\""},{"cat":"word","origin":"A French term for a practical joke performed by igniting a paper cornet and blowing the smoke from it into the nose of a sleeping person became slang for \"to disguise,\" which led to this word. Think about a puff of smoke that makes it hard to see.","def":"To conceal or disguise the presence of.","answer":"CAMOUFLAGE","tidbit":""},{"cat":"word","origin":"This disease was thought to be influenced by the stars.","def":"A contagious viral infection.","answer":"FLU","tidbit":"Flu is short for influenza which has the same root as influence."},{"cat":"word","origin":"This word derives from a Latin word meaning \"oak tree.\"","def":"Sturdy, strong, vigorous.","answer":"ROBUST","tidbit":""},{"cat":"phrase","origin":"This phrase, perhaps, is a modification of the Yiddish phrase arumfartsn zikh, \"to fart about.\"","def":"To waste time on random activities.","answer":"FUTZ AROUND","tidbit":""},{"cat":"word","origin":"Try to spit out this word's origin that was one of the four bodily humors of ancient medicine and thought to cause apathy and laziness. From a Greek word meaning \"to burn.\"","def":"Excess mucous produced by the body.","answer":"PHLEGM","tidbit":""},{"cat":"word","origin":"This is a contraction of the Old English word hlafweard, literally, \"one who guards the loaves.\" Guess you are the breadwinner if you get this origin.","def":"Someone who holds a noble rank or high position or who has power or authority over others.","answer":"LORD","tidbit":""},{"cat":"word","origin":"Think too deep to be measured or understood.","def":"Impossible to comprehend.","answer":"UNFATHOMABLE","tidbit":"Fathom is from an Old English word meaning \"outstretched arms.\""},{"cat":"phrase","origin":"This phrase's popularity soared in the 1940s and 1950s when Senator Joseph McCarthy falsely accused government officials and other well-known Americans of being Communists and conspiring against the United States. The expression was inspired by efforts in the 17th century to track down and persecute women accused of sorcery.","def":"A campaign by a group or person in a position of power to search out and persecute people with unpopular views.","answer":"WITCH HUNT","tidbit":""},{"cat":"word","origin":"Thomas Jefferson coined this word in 1781 to disparage French naturalist Georges-Louis Leclerc's claim that American species (including humans) were smaller and inferior to their European counterparts.","def":"Depreciate, scorn as worthless.","answer":"BELITTLE","tidbit":"Jefferson also sent Leclerc a stuffed moose.\nEuropeans mocked Jefferson for using the word arguing that \"be-\" is only properly used with verbs."},{"cat":"phrase","origin":"Think about medieval Europe, where knights and others would genuflect to show deference to a superior or someone powerful.","def":"To submit to someone with power or higher authority.","answer":"BEND THE KNEE","tidbit":""},{"cat":"word","origin":"From a Latin word meaning \"numbness,\" it was the name given to the electric ray, an aquatic creature that uses electric shocks to stun prey or predators. Later the name was given to an electric mine or self-propelled projectile weapon used for destroying ships.","def":"","answer":"TORPEDO","tidbit":"The electric ray is called a torpedo fish."},{"cat":"phrase","origin":"Generally, in four-round golf tournaments players must achieve a specific score after round two to advance to the final stages.","def":"To succeed; to be chosen out of a field of candidates or possibilities.","answer":"MAKE THE CUT","tidbit":""},{"cat":"name","origin":"French naturalist Jean-Baptiste Audebert arbitrarily named this animal after a minor mythological prince or king who fought in the Trojan War in Homer's Iliad. Later, a famous blood group was first discovered in and named for this animal.","def":"","answer":"RHESUS MONKEY","tidbit":"Rhesus of Thrace was the minor mythological figure.\nRhesus factor, commonly called Rh factor (from the first two letters of Rhesus), is a part of your blood type. It's the \"+\" or \"-\" in A+, B-, O+, etc."},{"cat":"word","origin":"Don't complain about it, but during some Christian services, the officiant utters a lengthy list of invocations and supplications to which the congregation responds out loud. The name for this call-and-response practice, from a Greek word meaning \"supplicant,\" later developed a broader meaning.","def":"A long, repetitive list or series of grievances.","answer":"LITANY","tidbit":""},{"cat":"word","origin":"Greek word meaning \"to measure the earth.\"","def":"1) The surface shape of an object.\n2) The mathematical study of the properties, measurement and relationships of points, lines, planes, surfaces, angles and solids.","answer":"GEOMETRY","tidbit":""},{"cat":"phrase","origin":"One intriguing theory ties the name of this tool to a similarly shaped children's toy popular in the 19th century. Though a proven origin will likely remain a mystery, it may be true that it is the only tool that can be used for both repairing and damaging things.","def":"","answer":"MONKEY WRENCH","tidbit":"The phrase \"to throw a monkey wrench into\" something is first cited in the late 19th century.\nA monkey on a stick was a popular 19th century children's toy with a monkey that moved up and down on a shaft."},{"cat":"phrase","origin":"In his poem L'Allegro, John Milton uses this phrase to ask Euphrosyne, the goddess of good cheer, to dance. The phrase was popularized in a song called The Sidewalks of New York at the end of the 1800s.","def":"To dance.","answer":"TRIP THE LIGHT FANTASTIC","tidbit":"Milton wrote:\n\"Come and trip it, as ye go.\nOn the light, fantastic toe.\"\nFrom the song:\n\"Boys and Girls together, Me and Mamie O'Rourke, Tripped the light fantastic, On the sidewalks of New York.\""},{"cat":"phrase","origin":"This phrase, with many meanings over time, originated when pay phone usage was common.","def":"1) To make or help someone make a phone call.\n2) To inform on someone.\n3) An assist in basketball (a pass that leads to a score).\n4) An exceptionally accurate pass in American football.\n5) To help someone.","answer":"DROP A DIME","tidbit":"For many years, it cost a dime to make a call from a pay phone, a call that could be secretly informing on a criminal. In sports, think of an athlete hitting a small coin from a distance through a congested defense. The basketball \"assist\" meaning has broadened to refer to helping someone in general."},{"cat":"phrase","origin":"From a Roman parable popularized by Cicero in his 45 BC book Tusculan Disputations. Dionysius II was a powerful, tyrannical, unhappy king who feared assassination. When a court sycophant remarked how blissful the king's life must be, Dionysius seated him on a golden couch and gave him a feast and servants. But the king also made a point about the precarious nature of power by seating the sycophant under a large blade hung in the air by a single horsehair.","def":"Imminent danger.","answer":"SWORD OF DAMOCLES","tidbit":""},{"cat":"word","origin":"Borrowed from an Anglo-French word meaning \"in the woods,\" the notion being to hide and surprise from a concealed place.","def":"To attack by surprise from a hidden place.","answer":"AMBUSH","tidbit":""},{"cat":"word","origin":"From Latin meaning \"to leap back.\"","def":"1) To return to its original form.\n2) To recover from adversity.","answer":"RESILIENCE","tidbit":""},{"cat":"words","origin":"Let's reveal the secret of both these words' origins: From a Greek word meaning \"to hide or conceal.\"","def":"1) Difficult to understand.\n2) A subterranean chamber or vault used for burials.","answer":"CRYPTIC & CRYPT","tidbit":""},{"cat":"word","origin":"It isn't unnecessary info to explain that the origin of this word comes from a Latin adjective meaning \"to overflow.\"","def":"Exceeding what is sufficient or necessary.","answer":"SUPERFLUOUS","tidbit":""},{"cat":"word","origin":"Though its origin is uncertain, this term, likely inspired by a word in the title of an 1863 Italian play about criminal gangs in a Palermo prison, derives from a Sicilian adjective which roughly translates to \"swagger\" and may have Arabic roots.","def":"","answer":"MAFIA","tidbit":"The play was titled I mafiusi di la Vicaria, or \"The Mafiosi of Vicaria.\" The term is never mentioned in the performance. It was likely put into the title to add local flair."},{"cat":"word","origin":"Old English and Norse mythology give us this word named for Odin, the god of war, poetry and wisdom. Odin and his brothers created the first man and woman from an ash and an alder tree and established the laws of the universe, so it is not surprising that we celebrate him frequently.","def":"","answer":"WEDNESDAY","tidbit":"Wodnesd\u00e6g means \"Woden's day.\" Woden is another name for Odin."},{"cat":"word","origin":"President Abraham Lincoln coined a new meaning for this word in an 1861 message to Congress attacking secessionists trying to make secession and rebellion seem attractive.","def":"Making something difficult or distasteful appear more pleasant or acceptable.","answer":"SUGARCOAT","tidbit":"Originally sugarcoat was to coat bitter pills in sugar to make them easier to swallow.\nThe official government printer felt sugarcoat was too undignified to be used by the President, but Lincoln told him he would not change it."},{"cat":"word","origin":"The origin of this word is utter confusion. From a Greek word meaning \"abyss,\" it first referred to the emptiness before the world came into being. Later, in English in the 1400s, it meant \"underworld.\" In the 1600s, influenced by Classical authors such as Ovid, this word referred to \"a jumbled, disorganized mass.\" Substitute \"mess\" for \"mass\" and you get today's definition.","def":"","answer":"CHAOS","tidbit":""},{"cat":"word","origin":"From a French term of uncertain origin meaning \"to coax.\" Possibly a blend of words meaning \"to chatter like a jay\" and \"to cage,\" this word may derive from the image of sweet talking to a bird in a cage.","def":"To persuade with flattery.","answer":"CAJOLE","tidbit":""},{"cat":"word","origin":"This painful word's origin comes via an Old English word meaning \"twist\" or \"bend.\"","def":"To twist or squirm in pain.","answer":"WRITHE","tidbit":""},{"cat":"word","origin":"An Arabic word meaning \"season,\" used for anything happening once a year (such as a festival), was also used by Portuguese sailors to describe when the Indian Ocean winds blew from the southwest and were right for voyages to the East Indies.","def":"1) A seasonal wind with heavy rain in southern Asia, blowing from the southwest in summer and from the northeast in winter.\n2) A period of torrential rainfall.","answer":"MONSOON","tidbit":""},{"cat":"word","origin":"Alexander Pope, tired of amateur poets asking him to read their poor poetry, complained they were inspired by drinking too much beer. The word Pope used for \"inspired\" referred to the Greek sister goddesses of the arts, but his word was misinterpreted as meaning \"confused.\"","def":"1) To bewilder.\n2) To be mildly amused in a detached way.","answer":"BEMUSE","tidbit":"The Greek sister goddesses are the Muses.\nPope's 1735 poem's first four lines are:\n\"Is there a parson, much bemus'd in beer,\nA maudlin poetess, a rhyming peer,\nA clerk, foredoom'd his father's soul to cross,\nWho pens a stanza, when he should engross?\""},{"cat":"phrase","origin":"A quote attributed to Rear Admiral David Farragut at the 1864 Battle of Mobile Bay, where he forced his way through a Confederate minefield and fought the Confederate Navy for a Union victory. Also, the name of a well-regarded album by Tom Petty and the Heartbreakers.","def":"To press forward no matter the cost or danger.","answer":"DAMN THE TORPEDOES","tidbit":"The full quote is usually cited as Damn the torpedoes, full speed ahead! The actual order (if it ever existed) was Damn the torpedoes! Four bells. Captain Drayton, go ahead! Jouett, full speed!\nDuring the Civil War, underwater mines were referred to as torpedoes after the torpedo fish that could deliver electric shocks."},{"cat":"phrase","origin":"Cricket is a very difficult game to play when the ground is wet.","def":"A difficult situation.","answer":"STICKY WICKET","tidbit":"A wicket consists of three stumps that the bowler targets and the batsman defends. Additionally, the term wicket refers to the rectangular strip of ground between the two sets of stumps where most of the action occurs."},{"cat":"word","origin":"Likely named for the agricultural practice of cutting dried grass with the wide swinging stroke of a scythe.","def":"A powerful blow or punch.","answer":"HAYMAKER","tidbit":""},{"cat":"word","origin":"An Italian word meaning \"bundle,\" and figuratively \"group,\" was used in Italy as part of the names of labor unions and then as part of a political alliance advocating for Italian participation in World War I supporting the Allies. When Mussolini took power, this word developed its current meaning.","def":"A government led by a dictator having complete power, forcibly suppressing opposition and advocating aggressive nationalism and racism.","answer":"FASCISM","tidbit":"Mussolini's governing party was called the Fascista."},{"cat":"phrase","origin":"The first word of this phrase comes from a Latin verb meaning \"to leave behind.\" The phrase itself is from a section of the United States Uniform Code of Military Justice concerning failure to obey orders or regulations.","def":"Abject failure to perform one's responsibility.","answer":"DERELICTION OF DUTY","tidbit":""},{"cat":"word","origin":"Perhaps an extended version of an imitative verb used to describe tossing something from one of its sides over to its other (picture a pancake in midair), this word came to refer to people nimble with their movements or speech. However, true to its roots, this word underwent a transformation and undertook a more negative connotation.","def":"Frivolously unserious or disrespectful.","answer":"FLIPPANT","tidbit":""},{"cat":"word","origin":"Greek for \"put to sleep.\"","def":"1) To influence or control by personal charm or words.\n2) To transfix, spellbind.\n3) To put into a trance characterized by heightened suggestibility.","answer":"HYPNOTIZE","tidbit":""},{"cat":"phrase","origin":"Bumbling, zany police officers in the slapstick silent movies from World War I through the 1920s inspired this phrase.","def":"A highly inept, high-energy group.","answer":"KEYSTONE COPS","tidbit":"The movies were produced at Keystone studios."},{"cat":"phrase","origin":"Originally designed in the late 1800s to help combat forces maintain their rifles, this tool added features over time to address soldiers' other needs such punching holes in leather and opening canned rations and corked bottles of medicines and other liquids. American troops stationed in France began to purchase and use this tool during World War II and dubbed it with its famous name.","def":"1) A person or object with diverse skills or functions.\n2) A multifunction tool.","answer":"SWISS ARMY KNIFE","tidbit":""},{"cat":"name","origin":"The founder of this company put together its name all by himself by combining the first letters of his first and last name, the name of the farm he grew up on and the name of the nearby village.","def":"","answer":"IKEA","tidbit":"IKEA was founded by Ingvar Kamprad. Elmtaryd is the farm he grew up on, and Agunnaryd, the nearby village."},{"cat":"word","origin":"Originally a dog-racing term for a dog that won all its heats but came in second in the final race.","def":"Second place.","answer":"RUNNER-UP","tidbit":""},{"cat":"word","origin":"You might be able to work out that this word combines ancient Greek terms meaning \"beauty\" and \"strength.\"","def":"Body-weight gymnastic fitness exercises.","answer":"CALISTHENICS","tidbit":""},{"cat":"word","origin":"\"False name\" in Greek.","def":"A fake name.","answer":"PSEUDONYM","tidbit":""},{"cat":"word","origin":"From a Greek term meaning \"out of place\" or \"out of one's mind.\"","def":"Great enthusiasm, rapture or delight.","answer":"ECSTATIC","tidbit":"Ecstasy has the same origins."},{"cat":"phrase","origin":"This idiom famously and traditionally yelled at the start of a baseball game has come to mean \"cooperate.\"","def":"","answer":"PLAY BALL","tidbit":""},{"cat":"word","origin":"\"Caused by.\"","def":"","answer":"BECAUSE","tidbit":""},{"cat":"word","origin":"\"To make timid.\"","def":"","answer":"INTIMIDATE","tidbit":""},{"cat":"word","origin":"Literally meaning \"bottom of the bag\" in French, this compound term was adopted into English in the late 17th century to describe a tubelike anatomical structure that ends blindly. It's more common meaning today extends the metaphor down a different path.","def":"A dead-end street.","answer":"CUL-DE-SAC","tidbit":""},{"cat":"word","origin":"Galen, a prominent Greek physician in the Roman Empire used this Latin word for \"straight\" to name the final section of the large intestine because that was how it appeared in the animals he dissected.","def":"","answer":"RECTUM","tidbit":""},{"cat":"word","origin":"A sickness or malady certainly makes a person feel uncomfortable and awkward.","def":"","answer":"DISEASE & ILL AT EASE","tidbit":""},{"cat":"word","origin":"Medieval Latin meaning \"with the times.\"","def":"","answer":"CONTEMPORARY","tidbit":""},{"cat":"word","origin":"An Old English word meaning \"a diver\" gave us the name of this waterfowl that bobs its head in the water for food and to bathe, cool down, play and explore.","def":"","answer":"DUCK","tidbit":"Old English duce means \"a diver or ducker.\""},{"cat":"word","origin":"Bet you were dying to know that this word in Latin means \"to breathe out.\"","def":"1) To die.\n2) To come to an end.\n3) To breathe out.","answer":"EXPIRE","tidbit":""},{"cat":"word","origin":"\"Incapable of speaking\" is the Latin meaning of this childish word.","def":"","answer":"INFANT","tidbit":""},{"cat":"word","origin":"From a Latin word for unclouded, clear weather.","def":"Tranquil.","answer":"SERENE","tidbit":""},{"cat":"word","origin":"A European title for nobility was adapted as a term for a \"linen canopy placed over an officer's tent\" (officers are like military nobles). Later, it evolved in British English to describe large wooden or tentlike structures used for outdoor events. Eventually, the word took on star-studded figurative meanings.","def":"1) A theater or arena sign that displays the names of featured attractions and performers.\n2) Exceptionally popular or skilled.","answer":"MARQUEE","tidbit":""},{"cat":"phrase","origin":"Civil rights leader and congressman John Lewis popularized this phrase to explain that meaningful social change sometimes requires disruption and a willingness to challenge unjust systems through nonviolent, purposeful actions.","def":"","answer":"GOOD TROUBLE","tidbit":""},{"cat":"phrase","origin":"The core word of this phrase likely refers to your neighborhood, area or domain, though one might think, and a few have speculated, that it comes from the game of bowling.","def":"Perfectly suited to your interests or expertise.","answer":"RIGHT UP YOUR ALLEY","tidbit":""},{"cat":"phrase","origin":"The British obsession with this drink led to a positive and to this negative version of this idiom.","def":"Something you don't like.","answer":"NOT MY CUP OF TEA","tidbit":""},{"cat":"phrase","origin":"This second word of this phrase meant, among many other things, \"a casual amount of work.\" The phrase itself may have been initially used when domestic workers would make a cursory effort at housework intending (or claiming to to intend) to come back later for a more thorough cleaning.","def":"A half-hearted effort.","answer":"A LICK AND A PROMISE","tidbit":""},{"cat":"phrase","origin":"Sometimes when traveling or when making life decisions there are multiple paths one can choose. Yogi Berra certainly thought so.","def":"","answer":"FORK IN THE ROAD","tidbit":"Baseball legend and famous quip master Yogi Berra once said, \"when you come to a fork in the road, take it.\""},{"cat":"phrase","origin":"Plants commonly found in domestic gardens, as opposed to rare varietals, is the likely origin of this phrase.","def":"Typical or unremarkable.","answer":"GARDEN VARIETY","tidbit":""},{"cat":"phrase","origin":"Probably derived from the Old Testament story of Adam and Eve, in which Satan appears as a serpent in the Garden of Eden.","def":"To tell lies.","answer":"SPEAK WITH A FORKED TONGUE","tidbit":"All snakes have forked tongues, helping them track prey, mates or other scent trails by comparing chemical cues from each side."},{"cat":"phrase","origin":"From the ancient practices and religious rituals trying to drive out evil spirits from a person believed to be possessed.","def":"To confront and rid oneself of troubling emotions, memories or psychological burdens.","answer":"EXORCISE YOUR DEMONS","tidbit":""},{"cat":"phrase","origin":"Raiders on horseback would rob 17th century travelers on the roads.","def":"A rip-off; a price or profit that is excessive.","answer":"HIGHWAY ROBBERY","tidbit":""},{"cat":"phrase","origin":"An unstable ship could tip over.","def":"Avoid causing trouble or upsetting the status quo.","answer":"DON'T ROCK THE BOAT","tidbit":""},{"cat":"phrase","origin":"The New England colloquial word that begins this phrase may have been influenced by a slang sense of a similar phrase which referred to \"tired and exhausted dogs.\"","def":"Exhausted: very tired.","answer":"TUCKERED OUT","tidbit":"Tucked up once described a tired horse or dog."},{"cat":"phrase","origin":"Shakespeare is likely the source of this equine phrase when his Twelfth Night character Maria uses it to confirm her intentions are exactly as described. By the mid-1800s, the expression was altered slightly and was used to point out a difference rather than a similarity.","def":"Something unlike something else.","answer":"A HORSE OF A DIFFERENT COLOR","tidbit":"Maria says, \"my purpose is, indeed, a horse of that color.\""},{"cat":"word","origin":"Used in the long running comic Barney Google and Snuffy Smith, this bold term was popularized again in movies like An Officer and a Gentleman (1982) and Bill and Ted's Excellent Adventure (1989) and for a while was associated with surfers. Its origin is hazy, but it is likely a portmanteau word.","def":"1) Brazen, remarkable.\n2) Sexy.","answer":"BODACIOUS","tidbit":"Bodacious is probably a blend of the words bold and audacious."},{"cat":"word","origin":"With Latin and French origins, this word translates to \"to be above\" and meant \"arrogant\" before evolving to the Latin meaning of \"excellent.\"","def":"","answer":"SUPERB","tidbit":""},{"cat":"word","origin":"Hear ye, hear ye. This word is from a French and Latin term meaning \"hearer,\" because examining and vouching for business accounts used to be an oral process.","def":"A person who examines and verifies financial records.","answer":"AUDITOR","tidbit":""},{"cat":"phrase","origin":"The first word of this phrase originates from an Old English term associated with being \"possessed by a god\" and so, unsurprisingly, meant \"insane\" or \"foolish.\" Over time, it evolved to describe a lightheaded or euphoric sensation, often linked to extreme joy.","def":"","answer":"GIDDY WITH EXCITEMENT","tidbit":""},{"cat":"word","origin":"In 17th century Europe, a showman's assistant would pretend to eat a poisonous amphibian so the charlatan in charge could \"save\" him by expelling the poison. Guess that is one way to suck up to the boss.","def":"A sycophant.","answer":"TOADY","tidbit":"The assistants were known as toadeaters, which was later shortened to toady."},{"cat":"phrase","origin":"The first word of this phrase refers to the shed skin of a snake. Leave it to snakes, lounging around, shedding skin instead of working.","def":"To avoid some work or to work lazily.","answer":"SLOUGH OFF","tidbit":""},{"cat":"phrase","origin":"Deploying combat troops in a foreign country led to this phrase first attributed to US general Volney Warner during the Iranian Hostage Crisis.","def":"1) Combat troops in a foreign company.\n2) People physically present and working to achieve a goal.","answer":"BOOTS ON THE GROUND","tidbit":""},{"cat":"phrase","origin":"Knife sharpeners used to bend over or lie close to the spinning wheel when they honed blades.","def":"To work hard with focus, dedication and diligence.","answer":"NOSE TO THE GRINDSTONE","tidbit":"In Thiers, France, knife sharpeners were known as \"yellow bellies,\" because they lay on their stomachs (which then got covered in yellow dust) to reduce the strain on their backs. They often had dogs lying on their legs to keep them warm."},{"cat":"phrase","origin":"Picture wild animals scratching, biting and brawling, and you get the origin of this phrase dating to the 1500s.","def":"Battling hard with intensity and determination.","answer":"FIGHTING TOOTH AND NAIL","tidbit":"In A Dialogue of Comfort Against Tribulation written by Thomas More in 1535 states: \"They would fayne kepe them as long as euer they mighte, euen with tooth and nayle.\""},{"cat":"word","origin":"An Old Norse term from the 12th century for the \"the track of an animal or person\" was used in Scotland as the first syllable of a name for a bloodhound used to hunt game or fugitives from justice. This dog name was shortened and its meaning broadened in the 19th century.","def":"A detective or investigator.","answer":"SLEUTH","tidbit":"Sleuthhound got shortened to sleuth."},{"cat":"phrase","origin":"From the title of one of William Shakespeare's plays about identical twin brothers who are separated at birth and experience many humorous and absurd mix-ups when they arrive in the same location by chance.","def":"A situation made ridiculous by multitudes of mistakes that are made throughout.","answer":"COMEDY OF ERRORS","tidbit":""},{"cat":"phrase","origin":"A journalism term for not putting the most important part of a story front and center is the source of this phrase.","def":"Failing to highlight the most important point up front.","answer":"BURYING THE LEDE","tidbit":"The spelling lede was used in newsrooms to avoid confusion with \"lead\" (the metal used in printing presses)."},{"cat":"phrase","origin":"The first word of this phrase, dating back to the year 800, comes from a word meaning \"murderer\" that evolved to mean \"something that causes death.\" It usually referred to poison. Over time, it broadened to signify anything very troubling.","def":"Something or someone that causes you material distress or misery.","answer":"THE BANE OF MY EXISTENCE","tidbit":"Besides this phrase, bane is mostly used today in the name of some poisonous plants, such as Wolfsbane."},{"cat":"phrase","origin":"Suitably, the card game contract bridge is the source of this phrase.","def":"To a great degree; in abundance.","answer":"IN SPADES","tidbit":"Spades is the highest-ranking suit in bridge."},{"cat":"phrase","origin":"One meaning of the first word of this idiom with Scandinavian roots is \"luster\" and refers to creating a smooth, shiny surface, which idiomatically can be thought of as covering up rough or unpleasant details.","def":"To skip or superficially cover something that is important.","answer":"GLOSS OVER","tidbit":"Gloss, as in \"glossary,\" has different roots, ultimately from a Greek word meaning \"the tongue.\""},{"cat":"phrase","origin":"The origin of this phrase is unclear. It may have biblical roots, tracing back to the Greek and Roman Gods who were believed to possess the power to move celestial bodies, or it may simply reflect the sense of impossibility that the phrase implies.","def":"To make extraordinary efforts.","answer":"MOVE HEAVEN AND EARTH","tidbit":""},{"cat":"word","origin":"Combining terms meaning \"individual\" and \"law,\" this Latin term entered English in the 12th century and expanded its meaning from \"a law applying to one person\" to \"a special right or commission\" to, in the 14th century, \"any special advantage.\"","def":"A special right or advantage enjoyed by a person or group.","answer":"PRIVILEGE","tidbit":""},{"cat":"word","origin":"\"Relation by marriage\" is the Latin meaning of this word, which expanded to refer to a kinship as close as family in the early 1600s, before expanding in meaning again.","def":"An attraction to or liking for something.","answer":"AFFINITY","tidbit":""},{"cat":"words","origin":"Probably an imitative sound used to calm a child for sleeping led to both of these words.","def":"1) To cause to sleep or relax; also a pause or decline in activity.\n2) A soothing song for children.","answer":"LULL & LULLABY","tidbit":"The \"by\" in lullaby may be \"goodbye\" or simply a meaningless lengthening."},{"cat":"word","origin":"The Medieval Latin dracunculus, literally \"little dragon\" is the source of this word that, when first used in English, meant \"to fester,\" apparently because certain ulcers or tumors were believed to be caused by small serpents. A festering wound would certainly make a lot of people angry.","def":"To cause anger or deep bitterness and resentment.","answer":"RANKLE","tidbit":""},{"cat":"phrase","origin":"Sometimes the crew must act quickly to keep a boat from capsizing in a storm.","def":"To correct a bad or problematic situation.","answer":"RIGHT THE SHIP","tidbit":""},{"cat":"word","origin":"Reflect on this origin, which is ultimately from a Latin word meaning \"to be surprised,\" \"to wonder at,\" \"to admire.\"","def":"","answer":"MIRROR","tidbit":""},{"cat":"phrase","origin":"The title of Erich Maria Remarque's 1929 novel about a group of Germans who enlist in World War I and learn that their romanticized version of war is far from reality is the source of this phrase.","def":"Nothing is happening.","answer":"ALL QUIET ON THE WESTERN FRONT","tidbit":""},{"cat":"word","origin":"Perhaps it is by chance or maybe it just naturally came to be, but an Old Norse word for \"good luck\" is behind this word.","def":"1) To occur or happen by chance.\n2) To come into being.","answer":"HAPPEN","tidbit":""},{"cat":"word","origin":"From an ancient Greek term meaning \"citizen of the world,\" this word was likely coined by the Cynic philosopher Diogenes (a younger contemporary of Aristotle) to describe himself.","def":"Worldwide in scope or attitude.","answer":"COSMOPOLITAN","tidbit":"Cosmopolitan, the vodka-based cocktail, is from the 1970s and was popularized in the 1990s because Carrie Bradshaw (played by Sarah Jessica Parker) drank it in the TV program Sex and the City."},{"cat":"phrase","origin":"You don't want to be late for your ship's departure.","def":"Fail to take advantage of an opportunity.","answer":"MISS THE BOAT","tidbit":""},{"cat":"phrase","origin":"Music can really resonate with people.","def":"To elicit or trigger a memory or emotional response.","answer":"STRIKE A CHORD","tidbit":""},{"cat":"phrase","origin":"Monty Python's film Life of Brian (1979) may have been the origin of this phrase. In an early scene, shepherds humorously discuss the impossible task of trying to gather up felines, but the phrase's popularity is likely from a famous 1980 Super Bowl commercial that hilariously depicted cowboys trying to do the same thing.","def":"To be nearly impossible to organize. Usually said of a group of people.","answer":"HERDING CATS","tidbit":"Golf | LiMu Emu & Doug | Liberty Mutual Insurance Commercial"},{"cat":"word","origin":"In 1903 this cracker was the only food on the market that was baked using electricity.","def":"","answer":"TRISCUIT","tidbit":"Triscuit stands for \"electricity biscuit.\""},{"cat":"phrase","origin":"A phrase that pointed out how annoying it can be to play the same note over and over on a stringed instrument was shortened to give us this idiom dating from the 16th century.","def":"To dwell on or nag about a subject tirelessly.","answer":"HARP ON","tidbit":"Harp on is a shortening of harp on the same string."},{"cat":"phrase","origin":"These rodents have very dirty and messy quarters.","def":"A disorganized, cluttered or confusing situation.","answer":"RAT'S NEST","tidbit":""},{"cat":"phrase","origin":"The first word of this phrase comes from the Old English wrotan, which referred to a pig's snout. Among other things, pigs use their snout for foraging through dirt for food.","def":"To search for a while and find (and often remove) the person or thing that is causing a problem.","answer":"ROOT OUT","tidbit":""},{"cat":"phrase","origin":"Perhaps from boxing when a corrupt fighter intentionally loses a bout by dropping to the canvas to feign a knockout.","def":"Intentionally lose or fail.","answer":"TAKE A DIVE","tidbit":""},{"cat":"word","origin":"The son of the god Zeus was famous for his superhuman strength and for completing monumentally difficult feats to pacify the god Apollo.","def":"Of extraordinary power or difficulty.","answer":"HERCULEAN","tidbit":""},{"cat":"phrase","origin":"A company founded in 1925 to place actors in minor roles in film and television is behind this phrase.","def":"Someone with traits that fit established stereotypes or archetypes.","answer":"STRAIGHT OUT OF CENTRAL CASTING","tidbit":""},{"cat":"phrase","origin":"Shaking a barred enclosure, say at a zoo, is likely to make the animal inside very upset.","def":"To purposefully anger, upset or unnerve you, especially to impact your performance or undermine your credibility.","answer":"RATTLE YOUR CAGE","tidbit":""},{"cat":"phrase","origin":"Shakespeare likely popularized this phrase in The Comedy of Errors, written in 1590, though the phrase is first recorded circa 1460.","def":"Without logic, order, purpose or meaning.","answer":"NEITHER RHYME NOR REASON","tidbit":"Rhyme suggests poetry and the arts, while reason stands for logic, hence something that can't be understood logically or creatively."},{"cat":"phrase","origin":"Sailors quickly climbing or hauling in ropes evolved to this idiom about earning income quickly.","def":"","answer":"MAKING MONEY HAND OVER FIST","tidbit":""},{"cat":"phrase","origin":"Likely popularized by Shakespeare's Hamlet in a famous speech where he exclaims that he finds no joy in his life and wonders if man is noble or just like dust.","def":"An unpleasant, difficult person.","answer":"A PIECE OF WORK","tidbit":"From Shakespeare's Hamlet, 1602:\n\"What a piece of work is a man! how noble in reason! how infinite in faculty! in form and moving how express and admirable! in action how like an angel! in apprehension how like a god! the beauty of the world! the paragon of animals! And yet, to me, what is this quintessence of dust? man delights not me: no, nor woman neither, though by your smiling you seem to say so.\""},{"cat":"phrase","origin":"This phrase, dating to the 1920s, reflects how certain animals freeze in fright when confronted with bright lights. In 1988, Vice presidential candidate Dan Quayle was so inexperienced that this idiom was sometimes used to describe him.","def":"Very scared or frightened.","answer":"DEER IN HEADLIGHTS","tidbit":""},{"cat":"word","origin":"This colorful word comes from a Latin word meaning \"full of life.\"","def":"1) Very bright or strong in color.\n2) Lively.\n3) Intense.","answer":"VIVID","tidbit":""},{"cat":"word","origin":"Chinese words meaning \"soft\" and \"art\" are behind this word.","def":"1) A system of weaponless fighting.\n2) Using an opponent's strengths or one's own weaknesses to accomplish a goal.","answer":"JUJITSU","tidbit":""},{"cat":"word","origin":"This unit of sound intensity was named in part for the famous inventor of the telephone.","def":"","answer":"DECIBEL","tidbit":"The decibel is a logarithmic unit. A decibel equals one-tenth of a Bel."},{"cat":"word","origin":"Though there are many theories, why this food means \"little donkey\" in Spanish is unclear. Its shape does slightly resemble a donkey's ears, as well as the rolled packs and bedrolls they sometimes carry.","def":"","answer":"BURRITO","tidbit":""},{"cat":"phrase","origin":"The adjective that starts this phrase means \"stormy\" but comes from Latin for \"unmerciful.\"","def":"","answer":"INCLEMENT WEATHER","tidbit":""},{"cat":"word","origin":"Likely passing from Arabic into Europe through the spice trade, this word meaning \"to sift\" referred to cleansing dirt and impurities from spices. Over time the term developed a generalized meaning of altering or scrambling a message.","def":"To confuse or jumble.","answer":"GARBLE","tidbit":""},{"cat":"word","origin":"A Latin word meaning \"expensive\" is unsurprisingly behind this term that describes things rich, luxurious and magnificent.","def":"","answer":"SUMPTUOUS","tidbit":""},{"cat":"phrase","origin":"From medieval German folklore popularized in English by Robert Browning in an 1842 poem. A man is hired by the citizens of a town to get rid of a plague of rats. The man, dressed in multicolored clothing, plays a magic flute to lure the rats to a river outside the town, where the rats drown. When the townspeople refuse to pay him, he uses the flute to lure their children away from home.","def":"To bear the consequences or repercussions.","answer":"PAY THE PIPER","tidbit":"The original full expression is he who pays the piper calls the tune."},{"cat":"phrase","origin":"This phrase describes when newspaper printing was halted to add late breaking news. In 2014, the New York Times reported at least six such events in 14 years.","def":"Something urgent, new, important or surprising has occurred. Sometimes used sarcastically.","answer":"STOP THE PRESSES","tidbit":""},{"cat":"word","origin":"This term was coined during the legendary 1974 boxing match known as The Rumble in the Jungle between Muhammad Ali and George Foreman. Ali leaned against the edges of the boxing ring, absorbing punches to tire Foreman out and then pulled a shocking reversal to win by a knockout.","def":"A strategy where someone appears passive or vulnerable only to turn the tables when the time is right.","answer":"ROPE-A-DOPE","tidbit":"The tactic was dubbed rope-a-dope because Ali appeared to be a \"dope on the ropes.\""},{"cat":"word","origin":"Lewis Carroll invented this word for his 1872 novel Through the Looking Glass to describe the movements of the \"beamish boy\" who, warned to \"beware the Jabberwock,\" sets out with his sword and ultimately slays the terrifying creature.","def":"To move in a clumsy or noisy manner.","answer":"GALUMPH","tidbit":"Galumph is likely a portmanteau of gallop and triumphant."},{"cat":"phrase","origin":"No one seems to have mastered the origin of this phrase. Logically, it could have come from adjusting the knobs of mechanical devices so they would work optimally. A few claim this phrase comes from the use of rotary phones.","def":"Exhibiting total concentration on and mastery of a sport or task.","answer":"DIALED IN","tidbit":""},{"cat":"word","origin":"Probably inspired by the name of an extraordinarily intelligent supervillain and adversary of Superman.","def":"A superintelligent person.","answer":"BRAINIAC","tidbit":"Brainiac is a portmanteau of brain and maniac."},{"cat":"phrase","origin":"A way to remove an adhesive dressing so the pain is quickly over with led to this idiom.","def":"To do something painful or unpleasant very quickly so that the discomfort is short lived.","answer":"RIP THE BAND-AID OFF","tidbit":""},{"cat":"word","origin":"This drug was named for the Greek god of dreams.","def":"","answer":"MORPHINE","tidbit":"Morpheus was a son of Hypnos and the god of dreams."},{"cat":"word","origin":"Directly from Latin meaning \"worn out, ground to pieces,\" this word was used religiously in Medieval times to mean \"to crush in spirit by a sense of sin.\"","def":"Feeling regret for one's sins or offenses.","answer":"CONTRITE","tidbit":""},{"cat":"phrase","origin":"Taken from the title of a 1974 book describing the Allies' failure to capture key German-controlled transportation structures in the Netherlands during World War II.","def":"Beyond reasonable or possible.","answer":"A BRIDGE TOO FAR","tidbit":"The book was A Bridge Too Far by Cornelius Ryan. The title itself comes from a British general's warning that the Arnhem bridge, a key strategic target, might be \"a bridge too far.\" He was right. It was much farther from the Allied forces than anticipated, and the operation to destroy it failed."},{"cat":"word","origin":"Let's not overhype this origin that comes from a Latin root meaning \"time\" that was extended to mean \"storm\" or \"season.\"","def":"1) A violent windstorm.\n2) A violent commotion.","answer":"TEMPEST","tidbit":"In many ancient languages words meaning \"weather\" were originally words for \"time.\""},{"cat":"word","origin":"From Ancient Greek and Latin words meaning \"breeze,\" this word developed its modern metaphysical meaning of \"a subtle emanation or distinctive atmosphere surrounding a person or thing\" in the 19th century.","def":"","answer":"AURA","tidbit":""},{"cat":"word","origin":"A Latin root for \"foot\" influenced this word from Old French and Latin meaning \"to entangle or hinder.\" The Old French word had a second meaning, \"to accuse someone of a crime,\" which eventually led to today's definitions.","def":"1) To cast doubt on.\n2) To charge a public official with a crime or misconduct before a tribunal.","answer":"IMPEACH","tidbit":""},{"cat":"phrase","origin":"A tool developed to help navigate steam-powered locomotives became a broad-based way to regulate traffic and eventually acquired a metaphorical meaning.","def":"Authority or permission to proceed.","answer":"GREEN LIGHT","tidbit":""},{"cat":"phrase","origin":"Jesus uses this phrase to describe honest, good people during his Sermon on the Mount as detailed in Matthew 5:13.","def":"A person or group of people considered to be honest, dependable and trustworthy.","answer":"SALT OF THE EARTH","tidbit":""},{"cat":"word","origin":"From a Late Latin word meaning \"to bend the knee.\"","def":"","answer":"GENUFLECT","tidbit":""},{"cat":"phrase","origin":"Fishing is the likely origin of this phrase. Think of the one that got away.","def":"No longer responsible or selected.","answer":"OFF THE HOOK","tidbit":"Starting in the 1980s and '90s, off the hook also meant \"cool,\" a meaning originating in hip-hop culture that probably meant someone was popular if their phone was \"ringing off the hook.\""},{"cat":"word","origin":"English borrowed t // =================================================================
// GAME STATE
// =================================================================
let puzzle, answer, answerClean;
let currentGuess = [], cursorPos = 0, guesses = [], gameOver = false;
let revealedLetters = new Set(), defShown = false, revealCount = 0, wrongCount = 0;
let streak = 0, puzzleIndex = 0;
let timerInterval = null, startTime = null, elapsedSeconds = 0;

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  return m + ':' + String(s).padStart(2, '0');
}

const KEYBOARD_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','\u232B']
];
const CAT_LABELS  = { word:'Word', phrase:'Phrase', name:'Name', words:'Two Words' };
const CAT_CLASSES = { word:'', phrase:'cat-phrase', name:'cat-name', words:'cat-words' };

// =================================================================
// PUZZLE SELECTION
// =================================================================
function getDayPuzzleIndex() {
  const today = new Date().toISOString().slice(0, 10);
  if (DATE_OVERRIDES[today] !== undefined) return DATE_OVERRIDES[today];
  const start = new Date('2026-01-01T00:00:00');
  const now   = new Date();
  const diff  = Math.floor((now - start) / 86400000);
  return ((diff % PUZZLES.length) + PUZZLES.length) % PUZZLES.length;
}

// =================================================================
// TIMER
// =================================================================
function startTimer() {
  startTime = Date.now() - elapsedSeconds * 1000;
  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timerDisplay').textContent = formatTime(elapsedSeconds);
  }, 500);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// =================================================================
// INIT
// =================================================================
function safeGetState() {
  try { return JSON.parse(localStorage.getItem('orijinzState') || '{}'); } catch(e) { return {}; }
}
function safeSaveState(obj) {
  try { localStorage.setItem('orijinzState', JSON.stringify(obj)); } catch(e) {}
}

function initGame() {
  const stored = safeGetState();
  streak      = stored.streak || 0;
  puzzleIndex = (stored.devPuzzleIndex !== undefined) ? stored.devPuzzleIndex : getDayPuzzleIndex();

  const todayKey = new Date().toDateString();
  if (stored.lastPlayed === todayKey && stored.guesses) {
    guesses         = stored.guesses;
    revealedLetters = new Set(stored.revealed || []);
    defShown        = stored.defShown   || false;
    revealCount     = stored.revealCount || 0;
    wrongCount      = stored.wrongCount  || 0;
    gameOver        = stored.gameOver   || false;
    elapsedSeconds  = stored.elapsed    || 0;
  }

  puzzle      = PUZZLES[puzzleIndex];
  answer      = puzzle.answer.toUpperCase();
  answerClean = answer.replace(/[\s-]/g, '');

  const now = new Date();
  document.getElementById('dateBadge').innerHTML =
    now.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + '<br>' + now.getFullYear();
  document.getElementById('puzzleNum').textContent = 'Puzzle #' + (puzzleIndex + 1);
  document.getElementById('originText').textContent = puzzle.origin;

  const badge = document.getElementById('categoryBadge');
  badge.textContent = CAT_LABELS[puzzle.cat] || puzzle.cat;
  badge.className   = 'category-badge ' + (CAT_CLASSES[puzzle.cat] || '');

  if (puzzle.def && defShown) {
    document.getElementById('defText').textContent = puzzle.def;
    document.getElementById('defPanel').classList.add('visible');
  }

  buildKeyboard();
  document.getElementById('guessHistory').innerHTML = '';
  updateCurrentInputDisplay();

  if (gameOver) {
    document.getElementById('timerDisplay').textContent = formatTime(elapsedSeconds);
    showResult(true);
  } else {
    startTimer();
  }
  updateRevealBtn();
  updateDefBtn();
  initDevTap();
}

function saveState() {
  safeSaveState({
    streak, lastPlayed: new Date().toDateString(),
    guesses, revealed: [...revealedLetters],
    defShown, revealCount, wrongCount, gameOver, elapsed: elapsedSeconds
  });
}

// =================================================================
// RENDERING
// =================================================================
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KEYBOARD_ROWS.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className   = 'kb-key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.dataset.key = key;
      btn.addEventListener('click', () => handleKey(key));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function fitWordGroups() {
  const display = document.getElementById('currentInputDisplay');
  if (!display) return;
  let availW = 0;
  let el = display;
  while (el && !availW) { availW = el.clientWidth; el = el.parentElement; }
  if (!availW) return;
  display.querySelectorAll('.word-group').forEach(g => {
    // Reset previous scaling
    g.style.zoom = '';
    g.querySelectorAll('.letter-tile').forEach(t => { t.style.width = ''; t.style.height = ''; t.style.fontSize = ''; });
    const groupW = g.scrollWidth;
    if (groupW > availW * 0.98) {
      g.style.zoom = String(availW / groupW);
    }
  });
}

function updateCurrentInputDisplay() {
  const display = document.getElementById('currentInputDisplay');
  display.innerHTML = '';
  let inputSlot = 0;
  let group = null;
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] === ' ' || answer[i] === '-') {
      group = null;
      const s = document.createElement('div');
      s.className   = 'letter-tile space-tile';
      s.textContent = answer[i] === '-' ? '-' : '\u00B7';
      display.appendChild(s);
      continue;
    }
    if (!group) {
      group = document.createElement('div');
      group.className = 'word-group';
      display.appendChild(group);
    }
    const tile = document.createElement('div');
    tile.className        = 'letter-tile';
    tile.style.transition = '';
    tile.style.transform  = '';
    if (revealedLetters.has(i) || gameOver) {
      tile.textContent = answer[i];
      tile.classList.add('revealed');
    } else {
      tile.textContent = currentGuess[inputSlot] || '';
      if (inputSlot === cursorPos) tile.classList.add('active');
      const capturedSlot = inputSlot;
      tile.style.cursor = 'pointer';
      tile.addEventListener('click', () => {
        if (gameOver) return;
        cursorPos = capturedSlot;
        updateCurrentInputDisplay();
      });
      inputSlot++;
    }
    group.appendChild(tile);
  }
  requestAnimationFrame(() => requestAnimationFrame(fitWordGroups));
}

function getLetterState(guessWord, idx) {
  const gl = guessWord[idx];
  if (!gl) return 'wrong';
  return gl === answerClean[idx] ? 'correct-pos' : 'wrong';
}

function updateKeyboard() {
  // Keyboard letter highlighting disabled — answers can reuse letters
}

// =================================================================
// INPUT HANDLING
// =================================================================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === ']') { e.preventDefault(); devNext();  return; }
  if (e.ctrlKey && e.key === '[') { e.preventDefault(); devReset(); return; }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if      (e.key === 'Enter')     handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('\u232B');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(key) {
  if (gameOver) return;
  let available = 0;
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] !== ' ' && answer[i] !== '-' && !revealedLetters.has(i)) available++;
  }
  if (key === '\u232B' || key === 'BACKSPACE') {
    if (cursorPos > 0) {
      cursorPos--;
      currentGuess[cursorPos] = '';
    } else {
      currentGuess[0] = '';
    }
    updateCurrentInputDisplay();
    updateRevealBtn();
  } else if (key === 'ENTER') {
    submitGuess();
  } else if (/^[A-Z]$/.test(key)) {
    if (cursorPos < available) {
      currentGuess[cursorPos] = key;
      cursorPos = Math.min(cursorPos + 1, available);
      updateCurrentInputDisplay();
      updateRevealBtn();
      const filled = Array.from({length: available}, (_, i) => currentGuess[i] || '').filter(c => c !== '').length;
      if (filled === available) setTimeout(submitGuess, 200);
    }
  }
}

function submitGuess() {
  let fullGuess = '', inputIdx = 0;
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] === ' ' || answer[i] === '-') continue;
    fullGuess += revealedLetters.has(i) ? answer[i] : (currentGuess[inputIdx++] || '');
  }
  const available = answerClean.length - revealedLetters.size;
  const filledCount = Array.from({length: available}, (_, i) => currentGuess[i] || '').filter(c => c !== '').length;
  if (filledCount < available) {
    showToast('Not enough letters!');
    const d = document.getElementById('currentInputDisplay');
    d.classList.add('row-shake');
    setTimeout(() => d.classList.remove('row-shake'), 600);
    return;
  }
  const states = Array.from({length: fullGuess.length}, (_, i) => getLetterState(fullGuess, i));
  const won    = fullGuess === answerClean;

  wrongCount += states.filter((st, i) => st === 'wrong' && !revealedLetters.has(i)).length;
  animateGuessSubmit(states, won, () => {
    guesses.push({ word: fullGuess, states });
    currentGuess = []; cursorPos = 0;

    if (won) {
      gameOver = true;
      streak++;
      updateCurrentInputDisplay();
      launchConfetti();
      setTimeout(() => showResult(true), 1800);
    } else {
      // Lock correct-position letters so they stay at their exact tile positions
      let slot = 0;
      for (let i = 0; i < answer.length; i++) {
        if (answer[i] === ' ' || answer[i] === '-') continue;
        if (!revealedLetters.has(i) && states[slot] === 'correct-pos') revealedLetters.add(i);
        slot++;
      }
      currentGuess = []; cursorPos = 0;
      updateCurrentInputDisplay();
      showToast('Not quite \u2014 keep trying!', 1800);
    }
    saveState();
  });
}

// =================================================================
// TILE ANIMATION ENGINE
// =================================================================
function animateGuessSubmit(states, won, onComplete) {
  const display  = document.getElementById('currentInputDisplay');
  const tiles    = [...display.querySelectorAll('.letter-tile:not(.space-tile)')];
  const FLIP_DUR = 400, STAGGER = 100;

  // Use absolute index so stateIdx aligns with states[] (which includes revealed positions)
  const tileData = tiles.map((tile, i) => ({
    tile, stateIdx: i, isRevealed: tile.classList.contains('revealed')
  }));
  const totalFlip = (tileData.length - 1) * STAGGER + FLIP_DUR;

  if (won) {
    tileData.forEach(({ tile }, i) => {
      setTimeout(() => {
        tile.style.transition = 'transform 0.2s ease';
        tile.style.transform  = 'rotateY(90deg)';
        setTimeout(() => {
          tile.style.background  = 'var(--blue)';
          tile.style.borderColor = 'var(--blue)';
          tile.style.color       = 'white';
          tile.style.transform   = 'rotateY(0deg)';
        }, FLIP_DUR / 2);
      }, i * STAGGER);
    });
    setTimeout(() => {
      tileData.forEach(({ tile }, i) => setTimeout(() => tile.classList.add('win-bounce'), i * 80));
      setTimeout(onComplete, tileData.length * 80 + 700);
    }, totalFlip + 80);

  } else {
    tileData.forEach(({ tile, stateIdx, isRevealed }, i) => {
      setTimeout(() => {
        tile.style.transition = 'transform 0.2s ease';
        tile.style.transform  = 'rotateY(90deg)';
        setTimeout(() => {
          if (isRevealed) {
            tile.style.background  = 'var(--blue)';
            tile.style.borderColor = 'var(--blue)';
          } else {
            const st = states[stateIdx];
            tile.style.background  = st === 'correct-pos' ? 'var(--blue)' : '#c0392b';
            tile.style.borderColor = st === 'correct-pos' ? 'var(--blue)' : '#c0392b';
          }
          tile.style.color     = 'white';
          tile.style.transform = 'rotateY(0deg)';
        }, FLIP_DUR / 2);
      }, i * STAGGER);
    });
    setTimeout(() => {
      tileData.forEach(({ tile, stateIdx, isRevealed }) => {
        if (isRevealed || states[stateIdx] === 'correct-pos') return;
        tile.style.transition  = 'background 0.3s ease, border-color 0.3s ease, color 0.3s ease';
        tile.style.background  = 'var(--bg3)';
        tile.style.borderColor = 'var(--border)';
        tile.style.color       = 'var(--white)';
        tile.textContent       = '';
      });
      setTimeout(onComplete, 400);
    }, totalFlip + 600);
  }
}

// =================================================================
// CONFETTI
// =================================================================
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const COLORS  = ['#4CB3D1','#87C7DD','#f5c842','#f0932b','#e8eaf6','#3490aa'];
  const parts   = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 6,
    d: 2 + Math.random() * 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltSpeed: 0.05 + Math.random() * 0.1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  }));
  let frame = 0;
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += p.d;
      p.x += Math.sin(frame * 0.02 + p.tiltAngle) * 1.2;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      ctx.save();
      ctx.fillStyle   = p.color;
      ctx.globalAlpha = Math.max(0, 1 - p.y / (canvas.height * 0.85));
      if (p.shape === 'rect') {
        ctx.translate(p.x, p.y); ctx.rotate(p.tilt * Math.PI / 180);
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 1.6);
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r / 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    });
    frame++;
    if (frame < 180) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  })();
}

// =================================================================
// CLUES
// =================================================================
function showDefinition() {
  if (!puzzle.def || defShown) return;
  defShown = true;
  document.getElementById('defText').textContent = puzzle.def;
  document.getElementById('defPanel').classList.add('visible');
  updateDefBtn();
  saveState();
}

function updateDefBtn() {
  const btn = document.getElementById('defBtn');
  if (!puzzle.def) {
    btn.style.display = 'none';
  } else if (defShown) {
    btn.disabled = true;
    btn.querySelector('.clue-count').textContent = '(used)';
  }
}

function revealLetter() {
  if (gameOver) return;
  // Build slotIdx map: answer position → currentGuess index (for non-revealed, non-space positions)
  let slot = 0;
  const slotMap = {};
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] === ' ' || answer[i] === '-' || revealedLetters.has(i)) continue;
    slotMap[i] = slot++;
  }
  // Collect all undetermined positions (not revealed, not already correctly typed)
  const candidates = [];
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] === ' ' || answer[i] === '-' || revealedLetters.has(i)) continue;
    if ((currentGuess[slotMap[i]] || '') !== answer[i]) candidates.push(i);
  }
  if (candidates.length === 0) return;
  // Pick a random undetermined position
  const pos = candidates[Math.floor(Math.random() * candidates.length)];
  // Remove just that slot from currentGuess without resetting other typed letters
  const sIdx = slotMap[pos];
  currentGuess.splice(sIdx, 1);
  if (cursorPos > sIdx) cursorPos--;
  revealedLetters.add(pos);
  revealCount++;
  updateCurrentInputDisplay();
  updateRevealBtn();
  saveState();
  showToast('Letter revealed! "' + answer[pos] + '"', 1200);
  // If this reveal completed the puzzle, trigger the win sequence
  if (candidates.length === 1) {
    setTimeout(submitGuess, 400);
  }
}

function updateRevealBtn() {
  const btn = document.getElementById('revealBtn');
  // Count positions that are neither revealed nor already correctly typed by the user
  let slot = 0, undetermined = 0;
  for (let i = 0; i < answer.length; i++) {
    if (answer[i] === ' ' || answer[i] === '-' || revealedLetters.has(i)) continue;
    if ((currentGuess[slot] || '') !== answer[i]) undetermined++;
    slot++;
  }
  btn.disabled = (undetermined <= 0 || gameOver);
  btn.querySelector('.clue-count').textContent = revealCount > 0 ? '(used ' + revealCount + '\xD7)' : '';
}

// =================================================================
// RESULT & SHARE
// =================================================================
function showResult(won) {
  stopTimer();
  document.getElementById('resultPanel').classList.add('visible');
  document.getElementById('instructionText').style.display = 'none';

  const emoji = document.getElementById('resultEmoji');
  const hl    = document.getElementById('resultHeadline');
  const ans   = document.getElementById('resultAnswer');
  const msg   = document.getElementById('resultMsg');

  ans.textContent = answer;

  const timeStr = formatTime(elapsedSeconds);

  if (won) {
    const t = guesses.length;
    if      (t === 1) { emoji.textContent = '\uD83C\uDFC6'; hl.textContent = 'Legendary!'; }
    else if (t <= 2)  { emoji.textContent = '\uD83C\uDFAF'; hl.textContent = 'Brilliant!'; }
    else if (t <= 3)  { emoji.textContent = '\u2B50';       hl.textContent = 'Impressive!'; }
    else if (t <= 4)  { emoji.textContent = '\u2728';       hl.textContent = 'Well done!'; }
    else              { emoji.textContent = '\uD83D\uDC4F'; hl.textContent = 'You got it!'; }
    const revealStr = revealCount > 0 ? ' · ' + revealCount + ' letter' + (revealCount === 1 ? '' : 's') + ' revealed' : '';
    const wrongStr  = wrongCount  > 0 ? ' · ' + wrongCount  + ' letter' + (wrongCount  === 1 ? '' : 's') + ' guessed incorrectly' : '';
    msg.innerHTML = 'Solved in ' + timeStr + revealStr + wrongStr + '.<br>Share the fun with friends!';
  } else {
    emoji.textContent = '\uD83D\uDCDA';
    hl.textContent    = 'Better luck tomorrow!';
    msg.textContent   = 'Today\'s answer was "' + answer + '". Come back tomorrow for a new origin puzzle!';
  }

  if (puzzle.tidbit) {
    document.getElementById('tidbitText').textContent = puzzle.tidbit;
    document.getElementById('tidbitPanel').classList.add('visible');
  }
}

function shareResult() {
  const timeStr = formatTime(elapsedSeconds);
  const text = 'Orijinz Daily #' + (puzzleIndex + 1) + ' \u23F1\uFE0F ' + timeStr + '\nhttps://www.entspire.com/orijinz-daily';
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard! \uD83D\uDCCB', 2000));
}

// =================================================================
// TOAST
// =================================================================
let toastTimer;
function showToast(msg, duration) {
  duration = duration || 1800;
  const t  = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// =================================================================
// DEV TOOLS
// URL params: ?next (advance), ?reset (reset), ?puzzle=N (go to puzzle N)
// Desktop: Ctrl+] = next, Ctrl+[ = reset
// Mobile: triple-tap puzzle number = next, long-press = reset
// =================================================================
function devReset() { try { localStorage.removeItem('orijinzState'); } catch(e) {} location.href = location.pathname; }
function devNext() {
  const state = safeGetState();
  safeSaveState({
    ...state,
    devPuzzleIndex: ((puzzleIndex + 1) % PUZZLES.length),
    lastPlayed: null, guesses: [], revealed: [],
    defShown: false, revealCount: 0, wrongCount: 0, gameOver: false, elapsed: 0
  });
  location.href = location.pathname;
}
function devGoTo(n) {
  const idx = Math.max(0, Math.min(n - 1, PUZZLES.length - 1));
  const state = safeGetState();
  safeSaveState({
    ...state,
    devPuzzleIndex: idx,
    lastPlayed: null, guesses: [], revealed: [],
    defShown: false, revealCount: 0, wrongCount: 0, gameOver: false, elapsed: 0
  });
  location.href = location.pathname;
}
// Handle URL parameters
try {
  const p = new URLSearchParams(location.search);
  if (p.has('next'))   devNext();
  else if (p.has('reset'))  devReset();
  else if (p.has('puzzle')) devGoTo(+p.get('puzzle'));
} catch(e) {}
// Show dev toolbar only on github.io or local file
try {
  const h = location.hostname;
  if (h.includes('github.io') || h === 'localhost' || h === '') {
    const tb = document.getElementById('devToolbar');
    if (tb) tb.style.display = 'flex';
  }
} catch(e) {}
let devTapCount = 0, devTapTimer = null;
function initDevTap() {
  const el = document.getElementById('puzzleNum');
  if (!el) return;
  el.style.cursor = 'pointer';
  el.addEventListener('click', function() {
    devTapCount++;
    clearTimeout(devTapTimer);
    devTapTimer = setTimeout(() => { devTapCount = 0; }, 800);
    if (devTapCount >= 3) { devTapCount = 0; devNext(); }
  });
  el.addEventListener('contextmenu', function(e) { e.preventDefault(); devReset(); });
  let holdTimer;
  el.addEventListener('touchstart', function() { holdTimer = setTimeout(devReset, 900); }, {passive:true});
  el.addEventListener('touchend',   function() { clearTimeout(holdTimer); }, {passive:true});
}

// =================================================================
// START
// =================================================================
let _initialized = false;
function safeInit() {
  if (_initialized) return;
  _initialized = true;
  try { initGame(); } catch(e) {
    const el = document.getElementById('originText');
    if (el) el.textContent = '\u26A0\uFE0F Could not load puzzle: ' + e.message;
  }
}
document.addEventListener('DOMContentLoaded', safeInit);
if (document.readyState !== 'loading') safeInit();
window.addEventListener('resize', fitWordGroups);
</script>
